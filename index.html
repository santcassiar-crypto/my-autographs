
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VaultOS v3 — Intelligence Layer</title>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:Arial;
background:radial-gradient(circle at top,#111,#000);
color:#fff;
}

header{
position:sticky;top:0;
background:rgba(10,10,10,.95);
padding:14px;
border-bottom:1px solid #222;
backdrop-filter:blur(10px);
z-index:10;
}

.title{font-size:20px;font-weight:bold}
.subtitle{font-size:12px;color:#888}

input,select,button{
width:100%;
padding:10px;
margin-top:8px;
border-radius:10px;
border:1px solid #333;
background:#0b0b0b;
color:#fff;
}

button{cursor:pointer;font-weight:bold}
button:hover{border-color:#777}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
padding:10px;
}

.box{
background:#111;
border:1px solid #222;
border-radius:14px;
padding:12px;
text-align:center;
}

.card{
background:#111;
border:1px solid #222;
border-radius:14px;
padding:12px;
margin:10px;
}

.small{font-size:11px;color:#888}

.status-success{border-left:4px solid #00ff99}
.status-pending{border-left:4px solid orange}
.status-rts{border-left:4px solid red}
.status-logged{border-left:4px solid #44aaff}
.status-sent{border-left:4px solid violet}

.badge{
font-size:11px;
padding:3px 6px;
border:1px solid #333;
border-radius:6px;
display:inline-block;
margin-top:6px;
color:#aaa;
}
</style>
</head>

<body>

<header>
<div class="title">🧠 VaultOS v3</div>
<div class="subtitle">Intelligence + Dedup + Priority Engine</div>
<input id="search" placeholder="Search vault...">
</header>

<div class="grid" id="stats"></div>

<div id="top10"></div>

<div id="list"></div>

<script>

const STORAGE_KEY="vault_v3";

let DB=[];
let search="";

/* -------------------------
FULL DATA LOAD (YOU PASTE)
--------------------------*/
const RAW = /* YOUR FULL JSON HERE */ null;

/* -------------------------
STATUS NORMALISER
--------------------------*/
function normStatus(s){
s=(s||"").toUpperCase();
if(s.includes("RTS")) return "RTS";
if(s.includes("SUCCESS")) return "SUCCESS";
if(s.includes("LOGGED")) return "LOGGED";
if(s.includes("SENT")) return "SENT";
return "PENDING";
}

/* -------------------------
DEDUP ENGINE (by ID)
--------------------------*/
function dedupe(arr){
const map=new Map();
arr.forEach(x=>{
if(!map.has(x.ID)) map.set(x.ID,x);
else {
map.set(x.ID,{
...map.get(x.ID),
...x
});
}
});
return [...map.values()];
}

/* -------------------------
LOAD SYSTEM
--------------------------*/
function load(){

let raw=localStorage.getItem(STORAGE_KEY);

if(raw){
try{
DB=dedupe(JSON.parse(raw));
return render();
}catch(e){}
}

if(RAW){
DB=dedupe(RAW);
save();
render();
}
}

function save(){
localStorage.setItem(STORAGE_KEY,JSON.stringify(DB));
}

/* -------------------------
SCORING ENGINE (INTELLIGENCE)
--------------------------*/
function score(r){

let s=normStatus(r.Status);

if(s==="SUCCESS") return 0;
if(s==="RTS") return 10;
if(s==="SENT") return 60;
if(s==="LOGGED") return 70;

return 90; // PENDING highest priority
}

/* -------------------------
TOP 10 NEXT TARGETS
--------------------------*/
function top10(){
return [...DB]
.filter(x=>normStatus(x.Status)!=="SUCCESS")
.sort((a,b)=>score(b)-score(a))
.slice(0,10);
}

/* -------------------------
STATS
--------------------------*/
function stats(){
let total=DB.length;
let success=DB.filter(x=>normStatus(x.Status)==="SUCCESS").length;
let pending=DB.filter(x=>normStatus(x.Status)==="PENDING").length;
let sent=DB.filter(x=>normStatus(x.Status)==="SENT").length;
let rts=DB.filter(x=>normStatus(x.Status)==="RTS").length;

return{total,success,pending,sent,rts};
}

/* -------------------------
SEARCH
--------------------------*/
document.getElementById("search").addEventListener("input",e=>{
search=e.target.value.toLowerCase();
render();
});

function match(r){
return !search || (r.Name||"").toLowerCase().includes(search);
}

/* -------------------------
RENDER
--------------------------*/
function render(){

let s=stats();

document.getElementById("stats").innerHTML=`
<div class="box"><b>${s.total}</b><div class="small">TOTAL</div></div>
<div class="box"><b>${s.success}</b><div class="small">SUCCESS</div></div>
<div class="box"><b>${s.pending}</b><div class="small">PENDING</div></div>
<div class="box"><b>${s.sent}</b><div class="small">SENT</div></div>
<div class="box"><b>${s.rts}</b><div class="small">RTS</div></div>
`;

/* TOP 10 */
document.getElementById("top10").innerHTML=`
<div class="card">
<h3>🔥 TOP 10 NEXT TARGETS</h3>
${top10().map(x=>`
<div class="badge">${x.Name} — ${normStatus(x.Status)}</div>
`).join("")}
</div>
`;

/* LIST */
document.getElementById("list").innerHTML=
DB.filter(match)
.sort((a,b)=>b.ID-a.ID)
.map(r=>{

let st=normStatus(r.Status);
let cls="status-"+st.toLowerCase();

return `
<div class="card ${cls}">
<div class="small">ID: ${r.ID}</div>

<input value="${r.Name}"
onchange="upd(${r.ID},this.value)">

<select onchange="sts(${r.ID},this.value)">
<option ${st==="PENDING"?"selected":""}>PENDING</option>
<option ${st==="SUCCESS"?"selected":""}>SUCCESS</option>
<option ${st==="RTS"?"selected":""}>RTS</option>
<option ${st==="LOGGED"?"selected":""}>LOGGED</option>
<option ${st==="SENT"?"selected":""}>SENT</option>
</select>
</div>
`;

}).join("");

}

function upd(id,val){
let r=DB.find(x=>x.ID===id);
if(r){r.Name=val;save();render();}
}

function sts(id,val){
let r=DB.find(x=>x.ID===id);
if(r){r.Status=val;save();render();}
}

/* INIT */
load();

</script>

</body>
</html>
