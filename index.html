


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VaultOS ULTIMATE AI ENGINE</title>

<style>
body { margin:0; font-family:Arial; background:#0b0b0b; color:#fff; }

header {
  padding:12px;
  background:#111;
  border-bottom:1px solid #222;
  position:sticky;
  top:0;
}

.container {
  display:grid;
  grid-template-columns:320px 1fr;
  height:calc(100vh - 50px);
}

/* SIDEBAR */
.sidebar {
  background:#0f0f0f;
  border-right:1px solid #222;
  padding:10px;
}

.card {
  background:#111;
  border:1px solid #222;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
}

button {
  width:100%;
  padding:8px;
  margin:4px 0;
  background:#00ffcc;
  border:0;
  font-weight:bold;
  border-radius:5px;
  cursor:pointer;
}

button:hover { background:#00ddb3; }

/* MAIN */
.main { padding:10px; overflow:auto; }

.record {
  background:#0d0d0d;
  border:1px solid #222;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
}

.badge {
  padding:3px 8px;
  border-radius:20px;
  font-size:11px;
}

.PENDING { background:#ffcc00; color:#000; }
.SUCCESS { background:#00ff88; color:#000; }
.RTS { background:#ff4d4d; color:#fff; }
.SENT { background:#4da6ff; color:#fff; }
.LOGGED { background:#888; color:#fff; }

.ticker {
  background:#111;
  border:1px solid #222;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  color:#00ffcc;
}

input {
  width:100%;
  padding:7px;
  background:#000;
  border:1px solid #333;
  color:#fff;
  border-radius:5px;
}
</style>
</head>

<body>

<header><b>VaultOS ULTIMATE AI ENGINE</b></header>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

  <div class="card">
    <button onclick="triggerImport()">IMPORT JSON</button>
    <button onclick="markNext()">MARK NEXT AS SENT</button>
    <input type="file" id="file" style="display:none" accept="application/json">
  </div>

  <div class="card">
    <input id="search" placeholder="Search Name..." oninput="render()">
  </div>

</div>

<!-- MAIN -->
<div class="main">

  <div id="ticker" class="ticker">Loading...</div>

  <div id="view"></div>

</div>

</div>

<script>

// =========================
// CORE DB
// =========================
let DB = { records: [] };
let index = 0;

// =========================
// LOAD / SAVE
// =========================
function save(){
  localStorage.setItem("vault_ai_v3", JSON.stringify(DB));
}

function load(){
  const d = localStorage.getItem("vault_ai_v3");
  if(d) DB = JSON.parse(d);
}
load();

// =========================
// NORMALISER (NO BREAKS EVER)
// =========================
function norm(r){
  return {
    ID: r?.ID ?? Date.now(),
    Name: r?.Name ?? "Untitled",
    Status: r?.Status ?? "PENDING"
  };
}

// =========================
// IMPORT SYSTEM
// =========================
function triggerImport(){
  document.getElementById("file").click();
}

document.getElementById("file").addEventListener("change", e => {
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);

      const arr = Array.isArray(data)
        ? data
        : (data.records || []);

      DB.records = arr.map(norm);

      save();
      render();

      alert("Imported: " + DB.records.length);

    } catch {
      alert("Invalid JSON");
    }
  };

  reader.readAsText(file);
});

// =========================
// AI ENGINE (FILTER QUEUE)
// =========================
function getQueue(){

  let arr = DB.records.map(norm);

  // only PENDING
  arr = arr.filter(r => r.Status === "PENDING");

  // dedupe
  const seen = new Set();
  arr = arr.filter(r => {
    const k = r.Name.toLowerCase().trim();
    if(seen.has(k)) return false;
    seen.add(k);
    return true;
  });

  return arr;
}

// =========================
// TICKER
// =========================
function updateTicker(queue){
  if(queue.length === 0){
    document.getElementById("ticker").innerHTML = "NO NEXT ITEMS";
    return;
  }

  const next = queue[index] || queue[0];

  document.getElementById("ticker").innerHTML =
    `NEXT SEND → <b>${next.Name}</b> <span class="${next.Status} badge">${next.Status}</span>`;
}

// =========================
// MARK NEXT
// =========================
function markNext(){

  const queue = getQueue();
  if(queue.length === 0) return;

  const next = queue[index] || queue[0];

  DB.records = DB.records.map(r => {
    if(r.Name === next.Name){
      return {...r, Status:"SENT"};
    }
    return r;
  });

  save();

  index = 0;
  render();
}

// =========================
// RENDER
// =========================
function render(){

  const q = document.getElementById("search").value.toLowerCase();
  let records = DB.records.map(norm);

  if(q){
    records = records.filter(r =>
      r.Name.toLowerCase().includes(q)
    );
  }

  const queue = getQueue();
  updateTicker(queue);

  const view = document.getElementById("view");

  view.innerHTML = `<h3>QUEUE (${queue.length})</h3>`;

  queue.forEach(r => {
    view.innerHTML += `
      <div class="record">
        <b>${r.Name}</b>
        <span class="badge ${r.Status}">${r.Status}</span><br>
        <small>ID: ${r.ID}</small>
      </div>
    `;
  });
}

// INIT
load();
render();

</script>

</body>
</html>
