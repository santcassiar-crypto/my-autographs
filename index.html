
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VaultOS OCR Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#000;
color:#fff;
font-family:Arial,sans-serif;
}

header{
position:sticky;
top:0;
background:#111;
padding:10px;
z-index:10;
border-bottom:1px solid #222;
}

input,select,textarea,button{
width:100%;
padding:10px;
margin-top:8px;
background:#000;
color:#fff;
border:1px solid #333;
border-radius:8px;
font-size:14px;
}

button{
cursor:pointer;
background:#111;
}

button:hover{
background:#1b1b1b;
}

.row{
display:flex;
gap:8px;
padding:10px;
flex-wrap:wrap;
}

.row button{
flex:1;
min-width:100px;
}

.section{
margin:10px;
padding:10px;
background:#0d0d0d;
border:1px solid #222;
border-radius:10px;
}

.card{
background:#111;
margin:10px;
padding:10px;
border-radius:10px;
border:1px solid #222;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
padding:10px;
}

.box{
background:#111;
border:1px solid #222;
padding:12px;
border-radius:8px;
text-align:center;
font-size:14px;
}

.small{
font-size:11px;
color:#888;
margin-top:5px;
word-break:break-word;
}

textarea{
min-height:90px;
resize:vertical;
}

h3{
margin-top:0;
}

.raw{
background:#050505;
border:1px solid #222;
padding:10px;
border-radius:8px;
font-size:11px;
white-space:pre-wrap;
margin-top:10px;
color:#8f8f8f;
max-height:180px;
overflow:auto;
}

@media(max-width:700px){

.grid{
grid-template-columns:repeat(2,1fr);
}

}

</style>
</head>

<body>

<header>

<input
id="search"
placeholder="Search ALL records..."
>

</header>

<div class="row">

<button onclick="setFilter('ALL')">
ALL
</button>

<button onclick="setFilter('PENDING')">
PENDING
</button>

<button onclick="setFilter('SENT')">
SENT
</button>

<button onclick="setFilter('SUCCESS')">
SIGNED
</button>

<button onclick="setFilter('RTS')">
RTS
</button>

</div>

<div id="stats" class="grid"></div>

<div class="section">

<h3>📸 OCR IMPORT</h3>

<input
type="file"
id="ocrInput"
accept="image/*"
>

<button onclick="extractOCR()">
Extract & Create Record
</button>

<div class="small">
Upload envelope / letter / label image
</div>

</div>

<div class="row">

<button onclick="add()">
+ ADD MANUAL
</button>

<button onclick="exportDB()">
EXPORT
</button>

</div>

<div class="section">

<input type="file" id="importFile">

<button onclick="importDB()">
IMPORT BACKUP
</button>

</div>

<div id="list"></div>

<script>

////////////////////////////////////////////////////
// MASTER DATA
////////////////////////////////////////////////////

const MASTER_DATA = [

{
ID:1,
Name:"Jannik Sinner",
Address:"",
Status:"SUCCESS"
},

{
ID:2,
Name:"Keanu Reeves",
Address:"",
Status:"RTS"
},

{
ID:3,
Name:"Alan Carr",
Address:"",
Status:"SUCCESS"
},

{
ID:4,
Name:"Harry Kane",
Address:"",
Status:"PENDING"
},

{
ID:5,
Name:"David Attenborough",
Address:"",
Status:"SUCCESS"
}

];

////////////////////////////////////////////////////
// DATABASE
////////////////////////////////////////////////////

let DB = load();

function load(){

let raw =
localStorage.getItem("vault_os_ocr");

if(raw){

try{
return JSON.parse(raw);
}catch(e){}

}

return MASTER_DATA;

}

function save(){

localStorage.setItem(
"vault_os_ocr",
JSON.stringify(DB)
);

}

////////////////////////////////////////////////////
// STATE
////////////////////////////////////////////////////

let search = "";
let filter = "ALL";

document.getElementById("search").oninput = e => {

search =
e.target.value.toLowerCase();

render();

};

function setFilter(f){

filter = f;

render();

}

////////////////////////////////////////////////////
// HELPERS
////////////////////////////////////////////////////

function escapeHTML(str=""){

return str
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#039;");

}

////////////////////////////////////////////////////
// ADD MANUAL
////////////////////////////////////////////////////

function add(){

let name = prompt("Name:");

if(!name) return;

DB.unshift({

ID:Date.now(),
Name:name,
Address:"",
Status:"PENDING",
Notes:"",
RawOCR:""

});

save();

render();

}

////////////////////////////////////////////////////
// OCR
////////////////////////////////////////////////////

async function extractOCR(){

let file =
document.getElementById("ocrInput").files[0];

if(!file){

alert("Upload image first");

return;

}

try{

alert("Running OCR...");

const result =
await Tesseract.recognize(
file,
"eng",
{
logger:m=>console.log(m)
}
);

const text =
result.data.text;

console.log("OCR:",text);

if(!text || text.trim()===""){

alert("No text detected");

return;

}

const parsed =
parseText(text);

createFromOCR(parsed);

}catch(err){

console.error(err);

alert("OCR FAILED");

}

}

////////////////////////////////////////////////////
// OCR PARSER
////////////////////////////////////////////////////

function parseText(text){

let lines = text
.split("\n")
.map(x=>x.trim())
.filter(x=>x.length>1);

let name = "Unknown";

for(let line of lines){

if(
/^[A-Z][a-z]+(\s[A-Z][a-z]+)+$/.test(line)
){

name = line;

break;

}

}

if(name==="Unknown" && lines[0]){

name = lines[0];

}

let address =
lines
.filter(x=>x!==name)
.slice(0,5)
.join(", ");

return {

name,
address,
raw:text

};

}

////////////////////////////////////////////////////
// CREATE RECORD
////////////////////////////////////////////////////

function createFromOCR(data){

DB.unshift({

ID:Date.now(),
Name:data.name,
Address:data.address,
Status:"PENDING",
Notes:"OCR IMPORT",
RawOCR:data.raw

});

save();

render();

alert("OCR RECORD CREATED");

}

////////////////////////////////////////////////////
// UPDATE
////////////////////////////////////////////////////

function updateName(id,val){

let item =
DB.find(x=>x.ID==id);

if(item){

item.Name = val;

save();

}

}

function updateAddress(id,val){

let item =
DB.find(x=>x.ID==id);

if(item){

item.Address = val;

save();

}

}

function updateStatus(id,val){

let item =
DB.find(x=>x.ID==id);

if(item){

item.Status = val;

save();

renderStats();

}

}

////////////////////////////////////////////////////
// DELETE
////////////////////////////////////////////////////

function removeRecord(id){

if(!confirm("Delete record?"))
return;

DB =
DB.filter(x=>x.ID!=id);

save();

render();

}

////////////////////////////////////////////////////
// EXPORT
////////////////////////////////////////////////////

function exportDB(){

let blob =
new Blob(
[
JSON.stringify(DB,null,2)
],
{
type:"application/json"
}
);

let a =
document.createElement("a");

a.href =
URL.createObjectURL(blob);

a.download =
"vault_backup.json";

a.click();

}

////////////////////////////////////////////////////
// IMPORT
////////////////////////////////////////////////////

function importDB(){

let file =
document.getElementById("importFile").files[0];

if(!file){

alert("Select file");

return;

}

let reader =
new FileReader();

reader.onload = e => {

try{

DB =
JSON.parse(e.target.result);

save();

render();

alert("IMPORT COMPLETE");

}catch(err){

alert("INVALID FILE");

}

};

reader.readAsText(file);

}

////////////////////////////////////////////////////
// SEARCH / FILTER
////////////////////////////////////////////////////

function getView(){

let list = [...DB];

if(search){

list = list.filter(x=>{

let blob = `

${x.ID||""}
${x.Name||""}
${x.Address||""}
${x.Status||""}
${x.Notes||""}
${x.RawOCR||""}

`
.toLowerCase();

return blob.includes(search);

});

}

if(filter!=="ALL"){

list =
list.filter(
x=>x.Status===filter
);

}

return list;

}

////////////////////////////////////////////////////
// STATS
////////////////////////////////////////////////////

function renderStats(){

let total =
DB.length;

let pending =
DB.filter(
x=>x.Status==="PENDING"
).length;

let sent =
DB.filter(
x=>x.Status==="SENT"
).length;

let success =
DB.filter(
x=>x.Status==="SUCCESS"
).length;

let rts =
DB.filter(
x=>x.Status==="RTS"
).length;

document.getElementById("stats").innerHTML = `

<div class="box">
TOTAL<br>${total}
</div>

<div class="box">
PENDING<br>${pending}
</div>

<div class="box">
SENT<br>${sent}
</div>

<div class="box">
SIGNED<br>${success}
</div>

<div class="box">
RTS<br>${rts}
</div>

`;

}

////////////////////////////////////////////////////
// RENDER
////////////////////////////////////////////////////

function render(){

let list =
getView();

document.getElementById("list").innerHTML =

list.map(r=>`

<div class="card">

<input
value="${escapeHTML(r.Name||"")}"
onchange="updateName(${r.ID},this.value)"
>

<textarea
placeholder="Address"
onchange="updateAddress(${r.ID},this.value)"
>${escapeHTML(r.Address||"")}</textarea>

<select
onchange="updateStatus(${r.ID},this.value)"
>

<option
value="PENDING"
${r.Status==="PENDING"?"selected":""}
>
PENDING
</option>

<option
value="SENT"
${r.Status==="SENT"?"selected":""}
>
SENT
</option>

<option
value="SUCCESS"
${r.Status==="SUCCESS"?"selected":""}
>
SUCCESS
</option>

<option
value="RTS"
${r.Status==="RTS"?"selected":""}
>
RTS
</option>

</select>

<button onclick="removeRecord(${r.ID})">
DELETE
</button>

<div class="small">
ID: ${r.ID}
</div>

${
r.RawOCR
?

`<div class="raw">
${escapeHTML(r.RawOCR)}
</div>`

:

""

}

</div>

`).join("");

renderStats();

}

////////////////////////////////////////////////////

render();

</script>

</body>
</html>
