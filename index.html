

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VaultOS COMMAND CENTER</title>

<style>
body { margin:0; font-family:Arial; background:#0b0b0b; color:#fff; }

header {
  padding:12px;
  background:#111;
  border-bottom:1px solid #222;
  position:sticky;
  top:0;
}

.container {
  display:grid;
  grid-template-columns:340px 1fr;
  height:calc(100vh - 50px);
}

.sidebar {
  background:#0f0f0f;
  border-right:1px solid #222;
  padding:10px;
}

.card {
  background:#111;
  border:1px solid #222;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
}

button {
  width:100%;
  padding:8px;
  margin:4px 0;
  background:#00ffcc;
  border:0;
  font-weight:bold;
  border-radius:5px;
  cursor:pointer;
}

button:hover { background:#00ddb3; }

.main {
  padding:10px;
  overflow:auto;
}

.ticker {
  background:#111;
  border:1px solid #222;
  padding:12px;
  border-radius:8px;
  margin-bottom:10px;
  color:#00ffcc;
}

.record {
  background:#0d0d0d;
  border:1px solid #222;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
}

.badge {
  padding:3px 8px;
  border-radius:20px;
  font-size:11px;
}

.PENDING { background:#ffcc00; color:#000; }
.SENT { background:#4da6ff; color:#fff; }
.SUCCESS { background:#00ff88; color:#000; }
.RTS { background:#ff4d4d; color:#fff; }

input, textarea {
  width:100%;
  padding:8px;
  background:#000;
  border:1px solid #333;
  color:#fff;
  border-radius:5px;
}

.log {
  font-size:11px;
  opacity:0.7;
  max-height:120px;
  overflow:auto;
}
</style>
</head>

<body>

<header><b>VaultOS COMMAND CENTER</b></header>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

  <div class="card">
    <input id="commandInput" placeholder="Enter command..." onkeydown="if(event.key==='Enter') runCommand()">
    <button onclick="runCommand()">RUN</button>
  </div>

  <div class="card">
    <button onclick="triggerImport()">IMPORT JSON</button>
    <input type="file" id="file" style="display:none" accept="application/json">
  </div>

  <div class="card">
    <div id="stats"></div>
  </div>

  <div class="card log" id="log"></div>

</div>

<!-- MAIN -->
<div class="main">

  <div id="ticker" class="ticker">INITIALISING COMMAND ENGINE...</div>

  <div id="view"></div>

</div>

</div>

<script>

// =========================
// CORE DB
// =========================
let DB = { records: [] };
let pointer = 0;
let history = [];

// =========================
// LOAD / SAVE
// =========================
function save(){
  localStorage.setItem("vault_command", JSON.stringify(DB));
}

function load(){
  const d = localStorage.getItem("vault_command");
  if(d) DB = JSON.parse(d);
}
load();

// =========================
// SAFE NORMALISER
// =========================
function norm(r){
  return {
    ID: r?.ID ?? Date.now(),
    Name: r?.Name ?? "Untitled",
    Status: r?.Status ?? "PENDING"
  };
}

// =========================
// LOG SYSTEM
// =========================
function log(msg){
  history.unshift(msg);
  history = history.slice(0,20);
  document.getElementById("log").innerHTML = history.join("<br>");
}

// =========================
// IMPORT (ROBUST)
// =========================
function triggerImport(){
  document.getElementById("file").click();
}

document.getElementById("file").addEventListener("change", e => {
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);

      const arr =
        Array.isArray(data) ? data :
        Array.isArray(data.records) ? data.records :
        [];

      DB.records = arr.map(norm);

      save();
      render();
      log("IMPORT COMPLETE");

    } catch {
      log("IMPORT FAILED");
    }
  };

  reader.readAsText(file);
});

// =========================
// QUEUE ENGINE
// =========================
function queue(){
  let arr = DB.records.map(norm);

  arr = arr.filter(r => r.Status === "PENDING");

  const seen = new Set();
  arr = arr.filter(r => {
    const k = r.Name.toLowerCase().trim();
    if(seen.has(k)) return false;
    seen.add(k);
    return true;
  });

  return arr;
}

// =========================
// COMMAND ENGINE (AI RULES)
// =========================
function runCommand(){

  const input = document.getElementById("commandInput");
  const cmd = input.value.toLowerCase().trim();
  input.value = "";

  const q = queue();

  if(cmd === "import file"){
    triggerImport();
    log("COMMAND: IMPORT FILE");
  }

  else if(cmd === "next mission"){
    const next = q[pointer] || q[0];
    log("NEXT → " + (next?.Name || "NONE"));
  }

  else if(cmd === "mark done"){
    const next = q[pointer] || q[0];
    if(!next) return;

    DB.records = DB.records.map(r =>
      r.Name === next.Name ? {...r, Status:"SENT"} : r
    );

    pointer = 0;
    save();
    render();
    log("MARKED DONE → " + next.Name);
  }

  else if(cmd === "show pending"){
    log("PENDING COUNT: " + q.length);
  }

  else if(cmd === "clean duplicates"){
    const seen = new Set();
    DB.records = DB.records.filter(r => {
      const k = r.Name.toLowerCase().trim();
      if(seen.has(k)) return false;
      seen.add(k);
      return true;
    });
    save();
    render();
    log("DUPLICATES CLEANED");
  }

  else if(cmd === "reset system"){
    DB = {records:[]};
    save();
    render();
    log("SYSTEM RESET");
  }

  else {
    log("UNKNOWN COMMAND");
  }

  render();
}

// =========================
// TICKER
// =========================
function tickerUpdate(q){

  if(q.length === 0){
    document.getElementById("ticker").innerHTML =
      "🧠 NO ACTIVE MISSIONS";
    return;
  }

  const next = q[pointer] || q[0];

  document.getElementById("ticker").innerHTML =
    `🚀 NEXT → <b>${next.Name}</b> <span class="badge ${next.Status}">${next.Status}</span>`;
}

// =========================
// STATS
// =========================
function stats(){

  const s = {PENDING:0,SENT:0,SUCCESS:0,RTS:0};

  DB.records.forEach(r=>{
    const n = norm(r);
    if(s[n.Status] !== undefined) s[n.Status]++;
  });

  document.getElementById("stats").innerHTML = `
    PENDING: ${s.PENDING}<br>
    SENT: ${s.SENT}<br>
    SUCCESS: ${s.SUCCESS}<br>
    RTS: ${s.RTS}
  `;
}

// =========================
// RENDER
// =========================
function render(){

  const q = queue();
  tickerUpdate(q);
  stats();

  const view = document.getElementById("view");

  view.innerHTML = `<h3>QUEUE (${q.length})</h3>`;

  q.forEach(r=>{
    view.innerHTML += `
      <div class="record">
        <b>${r.Name}</b><br>
        <span class="badge ${r.Status}">${r.Status}</span><br>
        <small>ID: ${r.ID}</small>
      </div>
    `;
  });
}

// INIT
load();
render();

</script>

</body>
</html>
