/* =========================
HELPERS
========================= */

function save(){
localStorage.setItem("vault_v3", JSON.stringify(records));
}

function load(){
let s = JSON.parse(localStorage.getItem("vault_v3"));
if(s) records = s;
}
load();

/* =========================
INSIGHTS ENGINE
========================= */

function insights(){
let total = records.length;
let success = records.filter(r=>r.Status==="SUCCESS").length;
let pending = records.filter(r=>r.Status==="PENDING").length;
let sent = records.filter(r=>r.Status==="Sent").length;
let rts = records.filter(r=>r.Status==="RTS").length;

let rate = ((success/total)*100).toFixed(1);

document.getElementById("insights").innerHTML = `
Success rate: <b>${rate}%</b><br>
Recommended focus: <b>Football ex-pro system + Theatre only</b><br>
Avoid scaling: <b>Film/agency/training HQ routes</b><br>
Optimal monthly allocation: <b>15–20 stamps max (70% football / 30% theatre)</b>
`;
}

/* =========================
RENDER
========================= */

function render(){
let q = document.getElementById("search").value.toLowerCase();
let f = document.getElementById("filter").value;

let list = document.getElementById("list");
list.innerHTML="";

let filtered = records.filter(r=>{
return r.Name.toLowerCase().includes(q) &&
(f==="ALL" || r.Status===f);
});

document.getElementById("t").innerText = records.length;
document.getElementById("s").innerText = records.filter(r=>r.Status==="SUCCESS").length;
document.getElementById("p").innerText = records.filter(r=>r.Status==="PENDING").length;
document.getElementById("se").innerText = records.filter(r=>r.Status==="Sent").length;
document.getElementById("r").innerText = records.filter(r=>r.Status==="RTS").length;

filtered.forEach(r=>{
let div=document.createElement("div");
div.className="card p-3 flex justify-between items-center status-"+r.Status;

div.innerHTML=`
<div class="text-xs font-bold w-2/3">${r.Name}</div>
<select onchange="update(${r.ID},this.value)" class="bg-black text-[10px]">
<option ${r.Status==="SUCCESS"?"selected":""}>SUCCESS</option>
<option ${r.Status==="PENDING"?"selected":""}>PENDING</option>
<option ${r.Status==="Sent"?"selected":""}>Sent</option>
<option ${r.Status==="RTS"?"selected":""}>RTS</option>
</select>
`;

list.appendChild(div);
});

insights();
}

function update(id,val){
let r=records.find(x=>x.ID===id);
r.Status=val;
save();
render();
}
