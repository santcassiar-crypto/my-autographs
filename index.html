
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TTM OS – Stable Core</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#0b0b0b;
  color:#fff;
  margin:0;
}

header{
  background:#111;
  padding:12px;
  position:sticky;
  top:0;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:#111;
  border:1px solid #222;
  border-radius:10px;
  padding:12px;
  margin:10px;
}

input,textarea,button,select{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid #333;
  background:#181818;
  color:#fff;
}

button{cursor:pointer}

.record{
  padding:8px;
  border-bottom:1px solid #222;
}

.small{font-size:12px;color:#aaa}

.badge{
  padding:2px 6px;
  background:#222;
  border-radius:6px;
  font-size:11px;
  margin-left:6px;
}
</style>
</head>

<body>

<header>
<h2>TTM OS – Stable Intelligence Core</h2>
<input id="search" placeholder="Search targets...">
</header>

<div class="grid" id="stats"></div>

<!-- ADD -->
<div class="card">
<h3>➕ Add Targets</h3>
<textarea id="bulk" placeholder="One name per line"></textarea>
<button onclick="addTargets()">Add</button>
</div>

<!-- UPDATE -->
<div class="card">
<h3>📌 Update Status</h3>
<input id="updateName" placeholder="Target name">
<select id="updateStatus">
<option>PENDING</option>
<option>SENT</option>
<option>SUCCESS</option>
<option>RTS</option>
<option>LOGGED</option>
</select>
<button onclick="updateStatus()">Update</button>
</div>

<!-- BACKUP -->
<div class="card">
<h3>💾 Backup / Restore</h3>
<input type="file" id="file">
<button onclick="importJSON()">Import JSON</button>
<button onclick="exportJSON()">Export JSON</button>
<div id="status" class="small"></div>
</div>

<!-- QUEUE -->
<div class="card">
<h3>🎯 Daily Send Queue</h3>
<div id="queue"></div>
</div>

<!-- LIST -->
<div class="card">
<h3>📋 All Targets</h3>
<div id="list"></div>
</div>

<script>

/* =========================
   CORE DATABASE (STABLE)
========================= */

const KEY = "ttm_os_stable_v1";

let DB = load();

function load(){
  const raw = JSON.parse(localStorage.getItem(KEY) || "{}");
  return raw.records ? raw : {records:[],meta:{}};
}

function save(){
  localStorage.setItem(KEY, JSON.stringify(DB));
}

/* =========================
   STATUS NORMALISATION
========================= */

function normaliseStatus(s){
  if(!s) return "PENDING";

  s = String(s).trim().toUpperCase();

  if(s.includes("PEND")) return "PENDING";
  if(s.includes("SUCCESS")) return "SUCCESS";
  if(s.includes("RTS") || s.includes("FAIL")) return "RTS";
  if(s.includes("LOG")) return "LOGGED";
  if(s.includes("SENT")) return "SENT";

  return "PENDING";
}

/* =========================
   CLEAN IMPORT PIPELINE
========================= */

function importJSON(){
  const file = document.getElementById("file").files[0];
  if(!file) return alert("Select file");

  const reader = new FileReader();

  reader.onload = e=>{
    const data = JSON.parse(e.target.result);

    const records = Array.isArray(data) ? data : data.records || [];

    DB.records = records.map(r=>({
      id: r.ID || r.id || Date.now()+Math.random(),
      name: r.Name || r.name || "",
      status: normaliseStatus(r.Status || r.status),
      history: r.history || []
    }));

    dedupe();
    save();
    render();

    document.getElementById("status").innerText =
      "Loaded " + DB.records.length + " records";
  };

  reader.readAsText(file);
}

/* =========================
   EXPORT
========================= */

function exportJSON(){
  const blob = new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "ttm_backup.json";
  a.click();
}

/* =========================
   ADD TARGETS
========================= */

function addTargets(){
  const lines = document.getElementById("bulk").value
    .split("\n").map(x=>x.trim()).filter(Boolean);

  lines.forEach(n=>{
    DB.records.push({
      id: Date.now()+Math.random(),
      name: n,
      status: "PENDING",
      history: []
    });
  });

  document.getElementById("bulk").value="";
  save();
  render();
}

/* =========================
   UPDATE STATUS
========================= */

function updateStatus(){
  const name = document.getElementById("updateName").value.toLowerCase();
  const status = normaliseStatus(document.getElementById("updateStatus").value);

  DB.records.forEach(r=>{
    if(r.name.toLowerCase() === name){
      r.status = status;
    }
  });

  save();
  render();
}

/* =========================
   DUPLICATE FIX (IMPORTANT)
========================= */

function dedupe(){
  const map = new Map();

  DB.records.forEach(r=>{
    const key = r.name.trim().toLowerCase();

    if(!map.has(key)){
      map.set(key,r);
    } else {
      const existing = map.get(key);

      // keep best status
      if(r.status === "SUCCESS") existing.status = "SUCCESS";
      if(r.status === "RTS" && existing.status !== "SUCCESS") existing.status = "RTS";
    }
  });

  DB.records = [...map.values()];
}

/* =========================
   INTELLIGENCE (SIMPLE BUT STABLE)
========================= */

function score(r){
  let s = 50;

  if(r.status === "SUCCESS") s += 30;
  if(r.status === "SENT") s += 10;
  if(r.status === "RTS") s -= 25;

  const n = r.name.toLowerCase();
  if(n.includes("event")) s += 5;
  if(n.includes("training")) s -= 5;

  return Math.max(0,Math.min(100,s));
}

/* =========================
   QUEUE
========================= */

function queue(){
  return DB.records
    .filter(r=>r.status === "PENDING")
    .sort((a,b)=>score(b)-score(a))
    .slice(0,10);
}

/* =========================
   RENDER
========================= */

function render(){

  dedupe();

  const total = DB.records.length;
  const pending = DB.records.filter(r=>r.status==="PENDING").length;
  const success = DB.records.filter(r=>r.status==="SUCCESS").length;
  const sent = DB.records.filter(r=>r.status==="SENT").length;
  const rts = DB.records.filter(r=>r.status==="RTS").length;
  const logged = DB.records.filter(r=>r.status==="LOGGED").length;

  document.getElementById("stats").innerHTML = `
    <div class="card"><h2>${total}</h2>Total</div>
    <div class="card"><h2>${pending}</h2>Pending</div>
    <div class="card"><h2>${sent}</h2>Sent</div>
    <div class="card"><h2>${success}</h2>Success</div>
    <div class="card"><h2>${rts}</h2>RTS</div>
    <div class="card"><h2>${logged}</h2>Logged</div>
  `;

  document.getElementById("queue").innerHTML =
    queue().map(r=>`
      🎯 ${r.name}
      <span class="badge">${score(r).toFixed(0)}%</span>
    `).join("<br>");

  const q = (document.getElementById("search").value||"").toLowerCase();

  document.getElementById("list").innerHTML =
    DB.records
      .filter(r=>r.name.toLowerCase().includes(q))
      .map(r=>`
        <div class="record">
          <b>${r.name}</b><br>
          <span class="small">${r.status}</span>
        </div>
      `).join("");

  save();
}

/* =========================
   INIT
========================= */

document.getElementById("search").addEventListener("input",render);
render();

</script>

</body>
</html>
