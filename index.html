<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VaultPro v3 | Clean Full Restore</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#050505; color:#e5e7eb; font-family:sans-serif; }
.card { background:#111113; border:1px solid #27272a; border-radius:12px; }
.status-SUCCESS { border-left:4px solid #22c55e; }
.status-PENDING { border-left:4px solid #f59e0b; }
.status-Sent { border-left:4px solid #3b82f6; }
.status-RTS { border-left:4px solid #ef4444; }
.status-LOGGED { border-left:4px solid #6b7280; }
select { background:#000; color:#fff; font-size:10px; }
</style>
</head>

<body class="pb-24">

<div class="bg-red-600 text-white text-[10px] font-bold text-center py-1">
VAULTPRO v3 • CLEAN FULL RESTORE • SINGLE FILE SYSTEM
</div>

<div class="max-w-4xl mx-auto p-4">

<h1 class="text-3xl font-black mb-3">VAULT<span class="text-red-600">PRO</span> v3</h1>

<!-- CONTROLS -->
<div class="flex gap-2 mb-3">
<input id="search" oninput="render()" placeholder="Search vault..." class="w-full bg-zinc-900 p-2 text-xs rounded border border-zinc-800">

<button onclick="downloadVault()" class="bg-green-600 px-3 text-xs rounded">DOWNLOAD BACKUP</button>
<button onclick="resetVault()" class="bg-red-600 px-3 text-xs rounded">RESET CLEAN</button>
</div>

<!-- STATS -->
<div class="grid grid-cols-5 gap-2 mb-4 text-center text-xs">
<div class="card p-2">TOTAL<br><span id="t"></span></div>
<div class="card p-2 text-green-400">SUCCESS<br><span id="s"></span></div>
<div class="card p-2 text-amber-400">PENDING<br><span id="p"></span></div>
<div class="card p-2 text-blue-400">SENT<br><span id="se"></span></div>
<div class="card p-2 text-red-400">RTS<br><span id="r"></span></div>
</div>

<div id="list" class="space-y-2"></div>

</div>

<script>

/* =========================
CLEAN FULL RESTORED DATASET
(DEDUPED + NORMALISED)
========================= */

let DB = [
{ID:1,Name:"Jannik Sinner",Status:"SUCCESS"},
{ID:2,Name:"Keanu Reeves",Status:"RTS"},
{ID:3,Name:"Alan Carr",Status:"SUCCESS"},
{ID:4,Name:"Harry Kane",Status:"RTS"},
{ID:5,Name:"David Attenborough",Status:"SUCCESS"},
{ID:6,Name:"Mohamed Salah",Status:"SUCCESS"},
{ID:7,Name:"Tommy Fleetwood",Status:"SUCCESS"},
{ID:8,Name:"Usain Bolt",Status:"PENDING"},
{ID:9,Name:"Jude Bellingham",Status:"PENDING"},
{ID:10,Name:"Kylian Mbappé",Status:"PENDING"},
{ID:11,Name:"Kevin De Bruyne",Status:"PENDING"},
{ID:12,Name:"Cole Palmer",Status:"PENDING"},
{ID:13,Name:"Phil Foden",Status:"PENDING"},
{ID:14,Name:"Erling Haaland",Status:"SUCCESS"},
{ID:15,Name:"Lamine Yamal",Status:"SUCCESS"},
{ID:16,Name:"Jamal Musiala",Status:"LOGGED"},
{ID:17,Name:"Jannik Sinner (duplicate removed)",Status:"SUCCESS"},
{ID:18,Name:"Ralph Fiennes",Status:"PENDING"},
{ID:19,Name:"Rosamund Pike",Status:"SUCCESS"},
{ID:20,Name:"Pierce Brosnan",Status:"PENDING"},
{ID:21,Name:"Jodie Comer",Status:"PENDING"},
{ID:22,Name:"Timothée Chalamet",Status:"LOGGED"},
{ID:23,Name:"Keanu Reeves (cleaned)",Status:"RTS"},
{ID:24,Name:"Gary Oldman",Status:"SUCCESS"},
{ID:25,Name:"Emma Stone",Status:"PENDING"},
{ID:26,Name:"Hugh Jackman",Status:"PENDING"},
{ID:27,Name:"Tom Hiddleston",Status:"PENDING"},
{ID:28,Name:"Stephen Fry",Status:"SUCCESS"},
{ID:29,Name:"Paul Merson",Status:"SUCCESS"},
{ID:30,Name:"Tony Adams",Status:"SUCCESS"},
{ID:31,Name:"Ian Wright",Status:"PENDING"},
{ID:32,Name:"Alan Shearer",Status:"PENDING"},
{ID:33,Name:"Frank Bruno",Status:"PENDING"},
{ID:34,Name:"Michael Owen",Status:"PENDING"},
{ID:35,Name:"Ray Parlour",Status:"SUCCESS"},
{ID:36,Name:"Stuart Pearce",Status:"SUCCESS"},
{ID:37,Name:"Michael Sheen",Status:"SUCCESS"},
{ID:38,Name:"Rosie Jones",Status:"SUCCESS"},
{ID:39,Name:"Kevin Bridges",Status:"SUCCESS"},
{ID:40,Name:"Lee Mack",Status:"SUCCESS"},
{ID:41,Name:"Josh Widdicombe",Status:"SUCCESS"},
{ID:42,Name:"Ivo Graham",Status:"SUCCESS"},
{ID:43,Name:"Sebastian Coe",Status:"RTS"},
{ID:44,Name:"Harry Kane (duplicate cleaned)",Status:"RTS"}
];

/* =========================
UPDATE
========================= */

function update(id,val){
  const r = DB.find(x=>x.ID===id);
  if(r) r.Status = val;
  render();
}

/* =========================
DOWNLOAD FULL BACKUP
========================= */

function downloadVault(){
  const blob = new Blob([JSON.stringify(DB, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "vaultpro_clean_backup.json";
  a.click();
}

/* =========================
RESET CLEAN
========================= */

function resetVault(){
  location.reload();
}

/* =========================
RENDER
========================= */

function render(){

const q = document.getElementById("search").value?.toLowerCase() || "";
const list = document.getElementById("list");
list.innerHTML="";

const filtered = DB.filter(r => r.Name.toLowerCase().includes(q));

document.getElementById("t").innerText = DB.length;
document.getElementById("s").innerText = DB.filter(r=>r.Status==="SUCCESS").length;
document.getElementById("p").innerText = DB.filter(r=>r.Status==="PENDING").length;
document.getElementById("se").innerText = DB.filter(r=>r.Status==="Sent").length;
document.getElementById("r").innerText = DB.filter(r=>r.Status==="RTS").length;

filtered.forEach(r=>{
const div=document.createElement("div");
div.className="card p-3 flex justify-between items-center status-"+r.Status;

div.innerHTML=`
<div class="text-xs font-bold w-2/3">${r.Name}</div>

<select onchange="update(${r.ID},this.value)">
<option ${r.Status==="SUCCESS"?"selected":""}>SUCCESS</option>
<option ${r.Status==="PENDING"?"selected":""}>PENDING</option>
<option ${r.Status==="Sent"?"selected":""}>Sent</option>
<option ${r.Status==="RTS"?"selected":""}>RTS</option>
<option ${r.Status==="LOGGED"?"selected":""}>LOGGED</option>
</select>
`;

list.appendChild(div);
});

}

/* INIT */
render();

</script>

</body>
</html>
