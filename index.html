<!DOCTYPE html>
<html lang="en">
<head>

</button>

<script>

////////////////////////////////////////////////////

////////////////////////////////////////////////////

const STORAGE_KEY = "vault_wipe_resistant_v1";

let DB = [];

const SEED = [

{"ID":1779457276281,"Name":"Arsenal womens team","Status":"PENDING"},
{"ID":1779457232607,"Name":"Park theatre x 2 ","Status":"PENDING"},
{"ID":1779457195881,"Name":"Jermery Sochan","Status":"PENDING"},
{"ID":1779369334553,"Name":"Geoff Hurst ","Status":"LOGGED"},
{"ID":1779362415139,"Name":"Max Dowman - Dads London office","Status":"PENDING"},

{"ID":1,"Name":"Jannik Sinner","Status":"SUCCESS"},
{"ID":2,"Name":"Keanu Reeves","Status":"RTS"},
{"ID":3,"Name":"Alan Carr","Status":"SUCCESS"},

];

////////////////////////////////////////////////////
// HTML ESCAPE SAFETY
////////////////////////////////////////////////////

function esc(s){

return String(s)
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;");

}

////////////////////////////////////////////////////
// LOAD SYSTEM
////////////////////////////////////////////////////

function load(){

let raw = localStorage.getItem(STORAGE_KEY);

////////////////////////////////////////////////////
// EXISTING SAVED DATA
////////////////////////////////////////////////////

if(raw){

try{

DB = JSON.parse(raw);

////////////////////////////////////////////////////
// MERGE NEW RECORDS SAFELY
////////////////////////////////////////////////////

SEED.forEach(seedItem=>{

let exists = DB.find(x=>x.ID===seedItem.ID);

if(!exists){
DB.push(seedItem);
}

});

save();
render();
return;

}catch(e){}

}

////////////////////////////////////////////////////
// FIRST TIME LOAD
////////////////////////////////////////////////////

DB = [...SEED];

save();
render();

}

////////////////////////////////////////////////////
// SAVE SYSTEM
////////////////////////////////////////////////////

function save(){

localStorage.setItem(
STORAGE_KEY,
JSON.stringify(DB)
);

autoBackup();

}

////////////////////////////////////////////////////
// AUTO BACKUP
////////////////////////////////////////////////////

function autoBackup(){

let snapshot = {

time: Date.now(),
data: DB

};

localStorage.setItem(
"vault_backup_latest",
JSON.stringify(snapshot)
);

localStorage.setItem(
"vault_backup_shadow",
JSON.stringify(snapshot)
);

}

////////////////////////////////////////////////////
// EXPORT BACKUP
////////////////////////////////////////////////////

function exportBackup(){

let blob = new Blob(

[JSON.stringify({

time: Date.now(),
data: DB

},null,2)],

{type:"application/json"}

);

let a = document.createElement("a");

a.href = URL.createObjectURL(blob);

a.download =
"vault_backup_" + Date.now() + ".json";

a.click();

}

////////////////////////////////////////////////////
// RESTORE BACKUP
////////////////////////////////////////////////////

function restoreBackup(){

let file =
document.getElementById("restoreFile").files[0];

if(!file){

alert("Select backup file");
return;

}

let reader = new FileReader();

reader.onload = e=>{

try{

let obj = JSON.parse(e.target.result);

if(obj.data){

DB = obj.data;

save();
render();

alert("RESTORE COMPLETE");

}else{

alert("Invalid backup file");

}

}catch(err){

alert("Restore failed");

}

};

reader.readAsText(file);

}

////////////////////////////////////////////////////
// SEARCH
////////////////////////////////////////////////////

let search = "";

document
.getElementById("search")
.addEventListener("input",e=>{

search = e.target.value.toLowerCase();

render();

});

function match(r,q){

if(!q) return true;

return (
(r.Name || "")
.toLowerCase()
.includes(q)
);

}

////////////////////////////////////////////////////
// STATS
////////////////////////////////////////////////////

function stats(){

return {

total:
DB.length,

pending:
DB.filter(x=>x.Status==="PENDING").length,

success:
DB.filter(x=>x.Status==="SUCCESS").length,

rts:
DB.filter(x=>x.Status.includes("RTS")).length,

logged:
DB.filter(x=>x.Status==="LOGGED").length,

sent:
DB.filter(x=>x.Status==="Sent").length

};

}

////////////////////////////////////////////////////
// RENDER
////////////////////////////////////////////////////

function render(){

let s = stats();

document.getElementById("stats").innerHTML = `

<div class="box">
TOTAL<br>${s.total}
</div>

<div class="box">
PENDING<br>${s.pending}
</div>

<div class="box">
SUCCESS<br>${s.success}
</div>

<div class="box">
RTS<br>${s.rts}
</div>

<div class="box">
LOGGED<br>${s.logged}
</div>

<div class="box">
SENT<br>${s.sent}
</div>

`;

document.getElementById("list").innerHTML =

DB
.filter(r=>match(r,search))

.map(r=>`

<div class="card">

<input
value="${esc(r.Name)}"
onchange="update(${r.ID},this.value)"
>

<select
onchange="setStatus(${r.ID},this.value)"
>

<option ${r.Status==="PENDING"?"selected":""}>
PENDING
</option>

<option ${r.Status==="SUCCESS"?"selected":""}>
SUCCESS
</option>

<option ${r.Status==="RTS"?"selected":""}>
RTS
</option>

<option ${r.Status==="LOGGED"?"selected":""}>
LOGGED
</option>

<option ${r.Status==="Sent"?"selected":""}>
Sent
</option>

</select>

</div>

`).join("");

}

////////////////////////////////////////////////////
// ACTIONS
////////////////////////////////////////////////////

function update(id,val){

let r = DB.find(x=>x.ID===id);

if(r){

r.Name = val;

save();
render();

}

}

function setStatus(id,val){

let r = DB.find(x=>x.ID===id);

if(r){

r.Status = val;

save();
render();

}

}

////////////////////////////////////////////////////
// EMERGENCY RECOVERY
////////////////////////////////////////////////////

(function recoveryCheck(){

let backup =
localStorage.getItem("vault_backup_latest");

if(
!localStorage.getItem(STORAGE_KEY)
&& backup
){

let obj = JSON.parse(backup);

DB = obj.data || [];

save();

}

})();

////////////////////////////////////////////////////
// INIT
////////////////////////////////////////////////////

load();

</script>

</body>
</html>
