<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VaultPro v6 | Intelligence System</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#050505; color:#e5e7eb; font-family:sans-serif; }
.card { background:#111113; border:1px solid #27272a; border-radius:12px; }
.good { border-left:4px solid #22c55e; }
.mid { border-left:4px solid #f59e0b; }
.low { border-left:4px solid #ef4444; }
.small { font-size:10px; opacity:0.7; }
select { background:#000; color:#fff; font-size:11px; }
button { font-size:11px; }
</style>
</head>

<body class="pb-24">

<div class="bg-red-600 text-white text-[10px] font-bold text-center py-1">
VAULTPRO v6 • INTELLIGENCE LAYER • DUPLICATION + STRATEGY CONTROL
</div>

<div class="max-w-6xl mx-auto p-4">

<h1 class="text-3xl font-black mb-3">VAULT<span class="text-red-600">PRO</span> v6</h1>

<!-- CONTROL -->
<div class="flex gap-2 mb-3">
<input id="search" oninput="render()" placeholder="Search..." class="w-full bg-zinc-900 p-2 text-xs rounded border border-zinc-800">

<button onclick="runAudit()" class="bg-blue-600 px-3 rounded">AUDIT SYSTEM</button>
<button onclick="resetStamps()" class="bg-green-600 px-3 rounded">RESET STAMPS</button>
</div>

<!-- STAMPS -->
<div class="card p-3 mb-3 text-xs">
📦 Monthly Stamp Budget: <b>20</b>  
Remaining: <b id="stamps">20</b>
<button onclick="useStamp()" class="ml-2 bg-red-600 px-2 rounded">USE</button>
</div>

<!-- OUTPUTS -->
<div id="audit" class="mb-3"></div>
<div id="list"></div>

</div>

<script>

/* =========================
FULL DATASET
========================= */

let DB = /* FULL DATA GOES HERE (your restore JSON) */ [];

/* =========================
STAMP SYSTEM
========================= */

let stamps = 20;

/* =========================
CORE INTELLIGENCE
========================= */

function baseScore(r){

let s = 50;

if(r.Status==="SUCCESS") s += 30;
if(r.Status==="RTS") s -= 30;
if(r.Status==="Sent") s -= 10;
if(r.Status==="LOGGED") s -= 5;

/* pattern intelligence */
let n = r.Name.toLowerCase();

if(n.includes("theatre") || n.includes("park")) s += 15;
if(n.includes("training") || n.includes("fc")) s += 12;
if(n.includes("cast") || n.includes("series")) s += 10;
if(n.includes("home")) s += 8;

return s;
}

/* =========================
DUPLICATE DETECTOR
========================= */

function findDuplicates(){
let map = {};
let dups = [];

DB.forEach(r=>{
let key = r.Name.toLowerCase().trim();
if(!map[key]) map[key] = [];
map[key].push(r);
});

Object.values(map).forEach(arr=>{
if(arr.length > 1) dups.push(arr);
});

return dups;
}

/* =========================
STAMP CONTROL
========================= */

function useStamp(){
if(stamps > 0){
stamps--;
document.getElementById("stamps").innerText = stamps;
}
}

function resetStamps(){
stamps = 20;
document.getElementById("stamps").innerText = stamps;
}

/* =========================
AUDIT ENGINE
========================= */

function runAudit(){

let dups = findDuplicates();

let html = `<div class="card p-3 mb-3">
<div class="text-sm font-bold">🧠 SYSTEM AUDIT</div>
<div class="small">Intelligence scan complete</div>
</div>`;

/* DUPLICATES */
html += `<div class="card p-3 mb-2">
<div class="text-xs font-bold">🔁 Duplicate Clusters</div>
<div class="small">${dups.length} groups found</div>
</div>`;

/* STATUS BREAKDOWN */
let s = DB.filter(x=>x.Status==="SUCCESS").length;
let p = DB.filter(x=>x.Status==="PENDING").length;
let r = DB.filter(x=>x.Status==="RTS").length;

html += `
<div class="card p-3 mb-2">
<div class="text-xs">SUCCESS: ${s}</div>
<div class="text-xs">PENDING: ${p}</div>
<div class="text-xs">RTS: ${r}</div>
</div>`;

/* STAMP WARNING */
let topPending = DB.filter(x=>x.Status==="PENDING")
.sort((a,b)=>baseScore(b)-baseScore(a))
.slice(0, stamps);

html += `<div class="card p-3">
<div class="text-sm font-bold">🎯 RECOMMENDED SENDS (STAMP SAFE)</div>
<div class="small">Only top-ranked, non-wasted targets</div>
</div>`;

topPending.forEach(r=>{
html += `
<div class="card p-2 mt-2 good">
<div class="text-xs font-bold">${r.Name}</div>
<div class="small">Score: ${baseScore(r)}</div>
</div>`;
});

document.getElementById("audit").innerHTML = html;
}

/* =========================
RENDER LIST
========================= */

function render(){

let q = document.getElementById("search").value?.toLowerCase() || "";

let list = document.getElementById("list");
list.innerHTML = "";

DB.filter(r=>r.Name.toLowerCase().includes(q))
.sort((a,b)=>baseScore(b)-baseScore(a))
.forEach(r=>{

let sc = baseScore(r);
let cls = sc>80?"good":sc>55?"mid":"low";

let div = document.createElement("div");
div.className = "card p-3 flex justify-between items-center "+cls;

div.innerHTML = `
<div>
<div class="text-xs font-bold">${r.Name}</div>
<div class="small">Score ${sc}</div>
</div>

<select onchange="r.Status=this.value">
<option ${r.Status==="SUCCESS"?"selected":""}>SUCCESS</option>
<option ${r.Status==="PENDING"?"selected":""}>PENDING</option>
<option ${r.Status==="Sent"?"selected":""}>Sent</option>
<option ${r.Status==="RTS"?"selected":""}>RTS</option>
<option ${r.Status==="LOGGED"?"selected":""}>LOGGED</option>
</select>
`;

list.appendChild(div);
});

}

render();
runAudit();

</script>

</body>
</html>
