
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VaultOS v6 Core</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#0b0b0b;
  color:#fff;
  margin:0;
}

header{
  background:#111;
  padding:12px;
  position:sticky;
  top:0;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:#111;
  border:1px solid #222;
  border-radius:10px;
  padding:12px;
  margin:10px;
}

input,select,button,textarea{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid #333;
  background:#181818;
  color:#fff;
}

button{
  cursor:pointer;
}

.record{
  padding:8px;
  border-bottom:1px solid #222;
}

.small{font-size:12px;color:#aaa}
</style>
</head>

<body>

<header>
<h2>VaultOS v6 Core</h2>
<input id="search" placeholder="Search records...">
</header>

<div class="grid" id="stats"></div>

<div class="card">
<h3>Backup Tools</h3>
<input type="file" id="jsonFile">
<button onclick="loadFile()">Load Backup</button>
<button onclick="exportJSON()">Export Backup</button>
</div>

<div class="card">
<h3>Bulk Add (Pending)</h3>
<textarea id="bulkNames" placeholder="One name per line..."></textarea>
<button onclick="bulkAdd()">Add All As PENDING</button>
<div id="bulkResult" class="small"></div>
</div>

<div class="card">
<h3>Add Single Record</h3>
<input id="newName" placeholder="Name">
<select id="newStatus">
  <option>PENDING</option>
  <option>SUCCESS</option>
  <option>RTS</option>
  <option>LOGGED</option>
  <option>SENT</option>
</select>
<button onclick="addRecord()">Add</button>
</div>

<div class="card">
<h3>Records</h3>
<div id="list"></div>
</div>

<script>

const KEY = "vaultos_v6_core";
let DB = [];

/* ---------- STORAGE ---------- */

function save(){
  localStorage.setItem(KEY, JSON.stringify(DB));
  render();
}

function load(){
  try{
    DB = JSON.parse(localStorage.getItem(KEY) || "[]");
  }catch(e){
    DB = [];
    console.error("Storage reset (invalid JSON)");
  }
  render();
}

/* ---------- FILE ---------- */

function loadFile(){
  const file = document.getElementById('jsonFile').files[0];
  if(!file) return alert("Select a file");

  const reader = new FileReader();

  reader.onload = e => {
    try{
      DB = JSON.parse(e.target.result);
      save();
      alert("Loaded " + DB.length + " records");
    }catch(err){
      alert("Invalid JSON file");
    }
  };

  reader.readAsText(file);
}

function exportJSON(){
  const blob = new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "vault_backup.json";
  a.click();
}

/* ---------- CORE ACTIONS ---------- */

function addRecord(){
  const name = document.getElementById('newName').value.trim();
  const status = document.getElementById('newStatus').value;

  if(!name) return;

  DB.push({
    ID: Date.now(),
    Name: name,
    Status: status
  });

  document.getElementById('newName').value = "";
  save();
}

/* FIXED BULK FUNCTION */
function bulkAdd(){
  const text = document.getElementById('bulkNames').value.trim();
  if(!text) return alert("No names entered");

  const lines = text.split("\n").map(x => x.trim()).filter(Boolean);

  lines.forEach(name => {
    DB.push({
      ID: Date.now() + Math.random(),
      Name: name,
      Status: "PENDING"
    });
  });

  document.getElementById('bulkNames').value = "";
  document.getElementById('bulkResult').innerText =
    `Added ${lines.length} pending records`;

  save();
}

/* ---------- UI ---------- */

function render(){

  const total = DB.length;
  const pending = DB.filter(x => x.Status === "PENDING").length;
  const success = DB.filter(x => x.Status === "SUCCESS").length;
  const rts = DB.filter(x => (x.Status||"").includes("RTS")).length;

  document.getElementById('stats').innerHTML = `
    <div class="card"><h2>${total}</h2>Total</div>
    <div class="card"><h2>${pending}</h2>Pending</div>
    <div class="card"><h2>${success}</h2>Success</div>
    <div class="card"><h2>${rts}</h2>RTS</div>
  `;

  const q = (document.getElementById('search').value || "").toLowerCase();

  document.getElementById('list').innerHTML =
    DB
    .filter(x => (x.Name||"").toLowerCase().includes(q))
    .map(x => `
      <div class="record">
        <b>${x.Name}</b><br>
        <span class="small">${x.Status}</span>
      </div>
    `)
    .join("");
}

/* ---------- SEARCH ---------- */

document.getElementById('search').addEventListener('input', render);

/* ---------- INIT ---------- */

load();

</script>

</body>
</html>
