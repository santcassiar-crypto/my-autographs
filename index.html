<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VaultPro v11 AI Optimiser</title>

<style>
body{margin:0;font-family:Arial;background:#050505;color:#eee;}
header{position:sticky;top:0;background:#111;padding:10px;border-bottom:1px solid #222;}
input,select{width:100%;padding:10px;margin-top:5px;background:#000;color:#fff;border:1px solid #333;border-radius:6px;}

.stats{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:6px;
padding:10px;
}

.box{
background:#111;
padding:8px;
border-radius:8px;
text-align:center;
font-size:11px;
}

.list{padding:10px;}

.card{
background:#111;
border:1px solid #222;
padding:10px;
margin-bottom:8px;
border-radius:8px;
}

button{
background:#222;
border:1px solid #333;
color:#fff;
padding:6px;
font-size:11px;
border-radius:6px;
margin:4px;
}

.high{border-left:4px solid gold;}
.med{border-left:4px solid orange;}
.low{border-left:4px solid #333;}

.small{font-size:11px;color:#aaa;}
</style>
</head>

<body>

<header>
<input id="search" placeholder="Search full vault..." oninput="render()">
</header>

<div class="stats">
<div class="box">TOTAL<br><b id="t"></b></div>
<div class="box">HIGH PRIORITY<br><b id="hp"></b></div>
<div class="box">SEND NOW (20)<br><b id="sn"></b></div>
<div class="box">SUCCESS<br><b id="s"></b></div>
<div class="box">PENDING<br><b id="p"></b></div>
</div>

<div style="padding:10px">
<button onclick="add()">+ ADD</button>
<button onclick="stampQueue()">🎯 NEXT 20 STAMPS</button>
<button onclick="reset()">RESET MASTER</button>
</div>

<div id="list" class="list"></div>

<script>

// =========================
// FULL SAFE DATA ENGINE
// =========================

const MASTER_DATA = [
{"ID":1779457614274,"Name":"Scott Melvin- Stick to football podcast","Status":"PENDING"},
{"ID":1779457583433,"Name":"Jonathan ross tv show","Status":"PENDING"},
{"ID":1779457518143,"Name":"Kevin Keegan- Home","Status":"SUCCESS"},
{"ID":1,"Name":"Jannik Sinner","Status":"SUCCESS"},
{"ID":2,"Name":"Keanu Reeves","Status":"RTS"},
{"ID":3,"Name":"Alan Carr","Status":"SUCCESS"},
{"ID":4,"Name":"Harry Kane (Bayern)","Status":"RTS"},
{"ID":5,"Name":"David Attenborough","Status":"SUCCESS"},
{"ID":10,"Name":"Erling Haaland (City)","Status":"SUCCESS"},
{"ID":11,"Name":"Cole Palmer","Status":"RTS"},
{"ID":12,"Name":"Jude Bellingham","Status":"PENDING"},
{"ID":13,"Name":"Kylian Mbappé","Status":"PENDING"},
{"ID":14,"Name":"Kevin De Bruyne","Status":"PENDING"},
{"ID":15,"Name":"Usain Bolt","Status":"PENDING"},
{"ID":41,"Name":"Rik Smits","Status":"SUCCESS"},
{"ID":42,"Name":"Robert Parish","Status":"SUCCESS"},
{"ID":81,"Name":"LA Lakers","Status":"Sent"},
{"ID":82,"Name":"TNT Sports London","Status":"Sent"},
{"ID":83,"Name":"Man Utd Training","Status":"Sent"},
{"ID":88,"Name":"Antoine Griezmann / Alvarez","Status":"PENDING"},
{"ID":92,"Name":"Michael Sheen","Status":"SUCCESS"},
{"ID":114,"Name":"Dick Van Dyke","Status":"SUCCESS"},
{"ID":118,"Name":"Alex Ferguson (1)","Status":"LOGGED"},
{"ID":119,"Name":"Thierry Henry","Status":"LOGGED"},
{"ID":171,"Name":"Stephen Fry (1/3)","Status":"SUCCESS"},
{"ID":172,"Name":"Stephen Fry (2/3)","Status":"SUCCESS"},
{"ID":173,"Name":"Stephen Fry (3/3)","Status":"SUCCESS"},
{"ID":176,"Name":"Tony Adams","Status":"SUCCESS"},
{"ID":177,"Name":"Arsenal 2026 Squad","Status":"SUCCESS"}
];

// =========================
// SAFE LOAD (NO DATA LOSS)
// =========================

let DB;

let saved = localStorage.getItem("vault_v11");

if(saved){
    DB = JSON.parse(saved);
}else{
    DB = MASTER_DATA;
    localStorage.setItem("vault_v11", JSON.stringify(MASTER_DATA));
}

// =========================
// SAVE
// =========================

function save(){
    localStorage.setItem("vault_v11", JSON.stringify(DB));
}

// =========================
// AI SCORING ENGINE
// =========================

function score(r){

    let base =
        r.Status==="SUCCESS"?100:
        r.Status==="RTS"?30:
        r.Status==="Sent"?60:
        r.Status==="PENDING"?20:10;

    let n = r.Name.toLowerCase();

    // domain boosts (your real-world edge)
    if(n.includes("football")) base += 15;
    if(n.includes("arsenal")) base += 10;
    if(n.includes("actor")) base += 5;
    if(n.includes("cast")) base += 8;

    return base;
}

// probability model (core AI logic)
function probability(r){

    let s = score(r);

    if(r.Status==="RTS") return s * 0.25;
    if(r.Status==="SUCCESS") return 0;
    if(r.Status==="Sent") return s * 0.7;
    if(r.Status==="PENDING") return s * 0.85;

    return s * 0.5;
}

// =========================
// STAMP QUEUE (15–20 OPTIMISER)
// =========================

function stampQueue(){

    let sorted = [...DB]
        .filter(x=>x.Status!=="SUCCESS")
        .sort((a,b)=>probability(b)-probability(a));

    let top = sorted.slice(0,20);

    alert(
        "🎯 NEXT STAMP RUN (OPTIMISED)\n\n" +
        top.map((t,i)=>`${i+1}. ${t.Name}`).join("\n")
    );
}

// =========================
// RENDER
// =========================

function render(){

    let q = document.getElementById("search").value.toLowerCase();

    let list = DB;

    if(q){
        list = DB.filter(x=>x.Name.toLowerCase().includes(q));
    }

    list.sort((a,b)=>score(b)-score(a));

    let out = document.getElementById("list");
    out.innerHTML="";

    list.forEach(r=>{

        let cls =
            probability(r)>80 ? "high" :
            probability(r)>50 ? "med" : "low";

        let div = document.createElement("div");
        div.className="card "+cls;

        div.innerHTML=`
            <input value="${r.Name}" onchange="editName(${r.ID},this.value)">
            <select onchange="editStatus(${r.ID},this.value)">
                <option ${r.Status==="SUCCESS"?"selected":""}>SUCCESS</option>
                <option ${r.Status==="PENDING"?"selected":""}>PENDING</option>
                <option ${r.Status==="Sent"?"selected":""}>Sent</option>
                <option ${r.Status==="RTS"?"selected":""}>RTS</option>
                <option ${r.Status==="LOGGED"?"selected":""}>LOGGED</option>
            </select>
            <div class="small">
                Score: ${score(r)} | Prob: ${Math.round(probability(r))}
            </div>
        `;

        out.appendChild(div);
    });

    stats();
}

// =========================
// STATS
// =========================

function stats(){
    document.getElementById("t").innerText = DB.length;
    document.getElementById("hp").innerText = DB.filter(x=>probability(x)>80).length;
    document.getElementById("sn").innerText = Math.min(20, DB.filter(x=>x.Status!=="SUCCESS").length);
    document.getElementById("s").innerText = DB.filter(x=>x.Status==="SUCCESS").length;
    document.getElementById("p").innerText = DB.filter(x=>x.Status==="PENDING").length;
}

// =========================
// EDIT
// =========================

function editName(id,val){
    DB.find(x=>x.ID===id).Name = val;
    save();
}

function editStatus(id,val){
    DB.find(x=>x.ID===id).Status = val;
    save();
}

// =========================
// ADD / RESET
// =========================

function add(){
    let n = prompt("Name:");
    if(!n) return;

    DB.unshift({ID:Date.now(),Name:n,Status:"PENDING"});
    save();
    render();
}

function reset(){
    if(confirm("Reset to master dataset?")){
        DB = MASTER_DATA;
        save();
        render();
    }
}

render();

</script>

</body>
</html>
