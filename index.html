

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vault Tracker V1</title>
<style>
body { font-family: Arial; background:#0b0b0b; color:#fff; margin:0; padding:20px; }
h1 { margin-bottom:10px; }

input, select, button {
  padding:8px;
  margin:4px;
  border-radius:6px;
  border:none;
}

button { cursor:pointer; }

.container { max-width:1000px; margin:auto; }

.card {
  background:#1a1a1a;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.status-PENDING { color:orange; }
.status-SENT { color:cyan; }
.status-RTS { color:red; }
.status-SUCCESS { color:lime; }
.status-LOGGED { color:#aaa; }

.small { font-size:12px; opacity:0.7; }

.row { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px; }
</style>
</head>

<body>
<div class="container">

<h1>Vault Tracker V1</h1>

<div class="row">
  <input id="name" placeholder="Name / Target">
  <select id="status">
    <option>PENDING</option>
    <option>SENT</option>
    <option>RTS</option>
    <option>SUCCESS</option>
    <option>LOGGED</option>
  </select>
  <button onclick="addItem()">Add</button>
  <button onclick="exportJSON()">Export JSON</button>
  <input type="file" onchange="importJSON(event)">
</div>

<div id="list"></div>

</div>

<script>
let records = [];

function save() {
  localStorage.setItem("vault_data", JSON.stringify(records));
}

function load() {
  const data = localStorage.getItem("vault_data");
  if (data) records = JSON.parse(data);
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  records.forEach((r, i) => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div>
        <input value="${r.name}" onchange="editName(${i}, this.value)">
        <select onchange="editStatus(${i}, this.value)">
          <option ${r.status==="PENDING"?"selected":""}>PENDING</option>
          <option ${r.status==="SENT"?"selected":""}>SENT</option>
          <option ${r.status==="RTS"?"selected":""}>RTS</option>
          <option ${r.status==="SUCCESS"?"selected":""}>SUCCESS</option>
          <option ${r.status==="LOGGED"?"selected":""}>LOGGED</option>
        </select>
        <div class="small">ID: ${i}</div>
      </div>

      <button onclick="removeItem(${i})">Delete</button>
    `;

    list.appendChild(div);
  });
}

function addItem() {
  const name = document.getElementById("name").value;
  const status = document.getElementById("status").value;

  if (!name) return;

  records.push({ name, status });
  document.getElementById("name").value = "";

  save();
  render();
}

function editName(i, val) {
  records[i].name = val;
  save();
}

function editStatus(i, val) {
  records[i].status = val;
  save();
}

function removeItem(i) {
  records.splice(i, 1);
  save();
  render();
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(records, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "vault_data.json";
  a.click();
}

function importJSON(event) {
  const file = event.target.files[0];
  const reader = new FileReader();

  reader.onload = function(e) {
    records = JSON.parse(e.target.result);
    save();
    render();
  };

  reader.readAsText(file);
}

load();
render();
</script>

</body>
</html>
