<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VaultOS SR10 | Collector Edition</title>
<style>
:root{--bg:#0f172a;--panel:#1e293b;--panel2:#334155;--border:#475569;--text:#f8fafc;--accent:#38bdf8}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui, sans-serif;display:flex;min-height:100vh}
aside{width:270px;background:#020617;padding:20px;border-right:1px solid var(--border)}
main{flex:1;padding:20px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:18px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.stat{background:var(--panel2);padding:18px;border-radius:12px}
.stat b{font-size:28px;color:var(--accent)}
input,select,textarea,button{background:var(--panel2);color:white;border:1px solid var(--border);border-radius:8px;padding:10px;margin:4px}
button{cursor:pointer;font-weight:bold}
button:hover{background:var(--border)}
table{width:100%;border-collapse:collapse}
td,th{padding:12px;border-bottom:1px solid var(--border);text-align:left}
textarea{width:100%;resize:vertical}
</style>
</head>
<body>
<aside>
    <h2>VaultOS SR10</h2>
    <p>Command Centre</p>
    <button onclick="view('dash')">Dashboard</button>
    <button onclick="view('targets')">Targets & Inventory</button>
    <textarea id="notes" placeholder="Collector notes..."></textarea>
</aside>

<main>
    <section id="dash">
        <h2>Dashboard</h2>
        <div class="grid">
            <div class="stat">Total<br><b id="total">0</b></div>
            <div class="stat">Pending<br><b id="pending">0</b></div>
            <div class="stat">Success<br><b id="success">0</b></div>
            <div class="stat">RTS<br><b id="rts">0</b></div>
            <div class="stat">Award Circuit<br><b id="award">0</b></div>
            <div class="stat">Top Targets<br><b id="top">0</b></div>
        </div>
        <div class="card"><h3>System Status</h3><div id="activity">Ready</div></div>
    </section>

    <section id="targets" style="display:none">
        <div class="card">
            <h2>Add New Entry</h2>
            <input id="name" placeholder="Name">
            <input id="sport" placeholder="Sport">
            <input id="team" placeholder="Team">
            <select id="status">
                <option>Pending</option><option>Research</option><option>Sent</option>
                <option>Success</option><option>RTS</option><option>AWARD CIRCUIT – NON-ROUTING</option>
            </select>
            <select id="priority"><option>Normal</option><option>High</option><option>Top Target</option></select>
            <button onclick="add()">Save Entry</button>
            <button onclick="exportJSON()">Export JSON</button>
        </div>
        <div class="card">
            <input id="search" placeholder="Search collection..." oninput="render()">
            <table>
                <thead><tr><th>Name</th><th>Sport</th><th>Team</th><th>Status</th><th>Priority</th><th></th></tr></thead>
                <tbody id="list"></tbody>
            </table>
        </div>
    </section>
</main>

<script>
let vault = JSON.parse(localStorage.getItem("VaultOS_SR10")) || {records:[], notes:""};
let $ = x => document.getElementById(x);

function save() { localStorage.setItem("VaultOS_SR10", JSON.stringify(vault)); render(); }
function view(id) {
    document.querySelectorAll("main section").forEach(s => s.style.display="none");
    $(id).style.display="block";
}

function add() {
    if(!$("name").value) return;
    vault.records.push({
        Name:$("name").value, Sport:$("sport").value, Team:$("team").value,
        Status:$("status").value, Priority:$("priority").value
    });
    $("name").value = "";
    save();
}

function del(i) { vault.records.splice(i,1); save(); }

function render() {
    let q = $("search").value.toLowerCase();
    $("list").innerHTML = vault.records.filter(x => JSON.stringify(x).toLowerCase().includes(q)).map((x,i) => `
        <tr><td>${x.Name}</td><td>${x.Sport}</td><td>${x.Team}</td><td>${x.Status}</td><td>${x.Priority}</td>
        <td><button onclick="del(${i})">X</button></td></tr>`).join("");
    
    $("total").textContent = vault.records.length;
    $("pending").textContent = vault.records.filter(x => x.Status == "Pending").length;
    $("success").textContent = vault.records.filter(x => x.Status == "Success").length;
    $("rts").textContent = vault.records.filter(x => x.Status == "RTS").length;
    $("award").textContent = vault.records.filter(x => x.Status == "AWARD CIRCUIT – NON-ROUTING").length;
    $("top").textContent = vault.records.filter(x => x.Priority == "Top Target").length;
    $("activity").textContent = "Database synced - " + new Date().toLocaleTimeString();
}

function exportJSON() {
    let a = document.createElement("a");
    a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(vault));
    a.download = "VaultOS_Backup.json";
    a.click();
}

render();
</script>
</body>
</html>
