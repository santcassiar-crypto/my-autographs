

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VaultOS Pro v4</title>
<style>
body{font-family:Arial;margin:0;background:#0b0b0b;color:#fff}
header{padding:12px;background:#111;position:sticky;top:0}
input,select,textarea,button{width:100%;padding:10px;margin:6px 0;background:#181818;color:#fff;border:1px solid #333;border-radius:8px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;padding:10px}
.card{background:#111;border:1px solid #222;border-radius:10px;padding:10px}
.small{font-size:12px;color:#aaa}
.list{padding:10px}
</style>
</head>
<body>
<header>
<h2>VaultOS Pro v4</h2>
<input id="search" placeholder="Search...">
</header>

<div class="grid" id="stats"></div>

<div class="card">
<h3>Import / Export</h3>
<textarea id="jsonBox" placeholder="Paste JSON array here"></textarea>
<button onclick="importJSON()">Import JSON</button>
<button onclick="exportJSON()">Export JSON</button>
</div>

<div class="card">
<h3>Intelligence</h3>
<div id="intel"></div>
</div>

 <div class="card">
<h3>🎯 Awaiting Response</h3>
<div id="sendNext"></div>
</div>

<div class="card">
<h3>⚠ Duplicate Detector</h3>
<div id="duplicates"></div>
</div>

<div class="card">
<h3>📰 Vault News</h3>
<div id="news"></div>
</div>

<div class="list" id="list"></div>

<script>
const KEY="vaultos_v4";
let DB=[];

function save(){localStorage.setItem(KEY,JSON.stringify(DB));render();}
function load(){DB=JSON.parse(localStorage.getItem(KEY)||"[]");render();}

function importJSON(){
 try{
  DB=JSON.parse(document.getElementById('jsonBox').value);
  save();
  alert("Imported "+DB.length+" records");
 }catch(e){alert("Invalid JSON");}
}

function exportJSON(){
 const b=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(b);
 a.download='vault_backup.json';
 a.click();
}

function stats(){
 return {
 total:DB.length,
 success:DB.filter(x=>x.Status==="SUCCESS").length,
 pending:DB.filter(x=>x.Status==="PENDING").length,
 rts:DB.filter(x=>(x.Status||"").includes("RTS")).length
 }
}

function score(r){

 let s = 50;
 let n = (r.Name || "").toLowerCase();

 if((r.Status||"").toUpperCase()==="PENDING") s += 20;

 if(n.includes("home")) s += 30;
 if(n.includes("podcast")) s += 20;
 if(n.includes("theatre")) s += 15;
 if(n.includes("event")) s += 10;

 if(n.includes("training")) s -= 20;
 if(n.includes("camp")) s -= 15;
 if(n.includes("cast")) s -= 15;
 if(n.includes("production")) s -= 10;

 return Math.max(0,Math.min(100,s));
}

function render(){
function render(){

 let st = stats();

 document.getElementById('stats').innerHTML=`
 <div class="card"><h2>${st.total}</h2>Total</div>
 <div class="card"><h2>${st.success}</h2>Success</div>
 <div class="card"><h2>${st.pending}</h2>Pending</div>
 <div class="card"><h2>${st.rts}</h2>RTS</div>`;

 let top = DB
 .filter(x=>(x.Status||"").toUpperCase()==="PENDING")
 .sort((a,b)=>score(b)-score(a))
 .slice(0,10);

 document.getElementById('intel').innerHTML =
 `
 <b>Top 10 Likely Returns</b>
 <ol>
 ${top.map(x=>`<li>${x.Name} (${score(x)}%)</li>`).join("")}
 </ol>

 <hr>

 Success Rate:
 ${Math.round((st.success/st.total)*100)||0}%<br>

 Pending:
 ${st.pending}<br>

 Success:
 ${st.success}
 `;

 let next = DB
 .filter(x=>(x.Status||"").toUpperCase()==="PENDING")
 .filter(x=>!/training|camp|cast/i.test(x.Name||""))
 .sort((a,b)=>score(b)-score(a))
 .slice(0,10);

 document.getElementById("sendNext").innerHTML =
 next.length
 ? next.map(x=>`🎯 ${x.Name}`).join("<br>")
 : "No pending targets found";

 let nameMap = {};

 DB.forEach(r=>{
  let key=(r.Name||"").trim().toLowerCase();
  nameMap[key]=(nameMap[key]||0)+1;
 });

 let dups = Object.keys(nameMap)
 .filter(x=>nameMap[x]>1);

 document.getElementById("duplicates").innerHTML =
 dups.length
 ? dups.map(x=>`⚠ ${x}`).join("<br>")
 : "No duplicates found";

 document.getElementById("news").innerHTML = `
 📬 ${st.pending} active requests<br>
 🏆 ${st.success} successful returns<br>
 ⚠ ${dups.length} duplicate targets detected<br>
 🎭 Film & TV projects active<br>
 ⚽ Football remains strongest category<br>
 🏀 NBA opportunities still pending
 `;

 let q=(document.getElementById('search').value||'').toLowerCase();

 document.getElementById('list').innerHTML =
 DB.filter(x=>(x.Name||'').toLowerCase().includes(q))
 .map(x=>`
 <div class="card">
 <b>${x.Name||''}</b><br>
 <span class="small">${x.Status||''}</span>
 </div>
 `).join("");
}

 // SEND NEXT

let next = DB
.filter(x => (x.Status || "").toUpperCase() === "PENDING")
.sort((a,b)=>score(b)-score(a))
.slice(0,10);

document.getElementById("sendNext").innerHTML =
next.length
? next.map(x=>`🎯 ${x.Name}`).join("<br>")
: "No pending targets found";


// DUPLICATES

let nameMap = {};

DB.forEach(r=>{
 let key=(r.Name||"").trim().toLowerCase();
 nameMap[key]=(nameMap[key]||0)+1;
});

let dups = Object.keys(nameMap)
.filter(x=>nameMap[x]>1);

document.getElementById("duplicates").innerHTML =
dups.length
? dups.map(x=>`⚠ ${x}`).join("<br>")
: "No duplicates found";


// NEWS

document.getElementById("news").innerHTML = `
⚽ ${st.pending} active pending requests<br>
🏆 ${st.success} successful returns<br>
📬 ${st.total} total targets tracked<br>
🎭 Film & TV cast mailings active<br>
🏀 NBA offseason signing opportunities
`;

 let q=(document.getElementById('search').value||'').toLowerCase();

 document.getElementById('list').innerHTML =
 DB.filter(x=>(x.Name||'').toLowerCase().includes(q))
   .map(x=>`
   <div class="card">
   <b>${x.Name||''}</b><br>
   <span class="small">${x.Status||''}</span>
   </div>`).join("");
}

document.getElementById('search').addEventListener('input',render);
load();
</script>
</body>
</html>
