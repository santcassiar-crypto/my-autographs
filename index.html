<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VaultOS — Wipe Resistant Edition</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial}
header{position:sticky;top:0;background:#111;padding:10px;border-bottom:1px solid #222}

input,select,textarea,button{
width:100%;padding:10px;margin-top:6px;
background:#000;color:#fff;border:1px solid #333;border-radius:8px
}

button{cursor:pointer;background:#111}
button:hover{background:#1c1c1c}

.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px}
.box{background:#111;border:1px solid #222;padding:10px;border-radius:8px;text-align:center}
.card{background:#111;margin:10px;padding:10px;border-radius:10px;border:1px solid #222}
.small{font-size:11px;color:#888}
</style>
</head>

<body>

<header>
<input id="search" placeholder="Search vault...">
</header>

<div class="grid" id="stats"></div>

<div class="card">
<h3>🛡️ BACKUP CONTROLS</h3>

<button onclick="exportBackup()">⬇️ DOWNLOAD BACKUP NOW</button>

<input type="file" id="restoreFile">
<button onclick="restoreBackup()">⬆️ RESTORE FROM FILE</button>

<div class="small">
Backups are your protection if browser/device is wiped.
</div>
</div>

<div id="list"></div>

<script>

////////////////////////////////////////////////////
// CORE DATA (your system)
////////////////////////////////////////////////////
let DB = [];

const STORAGE_KEY = "vault_wipe_resistant_v1";

const SEED = [
{ID:1,Name:"Example Record A",Status:"PENDING"},
{ID:2,Name:"Example Record B",Status:"SUCCESS"}
];

////////////////////////////////////////////////////
// LOAD (multi-layer recovery system)
////////////////////////////////////////////////////
function load(){

// Layer 1: browser storage
let raw = localStorage.getItem(STORAGE_KEY);

if(raw){
try{
DB = JSON.parse(raw);
render();
return;
}catch(e){}
}

// Layer 2: seed fallback
DB = SEED;
save();
render();
}

function save(){
localStorage.setItem(STORAGE_KEY, JSON.stringify(DB));

// 🔥 AUTO BACKUP SNAPSHOT (critical)
autoBackup();
}

////////////////////////////////////////////////////
// AUTO BACKUP SYSTEM (KEY FEATURE)
////////////////////////////////////////////////////
function autoBackup(){

let snapshot = {
time:Date.now(),
data:DB
};

// store rotating backup slots
localStorage.setItem("vault_backup_latest", JSON.stringify(snapshot));

// keep second safety copy
localStorage.setItem("vault_backup_shadow", JSON.stringify(snapshot));
}

////////////////////////////////////////////////////
// EXPORT BACKUP (download file)
////////////////////////////////////////////////////
function exportBackup(){

let blob = new Blob(
[JSON.stringify({
time:Date.now(),
data:DB
},null,2)],
{type:"application/json"}
);

let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="vault_backup_"+Date.now()+".json";
a.click();
}

////////////////////////////////////////////////////
// RESTORE SYSTEM (DRAG DROP FILE)
////////////////////////////////////////////////////
function restoreBackup(){

let file = document.getElementById("restoreFile").files[0];
if(!file) return alert("Select backup file");

let reader = new FileReader();

reader.onload = e=>{

try{
let obj = JSON.parse(e.target.result);

if(obj.data){
DB = obj.data;
save();
render();
alert("RESTORE COMPLETE");
}else{
alert("Invalid backup file");
}

}catch(err){
alert("Restore failed");
}

};

reader.readAsText(file);
}

////////////////////////////////////////////////////
// SEARCH
////////////////////////////////////////////////////
let search="";
document.getElementById("search").addEventListener("input",e=>{
search=e.target.value.toLowerCase();
render();
});

function match(r,q){
if(!q) return true;
return (r.Name||"").toLowerCase().includes(q);
}

////////////////////////////////////////////////////
// STATS
////////////////////////////////////////////////////
function stats(){
return {
total:DB.length,
pending:DB.filter(x=>x.Status==="PENDING").length,
success:DB.filter(x=>x.Status==="SUCCESS").length
};
}

////////////////////////////////////////////////////
// RENDER
////////////////////////////////////////////////////
function render(){

let s=stats();

document.getElementById("stats").innerHTML=`
<div class="box">TOTAL<br>${s.total}</div>
<div class="box">PENDING<br>${s.pending}</div>
<div class="box">SUCCESS<br>${s.success}</div>
<div class="box">BACKUP<br>ACTIVE</div>
`;

document.getElementById("list").innerHTML=
DB.filter(r=>match(r,search))
.map(r=>`
<div class="card">
<input value="${r.Name}" onchange="update(${r.ID},this.value)">

<select onchange="setStatus(${r.ID},this.value)">
<option ${r.Status==="PENDING"?"selected":""}>PENDING</option>
<option ${r.Status==="SUCCESS"?"selected":""}>SUCCESS</option>
<option ${r.Status==="RTS"?"selected":""}>RTS</option>
</select>
</div>
`).join("");

}

////////////////////////////////////////////////////
// ACTIONS
////////////////////////////////////////////////////
function update(id,val){
let r=DB.find(x=>x.ID===id);
if(r){
r.Name=val;
save();
render();
}
}

function setStatus(id,val){
let r=DB.find(x=>x.ID===id);
if(r){
r.Status=val;
save();
render();
}
}

////////////////////////////////////////////////////
// EMERGENCY RECOVERY (if storage wiped)
////////////////////////////////////////////////////
(function recoveryCheck(){

let backup = localStorage.getItem("vault_backup_latest");

if(!localStorage.getItem(STORAGE_KEY) && backup){

let obj = JSON.parse(backup);
DB = obj.data || [];
save();

}

})();

////////////////////////////////////////////////////
// INIT
////////////////////////////////////////////////////
load();

</script>

</body>
</html>
