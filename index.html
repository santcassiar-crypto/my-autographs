

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VaultOS V7.5 Advanced Import System</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0f14;
    color:#fff;
}

header{
    background:#111827;
    padding:10px;
    position:sticky;
    top:0;
}

.container{
    display:grid;
    grid-template-columns:320px 1fr;
    height:calc(100vh - 50px);
}

.sidebar{
    background:#0f172a;
    padding:10px;
    overflow:auto;
    border-right:1px solid #222;
}

.main{
    padding:10px;
    overflow:auto;
}

.card{
    background:#111827;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #222;
}

input, textarea, button, select{
    width:100%;
    padding:8px;
    margin:5px 0;
    background:#111;
    color:#fff;
    border:1px solid #333;
    border-radius:6px;
}

button{
    cursor:pointer;
    background:#2563eb;
    border:none;
}

button:hover{background:#1d4ed8}

.danger{background:#dc2626}

.dropzone{
    border:2px dashed #555;
    padding:10px;
    text-align:center;
    margin:10px 0;
    color:#aaa;
}

.small{font-size:12px;opacity:0.7}

.history{
    font-size:11px;
    max-height:120px;
    overflow:auto;
    background:#0b1220;
    padding:5px;
    border-radius:6px;
}

</style>
</head>

<body>

<header>
VaultOS V7.5 Advanced Import System
</header>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

<h3>Import System</h3>

<div class="dropzone" id="dropzone">
Drop JSON file here
</div>

<textarea id="importBox" placeholder="Paste JSON here"></textarea>

<button onclick="importData('replace')">Import (Replace)</button>
<button onclick="importData('merge')">Import (Merge)</button>

<button onclick="exportData()">Export</button>

<hr>

<h3>Command</h3>
<input id="cmd" placeholder="add / export / clear / merge last"/>
<button onclick="runCommand()">Run</button>

<hr>

<h3>Import History</h3>
<div class="history" id="history"></div>

</div>

<!-- MAIN -->
<div class="main">

<h3>Records</h3>

<input id="search" placeholder="Search..." oninput="render()"/>

<div id="records"></div>

</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("vaultos") || "[]");
let importHistory = JSON.parse(localStorage.getItem("vaultos_history") || "[]");

/* ---------------- SAVE ---------------- */
function save(){
    localStorage.setItem("vaultos", JSON.stringify(data));
    localStorage.setItem("vaultos_history", JSON.stringify(importHistory));
}

/* ---------------- JSON FIXER ---------------- */
function repairJSON(str){
    try {
        return JSON.parse(str);
    } catch(e) {
        // attempt auto-fix
        try {
            let fixed = str
                .replace(/,\s*}/g, "}")
                .replace(/,\s*]/g, "]")
                .replace(/'/g, '"');

            return JSON.parse(fixed);
        } catch(err){
            return null;
        }
    }
}

/* ---------------- IMPORT ---------------- */
function importData(mode){
    const raw = document.getElementById("importBox").value.trim();
    const parsed = repairJSON(raw);

    if(!parsed){
        alert("Import failed: invalid JSON even after repair");
        return;
    }

    if(!Array.isArray(parsed)){
        alert("JSON must be an array of records");
        return;
    }

    const version = Date.now();

    importHistory.unshift({
        version,
        mode,
        count: parsed.length,
        time: new Date().toLocaleString()
    });

    if(mode === "replace"){
        data = parsed;
    } else if(mode === "merge"){
        data = [...parsed, ...data];
    }

    save();
    render();
    renderHistory();

    alert("Import successful: " + mode);
}

/* ---------------- EXPORT ---------------- */
function exportData(){
    const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "vaultos_export.json";
    a.click();
}

/* ---------------- DROPZONE ---------------- */
const dropzone = document.getElementById("dropzone");

dropzone.addEventListener("dragover", e=>{
    e.preventDefault();
    dropzone.style.borderColor="#2563eb";
});

dropzone.addEventListener("dragleave", ()=>{
    dropzone.style.borderColor="#555";
});

dropzone.addEventListener("drop", e=>{
    e.preventDefault();
    dropzone.style.borderColor="#555";

    const file = e.dataTransfer.files[0];
    const reader = new FileReader();

    reader.onload = function(ev){
        document.getElementById("importBox").value = ev.target.result;
        alert("File loaded. Choose Import mode.");
    };

    reader.readAsText(file);
});

/* ---------------- RECORDS ---------------- */
function render(){
    const q = document.getElementById("search").value.toLowerCase();
    const box = document.getElementById("records");

    box.innerHTML = "";

    data
    .filter(x => (x.title||"").toLowerCase().includes(q))
    .forEach(item=>{

        const div = document.createElement("div");
        div.className="card";

        div.innerHTML=`
            <b>${item.title || "Untitled"}</b>
            <div class="small">${item.desc || ""}</div>
        `;

        box.appendChild(div);
    });
}

/* ---------------- HISTORY ---------------- */
function renderHistory(){
    const h = document.getElementById("history");
    h.innerHTML = importHistory.slice(0,10).map(i=>
        `<div>${i.time} | ${i.mode} | ${i.count} items</div>`
    ).join("");
}

/* ---------------- COMMANDS ---------------- */
function runCommand(){
    const cmd = document.getElementById("cmd").value.toLowerCase();

    if(cmd === "clear"){
        data = [];
    }

    if(cmd === "export"){
        exportData();
    }

    if(cmd === "merge last"){
        alert("Use merge import button");
    }

    if(cmd.startsWith("add ")){
        data.unshift({
            id:Date.now(),
            title:cmd.replace("add ",""),
            desc:"command entry"
        });
    }

    save();
    render();
}

/* ---------------- INIT ---------------- */
render();
renderHistory();

</script>

</body>
</html>
