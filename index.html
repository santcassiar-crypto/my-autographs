

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VaultOS AUTONOMOUS OS</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:#fff;
}

header {
  padding:12px;
  background:#111;
  border-bottom:1px solid #222;
  position:sticky;
  top:0;
  z-index:10;
}

.container {
  display:grid;
  grid-template-columns:340px 1fr;
  height:calc(100vh - 50px);
}

/* LEFT PANEL */
.sidebar {
  background:#0f0f0f;
  border-right:1px solid #222;
  padding:10px;
}

.card {
  background:#111;
  border:1px solid #222;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
}

button {
  width:100%;
  padding:8px;
  margin:4px 0;
  background:#00ffcc;
  border:0;
  font-weight:bold;
  border-radius:5px;
  cursor:pointer;
}

button:hover { background:#00ddb3; }

/* MAIN */
.main {
  padding:10px;
  overflow:auto;
}

.ticker {
  background:#111;
  border:1px solid #222;
  padding:12px;
  border-radius:8px;
  margin-bottom:10px;
  color:#00ffcc;
}

.record {
  background:#0d0d0d;
  border:1px solid #222;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
}

.badge {
  padding:3px 8px;
  border-radius:20px;
  font-size:11px;
}

.PENDING { background:#ffcc00; color:#000; }
.SENT { background:#4da6ff; color:#fff; }
.SUCCESS { background:#00ff88; color:#000; }
.RTS { background:#ff4d4d; color:#fff; }
.LOGGED { background:#888; color:#fff; }

input {
  width:100%;
  padding:7px;
  background:#000;
  border:1px solid #333;
  color:#fff;
  border-radius:5px;
}
</style>
</head>

<body>

<header>
<b>VaultOS AUTONOMOUS OS</b>
</header>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

  <div class="card">
    <button onclick="triggerImport()">IMPORT JSON</button>
    <button onclick="markNext()">COMPLETE NEXT MISSION</button>
    <input type="file" id="file" style="display:none" accept="application/json">
  </div>

  <div class="card">
    <input id="search" placeholder="Search missions..." oninput="render()">
  </div>

  <div class="card">
    <div id="stats"></div>
  </div>

</div>

<!-- MAIN -->
<div class="main">

  <div id="ticker" class="ticker">INITIALISING AUTONOMOUS ENGINE...</div>

  <div id="view"></div>

</div>

</div>

<script>

// =========================
// CORE DATABASE
// =========================
let DB = { records: [] };
let index = 0;

// =========================
// LOAD / SAVE
// =========================
function save(){
  localStorage.setItem("vault_os", JSON.stringify(DB));
}

function load(){
  const d = localStorage.getItem("vault_os");
  if(d) DB = JSON.parse(d);
}
load();

// =========================
// NORMALISER (SELF-HEALING)
// =========================
function norm(r){
  return {
    ID: r?.ID ?? Date.now(),
    Name: r?.Name ?? "Untitled Mission",
    Status: r?.Status ?? "PENDING"
  };
}

// =========================
// IMPORT ENGINE (ROBUST)
// =========================
function triggerImport(){
  document.getElementById("file").click();
}

document.getElementById("file").addEventListener("change", e => {
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);

      const arr =
        Array.isArray(data) ? data :
        Array.isArray(data.records) ? data.records :
        [];

      DB.records = arr.map(norm);

      save();
      render();

      alert("Autonomous import complete: " + DB.records.length);

    } catch {
      alert("Import failed - invalid JSON");
    }
  };

  reader.readAsText(file);
});

// =========================
// AUTONOMOUS QUEUE ENGINE
// =========================
function getQueue(){

  let arr = DB.records.map(norm);

  // ONLY ACTIVE WORK
  arr = arr.filter(r => r.Status === "PENDING");

  // DEDUPE BY NAME
  const seen = new Set();
  arr = arr.filter(r => {
    const k = r.Name.toLowerCase().trim();
    if(seen.has(k)) return false;
    seen.add(k);
    return true;
  });

  return arr;
}

// =========================
// TICKER ENGINE
// =========================
function updateTicker(queue){

  if(queue.length === 0){
    document.getElementById("ticker").innerHTML =
      "🧠 AUTONOMOUS ENGINE: NO ACTIVE MISSIONS";
    return;
  }

  const next = queue[index] || queue[0];

  document.getElementById("ticker").innerHTML =
    `🚀 NEXT MISSION → <b>${next.Name}</b> 
     <span class="${next.Status} badge">${next.Status}</span>`;
}

// =========================
// COMPLETE MISSION
// =========================
function markNext(){

  const queue = getQueue();
  if(queue.length === 0) return;

  const next = queue[index] || queue[0];

  DB.records = DB.records.map(r => {
    if(r.Name === next.Name){
      return {...r, Status:"SENT"};
    }
    return r;
  });

  save();

  index = 0;
  render();
}

// =========================
// STATS ENGINE
// =========================
function updateStats(){

  const s = {PENDING:0,SENT:0,SUCCESS:0,RTS:0,LOGGED:0};

  DB.records.forEach(r=>{
    const n = norm(r);
    if(s[n.Status] !== undefined) s[n.Status]++;
  });

  document.getElementById("stats").innerHTML = `
    PENDING: ${s.PENDING}<br>
    SENT: ${s.SENT}<br>
    SUCCESS: ${s.SUCCESS}<br>
    RTS: ${s.RTS}<br>
    LOGGED: ${s.LOGGED}
  `;
}

// =========================
// RENDER ENGINE
// =========================
function render(){

  const q = document.getElementById("search").value.toLowerCase();

  let queue = getQueue();

  if(q){
    queue = queue.filter(r =>
      r.Name.toLowerCase().includes(q)
    );
  }

  updateTicker(queue);
  updateStats();

  const view = document.getElementById("view");

  view.innerHTML = `<h3>ACTIVE AUTONOMOUS QUEUE (${queue.length})</h3>`;

  queue.forEach(r=>{
    view.innerHTML += `
      <div class="record">
        <b>${r.Name}</b><br>
        <span class="badge ${r.Status}">${r.Status}</span><br>
        <small>ID: ${r.ID}</small>
      </div>
    `;
  });
}

// INIT
load();
render();

</script>

</body>
</html>
