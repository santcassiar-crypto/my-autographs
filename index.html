
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VaultOS Hobby Command Centre</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#0b0b0b;
  color:#fff;
  margin:0;
}

header{
  background:#111;
  padding:12px;
  position:sticky;
  top:0;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:#111;
  border:1px solid #222;
  border-radius:10px;
  padding:12px;
  margin:10px;
}

input,textarea,button{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid #333;
  background:#181818;
  color:#fff;
}

button{cursor:pointer}

.record{
  padding:8px;
  border-bottom:1px solid #222;
}

.small{font-size:12px;color:#aaa}

.badge{
  padding:2px 6px;
  background:#222;
  border-radius:6px;
  font-size:11px;
  margin-left:6px;
}
</style>
</head>

<body>

<header>
<h2>VaultOS Hobby Command Centre</h2>
<input id="search" placeholder="Search records...">
</header>

<div class="grid" id="stats"></div>

<div class="card">
<h3>Bulk Add</h3>
<textarea id="bulkNames" placeholder="One name per line..."></textarea>
<button onclick="bulkAdd()">Add All</button>
<div id="bulkResult" class="small"></div>
</div>

<div class="card">
<h3>🧠 Intelligence</h3>
<div id="intel"></div>
</div>

<div class="card">
<h3>🎯 Where to Send Next</h3>
<div id="next"></div>
</div>

<div class="card">
<h3>📰 TTM News Feed</h3>
<div id="news"></div>
</div>

<div class="card">
<h3>📊 Performance Graph</h3>
<canvas id="graph" width="400" height="160" style="width:100%;background:#0a0a0a;border-radius:8px"></canvas>
</div>

<div class="card">
<h3>Records</h3>
<div id="list"></div>
</div>

<script>

/* =========================
   CORE DB
========================= */

const KEY = "vaultos_hobby_core";

let DB = loadDB();

function loadDB(){
  const raw = JSON.parse(localStorage.getItem(KEY) || "{}");

  if(raw.records) return raw;

  return {
    records: [],
    meta:{created:Date.now(),updated:Date.now()}
  };
}

function saveDB(){
  DB.meta.updated = Date.now();
  localStorage.setItem(KEY, JSON.stringify(DB));
}

/* =========================
   BULK ADD
========================= */

function bulkAdd(){

  const text = document.getElementById('bulkNames').value.trim();
  if(!text) return alert("No input");

  const lines = text.split("\n").map(x=>x.trim()).filter(Boolean);

  lines.forEach(name=>{
    DB.records.push({
      id:Date.now()+Math.random(),
      name,
      status:"PENDING",
      history:[]
    });
  });

  document.getElementById('bulkNames').value="";
  document.getElementById('bulkResult').innerText =
    `Added ${lines.length}`;

  saveDB();
  render();
}

/* =========================
   INTELLIGENCE CORE
========================= */

function baseScore(r){
  let s=50;
  const n=(r.name||"").toLowerCase();

  if(r.status==="SUCCESS") s+=25;
  if(r.status==="RTS") s-=25;
  if(r.status==="PENDING") s+=10;

  if(n.includes("official")) s+=10;
  if(n.includes("event")) s+=8;
  if(n.includes("academy")) s-=10;

  return Math.max(0,Math.min(100,s));
}

function learn(r){
  if(!r.history) r.history=[];
  r.history.push(baseScore(r));
  if(r.history.length>8) r.history.shift();
}

function trend(r){
  const h=r.history||[];
  if(h.length<2) return 0;
  return h[h.length-1]-h[0];
}

function predict(r){
  return Math.max(0,Math.min(100,baseScore(r)+trend(r)*1.5));
}

function confidence(r){
  const h=r.history||[];
  if(h.length<3) return 40;
  return Math.max(0,100-Math.abs(trend(r))*5);
}

/* =========================
   NEWS ENGINE (TTM FEED)
========================= */

function generateNews(){
  return DB.records
    .filter(r=>r.status==="PENDING")
    .sort((a,b)=>predict(b)-predict(a))
    .slice(0,5)
    .map(r=>({
      text:`${r.name} showing activity trend`,
      score:predict(r).toFixed(0)
    }));
}

/* =========================
   NEXT TARGETS ENGINE
========================= */

function nextTargets(){
  return DB.records
    .filter(r=>r.status==="PENDING")
    .sort((a,b)=>(predict(b)+confidence(b))-(predict(a)+confidence(a)))
    .slice(0,10);
}

/* =========================
   GRAPH
========================= */

function drawGraph(){
  const c=document.getElementById("graph");
  const ctx=c.getContext("2d");

  ctx.clearRect(0,0,c.width,c.height);

  const data=DB.records
    .map(r=>r.history?.slice(-1)[0]||50)
    .slice(-20);

  ctx.beginPath();
  ctx.moveTo(0,150);

  data.forEach((v,i)=>{
    const x=i*20;
    const y=150-(v*1.2);
    ctx.lineTo(x,y);
  });

  ctx.strokeStyle="#4ade80";
  ctx.stroke();
}

/* =========================
   RENDER
========================= */

function render(){

  DB.records.forEach(learn);

  const total=DB.records.length;
  const pending=DB.records.filter(x=>x.status==="PENDING").length;
  const success=DB.records.filter(x=>x.status==="SUCCESS").length;

  document.getElementById('stats').innerHTML=`
    <div class="card"><h2>${total}</h2>Total</div>
    <div class="card"><h2>${pending}</h2>Pending</div>
    <div class="card"><h2>${success}</h2>Success</div>
  `;

  const intel=DB.records
    .filter(x=>x.status==="PENDING")
    .sort((a,b)=>predict(b)-predict(a))
    .slice(0,10);

  document.getElementById('intel').innerHTML=
    intel.map(x=>`
      ⚡ <b>${x.name}</b>
      <span class="badge">${predict(x).toFixed(0)}%</span>
    `).join("");

  const next=nextTargets();

  document.getElementById('next').innerHTML=
    next.map(x=>`
      🎯 ${x.name}
      <span class="badge">${(predict(x)+confidence(x)).toFixed(0)}</span>
    `).join("<br>");

  const news=generateNews();

  document.getElementById('news').innerHTML=
    news.map(n=>`
      📰 ${n.text}
      <span class="badge">${n.score}%</span>
    `).join("<br>");

  const q=(document.getElementById('search').value||"").toLowerCase();

  document.getElementById('list').innerHTML=
    DB.records
      .filter(x=>(x.name||"").toLowerCase().includes(q))
      .map(x=>`
        <div class="record">
          <b>${x.name}</b><br>
          <span class="small">${x.status}</span>
        </div>
      `).join("");

  drawGraph();
  saveDB();
}

/* =========================
   SEARCH
========================= */

document.getElementById('search').addEventListener('input',render);

/* INIT */
render();

</script>

</body>
</html>
