<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VaultPro v12 Full Safe Engine</title>

<style>
body{margin:0;font-family:Arial;background:#050505;color:#eee;}
header{position:sticky;top:0;background:#111;padding:10px;border-bottom:1px solid #222;}
input,select{width:100%;padding:10px;margin-top:5px;background:#000;color:#fff;border:1px solid #333;border-radius:6px;}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:6px;
padding:10px;
}

.box{
background:#111;
padding:8px;
border-radius:8px;
text-align:center;
font-size:12px;
}

.list{padding:10px;}

.card{
background:#111;
border:1px solid #222;
padding:10px;
margin-bottom:8px;
border-radius:8px;
}

button{
background:#222;
border:1px solid #333;
color:#fff;
padding:6px;
font-size:11px;
border-radius:6px;
margin:4px;
}

.small{font-size:11px;color:#aaa;}

.high{border-left:4px solid gold;}
</style>
</head>

<body>

<header>
<input id="search" placeholder="Search ALL 180+ records..." oninput="render()">
</header>

<div class="stats">
<div class="box">TOTAL<br><b id="t"></b></div>
<div class="box">SUCCESS<br><b id="s"></b></div>
<div class="box">PENDING<br><b id="p"></b></div>
<div class="box">RTS<br><b id="r"></b></div>
</div>

<div style="padding:10px">
<button onclick="add()">+ ADD</button>
<button onclick="reset()">RESET MASTER</button>
</div>

<div id="list" class="list"></div>

<script>

////////////////////////////////////////////////////
// 1. FULL MASTER DATA (PASTE YOUR FULL 180 HERE)
////////////////////////////////////////////////////

const MASTER_DATA = [
{"ID":1779457614274,"Name":"Scott Melvin- Stick to football podcast","Status":"PENDING"},
{"ID":1779457583433,"Name":"Jonathan ross tv show","Status":"PENDING"},
{"ID":1779457518143,"Name":"Kevin Keegan- Home","Status":"SUCCESS"},
{"ID":1,"Name":"Jannik Sinner","Status":"SUCCESS"},
{"ID":2,"Name":"Keanu Reeves","Status":"RTS"},
{"ID":3,"Name":"Alan Carr","Status":"SUCCESS"},
{"ID":4,"Name":"Harry Kane (Bayern)","Status":"RTS"},
{"ID":5,"Name":"David Attenborough","Status":"SUCCESS"},
{"ID":10,"Name":"Erling Haaland (City)","Status":"SUCCESS"},
{"ID":11,"Name":"Cole Palmer","Status":"RTS"},
{"ID":12,"Name":"Jude Bellingham","Status":"PENDING"},
{"ID":13,"Name":"Kylian Mbappé","Status":"PENDING"},
{"ID":14,"Name":"Kevin De Bruyne","Status":"PENDING"},
{"ID":15,"Name":"Usain Bolt","Status":"PENDING"}

// 👆 ADD YOUR FULL 180+ RECORDS HERE (IMPORTANT)
];

////////////////////////////////////////////////////
// 2. SAFE LOAD SYSTEM (PREVENTS DATA LOSS)
////////////////////////////////////////////////////

let DB;

const saved = localStorage.getItem("vault_v12");

if (saved) {
    let parsed = JSON.parse(saved);

    // safety check: prevents corrupted/small overwrite
    if (parsed.length >= 50) {
        DB = parsed;
    } else {
        DB = MASTER_DATA;
        localStorage.setItem("vault_v12", JSON.stringify(MASTER_DATA));
    }

} else {
    DB = MASTER_DATA;
    localStorage.setItem("vault_v12", JSON.stringify(MASTER_DATA));
}

////////////////////////////////////////////////////
// 3. SAVE
////////////////////////////////////////////////////

function save(){
    localStorage.setItem("vault_v12", JSON.stringify(DB));
}

////////////////////////////////////////////////////
// 4. CORE FUNCTIONS
////////////////////////////////////////////////////

function render(){

    let q = document.getElementById("search").value.toLowerCase();

    let list = DB;

    if(q){
        list = DB.filter(x => x.Name.toLowerCase().includes(q));
    }

    document.getElementById("list").innerHTML = "";

    list.forEach(r => {

        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <input value="${r.Name}" onchange="editName(${r.ID},this.value)">
            <select onchange="editStatus(${r.ID},this.value)">
                <option ${r.Status==="SUCCESS"?"selected":""}>SUCCESS</option>
                <option ${r.Status==="PENDING"?"selected":""}>PENDING</option>
                <option ${r.Status==="Sent"?"selected":""}>Sent</option>
                <option ${r.Status==="RTS"?"selected":""}>RTS</option>
                <option ${r.Status==="LOGGED"?"selected":""}>LOGGED</option>
            </select>
            <div class="small">ID: ${r.ID}</div>
        `;

        document.getElementById("list").appendChild(div);
    });

    stats();
}

////////////////////////////////////////////////////
// 5. EDIT
////////////////////////////////////////////////////

function editName(id,val){
    let item = DB.find(x=>x.ID===id);
    if(item){
        item.Name = val;
        save();
    }
}

function editStatus(id,val){
    let item = DB.find(x=>x.ID===id);
    if(item){
        item.Status = val;
        save();
    }
}

////////////////////////////////////////////////////
// 6. ADD / RESET
////////////////////////////////////////////////////

function add(){
    let n = prompt("Name:");
    if(!n) return;

    DB.unshift({
        ID: Date.now(),
        Name: n,
        Status: "PENDING"
    });

    save();
    render();
}

function reset(){
    if(confirm("Reset to FULL master dataset?")){
        DB = MASTER_DATA;
        save();
        render();
    }
}

////////////////////////////////////////////////////
// 7. STATS
////////////////////////////////////////////////////

function stats(){
    document.getElementById("t").innerText = DB.length;
    document.getElementById("s").innerText = DB.filter(x=>x.Status==="SUCCESS").length;
    document.getElementById("p").innerText = DB.filter(x=>x.Status==="PENDING").length;
    document.getElementById("r").innerText = DB.filter(x=>x.Status==="RTS").length;
}

////////////////////////////////////////////////////
// INIT
////////////////////////////////////////////////////

render();

</script>

</body>
</html>
