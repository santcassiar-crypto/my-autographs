

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VaultOS Learning v2</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{margin:0;font-family:Arial;background:#020617;color:#fff;display:flex}
aside{width:220px;background:#01040d;padding:15px}
main{flex:1;padding:15px}
.card{background:#0f172a;padding:15px;border-radius:10px;margin-bottom:15px}
table{width:100%;border-collapse:collapse}
td,th{border-bottom:1px solid #334155;padding:8px}
input{width:100%;padding:6px;background:#1e293b;color:#fff;border:1px solid #334155}
button{padding:6px;background:#1e293b;color:#fff;border:1px solid #334155;cursor:pointer}
small{opacity:0.7}
</style>
</head>

<body>

<aside>
<h3>VaultOS v2</h3>
<input type="file" id="importFile">
</aside>

<main>

<div class="card">
<h3>Targets (Learning System)</h3>
<table>
<thead>
<tr>
<th>Name</th>
<th>Status</th>
<th>Possible Address Used</th>
<th></th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>
</div>

</main>

<script>

let vault = JSON.parse(localStorage.getItem("VAULT_LV2")) || {
targets:[],
memory:{}   // 🧠 learning map
};

const $ = id => document.getElementById(id);

function save(){
localStorage.setItem("VAULT_LV2", JSON.stringify(vault));
}

/* 🧠 FUZZY MATCH HELPER */
function similarity(a,b){
a=a.toLowerCase();
b=b.toLowerCase();
if(a.includes(b) || b.includes(a)) return 0.8;
return 0;
}

/* 🧠 LEARNING ENGINE */
function guessAddress(name){

let n = name.toLowerCase();

/* 1. MEMORY FIRST (learned behaviour) */
let keys = Object.keys(vault.memory);

for(let k of keys){
if(similarity(n,k) > 0){
return vault.memory[k];
}
}

/* 2. RULE FALLBACKS */
if(n.includes("arsenal") || n.includes("man utd"))
return "Football Club Training / Stadium Route";

if(n.includes("oldman") || n.includes("reeves"))
return "Film Production / Agency Route";

if(n.includes("comed") || n.includes("tv"))
return "TV Studio / Network Route";

return "General Agency / Organisation Route";
}

/* 📥 IMPORT + AUTO LEARN */
document.getElementById("importFile").addEventListener("change",(e)=>{

let file=e.target.files?.[0];
if(!file)return;

let r=new FileReader();

r.onload=()=>{

let d=JSON.parse(r.result||"{}");

let raw=d.records||d.targets||[];

vault.targets=raw.map((t,i)=>{

let name=t.name||t.Name||"Unknown";
let status=(t.status||t.Status||"PENDING").toUpperCase();

/* 🧠 store learning */
if(t.address){
vault.memory[name.toLowerCase()] = t.address;
}

return{
id:Date.now()+i,
name,
status,
address:t.address || guessAddress(name)
};

});

save();
render();

};

r.readAsText(file);
});

/* 📊 RENDER */
function render(){

$("list").innerHTML = vault.targets.map((t,i)=>`

<tr>

<td><input value="${t.name}"
oninput="vault.targets[${i}].name=this.value; save()"></td>

<td><input value="${t.status}"
oninput="vault.targets[${i}].status=this.value; save()"></td>

<td><input value="${t.address}"
oninput="
vault.targets[${i}].address=this.value;
vault.memory[t.name.toLowerCase()] = this.value;
save();
"></td>

<td><button onclick="remove(${i})">X</button></td>

</tr>

`).join("");

}

/* ❌ REMOVE */
function remove(i){
vault.targets.splice(i,1);
save();
render();
}

render();

</script>

</body>
</html>
