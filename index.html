



<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VaultOS SR4 JSON Repair</title>
<style>
body{margin:0;background:#0b0f14;color:#fff;font-family:Arial;padding:20px}
h1{color:#60a5fa}
.card{background:#111827;padding:15px;border-radius:10px;margin-bottom:15px}
button{padding:10px 15px;border:0;border-radius:6px;background:#2563eb;color:white;cursor:pointer}
input{margin:10px 0}
table{width:100%;border-collapse:collapse}
td,th{padding:8px;border-bottom:1px solid #374151;text-align:left}
.ok{color:#34d399}
</style>
</head>
<body>

<h1>VaultOS SR4</h1>

<div class="card">
<input type="file" id="file" accept=".json">
<button onclick="importJSON()">Import JSON</button>
<div id="report"></div>
</div>

<div class="card">
<button onclick="addRecord()">Add Record</button>
<button onclick="exportJSON()">Export JSON</button>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Name</th><th>Route</th><th>Status</th><th>Strength</th><th>Likelihood</th><th>Notes</th><th></th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>
</div>

<script>
let records=[];

function clean(v){
 return v ?? "";
}

function normaliseItem(i){
 return {
  Name: clean(i.Name || i.name || i.Title || i.title),
  Route: clean(i.Route || i.route || i.Address || i.address),
  Status: clean(i.Status || i.status),
  Strength: clean(i.Strength || i.strength),
  Likelihood: clean(i.Likelihood || i.likelihood),
  Notes: clean(i.Notes || i.notes)
 };
}

function render(){
 let r=document.getElementById("rows");
 r.innerHTML="";
 records.forEach((x,n)=>{
  r.innerHTML+=`
  <tr>
  <td>${x.Name}</td>
  <td>${x.Route}</td>
  <td>${x.Status}</td>
  <td>${x.Strength}</td>
  <td>${x.Likelihood}</td>
  <td>${x.Notes}</td>
  <td><button onclick="records.splice(${n},1);render()">X</button></td>
  </tr>`;
 });
}

function importJSON(){
 let f=document.getElementById("file").files[0];
 if(!f)return;
 let reader=new FileReader();
 reader.onload=e=>{
  try{
   let data=JSON.parse(e.target.result);
   if(!Array.isArray(data)) data=[data];
   records=data.map(normaliseItem);
   document.getElementById("report").innerHTML=
   `<p class="ok">IMPORT COMPLETE</p>
   Records found: ${data.length}<br>
   Valid records: ${records.length}<br>
   Legacy field conversion: ENABLED`;
   render();
  }catch(err){
   document.getElementById("report").innerHTML="Import failed: "+err;
  }
 };
 reader.readAsText(f);
}

function addRecord(){
 records.push({
 Name:"New Target",
 Route:"",
 Status:"PENDING",
 Strength:"Medium",
 Likelihood:"Medium",
 Notes:""
 });
 render();
}

function exportJSON(){
 let blob=new Blob([JSON.stringify(records,null,2)],{type:"application/json"});
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="VaultOS_export.json";
 a.click();
}
</script>

</body>
</html>
