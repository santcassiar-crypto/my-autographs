<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VaultPro FULL 180 SAFE</title>

<style>
body{margin:0;font-family:Arial;background:#050505;color:#eee;}
header{position:sticky;top:0;background:#111;padding:10px;border-bottom:1px solid #222;}

input,select{
width:100%;
padding:10px;
margin-top:5px;
background:#000;
color:#fff;
border:1px solid #333;
border-radius:6px;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:6px;
padding:10px;
}

.box{
background:#111;
padding:10px;
border-radius:8px;
text-align:center;
font-size:12px;
}

.list{padding:10px;}

.card{
background:#111;
border:1px solid #222;
padding:10px;
margin-bottom:8px;
border-radius:8px;
}

button{
background:#222;
border:1px solid #333;
color:#fff;
padding:6px;
font-size:11px;
border-radius:6px;
margin:4px;
}

.small{font-size:10px;color:#888;}
</style>
</head>

<body>

<header>
<input id="search" placeholder="Search 180+ records..." oninput="render()">
</header>

<div class="stats">
<div class="box">TOTAL<br><b id="t"></b></div>
<div class="box">SUCCESS<br><b id="s"></b></div>
<div class="box">PENDING<br><b id="p"></b></div>
<div class="box">RTS<br><b id="r"></b></div>
</div>

<div style="padding:10px">
<button onclick="add()">+ ADD</button>
<button onclick="reset()">RESET</button>
<button onclick="more()">LOAD MORE</button>
</div>

<div id="list" class="list"></div>

<script>

////////////////////////////////////////////////////
// MASTER DATA (SOURCE OF TRUTH)
////////////////////////////////////////////////////
const MASTER_DATA = [
{"ID":1,"Name":"Jannik Sinner","Status":"SUCCESS"},
{"ID":2,"Name":"Keanu Reeves","Status":"RTS"},
{"ID":3,"Name":"Alan Carr","Status":"SUCCESS"},
{"ID":4,"Name":"Harry Kane (Bayern)","Status":"RTS"},
{"ID":5,"Name":"David Attenborough","Status":"SUCCESS"},
{"ID":6,"Name":"Paul Merson","Status":"SUCCESS"},
{"ID":7,"Name":"Tony Adams","Status":"SUCCESS"},
{"ID":8,"Name":"Joshua Kimmich","Status":"SUCCESS"},
{"ID":9,"Name":"Ron Ferdinand","Status":"SUCCESS"},
{"ID":10,"Name":"Erling Haaland","Status":"SUCCESS"},
{"ID":11,"Name":"Lamine Yamal","Status":"RTS"},
{"ID":12,"Name":"Rosie Jones","Status":"SUCCESS"},
{"ID":13,"Name":"Kevin Bridges","Status":"SUCCESS"},
{"ID":14,"Name":"Lee Mack","Status":"SUCCESS"},
{"ID":15,"Name":"Chris Waddle","Status":"SUCCESS"},
{"ID":16,"Name":"Ivo Graham","Status":"SUCCESS"},
{"ID":17,"Name":"Josh Widdicombe","Status":"SUCCESS"},
{"ID":18,"Name":"Timothée Chalamet","Status":"Sent"},
{"ID":19,"Name":"Rob Beckett","Status":"SUCCESS"},
{"ID":20,"Name":"Mohamed Salah","Status":"SUCCESS"}
];

////////////////////////////////////////////////////
// STATE
////////////////////////////////////////////////////

const MASTER = structuredClone(MASTER_DATA);

let DB = JSON.parse(localStorage.getItem("vault_full"))
    ? JSON.parse(localStorage.getItem("vault_full"))
    : structuredClone(MASTER);

let VIEW_LIMIT = 50;

function save(){
    localStorage.setItem("vault_full", JSON.stringify(DB));
}

////////////////////////////////////////////////////
// RENDER (SEARCH ALL, SHOW LIMITED)
////////////////////////////////////////////////////

function render(){

    let q = document.getElementById("search").value.toLowerCase();

    let filtered = q
        ? DB.filter(x => x.Name.toLowerCase().includes(q))
        : DB;

    let list = filtered.slice(0, VIEW_LIMIT);

    document.getElementById("list").innerHTML = list.map(r => `
        <div class="card">
            <input value="${r.Name}" onchange="edit(${r.ID},this.value)">
            <select onchange="status(${r.ID},this.value)">
                <option ${r.Status=="SUCCESS"?"selected":""}>SUCCESS</option>
                <option ${r.Status=="PENDING"?"selected":""}>PENDING</option>
                <option ${r.Status=="RTS"?"selected":""}>RTS</option>
                <option ${r.Status=="Sent"?"selected":""}>Sent</option>
                <option ${r.Status=="LOGGED"?"selected":""}>LOGGED</option>
            </select>
            <div class="small">ID:${r.ID}</div>
        </div>
    `).join("");

    stats();
}

////////////////////////////////////////////////////
// STATS (FULL DATASET)
////////////////////////////////////////////////////

function stats(){
    document.getElementById("t").innerText = DB.length;
    document.getElementById("s").innerText = DB.filter(x=>x.Status=="SUCCESS").length;
    document.getElementById("p").innerText = DB.filter(x=>x.Status=="PENDING").length;
    document.getElementById("r").innerText = DB.filter(x=>x.Status=="RTS").length;
}

////////////////////////////////////////////////////
// EDIT FUNCTIONS
////////////////////////////////////////////////////

function edit(id,val){
    let x = DB.find(i => i.ID === id);
    if(x){ x.Name = val; save(); }
}

function status(id,val){
    let x = DB.find(i => i.ID === id);
    if(x){ x.Status = val; save(); }
}

////////////////////////////////////////////////////
// ACTIONS
////////////////////////////////////////////////////

function add(){
    let n = prompt("Name:");
    if(!n) return;

    DB.unshift({
        ID: Date.now(),
        Name: n,
        Status: "PENDING"
    });

    save();
    render();
}

function reset(){
    DB = structuredClone(MASTER);
    save();
    VIEW_LIMIT = 50;
    render();
}

function more(){
    VIEW_LIMIT += 50;
    render();
}

////////////////////////////////////////////////////

render();

</script>

</body>
</html>
