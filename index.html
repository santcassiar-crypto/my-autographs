<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VaultPro v5 | Full System</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#050505; color:#e5e7eb; font-family:sans-serif; }
.card { background:#111113; border:1px solid #27272a; border-radius:12px; }
.tab { cursor:pointer; padding:6px 10px; font-size:11px; border-radius:6px; }
.active { background:#dc2626; color:white; }
select, input { background:#000; color:#fff; font-size:11px; }
.small { font-size:10px; opacity:0.7; }
.good { border-left:4px solid #22c55e; }
.mid { border-left:4px solid #f59e0b; }
.low { border-left:4px solid #ef4444; }
</style>
</head>

<body class="pb-24">

<div class="bg-red-600 text-white text-[10px] font-bold text-center py-1">
VAULTPRO v5 • FULL SYSTEM • VAULT + OPTIMISER + ANALYTICS
</div>

<div class="max-w-6xl mx-auto p-4">

<h1 class="text-3xl font-black mb-2">VAULT<span class="text-red-600">PRO</span> v5</h1>

<!-- TABS -->
<div class="flex gap-2 mb-3">
<div class="tab active" onclick="switchTab('vault')">VAULT</div>
<div class="tab" onclick="switchTab('opt')">OPTIMISER</div>
<div class="tab" onclick="switchTab('stats')">ANALYTICS</div>
</div>

<!-- SEARCH -->
<input id="search" oninput="render()" placeholder="Search vault..." class="w-full bg-zinc-900 p-2 text-xs rounded border border-zinc-800 mb-3">

<!-- VAULT -->
<div id="vault" class="space-y-2"></div>

<!-- OPTIMISER -->
<div id="opt" class="hidden"></div>

<!-- ANALYTICS -->
<div id="stats" class="hidden"></div>

</div>

<script>

/* =========================
FULL DATASET (YOUR RESTORE)
========================= */

let DB = /* YOUR FULL DATA HERE */ [];

/* =========================
AUTO SAVE
========================= */

function save(){
localStorage.setItem("vault_v5", JSON.stringify(DB));
}

function load(){
const data = localStorage.getItem("vault_v5");
if(data) DB = JSON.parse(data);
}
load();

/* =========================
SCORING ENGINE
========================= */

function score(r){

let s = 50;

if(r.Status==="SUCCESS") s += 25;
if(r.Status==="RTS") s -= 25;
if(r.Status==="Sent") s -= 10;
if(r.Status==="LOGGED") s -= 5;

const n = r.Name.toLowerCase();

if(n.includes("theatre")||n.includes("park")||n.includes("romeo")) s += 20;
if(n.includes("training")||n.includes("fc")||n.includes("lakers")) s += 15;
if(n.includes("cast")||n.includes("batman")||n.includes("avengers")) s += 10;

return s;
}

/* =========================
TAB SWITCH
========================= */

function switchTab(t){
["vault","opt","stats"].forEach(x=>{
document.getElementById(x).style.display = x===t?"block":"none";
});
}

/* =========================
UPDATE
========================= */

function update(id,val){
const r = DB.find(x=>x.ID===id);
if(r){ r.Status = val; save(); render(); }
}

/* =========================
RENDER VAULT
========================= */

function render(){

const q=document.getElementById("search").value?.toLowerCase()||"";
const vault=document.getElementById("vault");
vault.innerHTML="";

DB.filter(r=>r.Name.toLowerCase().includes(q))
.sort((a,b)=>score(b)-score(a))
.forEach(r=>{

let sc = score(r);
let cls = sc>80?"good":sc>55?"mid":"low";

const div=document.createElement("div");
div.className="card p-3 flex justify-between items-center "+cls;

div.innerHTML=`
<div>
<div class="text-xs font-bold">${r.Name}</div>
<div class="small">Score: ${sc}</div>
</div>

<select onchange="update(${r.ID},this.value)">
<option ${r.Status==="SUCCESS"?"selected":""}>SUCCESS</option>
<option ${r.Status==="PENDING"?"selected":""}>PENDING</option>
<option ${r.Status==="Sent"?"selected":""}>Sent</option>
<option ${r.Status==="RTS"?"selected":""}>RTS</option>
<option ${r.Status==="LOGGED"?"selected":""}>LOGGED</option>
</select>
`;

vault.appendChild(div);
});

renderOpt();
renderStats();
}

/* =========================
OPTIMISER (15–20 STAMPS)
========================= */

function renderOpt(){

let remaining = 20;

let ranked = [...DB]
.filter(r=>r.Status==="PENDING")
.sort((a,b)=>score(b)-score(a))
.slice(0,remaining);

let html = `<div class="card p-3 mb-3">
<div class="text-sm font-bold">🔥 SEND PLAN (20 STAMPS)</div>
<div class="small">Ranked by success probability scoring system</div>
</div>`;

ranked.forEach(r=>{
html += `
<div class="card p-3 mb-2 good">
<div class="text-xs font-bold">${r.Name}</div>
<div class="small">Score: ${score(r)}</div>
</div>`;
});

document.getElementById("opt").innerHTML = html;
}

/* =========================
ANALYTICS
========================= */

function renderStats(){

const total = DB.length;
const s = DB.filter(x=>x.Status==="SUCCESS").length;
const p = DB.filter(x=>x.Status==="PENDING").length;
const r = DB.filter(x=>x.Status==="RTS").length;
const se = DB.filter(x=>x.Status==="Sent").length;

document.getElementById("stats").innerHTML = `
<div class="card p-3">
<div class="text-sm font-bold mb-2">📊 ANALYTICS</div>
<div class="text-xs">Total: ${total}</div>
<div class="text-xs text-green-400">Success: ${s}</div>
<div class="text-xs text-amber-400">Pending: ${p}</div>
<div class="text-xs text-blue-400">Sent: ${se}</div>
<div class="text-xs text-red-400">RTS: ${r}</div>
</div>
`;
}

/* INIT */
render();

</script>

</body>
</html>
