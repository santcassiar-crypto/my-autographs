





<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VaultOS v5 Dropdown System</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{margin:0;font-family:Arial;background:#020617;color:#fff;display:flex}
aside{width:240px;background:#01040d;padding:15px}
main{flex:1;padding:15px}

.card{background:#0f172a;padding:15px;border-radius:10px;margin-bottom:15px}

table{width:100%;border-collapse:collapse}
td,th{border-bottom:1px solid #334155;padding:8px}

input,select{
width:100%;
padding:6px;
background:#1e293b;
color:#fff;
border:1px solid #334155;
border-radius:6px;
}
</style>
</head>

<body>

<aside>
<h3>VaultOS v5</h3>
<input type="file" id="importFile">
</aside>

<main>

<div class="card">
<h3>Dashboard</h3>
<p>Total: <b id="total"></b></p>
<p>Success: <b id="success"></b></p>
<p>RTS: <b id="rts"></b></p>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Name</th>
<th>Status</th>
<th>Route</th>
<th>Method</th>
<th>Address Type</th>
<th>Auto Address</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>
</div>

</main>

<script>

let vault = JSON.parse(localStorage.getItem("VAULT_V5")) || {
targets:[]
};

const $ = id => document.getElementById(id);

function save(){
localStorage.setItem("VAULT_V5", JSON.stringify(vault));
}

/* 🧠 ROUTE ENGINE */
function getAddress(route){
switch(route){
case "Club Route": return "Training Ground / Stadium HQ";
case "Agency Route": return "Talent Agency / Production Office";
case "Event Route": return "Event Venue / Organiser HQ";
case "Foundation Route": return "Charity / Foundation HQ";
default: return "General Organisation Route";
}
}

/* 📊 DASH */
function update(){

let total = vault.targets.length;

let success = vault.targets.filter(x =>
(x.status||"").toUpperCase()==="SUCCESS"
).length;

let rts = vault.targets.filter(x =>
(x.status||"").toUpperCase().includes("RTS")
).length;

totalEl.textContent = total;
successEl.textContent = success;
rtsEl.textContent = rts;

}

/* 📊 RENDER */
function render(){

list.innerHTML = vault.targets.map((t,i)=>{

let route = t.route || "General Route";
let addr = getAddress(route);

return `
<tr>

<td><input value="${t.name||""}"
oninput="vault.targets[${i}].name=this.value; save(); update();"></td>

<td>
<select onchange="vault.targets[${i}].status=this.value; save(); update();">
<option ${t.status==="PENDING"?"selected":""}>PENDING</option>
<option ${t.status==="SUCCESS"?"selected":""}>SUCCESS</option>
<option ${t.status==="RTS"?"selected":""}>RTS</option>
<option ${t.status==="WAITING"?"selected":""}>WAITING</option>
</select>
</td>

<td>
<select onchange="vault.targets[${i}].route=this.value; save(); render(); update();">
<option ${route==="Club Route"?"selected":""}>Club Route</option>
<option ${route==="Agency Route"?"selected":""}>Agency Route</option>
<option ${route==="Event Route"?"selected":""}>Event Route</option>
<option ${route==="Foundation Route"?"selected":""}>Foundation Route</option>
<option ${route==="General Route"?"selected":""}>General Route</option>
</select>
</td>

<td>
<select onchange="vault.targets[${i}].method=this.value; save();">
<option ${t.method==="TTM"?"selected":""}>TTM</option>
<option ${t.method==="IP"?"selected":""}>IP</option>
<option ${t.method==="EVENT"?"selected":""}>EVENT</option>
</select>
</td>

<td>
<select onchange="vault.targets[${i}].addrType=this.value; save();">
<option ${t.addrType==="AUTO"?"selected":""}>AUTO</option>
<option ${t.addrType==="CUSTOM"?"selected":""}>CUSTOM</option>
</select>
</td>

<td>${addr}</td>

</tr>
`;

}).join("");

update();

}

/* 📥 IMPORT */
importFile.onchange = e=>{

let file=e.target.files[0];
let r=new FileReader();

r.onload=()=>{

let d=JSON.parse(r.result||"{}");
let raw=d.records||[];

vault.targets = raw.map((t,i)=>({

id:Date.now()+i,
name:t.name||t.Name||"Unknown",
status:(t.status||t.Status||"PENDING").toUpperCase(),
route:t.route||"General Route",
method:t.method||"TTM",
addrType:"AUTO"

}));

save();
render();

};

r.readAsText(file);
};

render();

</script>

</body>
</html>
