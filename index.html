<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VaultOS SR7 | Fixed Import</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --text: #f1f5f9; --accent: #3b82f6; --danger: #7f1d1d; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; }
        aside { width: 300px; background: var(--panel); height: 100vh; padding: 20px; border-right: 1px solid #334155; }
        main { flex: 1; padding: 40px; }
        .card { background: var(--panel); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        input, button, textarea { background: #334155; color: white; border: 1px solid #475569; padding: 10px; border-radius: 6px; margin: 5px; }
        button { cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td, th { padding: 12px; border-bottom: 1px solid #334155; text-align: left; }
    </style>
</head>
<body>

<aside>
    <h2>VaultOS SR7</h2>
    <textarea id="scratchpad" style="width:90%; height:300px; background:#0f172a; color:#fff;" placeholder="Scrapbook..."></textarea>
</aside>

<main>
    <div class="card">
        <button onclick="document.getElementById('importFile').click()">Import Your JSON</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
        <div id="status" style="margin-top:10px; font-size:0.9rem;"></div>
    </div>
    <div class="card">
        <table>
            <thead><tr><th>Name</th><th>Status</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</main>

<script>
    let vault = { list: [], sends: [], notes: "" };

    function render() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = vault.list.map(x => `
            <tr>
                <td>${x.Name}</td>
                <td>${x.Status}</td>
            </tr>`).join("");
        document.getElementById('status').innerText = `Loaded ${vault.list.length} records successfully.`;
    }

    function importData(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                // This specifically looks for the array format you provided
                const data = JSON.parse(ev.target.result);
                vault.list = Array.isArray(data) ? data : (data.list || []);
                render();
            } catch(err) { alert("Error parsing JSON: " + err.message); }
        };
        reader.readAsText(e.target.files[0]);
    }
</script>
</body>
</html>
