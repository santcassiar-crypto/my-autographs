

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vault Tracker V3</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b0f14;
  color:#fff;
}

header {
  padding:20px;
  background:#111827;
  position:sticky;
  top:0;
  border-bottom:1px solid #222;
}

h1 { margin:0; font-size:18px; }

.container {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.controls {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin:15px 0;
}

input, select, button {
  padding:10px;
  border-radius:8px;
  border:none;
  background:#1f2937;
  color:#fff;
}

button {
  cursor:pointer;
  background:#2563eb;
}

button:hover {
  background:#1d4ed8;
}

.grid {
  display:grid;
  grid-template-columns: 1fr;
  gap:10px;
}

.card {
  background:#111827;
  border:1px solid #1f2937;
  padding:12px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.left {
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
}

input.edit {
  background:#0b0f14;
  border:1px solid #374151;
  min-width:220px;
}

.small {
  font-size:11px;
  opacity:0.6;
}

.status {
  padding:6px 8px;
  border-radius:6px;
  font-size:12px;
}

.PENDING { background:orange; color:#000; }
.SENT { background:deepskyblue; color:#000; }
.RTS { background:red; }
.SUCCESS { background:limegreen; color:#000; }
.LOGGED { background:gray; }

</style>
</head>

<body>

<header>
  <h1>Vault Tracker V3 — Clean Safe System</h1>
</header>

<div class="container">

<div class="controls">
  <input id="name" placeholder="Add target...">
  <select id="status">
    <option>PENDING</option>
    <option>SENT</option>
    <option>RTS</option>
    <option>SUCCESS</option>
    <option>LOGGED</option>
  </select>
  <button onclick="add()">Add</button>

  <button onclick="exportJSON()">Export</button>
  <input type="file" onchange="importJSON(event)">
  <button onclick="resetAll()">Reset</button>
</div>

<div id="list" class="grid"></div>

</div>

<script>

let records = [];

/* SAFE LOAD */
function load() {
  try {
    const raw = localStorage.getItem("vault_data");
    if (!raw) return;

    const parsed = JSON.parse(raw);

    records = Array.isArray(parsed) ? parsed.map(normalise) : [];

  } catch {
    records = [];
  }
}

/* NORMALISE DATA */
function normalise(r, i) {
  return {
    name: r?.name || `Unnamed ${i}`,
    status: ["PENDING","SENT","RTS","SUCCESS","LOGGED"].includes(r?.status)
      ? r.status
      : "PENDING"
  };
}

/* SAVE */
function save() {
  localStorage.setItem("vault_data", JSON.stringify(records));
}

/* RENDER */
function render() {
  const el = document.getElementById("list");
  el.innerHTML = "";

  records.forEach((r, i) => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="left">
        <input class="edit" value="${r.name}"
          onchange="editName(${i}, this.value)">

        <select onchange="editStatus(${i}, this.value)">
          <option ${r.status==="PENDING"?"selected":""}>PENDING</option>
          <option ${r.status==="SENT"?"selected":""}>SENT</option>
          <option ${r.status==="RTS"?"selected":""}>RTS</option>
          <option ${r.status==="SUCCESS"?"selected":""}>SUCCESS</option>
          <option ${r.status==="LOGGED"?"selected":""}>LOGGED</option>
        </select>

        <span class="status ${r.status}">${r.status}</span>

        <div class="small">#${i}</div>
      </div>

      <button onclick="del(${i})">Delete</button>
    `;

    el.appendChild(div);
  });
}

/* ACTIONS */
function add() {
  const name = document.getElementById("name").value.trim();
  const status = document.getElementById("status").value;

  if (!name) return;

  records.push({ name, status });

  document.getElementById("name").value = "";

  save();
  render();
}

function editName(i, val) {
  if (!records[i]) return;
  records[i].name = val || "Unnamed";
  save();
}

function editStatus(i, val) {
  if (!records[i]) return;
  records[i].status = val;
  save();
}

function del(i) {
  records.splice(i, 1);
  save();
  render();
}

/* IMPORT (SAFE) */
function importJSON(event) {
  const file = event.target.files[0];
  const reader = new FileReader();

  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      const arr = Array.isArray(parsed) ? parsed : [parsed];

      records = arr.map(normalise);

      save();
      render();

      alert("Imported: " + records.length);

    } catch {
      alert("Invalid JSON");
    }
  };

  reader.readAsText(file);
}

/* EXPORT */
function exportJSON() {
  const blob = new Blob([JSON.stringify(records, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "vault_v3.json";
  a.click();
}

/* RESET */
function resetAll() {
  localStorage.removeItem("vault_data");
  records = [];
  render();
}

load();
render();

</script>

</body>
</html>
