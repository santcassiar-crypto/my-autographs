<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VaultPro v5 | Single Source Engine</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#050505; color:#e5e7eb; font-family:sans-serif; }
.card { background:#111113; border:1px solid #27272a; border-radius:12px; }
.status-SUCCESS { border-left:4px solid #22c55e; }
.status-PENDING { border-left:4px solid #f59e0b; }
.status-Sent { border-left:4px solid #3b82f6; }
.status-RTS { border-left:4px solid #ef4444; }
.small { font-size:10px; opacity:0.7; }
.tag { font-size:10px; background:#1f2937; padding:2px 6px; border-radius:6px; }
</style>
</head>

<body class="pb-24">

<div class="bg-red-600 text-white text-[10px] font-bold text-center py-1">
VAULTPRO v5 • SINGLE SOURCE OF TRUTH ACTIVE
</div>

<div class="max-w-3xl mx-auto p-4">

<h1 class="text-3xl font-black mb-4">VAULT<span class="text-red-600">PRO</span> v5</h1>

<div class="grid grid-cols-4 gap-2 mb-4">
  <div class="card p-3 text-center"><div class="small">TOTAL</div><div id="t"></div></div>
  <div class="card p-3 text-center"><div class="small text-green-400">SUCCESS</div><div id="s"></div></div>
  <div class="card p-3 text-center"><div class="small text-amber-400">PENDING</div><div id="p"></div></div>
  <div class="card p-3 text-center"><div class="small text-blue-400">SENT</div><div id="se"></div></div>
</div>

<div class="flex gap-2 mb-3">
<input id="search" oninput="render()" class="w-full bg-zinc-900 p-2 text-xs rounded border border-zinc-800" placeholder="Search...">

<button onclick="saveDB()" class="bg-green-600 px-2 text-xs rounded">SAVE</button>
<button onclick="loadDB()" class="bg-blue-600 px-2 text-xs rounded">LOAD</button>
<button onclick="resetDB()" class="bg-red-600 px-2 text-xs rounded">RESET</button>
</div>

<div id="list" class="space-y-2"></div>

</div>

<script>

/* =========================
FULL DATASET (SOURCE OF TRUTH)
========================= */

const MASTER_DATA = [
{ID:1,Name:"Jannik Sinner",Status:"SUCCESS"},
{ID:2,Name:"Keanu Reeves",Status:"RTS"},
{ID:3,Name:"Alan Carr",Status:"SUCCESS"},
{ID:4,Name:"Harry Kane (Bayern)",Status:"RTS"},
{ID:5,Name:"David Attenborough",Status:"SUCCESS"},
{ID:6,Name:"Mohamed Salah",Status:"SUCCESS"},
{ID:7,Name:"Jude Bellingham",Status:"PENDING"},
{ID:8,Name:"Kylian Mbappé",Status:"PENDING"},
{ID:9,Name:"Usain Bolt",Status:"PENDING"},
{ID:10,Name:"Ralph Fiennes",Status:"PENDING"},
{ID:11,Name:"Rosamund Pike",Status:"SUCCESS"},
{ID:12,Name:"Stuart Pearce",Status:"SUCCESS"},
{ID:13,Name:"Ray Parlour",Status:"SUCCESS"}
];

/* =========================
SINGLE SOURCE OF TRUTH
========================= */

let VAULT_DB = [];

/* =========================
BOOT SYSTEM (NO FALLBACK CONFUSION)
========================= */

function boot(){
  let saved = localStorage.getItem("vault_v5");

  if(saved){
    VAULT_DB = JSON.parse(saved);
  } else {
    VAULT_DB = structuredClone(MASTER_DATA);
  }
}

/* =========================
SAVE / LOAD (EXPLICIT ONLY)
========================= */

function saveDB(){
  localStorage.setItem("vault_v5", JSON.stringify(VAULT_DB));
  alert("Saved to backup storage");
}

function loadDB(){
  let saved = localStorage.getItem("vault_v5");
  if(saved){
    VAULT_DB = JSON.parse(saved);
    render();
  }
}

function resetDB(){
  localStorage.removeItem("vault_v5");
  VAULT_DB = structuredClone(MASTER_DATA);
  render();
}

/* =========================
UPDATE (ONLY ONE TRUE SOURCE)
========================= */

function update(id,val){
  let r = VAULT_DB.find(x=>x.ID===id);
  if(r) r.Status = val;
  render();
}

/* =========================
RENDER
========================= */

function render(){

let q = document.getElementById("search").value?.toLowerCase() || "";

let list = document.getElementById("list");
list.innerHTML="";

let filtered = VAULT_DB.filter(r =>
  r.Name.toLowerCase().includes(q)
);

/* stats */
document.getElementById("t").innerText = VAULT_DB.length;
document.getElementById("s").innerText = VAULT_DB.filter(r=>r.Status==="SUCCESS").length;
document.getElementById("p").innerText = VAULT_DB.filter(r=>r.Status==="PENDING").length;
document.getElementById("se").innerText = VAULT_DB.filter(r=>r.Status==="Sent").length;

filtered.forEach(r=>{
let div=document.createElement("div");
div.className="card p-3 flex justify-between items-center status-"+r.Status;

div.innerHTML=`
<div class="text-xs font-bold w-2/3">${r.Name}</div>
<select onchange="update(${r.ID},this.value)" class="bg-black text-[10px]">
<option ${r.Status==="SUCCESS"?"selected":""}>SUCCESS</option>
<option ${r.Status==="PENDING"?"selected":""}>PENDING</option>
<option ${r.Status==="Sent"?"selected":""}>Sent</option>
<option ${r.Status==="RTS"?"selected":""}>RTS</option>
</select>
`;

list.appendChild(div);
});

}

/* BOOT */
boot();
render();

</script>

</body>
</html>
