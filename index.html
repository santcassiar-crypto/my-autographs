

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VaultOS DATA ENGINE V2 (Stable)</title>

<style>
body { margin:0; font-family:Arial; background:#0b0b0b; color:#fff; }

header {
  padding:12px;
  background:#111;
  border-bottom:1px solid #222;
  position:sticky;
  top:0;
}

.container {
  display:grid;
  grid-template-columns:320px 1fr;
  height:calc(100vh - 50px);
}

.sidebar {
  background:#0f0f0f;
  border-right:1px solid #222;
  padding:10px;
}

.card {
  background:#111;
  border:1px solid #222;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
}

button {
  width:100%;
  padding:8px;
  margin:4px 0;
  background:#00ffcc;
  border:0;
  font-weight:bold;
  border-radius:5px;
  cursor:pointer;
}

button:hover { background:#00ddb3; }

.main { padding:10px; overflow:auto; }

.ticker {
  background:#111;
  border:1px solid #222;
  padding:12px;
  border-radius:8px;
  margin-bottom:10px;
  color:#00ffcc;
}

.record {
  background:#0d0d0d;
  border:1px solid #222;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
}

.badge {
  padding:3px 8px;
  border-radius:20px;
  font-size:11px;
}

.PENDING { background:#ffcc00; color:#000; }
.SENT { background:#4da6ff; color:#fff; }
.SUCCESS { background:#00ff88; color:#000; }
.RTS { background:#ff4d4d; color:#fff; }

input {
  width:100%;
  padding:8px;
  background:#000;
  border:1px solid #333;
  color:#fff;
  border-radius:5px;
}
</style>
</head>

<body>

<header><b>VaultOS DATA ENGINE V2 (STABLE)</b></header>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

  <div class="card">
    <button onclick="triggerImport()">IMPORT JSON</button>
    <button onclick="markNext()">MARK NEXT AS SENT</button>
    <input type="file" id="file" style="display:none" accept="application/json">
  </div>

  <div class="card">
    <div id="stats"></div>
  </div>

</div>

<!-- MAIN -->
<div class="main">

  <div id="ticker" class="ticker">INITIALISING...</div>
  <div id="view"></div>

</div>

</div>

<script>

// =========================
// DB
// =========================
let DB = { records: [] };

// =========================
// LOAD / SAVE
// =========================
function save(){
  localStorage.setItem("vault_v2", JSON.stringify(DB));
}

function load(){
  const d = localStorage.getItem("vault_v2");
  if(d) DB = JSON.parse(d);
}
load();

// =========================
// NORMALISE (FIXES EVERYTHING)
// =========================
function norm(r){
  return {
    ID: r?.ID ?? Date.now(),
    Name: (r?.Name ?? "Untitled").trim(),
    Status: (r?.Status ?? "PENDING").toString().trim().toUpperCase()
  };
}

// =========================
// IMPORT (ROBUST)
// =========================
function triggerImport(){
  document.getElementById("file").click();
}

document.getElementById("file").addEventListener("change", e => {
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);

      const arr =
        Array.isArray(data) ? data :
        Array.isArray(data.records) ? data.records :
        [];

      // CLEAN + NORMALISE
      let cleaned = arr.map(norm);

      // DEDUPE BY NAME (CRITICAL FIX)
      const map = new Map();

      for(const r of cleaned){
        map.set(r.Name.toLowerCase(), r);
      }

      DB.records = [...map.values()];

      save();
      render();

      alert("Imported: " + DB.records.length);

    } catch {
      alert("Invalid JSON");
    }
  };

  reader.readAsText(file);
});

// =========================
// TRUE NEXT ENGINE (NO INDEX BUGS)
// =========================
function getQueue(){
  return DB.records
    .map(norm)
    .filter(r => r.Status === "PENDING");
}

function getNext(){
  const q = getQueue();
  return q.length ? q[0] : null;
}

// =========================
// MARK NEXT
// =========================
function markNext(){
  const next = getNext();
  if(!next) return;

  DB.records = DB.records.map(r =>
    r.Name === next.Name
      ? { ...norm(r), Status:"SENT" }
      : r
  );

  save();
  render();
}

// =========================
// STATS
// =========================
function stats(){
  const s = {PENDING:0,SENT:0,SUCCESS:0,RTS:0};

  DB.records.forEach(r=>{
    const n = norm(r);
    if(s[n.Status] !== undefined) s[n.Status]++;
  });

  document.getElementById("stats").innerHTML = `
    PENDING: ${s.PENDING}<br>
    SENT: ${s.SENT}<br>
    SUCCESS: ${s.SUCCESS}<br>
    RTS: ${s.RTS}
  `;
}

// =========================
// RENDER
// =========================
function render(){

  const next = getNext();

  document.getElementById("ticker").innerHTML =
    next
      ? `NEXT → <b>${next.Name}</b> <span class="badge ${next.Status}">${next.Status}</span>`
      : "NO PENDING ITEMS";

  stats();

  const view = document.getElementById("view");

  view.innerHTML = `<h3>QUEUE</h3>`;

  getQueue().forEach(r=>{
    const n = norm(r);

    view.innerHTML += `
      <div class="record">
        <b>${n.Name}</b><br>
        <span class="badge ${n.Status}">${n.Status}</span>
      </div>
    `;
  });
}

// INIT
load();
render();

</script>

</body>
</html>
