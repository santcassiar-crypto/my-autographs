<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VaultOS SR7 | Professional Tracker</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --text: #f1f5f9; --accent: #3b82f6; --danger: #7f1d1d; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; }
        aside { width: 300px; background: var(--panel); height: 100vh; padding: 20px; border-right: 1px solid #334155; }
        main { flex: 1; padding: 40px; }
        .card { background: var(--panel); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        input, button, textarea { background: #334155; color: white; border: 1px solid #475569; padding: 10px; border-radius: 6px; margin: 5px; }
        button { cursor: pointer; }
        .tab-btn { background: #334155; border: none; padding: 10px 20px; color: white; }
        .active { background: var(--accent); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td, th { padding: 12px; border-bottom: 1px solid #334155; text-align: left; }
    </style>
</head>
<body>

<aside>
    <h2>VaultOS SR7</h2>
    <h3>Scrapbook</h3>
    <textarea id="scratchpad" style="width:90%; height:300px; background:#0f172a; color:#fff;" oninput="saveData()"></textarea>
</aside>

<main>
    <div class="card">
        <input id="name" placeholder="Target Name..." onkeypress="if(event.key==='Enter') addCurrent()">
        <button onclick="addCurrent()">Add Record</button>
    </div>

    <div class="card">
        <button class="tab-btn active" id="btn-list" onclick="switchTab('list')">Target List</button>
        <button class="tab-btn" id="btn-sends" onclick="switchTab('sends')">New Sends</button>
        <table>
            <thead><tr><th>Name</th><th>Date Added</th><th>Action</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    
    <button onclick="exportData()">Export Data</button>
    <input type="file" id="importFile" style="display:none" onchange="importData(event)">
    <button onclick="document.getElementById('importFile').click()">Import Data</button>
</main>

<script>
    let vault = JSON.parse(localStorage.getItem('vaultData')) || { list: [], sends: [], notes: "" };
    let currentTab = 'list';

    document.getElementById('scratchpad').value = vault.notes;

    function render() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = vault[currentTab].map((x, i) => `
            <tr>
                <td>${x.name}</td>
                <td>${x.date}</td>
                <td><button style="background:var(--danger)" onclick="del(${i})">Remove</button></td>
            </tr>`).join("");
    }

    function addCurrent() {
        const name = document.getElementById('name').value;
        if (!name) return;
        vault[currentTab].push({ name: name, date: new Date().toLocaleDateString() });
        document.getElementById('name').value = "";
        saveData();
        render();
    }

    function switchTab(tab) {
        currentTab = tab;
        document.getElementById('btn-list').className = tab === 'list' ? 'tab-btn active' : 'tab-btn';
        document.getElementById('btn-sends').className = tab === 'sends' ? 'tab-btn active' : 'tab-btn';
        render();
    }

    function del(i) { vault[currentTab].splice(i, 1); saveData(); render(); }
    function saveData() {
        vault.notes = document.getElementById('scratchpad').value;
        localStorage.setItem('vaultData', JSON.stringify(vault));
    }
    function exportData() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(vault)], {type: 'application/json'}));
        a.download = 'vault_export.json'; a.click();
    }
    function importData(e) {
        const reader = new FileReader();
        reader.onload = (e) => {
            vault = JSON.parse(e.target.result);
            document.getElementById('scratchpad').value = vault.notes;
            localStorage.setItem('vaultData', JSON.stringify(vault));
            render();
        };
        reader.readAsText(e.target.files[0]);
    }
    render();
</script>
</body>
</html>
