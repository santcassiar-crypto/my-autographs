<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Autograph Registry Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: #f0f0f0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; }
        .card { background: #161616; border: 1px solid #262626; border-radius: 12px; margin-bottom: 8px; position: relative; transition: all 0.2s; }
        .sticky-header { position: sticky; top: 0; z-index: 50; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid #262626; }
        
        .status-success { border-left: 4px solid #22c55e; }
        .status-sent { border-left: 4px solid #3b82f6; }
        .status-failure { border-left: 4px solid #ef4444; }
        .status-pending { border-left: 4px solid #525252; }

        input, select { background: #1a1a1a !important; border: 1px solid #333 !important; color: white !important; outline: none; }
        input:focus { border-color: #dc2626 !important; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="pb-20">

    <div class="app-container">
        <!-- Header & Stats -->
        <div class="sticky-header p-5">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h1 class="text-xl font-black italic text-red-600 leading-none tracking-tighter">REGISTRY PRO</h1>
                    <p class="text-[10px] text-zinc-500 font-bold tracking-widest mt-1 uppercase" id="total-count">Loading Records...</p>
                </div>
                <div class="flex gap-4 text-[9px] font-black uppercase">
                    <div class="text-green-500 text-center"><div class="text-sm" id="s-win">0</div>WIN</div>
                    <div class="text-blue-500 text-center"><div class="text-sm" id="s-sent">0</div>SENT</div>
                    <div class="text-zinc-500 text-center"><div class="text-sm" id="s-wait">0</div>WAIT</div>
                </div>
            </div>
            
            <!-- Quick Add Form -->
            <div class="bg-zinc-900/50 p-3 rounded-xl border border-zinc-800 mb-4">
                <div class="grid grid-cols-12 gap-2">
                    <input type="text" id="newName" placeholder="Name/Item" class="col-span-7 p-2 rounded text-xs">
                    <select id="newStatus" class="col-span-5 p-2 rounded text-[10px] font-bold">
                        <option value="PENDING">PENDING</option>
                        <option value="SUCCESS">SUCCESS</option>
                        <option value="SENT">SENT</option>
                        <option value="RTS">RTS / FAIL</option>
                    </select>
                    <input type="text" id="newCat" placeholder="Category (e.g. Football)" class="col-span-7 p-2 rounded text-xs">
                    <button onclick="addRecord()" class="col-span-5 bg-red-600 hover:bg-red-700 text-white font-black text-[10px] rounded uppercase italic transition">Add Entry</button>
                </div>
            </div>

            <div class="relative">
                <input type="text" id="search" placeholder="Search 112+ records..." 
                    class="w-full p-3 pl-10 rounded-xl text-sm" onkeyup="renderList()">
                <span class="absolute left-3 top-3.5 opacity-30 text-xs">🔍</span>
            </div>
        </div>

        <!-- The List -->
        <div class="p-4" id="list"></div>

        <!-- Backup & Recovery -->
        <div class="p-8 flex flex-col gap-4 items-center">
            <button onclick="downloadDatabase()" class="w-full max-w-xs bg-zinc-800 py-3 rounded-lg text-[10px] text-zinc-300 font-bold uppercase tracking-widest hover:bg-zinc-700 transition border border-zinc-700">
                💾 Download GitHub Backup
            </button>
            <button onclick="resetData()" class="text-[9px] text-zinc-700 font-bold uppercase hover:text-red-800 transition">
                Reset to Original Factory List
            </button>
        </div>
    </div>

    <script>
        const initialData = [{"ID":1,"Name":"Jannik Sinner","Status":"SUCCESS","Category":"Tennis"},{"ID":2,"Name":"Keanu Reeves","Status":"FAILURE / RTS","Category":"Film"},{"ID":3,"Name":"Alan Carr","Status":"SUCCESS","Category":"Comedy"},{"ID":4,"Name":"Harry Kane (Bayern)","Status":"FAILURE / RTS","Category":"Football"},{"ID":5,"Name":"David Attenborough","Status":"SUCCESS","Category":"Legend"},{"ID":6,"Name":"Paul Merson (Original)","Status":"SUCCESS","Category":"Football"},{"ID":7,"Name":"Tony Adams","Status":"SUCCESS","Category":"Arsenal Legend"},{"ID":8,"Name":"Joshua Kimmich","Status":"SUCCESS","Category":"Football"},{"ID":9,"Name":"Ron Ferdinand","Status":"SUCCESS","Category":"Art"},{"ID":10,"Name":"Erling Haaland (City)","Status":"SUCCESS","Category":"Football"},{"ID":11,"Name":"Lamine Yamal (Home)","Status":"RTS","Category":"Football"},{"ID":12,"Name":"Rosie Jones","Status":"SUCCESS","Category":"Comedy"},{"ID":13,"Name":"Kevin Bridges","Status":"SUCCESS","Category":"Comedy"},{"ID":14,"Name":"Lee Mack","Status":"SUCCESS","Category":"Comedy"},{"ID":15,"Name":"Chris Waddle","Status":"SUCCESS","Category":"Football"},{"ID":16,"Name":"Ivo Graham","Status":"SUCCESS","Category":"Comedy"},{"ID":17,"Name":"Josh Widdicombe","Status":"SUCCESS","Category":"Comedy"},{"ID":18,"Name":"Timothée Chalamet","Status":"Sent","Category":"Film"},{"ID":19,"Name":"Rob Beckett","Status":"SUCCESS","Category":"Comedy"},{"ID":20,"Name":"Mohamed Salah","Status":"SUCCESS","Category":"Football"},{"ID":21,"Name":"Tommy Fleetwood","Status":"SUCCESS","Category":"Golf"},{"ID":22,"Name":"Lamine Yamal (Club)","Status":"SUCCESS","Category":"Football"},{"ID":23,"Name":"Tommy Fleetwood","Status":"SUCCESS","Category":"Golf"},{"ID":24,"Name":"Sebastian Coe","Status":"RTS","Category":"Legend"},{"ID":25,"Name":"Hugh Bonneville","Status":"SUCCESS","Category":"Stage & Screen"},{"ID":26,"Name":"Erling Haaland (Academy)","Status":"SUCCESS","Category":"Football"},{"ID":27,"Name":"Mark Addy","Status":"SUCCESS","Category":"Stage & Screen"},{"ID":28,"Name":"Mikel Arteta","Status":"Sent","Category":"Football"},{"ID":29,"Name":"Billy Crudup","Status":"SUCCESS","Category":"Stage & Screen"},{"ID":30,"Name":"Cole Palmer","Status":"RTS","Category":"Football"},{"ID":31,"Name":"Dougray Scott","Status":"PENDING","Category":"Stage & Screen"},{"ID":32,"Name":"Jude Bellingham","Status":"PENDING","Category":"Football"},{"ID":33,"Name":"Kylian Mbappé","Status":"PENDING","Category":"Football"},{"ID":34,"Name":"Kevin De Bruyne","Status":"PENDING","Category":"Football"},{"ID":35,"Name":"Jack Wilshere","Status":"PENDING","Category":"Arsenal Legend"},{"ID":36,"Name":"Usain Bolt","Status":"PENDING","Category":"Legend"},{"ID":37,"Name":"Dirk Nowitzki","Status":"PENDING","Category":"NBA"},{"ID":38,"Name":"Harry Kane","Status":"PENDING","Category":"Football"},{"ID":39,"Name":"Grant Hill","Status":"PENDING","Category":"NBA"},{"ID":40,"Name":"Paolo Banchero","Status":"PENDING","Category":"NBA"},{"ID":41,"Name":"Rik Smits","Status":"SUCCESS","Category":"NBA"},{"ID":42,"Name":"Robert Parish","Status":"SUCCESS","Category":"NBA"},{"ID":43,"Name":"John McEnroe","Status":"PENDING","Category":"Tennis"},{"ID":44,"Name":"Mutaz Barshim","Status":"PENDING","Category":"NBA"},{"ID":45,"Name":"Lee Evans","Status":"PENDING","Category":"Comedy"},{"ID":46,"Name":"Joe Marler","Status":"PENDING","Category":"Rugby"},{"ID":47,"Name":"Celia Imrie","Status":"PENDING","Category":"Stage & Screen"},{"ID":48,"Name":"Diane Morgan","Status":"PENDING","Category":"Comedy"},{"ID":49,"Name":"Lauren Duke","Status":"PENDING","Category":"Music"},{"ID":50,"Name":"Anna Maxwell","Status":"PENDING","Category":"Stage & Screen"},{"ID":51,"Name":"Alex Ferguson","Status":"PENDING","Category":"Football Legend"},{"ID":52,"Name":"Alan Shearer","Status":"PENDING","Category":"Football Legend"},{"ID":53,"Name":"Ian McKellen","Status":"PENDING","Category":"Stage & Screen"},{"ID":54,"Name":"Ian Wright","Status":"PENDING","Category":"Arsenal Legend"},{"ID":55,"Name":"Mikel Arteta","Status":"PENDING","Category":"Arsenal"},{"ID":56,"Name":"Michael J Fox","Status":"PENDING","Category":"Legend"},{"ID":57,"Name":"Alan Shearer","Status":"PENDING","Category":"Football Legend"},{"ID":58,"Name":"Frank Bruno","Status":"PENDING","Category":"Boxing"},{"ID":59,"Name":"Michael Owen","Status":"PENDING","Category":"Football"},{"ID":60,"Name":"Billy Crudup","Status":"SUCCESS","Category":"Stage"},{"ID":61,"Name":"Cole Palmer","Status":"FAILURE / RTS","Category":"Football"},{"ID":62,"Name":"Simu Liu","Status":"PENDING","Category":"Stage & Screen"},{"ID":63,"Name":"Hugh Laurie","Status":"PENDING","Category":"Stage & Screen"},{"ID":64,"Name":"Tom Hiddleston","Status":"PENDING","Category":"Stage & Screen"},{"ID":65,"Name":"Sheridan Smith","Status":"PENDING","Category":"Stage & Screen"},{"ID":66,"Name":"Ralph Fiennes","Status":"PENDING","Category":"Stage & Screen"},{"ID":67,"Name":"Pierce Brosnan","Status":"PENDING","Category":"Stage & Screen"},{"ID":68,"Name":"Jodie Comer","Status":"PENDING","Category":"Stage & Screen"},{"ID":69,"Name":"Vanessa Williams","Status":"PENDING","Category":"Stage & Screen"},{"ID":70,"Name":"Harry Potter","Status":"PENDING","Category":"Film/TV"},{"ID":71,"Name":"The Batman","Status":"PENDING","Category":"Film/TV"},{"ID":72,"Name":"Midland 2","Status":"PENDING","Category":"Film/TV"},{"ID":73,"Name":"Viva La Manana","Status":"PENDING","Category":"Film/TV"},{"ID":74,"Name":"Wife and D","Status":"PENDING","Category":"Film/TV"},{"ID":75,"Name":"England Squad","Status":"PENDING","Category":"Football"},{"ID":76,"Name":"Avengers","Status":"PENDING","Category":"Film/TV"},{"ID":77,"Name":"Austin Reaves","Status":"PENDING","Category":"NBA"},{"ID":78,"Name":"Man U Training","Status":"PENDING","Category":"Football"},{"ID":79,"Name":"TNT Pundits","Status":"PENDING","Category":"Sports"},{"ID":80,"Name":"Hugh Jackman","Status":"PENDING","Category":"Stage & Screen"},{"ID":81,"Name":"LA Lakers","Status":"Sent","Category":"NBA"},{"ID":82,"Name":"TNT Sports","Status":"Sent","Category":"Sports"},{"ID":83,"Name":"Man Utd Tr","Status":"Sent","Category":"Football"},{"ID":84,"Name":"Guy Ritchie","Status":"PENDING","Category":"Stage & Screen"},{"ID":85,"Name":"Line of Duty","Status":"PENDING","Category":"TV"},{"ID":88,"Name":"Antoine Griezmann","Status":"PENDING","Category":"Football"},{"ID":89,"Name":"England Women","Status":"PENDING","Category":"Football"},{"ID":90,"Name":"Paul Scholes","Status":"PENDING","Category":"Football Legend"},{"ID":91,"Name":"Nicky Butt","Status":"PENDING","Category":"Football Legend"},{"ID":92,"Name":"Michael Sheen","Status":"SUCCESS","Category":"Stage & Screen"},{"ID":93,"Name":"Stephen Fry (Extra)","Status":"SUCCESS","Category":"Legend"},{"ID":94,"Name":"Stephen Fry (Extra)","Status":"SUCCESS","Category":"Legend"},{"ID":95,"Name":"Paul Merson (Extra)","Status":"SUCCESS","Category":"Arsenal Legend"},{"ID":96,"Name":"Paul Merson (Extra)","Status":"SUCCESS","Category":"Arsenal Legend"},{"ID":97,"Name":"Tony Adams (Extra)","Status":"SUCCESS","Category":"Arsenal Legend"},{"ID":98,"Name":"Arsenal 2026 Squad","Status":"SUCCESS","Category":"Arsenal"},{"ID":117,"Name":"Emma Stone","Status":"PENDING","Category":"Film"},{"ID":121,"Name":"Robert Downey Jr.","Status":"Sent","Category":"Film"},{"ID":133,"Name":"Benedict Cumberbatch","Status":"PENDING","Category":"Film/TV"},{"ID":135,"Name":"Robert Pattinson","Status":"PENDING","Category":"Film/TV"},{"ID":137,"Name":"Henry Cavill","Status":"PENDING","Category":"Film/TV"},{"ID":153,"Name":"Michael Sheen","Status":"SUCCESS","Category":"Stage"},{"ID":154,"Name":"Griezmann / Alvarez","Status":"Sent","Category":"Football"},{"ID":156,"Name":"Paul Scholes","Status":"Sent","Category":"Football"},{"ID":157,"Name":"Nicky Butt","Status":"Sent","Category":"Football"},{"ID":171,"Name":"Stephen Fry (1/3)","Status":"SUCCESS","Category":"Legend"},{"ID":172,"Name":"Stephen Fry (2/3)","Status":"SUCCESS","Category":"Legend"},{"ID":173,"Name":"Stephen Fry (3/3)","Status":"SUCCESS","Category":"Legend"},{"ID":174,"Name":"Paul Merson (1/2)","Status":"SUCCESS","Category":"Football"},{"ID":175,"Name":"Paul Merson (2/2)","Status":"SUCCESS","Category":"Football"},{"ID":176,"Name":"Tony Adams","Status":"SUCCESS","Category":"Football"},{"ID":177,"Name":"Arsenal 2026 Squad","Status":"SUCCESS","Category":"Football"}];

        // This line is key: it looks for existing data or uses the hardcoded list
        let records = JSON.parse(localStorage.getItem('autograph_db')) || initialData;

        function renderList() {
            const query = document.getElementById('search').value.toLowerCase();
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = '';
            let win=0, sent=0, wait=0;

            // Sort newest first
            const sorted = [...records].sort((a,b) => b.ID - a.ID);

            sorted.forEach(r => {
                const s = r.Status.toUpperCase();
                if(s === "SUCCESS") win++;
                else if(s === "SENT") sent++;
                else if(s === "PENDING") wait++;

                if (r.Name.toLowerCase().includes(query) || r.Category.toLowerCase().includes(query)) {
                    const card = document.createElement('div');
                    let sClass = 'status-pending';
                    if(s === "SUCCESS") sClass = 'status-success';
                    else if(s === "SENT") sClass = 'status-sent';
                    else if(s.includes("FAIL") || s === "RTS") sClass = 'status-failure';

                    card.className = `card p-3 flex justify-between items-center ${sClass}`;
                    card.innerHTML = `
                        <div class="flex items-center gap-3">
                            <span class="text-zinc-800 font-mono text-[9px] w-5">${r.ID}</span>
                            <div>
                                <div class="font-bold text-[13px] leading-tight text-white">${r.Name}</div>
                                <div class="text-[8px] text-zinc-500 uppercase font-black tracking-wider mt-0.5">${r.Category}</div>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="text-[9px] font-black tracking-tighter ${s === 'SUCCESS' ? 'text-green-500' : 'text-zinc-500'}">${s}</div>
                            <button onclick="deleteRecord(${r.ID})" class="text-zinc-700 hover:text-red-600 transition">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    `;
                    listDiv.appendChild(card);
                }
            });

            document.getElementById('s-win').innerText = win;
            document.getElementById('s-sent').innerText = sent;
            document.getElementById('s-wait').innerText = wait;
            document.getElementById('total-count').innerText = `${records.length} TOTAL RECORDS`;
            
            // Auto-save to browser memory
            localStorage.setItem('autograph_db', JSON.stringify(records));
        }

        function addRecord() {
            const name = document.getElementById('newName').value;
            const status = document.getElementById('newStatus').value;
            const cat = document.getElementById('newCat').value || "General";
            if(!name) return;

            const nextID = records.length > 0 ? Math.max(...records.map(r => r.ID)) + 1 : 1;
            records.push({ ID: nextID, Name: name, Status: status, Category: cat });
            
            document.getElementById('newName').value = '';
            document.getElementById('newCat').value = '';
            renderList();
        }

        function deleteRecord(id) {
            if(confirm("Confirm deletion of this record?")) {
                records = records.filter(r => r.ID !== id);
                renderList();
            }
        }

        function downloadDatabase() {
            const currentData = JSON.stringify(records);
            const fullHtml = document.documentElement.outerHTML;
            
            // This replaces the hardcoded initialData variable with YOUR latest data
            const cleanHtml = fullHtml.replace(/const initialData = \[.*?\];/, `const initialData = ${currentData};`);

            const blob = new Blob([cleanHtml], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'autograph_master_update.html';
            a.click();
        }

        function resetData() {
            if(confirm("DANGER: This wipes your custom additions and resets to the original 112 list. Proceed?")) {
                localStorage.removeItem('autograph_db');
                records = [...initialData];
                renderList();
            }
        }

        renderList();
    </script>
</body>
</html>
