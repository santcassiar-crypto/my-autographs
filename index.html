


<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VaultOS SR7</title>
<style>
body{font-family:Arial,sans-serif;margin:20px;background:#f4f6f8}
.card{background:white;padding:15px;margin:10px 0;border-radius:8px}
button{padding:8px 12px;margin:5px}
table{width:100%;border-collapse:collapse;background:white}
td,th{border:1px solid #ccc;padding:8px}
input,select{padding:6px}
</style>
</head>
<body>
<h1>VaultOS SR7</h1>

<div class="card">
<h3>Dashboard</h3>
<div id="stats"></div>
</div>

<div class="card">
<h3>Import JSON</h3>
<input type="file" id="file" accept=".json">
<button onclick="importJSON()">Import</button>
<button onclick="exportJSON()">Export</button>
<p id="message"></p>
</div>

<div class="card">
<h3>Add Target</h3>
<input id="name" placeholder="Name">
<select id="category">
<option>Autograph Target</option>
<option>Fan Mail</option>
<option>Research</option>
<option>Follow Up</option>
<option>Completed</option>
<option>Unknown</option>
</select>
<button onclick="addTarget()">Add</button>
</div>

<table>
<thead><tr><th>Name</th><th>Category</th><th>Status</th><th>Strength</th><th>Likelihood</th><th>Notes</th></tr></thead>
<tbody id="table"></tbody>
</table>

<script>
let data=[];

function normalise(x){
 return {
  name:x.name||x.Name||"",
  category:x.category||x.Category||x.type||x.Type||detectCategory(x),
  status:x.status||x.Status||"",
  strength:x.strength||x.Strength||"",
  likelihood:x.likelihood||x.Likelihood||"",
  notes:x.notes||x.Notes||""
 };
}

function detectCategory(x){
 let text=JSON.stringify(x).toLowerCase();
 if(text.includes("sent")||text.includes("fan")) return "Fan Mail";
 if(text.includes("complete")||text.includes("signed")) return "Completed";
 return "Unknown";
}

function importJSON(){
 let f=document.getElementById("file").files[0];
 if(!f)return;
 let r=new FileReader();
 r.onload=e=>{
  let parsed=JSON.parse(e.target.result);
  if(!Array.isArray(parsed)) parsed=[parsed];
  data=parsed.map(normalise);
  render();
  document.getElementById("message").innerText=data.length+" records imported";
 };
 r.readAsText(f);
}

function addTarget(){
 data.push(normalise({
  name:document.getElementById("name").value,
  category:document.getElementById("category").value
 }));
 render();
}

function render(){
 document.getElementById("table").innerHTML=data.map(x=>
 `<tr><td>${x.name}</td><td>${x.category}</td><td>${x.status}</td><td>${x.strength}</td><td>${x.likelihood}</td><td>${x.notes}</td></tr>`
 ).join("");

 let counts={};
 data.forEach(x=>counts[x.category]=(counts[x.category]||0)+1);
 document.getElementById("stats").innerText=Object.entries(counts).map(x=>x[0]+": "+x[1]).join(" | ");
}

function exportJSON(){
 let blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="VaultOS_SR7_export.json";
 a.click();
}

render();
</script>
</body>
</html>
