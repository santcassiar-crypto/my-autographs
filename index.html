
<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VaultOS Intelligence — AI Layer</title>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:Arial;
background:radial-gradient(circle at top,#111,#000 70%);
color:#fff;
}
header{
position:sticky;
top:0;
z-index:999;
background:#0b0b0bee;
padding:14px;
border-bottom:1px solid #222;
backdrop-filter:blur(8px);
}
.title{font-size:26px;font-weight:bold}
.subtitle{font-size:12px;color:#888}
input,select,button,textarea{
width:100%;
padding:12px;
margin-top:8px;
background:#0d0d0d;
color:#fff;
border:1px solid #333;
border-radius:12px;
font-size:13px;
}
button{cursor:pointer;font-weight:bold}
button:hover{border-color:#666}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
padding:12px;
}
.box,.card{
background:#111;
border:1px solid #222;
border-radius:16px;
padding:14px;
}
.box{text-align:center}
.card{margin:12px;transition:.2s}
.card:hover{transform:translateY(-2px);border-color:#444}
.small{font-size:11px;color:#888;margin-top:6px}

.status-success{border-left:4px solid #00ff99}
.status-pending{border-left:4px solid orange}
.status-rts{border-left:4px solid red}
.status-logged{border-left:4px solid #44aaff}
.status-sent{border-left:4px solid violet}

.ticker-wrap{overflow:hidden;background:#050505;border-bottom:1px solid #222;padding:8px}
.ticker{white-space:nowrap;display:inline-block;padding-left:100%;animation:move 25s linear infinite;color:#00ffcc;font-size:12px}
@keyframes move{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
</style>

</head>
<body>

<header>
<div class="title">🏆 VaultOS Intelligence AI</div>
<div class="subtitle">Next-Gen Decision Engine Layer</div>
<input id="search" placeholder="Search vault...">
</header>

<div class="ticker-wrap">
<div class="ticker">🧠 AI Scoring Active • 🎯 Actionable intelligence only • ⚡ Risk + return prediction enabled</div>
</div>

<div class="grid" id="stats"></div>

<div class="card">
<h3>🔥 NEXT ACTION TODAY</h3>
<div id="topTargets"></div>
</div>

<div class="card">
<h3>⚠️ HIGH RISK / LOW RETURN</h3>
<div id="riskList"></div>
</div>

<div class="card">
<h3>📈 RETURN PROBABILITY VIEW</h3>
<div id="returnList"></div>
</div>

<div class="card">
<h3>➕ QUICK ADD</h3>
<input id="newName" placeholder="Add new target...">
<select id="newStatus">
<option>PENDING</option>
<option>SUCCESS</option>
<option>RTS</option>
<option>LOGGED</option>
<option>Sent</option>
</select>
<button onclick="addEntry()">ADD</button>
</div>

<div id="list"></div>

<script>

const STORAGE_KEY="vault_ai_v1";
let DB=[];
let search="";

function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(DB));}
function load(){let r=localStorage.getItem(STORAGE_KEY);DB=r?JSON.parse(r):[];render();}

function score(r){
let s=0;
if(r.Status==="PENDING") s+=12;
if(r.Status==="LOGGED") s+=3;
if(r.Status==="Sent") s+=1;
if(r.Status==="SUCCESS") s-=999;
if((r.Status||"").includes("RTS")) s-=25;

let n=(r.Name||"").toLowerCase();
if(n.includes("football")||n.includes("arsenal")) s+=3;
if(n.includes("film")||n.includes("cast")) s+=2;
if(n.includes("nba")||n.includes("lakers")) s+=2;

// weak recency boost (new IDs behave like timestamps)
if(r.ID>1e12) s+=2;

return s;
}

function returnProbability(r){
let base=60;
if(r.Status==="RTS") base-=25;
if(r.Status==="LOGGED") base+=5;
if(r.Status==="Sent") base+=10;
if(r.Status==="SUCCESS") base=0;

let n=(r.Name||"").toLowerCase();
if(n.includes("football")) base+=10;
if(n.includes("arsenal")) base+=8;
if(n.includes("film")) base+=5;

if(r.ID>1e12) base+=5;

return Math.max(0,Math.min(100,base));
}

function riskScore(r){
let s=0;
if(r.Status==="RTS") s+=50;
if(r.Status==="Sent") s+=20;
if(r.Status==="PENDING") s+=10;
if(r.Status==="SUCCESS") s=0;
return s;
}

function topNext(){
let list=DB.filter(r=>r.Status!=="SUCCESS");
let top=[...list].sort((a,b)=>score(b)-score(a)).slice(0,10);

document.getElementById("topTargets").innerHTML=
!top.length?"<div class='small'>No actions</div>":top.map(r=>`
<div class="card">
<b>${r.Name}</b>
<div class="small">Score: ${score(r)}</div>
<div class="small">Return: ${returnProbability(r)}%</div>
</div>`).join("");
}

function riskList(){
let top=[...DB].sort((a,b)=>riskScore(b)-riskScore(a)).slice(0,8);

document.getElementById("riskList").innerHTML=top.map(r=>`
<div class="card">
<b>${r.Name}</b>
<div class="small">Risk: ${riskScore(r)}</div>
<div class="small">Status: ${r.Status}</div>
</div>`).join("");
}

function returnList(){
let top=[...DB].sort((a,b)=>returnProbability(b)-returnProbability(a)).slice(0,8);

document.getElementById("returnList").innerHTML=top.map(r=>`
<div class="card">
<b>${r.Name}</b>
<div class="small">Return: ${returnProbability(r)}%</div>
</div>`).join("");
}

function stats(){
return{
total:DB.length,
pending:DB.filter(x=>x.Status==="PENDING").length,
success:DB.filter(x=>x.Status==="SUCCESS").length
};
}

function render(){
let s=stats();

let rate=Math.round((s.success/s.total)*100)||0;

topNext();
riskList();
returnList();

let q=search.toLowerCase();

document.getElementById("stats").innerHTML=
`<div class="box"><h2>${s.total}</h2><div class="small">TOTAL</div></div>
<div class="box"><h2>${s.success}</h2><div class="small">SUCCESS</div></div>
<div class="box"><h2>${rate}%</h2><div class="small">RATE</div></div>
<div class="box"><h2>${s.pending}</h2><div class="small">PENDING</div></div>`;

document.getElementById("list").innerHTML=
DB.filter(r=>!q||r.Name.toLowerCase().includes(q))
.map(r=>`
<div class="card">
<b>${r.Name}</b>
<div class="small">Status: ${r.Status}</div>
<div class="small">Score: ${score(r)}</div>
<div class="small">Return: ${returnProbability(r)}%</div>
</div>`).join("");
}

function addEntry(){
let n=document.getElementB
