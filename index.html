<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VaultPro v8.1 Editable System</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#050505;
    color:#eee;
}

header{
    position:sticky;
    top:0;
    background:#111;
    padding:10px;
    border-bottom:1px solid #222;
}

input, select{
    width:100%;
    padding:10px;
    margin-top:5px;
    background:#000;
    color:#fff;
    border:1px solid #333;
    border-radius:6px;
}

.stats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:6px;
    padding:10px;
}

.box{
    background:#111;
    padding:8px;
    border-radius:8px;
    text-align:center;
    font-size:12px;
}

.list{padding:10px;}

.card{
    background:#111;
    border:1px solid #222;
    padding:10px;
    margin-bottom:8px;
    border-radius:8px;
}

button{
    background:#222;
    border:1px solid #333;
    color:white;
    padding:6px;
    font-size:11px;
    border-radius:6px;
    margin-top:5px;
    margin-right:5px;
}

.small{font-size:11px;color:#aaa;}
</style>
</head>

<body>

<header>
<input id="search" placeholder="Search all records..." oninput="render()">
</header>

<div class="stats">
<div class="box">TOTAL<br><b id="t"></b></div>
<div class="box">SUCCESS<br><b id="s"></b></div>
<div class="box">PENDING<br><b id="p"></b></div>
<div class="box">RTS<br><b id="r"></b></div>
</div>

<div style="padding:10px">
<button onclick="addRecord()">+ ADD</button>
<button onclick="exportDB()">EXPORT</button>
<button onclick="importDB()">IMPORT</button>
</div>

<div id="list" class="list"></div>

<script>

// =======================
// LOAD DATABASE
// =======================

let DB = JSON.parse(localStorage.getItem("vault_db_v81")) || [];

// =======================
// SAVE
// =======================

function save(){
    localStorage.setItem("vault_db_v81", JSON.stringify(DB));
}

// =======================
// CORE FUNCTIONS
// =======================

function score(r){
    if(r.Status==="SUCCESS") return 100;
    if(r.Status==="Sent") return 70;
    if(r.Status==="RTS") return 40;
    if(r.Status==="PENDING") return 20;
    return 10;
}

function render(){

    let q = document.getElementById("search").value.toLowerCase();

    let filtered = DB;

    if(q){
        filtered = DB.filter(r =>
            r.Name.toLowerCase().includes(q)
        );
    }

    filtered.sort((a,b)=>score(b)-score(a));

    let list = document.getElementById("list");
    list.innerHTML="";

    filtered.forEach((r,i)=>{

        let div = document.createElement("div");
        div.className="card";

        div.innerHTML = `

            <input value="${r.Name}"
                onchange="editName(${r.ID},this.value)">

            <select onchange="editStatus(${r.ID},this.value)">
                <option ${r.Status==="SUCCESS"?"selected":""}>SUCCESS</option>
                <option ${r.Status==="PENDING"?"selected":""}>PENDING</option>
                <option ${r.Status==="Sent"?"selected":""}>Sent</option>
                <option ${r.Status==="RTS"?"selected":""}>RTS</option>
                <option ${r.Status==="LOGGED"?"selected":""}>LOGGED</option>
            </select>

            <div class="small">Score: ${score(r)}</div>

            <button onclick="del(${r.ID})">DELETE</button>

        `;

        list.appendChild(div);
    });

    stats();
}

function stats(){

    document.getElementById("t").innerText = DB.length;
    document.getElementById("s").innerText = DB.filter(x=>x.Status==="SUCCESS").length;
    document.getElementById("p").innerText = DB.filter(x=>x.Status==="PENDING").length;
    document.getElementById("r").innerText = DB.filter(x=>x.Status==="RTS").length;
}

// =======================
// EDIT SYSTEM
// =======================

function editName(id,val){
    DB.find(x=>x.ID===id).Name = val;
    save();
}

function editStatus(id,val){
    DB.find(x=>x.ID===id).Status = val;
    save();
}

// =======================
// ADD / DELETE
// =======================

function addRecord(){

    let name = prompt("Enter name:");
    if(!name) return;

    DB.unshift({
        ID:Date.now(),
        Name:name,
        Status:"PENDING"
    });

    save();
    render();
}

function del(id){
    DB = DB.filter(x=>x.ID!==id);
    save();
    render();
}

// =======================
// IMPORT / EXPORT
// =======================

function exportDB(){
    let blob = new Blob([JSON.stringify(DB)],{type:"application/json"});
    let a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="vault.json";
    a.click();
}

function importDB(){
    let i=document.createElement("input");
    i.type="file";
    i.onchange=e=>{
        let f=e.target.files[0];
        let r=new FileReader();
        r.onload=ev=>{
            DB=JSON.parse(ev.target.result);
            save();
            render();
        };
        r.readAsText(f);
    };
    i.click();
}

render();

</script>

</body>
</html>
