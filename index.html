////////////////////////////////////////////////////
// HTML ESCAPE
////////////////////////////////////////////////////

function esc(s){

return String(s)
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;");

}

////////////////////////////////////////////////////
// LOAD
////////////////////////////////////////////////////

function load(){

let raw = localStorage.getItem(STORAGE_KEY);

if(raw){

try{

DB = JSON.parse(raw);

SEED.forEach(seedItem=>{

let exists =
DB.find(x=>x.ID===seedItem.ID);

if(!exists){
DB.push(seedItem);
}

});

save();
render();

return;

}catch(e){}

}

DB = [...SEED];

save();
render();

}

////////////////////////////////////////////////////
// SAVE
////////////////////////////////////////////////////

function save(){

localStorage.setItem(
STORAGE_KEY,
JSON.stringify(DB)
);

autoBackup();

}

////////////////////////////////////////////////////
// BACKUPS
////////////////////////////////////////////////////

function autoBackup(){

let snapshot = {

time:Date.now(),
data:DB

};

localStorage.setItem(
"vault_backup_latest",
JSON.stringify(snapshot)
);

localStorage.setItem(
"vault_backup_shadow",
JSON.stringify(snapshot)
);

}

////////////////////////////////////////////////////
// EXPORT
////////////////////////////////////////////////////

function exportBackup(){

let blob = new Blob(

[JSON.stringify({

time:Date.now(),
data:DB

},null,2)],

{type:"application/json"}

);

let a = document.createElement("a");

a.href =
URL.createObjectURL(blob);

a.download =
"vault_backup_" + Date.now() + ".json";

a.click();

}

////////////////////////////////////////////////////
// RESTORE
////////////////////////////////////////////////////

function restoreBackup(){

let file =
document.getElementById("restoreFile").files[0];

if(!file){

alert("Select backup file");
return;

}

let reader = new FileReader();

reader.onload = e=>{

try{

let obj =
JSON.parse(e.target.result);

if(obj.data){

DB = obj.data;

save();
render();

alert("RESTORE COMPLETE");

}else{

alert("Invalid backup file");

}

}catch(err){

alert("Restore failed");

}

};

reader.readAsText(file);

}

////////////////////////////////////////////////////
// SEARCH
////////////////////////////////////////////////////

let search = "";

document
.getElementById("search")
.addEventListener("input",e=>{

search =
e.target.value.toLowerCase();

render();

});

function match(r,q){

if(!q) return true;

return (
(r.Name || "")
.toLowerCase()
.includes(q)
);

}

////////////////////////////////////////////////////
// STATS
////////////////////////////////////////////////////

function stats(){

return {

total:
DB.length,

pending:
DB.filter(x=>x.Status==="PENDING").length,

success:
DB.filter(x=>x.Status==="SUCCESS").length,

rts:
DB.filter(x=>x.Status.includes("RTS")).length,

logged:
DB.filter(x=>x.Status==="LOGGED").length,

sent:
DB.filter(x=>x.Status==="Sent").length

};

}

////////////////////////////////////////////////////
// QUICK ADD
////////////////////////////////////////////////////

function addEntry(){

let name =
document.getElementById("newName").value.trim();

let status =
document.getElementById("newStatus").value;

if(!name){

alert("Enter a name");
return;

}

DB.unshift({

ID:Date.now(),
Name:name,
Status:status

});

document.getElementById("newName").value = "";

save();
render();

}

////////////////////////////////////////////////////
// UPDATE
////////////////////////////////////////////////////

function update(id,val){

let r = DB.find(x=>x.ID===id);

if(r){

r.Name = val;

save();
render();

}

}

////////////////////////////////////////////////////
// STATUS UPDATE
////////////////////////////////////////////////////

function setStatus(id,val){

let r = DB.find(x=>x.ID===id);

if(r){

r.Status = val;

save();
render();

}

}

////////////////////////////////////////////////////
// DELETE
////////////////////////////////////////////////////

function removeEntry(id){

if(!confirm("Delete entry?")) return;

DB = DB.filter(x=>x.ID!==id);

save();
render();

}

////////////////////////////////////////////////////
// RENDER
////////////////////////////////////////////////////

function render(){

let s = stats();

let successRate =
Math.round((s.success / s.total) * 100) || 0;

document.getElementById("stats").innerHTML = `

<div class="box">
<h2>${s.total}</h2>
<div class="small">TOTAL TARGETS</div>
</div>

<div class="box">
<h2>${s.success}</h2>
<div class="small">SUCCESS</div>
</div>

<div class="box">
<h2>${successRate}%</h2>
<div class="small">SUCCESS RATE</div>
</div>

<div class="box">
<h2>${s.pending}</h2>
<div class="small">PENDING</div>
</div>

<div class="box">
<h2>${s.rts}</h2>
<div class="small">RTS</div>
</div>

<div class="box">
<h2>${s.logged}</h2>
<div class="small">LOGGED</div>
</div>

`;

document.getElementById("list").innerHTML =

DB

.filter(r=>match(r,search))

.map(r=>{

let statusClass =
"status-" +
r.Status.toLowerCase().replace(/\s/g,"");

return `

<div class="card ${statusClass}">

<div class="small">
ID: ${r.ID}
</div>

<input
value="${esc(r.Name)}"
onchange="update(${r.ID},this.value)"
>

<select
onchange="setStatus(${r.ID},this.value)"
>

<option ${r.Status==="PENDING"?"selected":""}>
PENDING
</option>

<option ${r.Status==="SUCCESS"?"selected":""}>
SUCCESS
</option>

<option ${r.Status==="RTS"?"selected":""}>
RTS
</option>

<option ${r.Status==="LOGGED"?"selected":""}>
LOGGED
</option>

<option ${r.Status==="Sent"?"selected":""}>
Sent
</option>

</select>

<button onclick="removeEntry(${r.ID})">
🗑 DELETE
</button>

</div>

`;

}).join("");

}

////////////////////////////////////////////////////
// RECOVERY CHECK
////////////////////////////////////////////////////

(function recoveryCheck(){

let backup =
localStorage.getItem("vault_backup_latest");

if(
!localStorage.getItem(STORAGE_KEY)
&& backup
){

let obj = JSON.parse(backup);

DB = obj.data || [];

save();

}

})();

////////////////////////////////////////////////////
// INIT
////////////////////////////////////////////////////

load();

</script>

</body>
</html>
