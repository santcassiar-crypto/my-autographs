<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VaultOS SR10</title>
    <style>
        :root{--bg:#0f172a;--panel:#1e293b;--text:#f8fafc;--accent:#38bdf8}
        body{background:var(--bg);color:var(--text);font-family:sans-serif;margin:20px}
        .card{background:var(--panel);padding:20px;border-radius:12px;margin-bottom:20px}
        input,select,button{padding:8px;margin:4px;border-radius:6px;border:1px solid #475569;background:#334155;color:white}
        button{background:var(--accent);color:black;font-weight:bold;cursor:pointer}
        table{width:100%;border-collapse:collapse;margin-top:20px}
        th,td{padding:10px;text-align:left;border-bottom:1px solid #475569}
    </style>
</head>
<body>

<div class="card">
    <h2>Add Autograph</h2>
    <input id="name" placeholder="Name">
    <input id="sport" placeholder="Sport">
    <select id="status">
        <option>Pending</option><option>Sent</option><option>Success</option><option>RTS</option>
    </select>
    <button onclick="add()">Save</button>
    <button onclick="exportData()">Export Data</button>
</div>

<table id="list">
    <thead><tr><th>Name</th><th>Sport</th><th>Status</th><th>Action</th></tr></thead>
    <tbody id="tbody"></tbody>
</table>

<script>
    let vault = JSON.parse(localStorage.getItem("VaultOS_SR10")) || {records:[]};

    function add() {
        let n = document.getElementById("name");
        if(!n.value) return;
        vault.records.push({name:n.value, sport:document.getElementById("sport").value, status:document.getElementById("status").value});
        n.value = "";
        save();
    }

    function del(i) { vault.records.splice(i, 1); save(); }

    function save() { 
        localStorage.setItem("VaultOS_SR10", JSON.stringify(vault)); 
        render(); 
    }

    function render() {
        document.getElementById("tbody").innerHTML = vault.records.map((r,i) => 
            `<tr><td>${r.name}</td><td>${r.sport}</td><td>${r.status}</td>
             <td><button onclick="del(${i})">X</button></td></tr>`).join("");
    }

    function exportData() {
        let blob = new Blob([JSON.stringify(vault)], {type: 'application/json'});
        let a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "VaultOS_Backup.json";
        a.click();
    }

    render();
</script>
</body>
</html>
