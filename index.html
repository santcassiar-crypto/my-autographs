<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VaultOS SR7 | Dashboard</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; }
        aside { width: 300px; background: var(--panel); padding: 20px; border-right: 1px solid #334155; height: 100vh; }
        main { flex: 1; padding: 20px; }
        .card { background: var(--panel); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        input, textarea, button { background: #334155; color: white; border: 1px solid #475569; padding: 8px; border-radius: 6px; margin: 4px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px; border-bottom: 2px solid #334155; color: #94a3b8; }
        td { padding: 10px; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>

<aside>
    <h3>Scrapbook</h3>
    <textarea id="notes" style="width:90%; height:80vh; background:#0f172a; color:#fff;" oninput="saveVault()"></textarea>
</aside>

<main>
    <div class="card">
        <h3>Dashboard Entry</h3>
        <input id="inID" type="hidden">
        <input id="inName" placeholder="Name" style="width: 300px;">
        <button onclick="saveRecord()">Save Entry</button>
        <button onclick="clearForm()">Clear</button>
        <button onclick="document.getElementById('importFile').click()" style="background:#059669">Import List</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
    </div>

    <div class="card">
        <table>
            <thead><tr><th>Name</th><th>Actions</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</main>

<script>
    let vault = JSON.parse(localStorage.getItem('vaultSR7')) || { records: [], notes: "" };
    document.getElementById('notes').value = vault.notes;

    function saveVault() {
        vault.notes = document.getElementById('notes').value;
        localStorage.setItem('vaultSR7', JSON.stringify(vault));
    }

    function render() {
        document.getElementById('tableBody').innerHTML = vault.records.map((r, i) => `
            <tr>
                <td>${r.Name}</td>
                <td><button onclick="edit(${i})">Edit</button> <button onclick="del(${i})">Del</button></td>
            </tr>`).join("");
    }

    function saveRecord() {
        const id = document.getElementById('inID').value;
        const name = document.getElementById('inName').value;
        if (!name) return;

        if (id !== "") {
            vault.records[id].Name = name;
        } else {
            vault.records.push({ Name: name });
        }
        
        clearForm();
        saveVault();
        render();
    }

    function edit(i) {
        document.getElementById('inID').value = i;
        document.getElementById('inName').value = vault.records[i].Name;
    }

    function clearForm() {
        document.getElementById('inID').value = "";
        document.getElementById('inName').value = "";
    }

    function del(i) { vault.records.splice(i, 1); saveVault(); render(); }

    function importData(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const data = JSON.parse(ev.target.result);
            // Map incoming JSON to the simple format { Name: "..." }
            vault.records = Array.isArray(data) ? data.map(r => ({Name: r.Name || r})) : (data.records || []);
            saveVault();
            render();
        };
        reader.readAsText(e.target.files[0]);
    }
    render();
</script>
</body>
</html>
