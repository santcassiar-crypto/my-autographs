<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VaultPro | Central Registry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #e4e4e7; font-family: sans-serif; }
        .bento-card { background: #111113; border: 1px solid #27272a; border-radius: 12px; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .ticker-wrap { animation: ticker 25s linear infinite; }
    </style>
</head>
<body class="pb-20">
    <div class="bg-red-600 overflow-hidden py-1 mb-6">
        <div class="ticker-wrap whitespace-nowrap text-[10px] font-black uppercase text-white tracking-widest">
            🚨 INTEL: SIR IAN MCKELLEN 'LEAR' ANNOUNCEMENT • HENRY CAVILL FILMING @ SKYE • LIONESSES VS VILLA TOMORROW 13:00 • VAULT SYNC ACTIVE...
        </div>
    </div>

    <div class="max-w-md mx-auto p-4">
        <div class="flex justify-between items-end mb-6">
            <h1 class="text-3xl font-black text-white italic">VAULT<span class="text-red-600">PRO</span></h1>
            <button onclick="exportData()" class="text-[9px] bg-zinc-800 px-3 py-1 rounded text-zinc-400 uppercase font-bold">Backup JSON</button>
        </div>

        <div id="list" class="space-y-2"></div>
    </div>

    <script>
        // FULL DATASET
        let records = JSON.parse(localStorage.getItem('vault_db')) || [
            {ID: 1, Name: "Jannik Sinner", Status: "SUCCESS"},
            {ID: 2, Name: "Keanu Reeves", Status: "FAILURE / RTS"},
            // ... [Insert the 162 records here]
        ];

        function render() {
            const list = document.getElementById('list');
            list.innerHTML = '';
            records.forEach(r => {
                const div = document.createElement('div');
                div.className = "bento-card p-4 flex justify-between items-center";
                div.innerHTML = `
                    <span class="text-sm font-bold">${r.Name}</span>
                    <select onchange="updateStatus(${r.ID}, this.value)" class="bg-black text-[10px] p-1 rounded border border-zinc-700 uppercase">
                        <option ${r.Status === 'SUCCESS' ? 'selected' : ''}>SUCCESS</option>
                        <option ${r.Status === 'PENDING' ? 'selected' : ''}>PENDING</option>
                        <option ${r.Status === 'Sent' ? 'selected' : ''}>Sent</option>
                        <option ${r.Status === 'RTS' ? 'selected' : ''}>RTS</option>
                    </select>
                `;
                list.appendChild(div);
            });
        }

        function updateStatus(id, newStatus) {
            const record = records.find(r => r.ID === id);
            record.Status = newStatus;
            localStorage.setItem('vault_db', JSON.stringify(records));
            render();
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(records));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", "vault_backup.json");
            dl.click();
        }

        render();
    </script>
</body>
</html>
