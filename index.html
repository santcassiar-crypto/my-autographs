<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VaultOS - Bulletproof Ops Engine</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial}
header{position:sticky;top:0;background:#111;padding:10px;border-bottom:1px solid #222}

input,select,textarea,button{
width:100%;padding:10px;margin-top:6px;
background:#000;color:#fff;border:1px solid #333;border-radius:8px
}

button{cursor:pointer;background:#111}
button:hover{background:#1c1c1c}

.card{background:#111;margin:10px;padding:10px;border-radius:10px;border:1px solid #222}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:10px}
.box{background:#111;border:1px solid #222;padding:10px;border-radius:8px;text-align:center}
.small{font-size:11px;color:#888}
.section{margin:10px;padding:10px;background:#0d0d0d;border:1px solid #222;border-radius:10px}
.queue{background:#0a0a0a;border:1px solid #333;padding:10px;margin:10px;border-radius:10px}
</style>
</head>

<body>

<header>
<input id="search" placeholder="Search records (full index)">
</header>

<div class="grid" id="stats"></div>

<div class="section">
<h3>🧠 NEXT ACTION (AUTO ENGINE)</h3>
<div id="next"></div>
</div>

<div class="section">
<h3>📸 OCR</h3>
<input type="file" id="ocr">
<button onclick="ocr()">Process OCR</button>
</div>

<div class="section">
<button onclick="add()">+ ADD</button>
<button onclick="exportDB()">EXPORT</button>
<button onclick="recover()">RECOVER SAFE STATE</button>
</div>

<div id="list"></div>

<script>

////////////////////////////////////////////////////
// BULLETPROOF CORE DB ENGINE (WAL + SNAPSHOT)
////////////////////////////////////////////////////

const KEY_DB = "vault_db_v3";
const KEY_WAL = "vault_wal_v3";
const KEY_SNAP = "vault_snap_v3";

let DB = [];
let WAL = loadWAL();
let saveQueue = false;

function now(){ return Date.now(); }

function uid(){
return now() + Math.random().toString(16).slice(2);
}

////////////////////////////////////////////////////
// LOAD + REBUILD (CRASH SAFE)
////////////////////////////////////////////////////
function loadWAL(){
try{
return JSON.parse(localStorage.getItem(KEY_WAL)||"[]");
}catch(e){return []}
}

function load(){
try{

let snap = localStorage.getItem(KEY_SNAP);
if(snap){
DB = JSON.parse(snap);
}

for(let op of WAL){
apply(op,true);
}

}catch(e){
DB=[];
}
}

////////////////////////////////////////////////////
// WRITE AHEAD LOG (NO LOSS GUARANTEE)
////////////////////////////////////////////////////
function log(op){
WAL.push(op);
localStorage.setItem(KEY_WAL,JSON.stringify(WAL));
}

function commitSnapshot(){
localStorage.setItem(KEY_SNAP,JSON.stringify(DB));
WAL=[];
localStorage.setItem(KEY_WAL,"[]");
}

////////////////////////////////////////////////////
// SAFE APPLY OPS
////////////////////////////////////////////////////
function apply(op,skipLog){

switch(op.type){

case "ADD":
DB.unshift(op.data);
break;

case "UPDATE":
let r=DB.find(x=>x.ID===op.id);
if(r){
r[op.key]=op.value;
r.UpdatedAt=now();
}
break;

case "DELETE":
DB=DB.filter(x=>x.ID!==op.id);
break;

case "STATUS":
let s=DB.find(x=>x.ID===op.id);
if(s){
s.Status=op.value;
s.UpdatedAt=now();
}
break;

}

if(!skipLog) save();
}

////////////////////////////////////////////////////
// SAVE PIPELINE (DEBOUNCED + SAFE)
////////////////////////////////////////////////////
function save(){
if(saveQueue) return;
saveQueue=true;

setTimeout(()=>{
commitSnapshot();
saveQueue=false;
render();
},300);
}

////////////////////////////////////////////////////
// INIT
////////////////////////////////////////////////////
load();

////////////////////////////////////////////////////
// SEARCH
////////////////////////////////////////////////////
let search="";
document.getElementById("search").addEventListener("input",e=>{
search=e.target.value.toLowerCase();
render();
});

////////////////////////////////////////////////////
// OPS ENGINE (WHO NEXT)
////////////////////////////////////////////////////
function nextCandidate(){

let pool = DB.filter(x=>x.Status==="PENDING"||x.Status==="RTS");
if(pool.length===0) return null;

pool.sort((a,b)=>
(priorityScore(b)-priorityScore(a))
);

return pool[0];
}

function priorityScore(r){
let age = now()-(r.UpdatedAt||0);
let base = r.Status==="RTS"?100:50;
return base + age/100000;
}

////////////////////////////////////////////////////
// OPS STATS
////////////////////////////////////////////////////
function stats(){
return {
total:DB.length,
pending:DB.filter(x=>x.Status==="PENDING").length,
sent:DB.filter(x=>x.Status==="SENT").length,
success:DB.filter(x=>x.Status==="SUCCESS").length,
rts:DB.filter(x=>x.Status==="RTS").length
};
}

////////////////////////////////////////////////////
// ACTIONS (ALL LOGGED)
////////////////////////////////////////////////////
function add(){
let r={
ID:uid(),
Name:"New Record",
Address:"",
Status:"PENDING",
CreatedAt:now(),
UpdatedAt:now(),
History:[]
};

log({type:"ADD",data:r});
apply({type:"ADD",data:r});
}

function update(id,key,value){
log({type:"UPDATE",id,key,value});
apply({type:"UPDATE",id,key,value});
}

function setStatus(id,value){
log({type:"STATUS",id,value});
apply({type:"STATUS",id,value});
}

function remove(id){
log({type:"DELETE",id});
apply({type:"DELETE",id});
}

////////////////////////////////////////////////////
// OCR
////////////////////////////////////////////////////
async function ocr(){
let f=document.getElementById("ocr").files[0];
if(!f) return alert("No file");

let res=await Tesseract.recognize(f,"eng");
let text=res.data.text||"";

let r={
ID:uid(),
Name:text.split("\n")[0]||"OCR",
Address:text,
Status:"PENDING",
CreatedAt:now(),
UpdatedAt:now(),
History:[]
};

log({type:"ADD",data:r});
apply({type:"ADD",data:r});
}

////////////////////////////////////////////////////
// RECOVERY
////////////////////////////////////////////////////
function recover(){
WAL = [];
localStorage.setItem(KEY_WAL,"[]");
commitSnapshot();
alert("Recovered clean snapshot state");
render();
}

////////////////////////////////////////////////////
// EXPORT
////////////////////////////////////////////////////
function exportDB(){
let b=new Blob([JSON.stringify(DB)],{type:"application/json"});
let a=document.createElement("a");
a.href=URL.createObjectURL(b);
a.download="vault_bulletproof.json";
a.click();
}

////////////////////////////////////////////////////
// RENDER
////////////////////////////////////////////////////
function render(){

let s=stats();

document.getElementById("stats").innerHTML=`
<div class="box">TOTAL<br>${s.total}</div>
<div class="box">PENDING<br>${s.pending}</div>
<div class="box">SENT<br>${s.sent}</div>
<div class="box">SIGNED<br>${s.success}</div>
<div class="box">RTS<br>${s.rts}</div>
`;

let next=nextCandidate();
document.getElementById("next").innerHTML=
next?
`<div class="queue">
<b>${next.Name}</b><br><br>
<button onclick="setStatus('${next.ID}','SENT')">Mark SENT</button>
</div>`
:
"Nothing pending";

let root=document.getElementById("list");
root.innerHTML="";

let view=DB.filter(r=>
JSON.stringify(r).toLowerCase().includes(search)
);

for(let r of view){

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<input value="${r.Name}" onchange="update('${r.ID}','Name',this.value)">
<textarea onchange="update('${r.ID}','Address',this.value)">${r.Address||""}</textarea>

<select onchange="setStatus('${r.ID}',this.value)">
<option ${r.Status==="PENDING"?"selected":""}>PENDING</option>
<option ${r.Status==="SENT"?"selected":""}>SENT</option>
<option ${r.Status==="SUCCESS"?"selected":""}>SUCCESS</option>
<option ${r.Status==="RTS"?"selected":""}>RTS</option>
</select>

<button onclick="remove('${r.ID}')">DELETE</button>

<div class="small">ID: ${r.ID}</div>
`;

root.appendChild(div);
}

}

render();

</script>

</body>
</html>
