


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VaultOS ULTIMATE ENGINE</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: #fff;
}

header {
    position: sticky;
    top: 0;
    background: #111;
    padding: 12px;
    border-bottom: 1px solid #222;
}

h1 {
    margin: 0;
    color: #00ffcc;
    font-size: 18px;
}

.container {
    display: grid;
    grid-template-columns: 280px 1fr;
    height: calc(100vh - 50px);
}

.sidebar {
    background: #0f0f0f;
    border-right: 1px solid #222;
    padding: 10px;
}

.main {
    padding: 10px;
    overflow-y: auto;
}

.card {
    background: #111;
    border: 1px solid #222;
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 10px;
}

button {
    width: 100%;
    padding: 8px;
    margin: 4px 0;
    background: #00ffcc;
    border: none;
    border-radius: 5px;
    font-weight: bold;
    cursor: pointer;
}

button:hover { background: #00ddb3; }

button.danger { background: #ff4d4d; color: white; }

.record {
    border: 1px solid #222;
    padding: 8px;
    margin: 6px 0;
    border-radius: 6px;
    background: #0d0d0d;
}

.small { font-size: 12px; opacity: 0.7; }

input {
    width: 100%;
    padding: 6px;
    background: #000;
    border: 1px solid #333;
    color: #fff;
    border-radius: 5px;
}
</style>
</head>

<body>

<header>
    <h1>VaultOS ULTIMATE ENGINE (FIXED IMPORTS)</h1>
</header>

<div class="container">

<div class="sidebar">

    <div class="card">
        <button onclick="setMode('records')">Records</button>
        <button onclick="setMode('timeline')">Timeline</button>
        <button onclick="setMode('backups')">Backups</button>
        <button onclick="setMode('settings')">Settings</button>
    </div>

    <div class="card">
        <input id="search" placeholder="Search..." oninput="render()">
    </div>

    <div class="card">
        <button onclick="addRecord()">+ Add Record</button>
        <button onclick="createSnapshot()">Snapshot</button>
        <button onclick="exportVault()">Export</button>
        <button onclick="document.getElementById('importFile').click()">Import</button>
        <input type="file" id="importFile" accept="application/json">
    </div>

</div>

<div class="main">
    <div id="view"></div>
</div>

</div>

<script>

let mode = "records";

// =========================
// LOAD VAULT
// =========================
function getVault() {
    return JSON.parse(localStorage.getItem("vaultos_ultimate") || "{}");
}

function saveVault(v) {
    localStorage.setItem("vaultos_ultimate", JSON.stringify(v));
    render();
}

// =========================
// LEGACY COMPATIBILITY ENGINE (KEY FIX)
// =========================
function normalizeVault(input) {

    let v = input;

    // unwrap all known formats
    if (v.vaultos_ultimate) v = v.vaultos_ultimate;
    if (v.vaultos_elite) v = v.vaultos_elite;
    if (v.vaultos) v = v.vaultos;
    if (v.data) v = v.data;

    // old format: array only
    if (Array.isArray(v)) v = { records: v };

    return {
        version: v.version || "ULTIMATE-FIXED",
        created: v.created || new Date().toISOString(),

        records: Array.isArray(v.records) ? v.records : [],
        snapshots: Array.isArray(v.snapshots) ? v.snapshots : [],

        slots: v.slots || { A:null, B:null, C:null, D:null }
    };
}

// =========================
// INIT
// =========================
if (!localStorage.getItem("vaultos_ultimate")) {
    saveVault(normalizeVault({
        records: [
            {
                id: 1,
                title: "System Boot",
                content: "VaultOS initialized",
                created: new Date().toISOString()
            }
        ]
    }));
}

// =========================
// MODE
// =========================
function setMode(m) {
    mode = m;
    render();
}

// =========================
// RECORDS
// =========================
function addRecord() {
    const title = prompt("Title:");
    if (!title) return;

    const content = prompt("Content:");
    if (!content) return;

    const v = getVault();

    v.records.push({
        id: Date.now(),
        title,
        content,
        created: new Date().toISOString()
    });

    saveVault(v);
}

function deleteRecord(id) {
    const v = getVault();
    v.records = v.records.filter(r => r.id !== id);
    saveVault(v);
}

function editRecord(id) {
    const v = getVault();
    const r = v.records.find(x => x.id === id);
    if (!r) return;

    const newVal = prompt("Edit:", r.content);
    if (newVal !== null) r.content = newVal;

    saveVault(v);
}

// =========================
// SNAPSHOTS
// =========================
function createSnapshot() {
    const v = getVault();

    v.snapshots.push({
        time: new Date().toISOString(),
        state: JSON.parse(JSON.stringify(v.records))
    });

    saveVault(v);
}

function restoreSnapshot(i) {
    const v = getVault();
    if (!v.snapshots[i]) return;

    v.records = JSON.parse(JSON.stringify(v.snapshots[i].state));
    saveVault(v);
}

// =========================
// EXPORT
// =========================
function exportVault() {
    const data = localStorage.getItem("vaultos_ultimate") || "{}";

    const blob = new Blob([data], { type: "application/json" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "VaultOS-ULTIMATE.json";
    a.click();

    URL.revokeObjectURL(url);
}

// =========================
// IMPORT (FIXED + LEGACY SAFE)
// =========================
document.getElementById("importFile").addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(ev) {
        try {
            const parsed = JSON.parse(ev.target.result);

            const current = getVault();
            const incoming = normalizeVault(parsed);

            const replace = confirm("OK = Replace FULL vault / Cancel = Merge records");

            if (replace) {
                saveVault(incoming);
            } else {
                current.records = [
                    ...(current.records || []),
                    ...(incoming.records || [])
                ];
                saveVault(current);
            }

        } catch (err) {
            alert("Invalid VaultOS JSON file");
            console.error(err);
        }
    };

    reader.readAsText(file);
    e.target.value = "";
});

// =========================
// SEARCH
// =========================
function filtered() {
    const v = getVault();
    const q = document.getElementById("search").value.toLowerCase();

    if (!q) return v.records;

    return v.records.filter(r =>
        (r.title || "").toLowerCase().includes(q) ||
        (r.content || "").toLowerCase().includes(q)
    );
}

// =========================
// RENDER
// =========================
function render() {
    const v = getVault();
    const view = document.getElementById("view");

    if (mode === "records") {
        view.innerHTML = "<h3>Records</h3>";

        filtered().forEach(r => {
            view.innerHTML += `
                <div class="record">
                    <b>${r.title}</b><br>
                    <span class="small">${r.created}</span>
                    <p>${r.content}</p>
                    <button onclick="editRecord(${r.id})">Edit</button>
                    <button class="danger" onclick="deleteRecord(${r.id})">Delete</button>
                </div>
            `;
        });
    }

    if (mode === "timeline") {
        view.innerHTML = "<h3>Snapshots</h3>";

        v.snapshots.forEach((s, i) => {
            view.innerHTML += `
                <div class="record">
                    <b>Snapshot ${i}</b><br>
                    <span class="small">${s.time}</span>
                    <button onclick="restoreSnapshot(${i})">Restore</button>
                </div>
            `;
        });
    }

    if (mode === "backups") {
        view.innerHTML = "<h3>Backup System</h3><button onclick='exportVault()'>Export Vault</button>";
    }

    if (mode === "settings") {
        view.innerHTML = `
            <h3>Settings</h3>
            <pre>${JSON.stringify(v, null, 2)}</pre>
        `;
    }
}

render();

</script>

</body>
</html>
