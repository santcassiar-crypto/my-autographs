<style>

input,select{
width:100%;
padding:10px;
margin-top:5px;
background:#000;
color:#fff;
border:1px solid #333;
border-radius:6px;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:6px;
padding:10px;
}

.box{
background:#111;
padding:10px;
border-radius:8px;
text-align:center;
font-size:12px;
}

.list{padding:10px;}

.card{
background:#111;
border:1px solid #222;
padding:10px;
margin-bottom:8px;
border-radius:8px;
}

button{
background:#222;
border:1px solid #333;
color:#fff;
padding:6px;
font-size:11px;
border-radius:6px;
margin:4px;
}

.small{font-size:10px;color:#888;}
</style>
</head>

////////////////////////////////////////////////////
// ENGINE
////////////////////////////////////////////////////

let DB = JSON.parse(localStorage.getItem("vault_full")) || MASTER_DATA;

function save(){
    localStorage.setItem("vault_full", JSON.stringify(DB));
}

function render(){

    let q = document.getElementById("search").value.toLowerCase();
    let list = q ? DB.filter(x=>x.Name.toLowerCase().includes(q)) : DB;

    document.getElementById("list").innerHTML = "";

    list.forEach(r=>{

        let div = document.createElement("div");
        div.className="card";

        div.innerHTML=`
        <input value="${r.Name}" onchange="edit(${r.ID},this.value)">
        <select onchange="status(${r.ID},this.value)">
            <option ${r.Status=="SUCCESS"?"selected":""}>SUCCESS</option>
            <option ${r.Status=="PENDING"?"selected":""}>PENDING</option>
            <option ${r.Status=="RTS"?"selected":""}>RTS</option>
            <option ${r.Status=="Sent"?"selected":""}>Sent</option>
            <option ${r.Status=="LOGGED"?"selected":""}>LOGGED</option>
        </select>
        <div class="small">ID:${r.ID}</div>
        `;

        document.getElementById("list").appendChild(div);
    });

    stats();
}

function stats(){
    document.getElementById("t").innerText=DB.length;
    document.getElementById("s").innerText=DB.filter(x=>x.Status=="SUCCESS").length;
    document.getElementById("p").innerText=DB.filter(x=>x.Status=="PENDING").length;
    document.getElementById("r").innerText=DB.filter(x=>x.Status=="RTS").length;
}

function edit(id,val){
    let x=DB.find(i=>i.ID===id);
    if(x){x.Name=val;save();}
}

function status(id,val){
    let x=DB.find(i=>i.ID===id);
    if(x){x.Status=val;save();}
}

function add(){
    let n=prompt("Name:");
    if(!n)return;
    DB.unshift({ID:Date.now(),Name:n,Status:"PENDING"});
    save();render();
}

function reset(){
    DB=MASTER_DATA;
    save();
    render();
}

render();

</script>
