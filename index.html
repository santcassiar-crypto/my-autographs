





<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VaultOS ELITE Backup System</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: #ffffff;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 1000px;
    margin: auto;
}

header {
    padding: 15px;
    background: #111;
    border-bottom: 1px solid #222;
    position: sticky;
    top: 0;
}

h1 {
    color: #00ffcc;
    margin: 0;
}

.card {
    background: #111;
    border: 1px solid #222;
    border-radius: 8px;
    padding: 15px;
    margin-top: 15px;
}

button {
    background: #00ffcc;
    border: none;
    padding: 10px 15px;
    margin: 5px 5px 5px 0;
    cursor: pointer;
    font-weight: bold;
    border-radius: 5px;
}

button:hover {
    background: #00ddb3;
}

button.danger {
    background: #ff4d4d;
    color: #fff;
}

button.danger:hover {
    background: #e63b3b;
}

pre {
    background: #000;
    border: 1px solid #222;
    padding: 12px;
    overflow: auto;
    border-radius: 6px;
    max-height: 400px;
}

input[type="file"] {
    display: none;
}

.badge {
    display: inline-block;
    padding: 3px 8px;
    background: #00ffcc;
    color: #000;
    border-radius: 4px;
    font-size: 12px;
    margin-left: 10px;
}
</style>
</head>

<body>

<header>
    <h1>VaultOS ELITE Backup System <span class="badge">V5</span></h1>
</header>

<div class="container">

    <!-- ACTIONS -->
    <div class="card">
        <button onclick="exportVaultBackup()">Export Backup</button>
        <button onclick="document.getElementById('jsonImport').click()">Import Backup</button>
        <button class="danger" onclick="resetVault()">Reset Vault</button>

        <input type="file" id="jsonImport" accept="application/json">
    </div>

    <!-- STATUS -->
    <div class="card">
        <h3>Vault Data Preview</h3>
        <pre id="output"></pre>
    </div>

</div>

<script>
// =============================
// CORE STORAGE SYSTEM
// =============================
function getVaultData() {
    return JSON.parse(localStorage.getItem("vaultos_data") || "{}");
}

function setVaultData(data) {
    localStorage.setItem("vaultos_data", JSON.stringify(data));
    render();
}

// =============================
// EXPORT BACKUP
// =============================
function exportVaultBackup() {
    const data = localStorage.getItem("vaultos_data") || "{}";

    const blob = new Blob([data], { type: "application/json" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "VaultOS-backup.json";
    a.click();

    URL.revokeObjectURL(url);
}

// =============================
// IMPORT BACKUP
// =============================
document.getElementById("jsonImport").addEventListener("change", function (event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function (e) {
        try {
            const importedData = JSON.parse(e.target.result);

            if (!importedData || typeof importedData !== "object") {
                alert("Invalid backup file");
                return;
            }

            // Safety check (optional version guard)
            if (importedData.version && importedData.version !== "V5") {
                const confirmImport = confirm("Version mismatch detected. Continue import?");
                if (!confirmImport) return;
            }

            setVaultData(importedData);

            alert("VaultOS backup restored successfully");

        } catch (err) {
            alert("Import failed: invalid JSON file");
            console.error(err);
        }
    };

    reader.readAsText(file);
    event.target.value = "";
});

// =============================
// RESET VAULT
// =============================
function resetVault() {
    const confirmReset = confirm("Reset entire VaultOS data?");
    if (!confirmReset) return;

    localStorage.removeItem("vaultos_data");
    setVaultData({
        version: "V5",
        created: new Date().toISOString(),
        records: []
    });
}

// =============================
// INIT DEFAULT DATA
// =============================
if (!localStorage.getItem("vaultos_data")) {
    setVaultData({
        version: "V5",
        created: new Date().toISOString(),
        records: [
            {
                id: 1,
                type: "system",
                message: "VaultOS initialized"
            }
        ]
    });
}

// =============================
// RENDER VIEW
// =============================
function render() {
    document.getElementById("output").textContent =
        JSON.stringify(getVaultData(), null, 2);
}

render();

</script>

</body>
</html>
