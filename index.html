        .status-LOGGED { border-left: 4px solid #6b7280; }

        ];

        let savedData = JSON.parse(localStorage.getItem('vault_db'));
        let records = (savedData && savedData.length >= masterList.length) ? savedData : masterList;

        function render() {
            const query = document.getElementById('search').value.toLowerCase();
            const list = document.getElementById('list');
            list.innerHTML = '';
            const filtered = records.filter(r => r.Name.toLowerCase().includes(query));
            filtered.forEach(r => {
                const div = document.createElement('div');
                div.className = `bento-card p-4 flex justify-between items-center status-${r.Status}`;
                div.innerHTML = `<span class="text-xs font-bold w-1/2">${r.Name}</span>
                                 <select onchange="updateStatus(${r.ID}, this.value)" class="bg-black text-[9px] p-1 border border-zinc-700 uppercase">
                                 <option ${r.Status === 'SUCCESS' ? 'selected' : ''}>SUCCESS</option>
                                 <option ${r.Status === 'PENDING' ? 'selected' : ''}>PENDING</option>
                                 <option ${r.Status === 'Sent' ? 'selected' : ''}>Sent</option>
                                 <option ${r.Status === 'RTS' ? 'selected' : ''}>RTS</option>
                                 <option ${r.Status === 'LOGGED' ? 'selected' : ''}>LOGGED</option></select>`;
                list.appendChild(div);
            });
            document.getElementById('m-total').innerText = records.length;
            document.getElementById('m-success').innerText = records.filter(r => r.Status === 'SUCCESS').length;
            document.getElementById('m-pending').innerText = records.filter(r => r.Status === 'PENDING').length;
        }

        function updateStatus(id, newStatus) {
            records.find(r => r.ID === id).Status = newStatus;
            localStorage.setItem('vault_db', JSON.stringify(records));
            render();
        }

        function addNew() {
            const name = prompt("Enter Target Name:");
            if (name) {
                records.unshift({ID: Date.now(), Name: name, Status: "PENDING"});
                localStorage.setItem('vault_db', JSON.stringify(records));
                render();
            }
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(records)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "vault_backup_" + new Date().toISOString().slice(0,10) + ".json";
            a.click();
        }

        function importData(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                records = JSON.parse(e.target.result);
                localStorage.setItem('vault_db', JSON.stringify(records));
                render();
                alert("Vault Restored!");
            };
            reader.readAsText(file);
        }
        render();
