




<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TTM OS ELITE PRO AUTONOMOUS V3</title>
<style>
body{font-family:Arial;background:#151923;color:#fff;margin:0}
header{background:#1f2633;padding:12px;border-bottom:3px solid #4ea1ff}
.card{background:#232b3a;border:1px solid #3d4f6b;border-radius:10px;padding:12px;margin:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;padding:10px}
input,textarea,select,button{background:#2e3747;color:#fff;border:1px solid #4ea1ff;border-radius:6px;padding:8px}
textarea,#search{width:100%}
.record{padding:8px;border-bottom:1px solid #3d4f6b}
</style></head><body>

<header>
<h2>TTM OS ELITE PRO AUTONOMOUS V3</h2>
<input id="search" placeholder="Search records">
</header>

<div class="grid" id="stats"></div>

<div class="card">
<h3>JSON Import / Export</h3>
<input type="file" id="file">
<button onclick="importJSON()">Import JSON</button>
<button onclick="exportJSON()">Export JSON</button>
<button onclick="cleanupDatabase()">Clean Duplicates</button>
</div>

<div class="card">
<h3>Weekly Discovery Feed</h3>
<p>Name | Category | Score</p>
<textarea id="feedInput"></textarea><br>
<button onclick="importOpportunities()">Import Feed</button>
<button onclick="generateSendList()">Generate Weekly Queue</button>
<div id="feedCount"></div>
</div>

<div class="card"><h3>🎯 Discovery Queue (New Targets Only)</h3><div id="discovery"></div></div>
<div class="card"><h3>📅 7 Day Planner</h3><div id="planner"></div></div>
<div class="card"><h3>📬 Editable Records</h3><div id="list"></div></div>

<script>
const KEY="TTM_OS_V3";
let DB={records:[],opportunities:[],generated:[]};

function save(){localStorage.setItem(KEY,JSON.stringify(DB));}
function load(){let d=localStorage.getItem(KEY);if(d)DB=JSON.parse(d);render();}

function norm(v){
 return (v||"").toLowerCase().replace(/\([^)]*\)/g,"")
 .replace(/[^a-z0-9 ]/g,"").replace(/\s+/g," ").trim();
}

function importJSON(){
 let f=document.getElementById("file").files[0];
 if(!f)return;
 let r=new FileReader();
 r.onload=e=>{
   let data=JSON.parse(e.target.result);
   DB.records=(Array.isArray(data)?data:(data.records||[])).map(x=>({
      id:x.ID||x.id||Date.now()+Math.random(),
      name:x.Name||x.name||"",
      status:(x.Status||x.status||"PENDING").toUpperCase()
   }));
   save();render();
 };
 r.readAsText(f);
}

function exportJSON(){
 let a=document.createElement("a");
 a.href=URL.createObjectURL(new Blob([JSON.stringify(DB,null,2)],{type:"application/json"}));
 a.download="TTM_OS_Backup.json";a.click();
}

function updateName(id,v){let r=DB.records.find(x=>x.id==id);if(r){r.name=v;save();}}
function updateStatus(id,v){let r=DB.records.find(x=>x.id==id);if(r){r.status=v;save();render();}}
function deleteRecord(id){DB.records=DB.records.filter(x=>x.id!=id);save();render();}

function rank(s){return {SUCCESS:5,LOGGED:4,SENT:3,PENDING:2}[s]||1;}
function cleanupDatabase(){
 let best={};
 DB.records.forEach(r=>{
   let k=norm(r.name);
   if(!best[k]||rank(r.status)>rank(best[k].status)) best[k]=r;
 });
 DB.records=Object.values(best);
 save();render();
}

function importOpportunities(){
 let count=0;
 document.getElementById("feedInput").value.split("\n").forEach(line=>{
   if(!line.trim()) return;
   let p=line.split("|");
   DB.opportunities.push({
      name:(p[0]||"").trim(),
      category:(p[1]||"General").trim(),
      score:Number((p[2]||75).trim())
   });
   count++;
 });
 document.getElementById("feedCount").innerHTML=count+" opportunities imported";
 save();
}

function tracked(name){
 let t=norm(name);
 return DB.records.some(r=>{
   let e=norm(r.name);
   return e.includes(t)||t.includes(e);
 });
}

function generateSendList(){
 DB.generated=DB.opportunities
   .filter(o=>!tracked(o.name))
   .sort((a,b)=>b.score-a.score);
 save();render();
}

function render(){
 let pending=DB.records.filter(x=>x.status==="PENDING").length;
 let success=DB.records.filter(x=>x.status==="SUCCESS").length;

 stats.innerHTML=`<div class='card'><h2>${DB.records.length}</h2>Total</div>
 <div class='card'><h2>${pending}</h2>Pending</div>
 <div class='card'><h2>${success}</h2>Success</div>`;

 discovery.innerHTML=DB.generated.map((o,i)=>`
 <div class='record'><b>#${i+1} ${o.name}</b><br>${o.category} | Score ${o.score}</div>`).join("") || "Import feed and generate queue.";

 planner.innerHTML=DB.generated.slice(0,7).map((o,i)=>
 `<b>Day ${i+1}</b><br>${o.name}<hr>`).join("");

 let q=(search.value||"").toLowerCase();
 list.innerHTML=DB.records.filter(r=>r.name.toLowerCase().includes(q)).map(r=>`
 <div class='record'>
 <input value="${String(r.name).replace(/"/g,'&quot;')}" onchange="updateName('${r.id}',this.value)" style="width:300px">
 <select onchange="updateStatus('${r.id}',this.value)">
 <option ${r.status==='PENDING'?'selected':''}>PENDING</option>
 <option ${r.status==='SENT'?'selected':''}>SENT</option>
 <option ${r.status==='LOGGED'?'selected':''}>LOGGED</option>
 <option ${r.status==='SUCCESS'?'selected':''}>SUCCESS</option>
 <option ${r.status==='RTS'?'selected':''}>RTS</option>
 </select>
 <button onclick="deleteRecord('${r.id}')">Delete</button>
 </div>`).join("");
}
document.addEventListener("input",e=>{if(e.target.id==="search")render();});
load();
</script>
</body></html>
