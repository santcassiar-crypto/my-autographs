<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VaultOS SR10 | Collector Edition</title>
<style>
    :root { --bg:#0f172a; --panel:#1e293b; --panel2:#334155; --text:#f8fafc; --accent:#38bdf8; --border:#475569; }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; display: flex; min-height: 100vh; }
    aside { width: 270px; background: #020617; padding: 20px; border-right: 1px solid var(--border); }
    main { flex: 1; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
    .stat { background: var(--panel2); padding: 20px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
    .stat b { font-size: 32px; color: var(--accent); display: block; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 20px; }
    input, select, button { background: var(--panel2); color: white; border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin: 4px; }
    button { cursor: pointer; font-weight: bold; }
    table { width: 100%; border-collapse: collapse; }
    td, th { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; }
</style>
</head>
<body>
<aside>
    <h2>VaultOS SR10</h2>
    <button onclick="view('dash')" style="width:100%">Dashboard</button>
    <button onclick="view('targets')" style="width:100%">Collection</button>
</aside>

<main>
    <section id="dash">
        <h2>Dashboard</h2>
        <div class="grid">
            <div class="stat">Total<b id="total">0</b></div>
            <div class="stat">Pending<b id="pending">0</b></div>
            <div class="stat">Success<b id="success">0</b></div>
            <div class="stat">RTS<b id="rts">0</b></div>
            <div class="stat">Award Circuit<b id="award">0</b></div>
        </div>
    </section>

    <section id="targets" style="display:none">
        <div class="card">
            <h2>Manage Collection</h2>
            <input id="name" placeholder="Name">
            <select id="status">
                <option>Pending</option><option>Research</option><option>Sent</option>
                <option>Success</option><option>RTS</option><option>AWARD CIRCUIT – NON-ROUTING</option>
            </select>
            <button onclick="add()">Save New</button>
            <button onclick="exportJSON()">Export</button>
            <input type="file" id="f" style="display:none">
            <button onclick="document.getElementById('f').click()">Import</button>
        </div>
        <div class="card">
            <table>
                <thead><tr><th>Name</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody id="list"></tbody>
            </table>
        </div>
    </section>
</main>

<script>
    let vault = JSON.parse(localStorage.getItem("VaultOS_SR10")) || {records:[]};
    let $ = x => document.getElementById(x);

    // Event listener attached explicitly
    $("f").addEventListener("change", function(e) {
        let file = e.target.files[0];
        if (!file) return;
        let reader = new FileReader();
        reader.onload = function(e) {
            try {
                let data = JSON.parse(e.target.result);
                vault.records = data.records || data;
                saveAndSync();
                alert("Data imported successfully!");
            } catch (err) {
                alert("Error importing file: " + err);
            }
        };
        reader.readAsText(file);
        e.target.value = ''; // Reset input to allow selecting same file again
    });

    function view(id) {
        document.querySelectorAll("main section").forEach(s => s.style.display="none");
        $(id).style.display="block";
    }

    function render() {
        $("list").innerHTML = vault.records.map((x,i) => `
            <tr>
                <td><input value="${x.Name}" onchange="update(${i}, 'Name', this.value)"></td>
                <td>
                    <select onchange="update(${i}, 'Status', this.value)">
                        ${['Pending','Research','Sent','Success','RTS','AWARD CIRCUIT – NON-ROUTING'].map(s => 
                            `<option value="${s}" ${x.Status==s?'selected':''}>${s}</option>`).join('')}
                    </select>
                </td>
                <td><button onclick="del(${i})">X</button></td>
            </tr>`).join("");
        
        $("total").textContent = vault.records.length;
        $("pending").textContent = vault.records.filter(x => x.Status === "Pending").length;
        $("success").textContent = vault.records.filter(x => x.Status === "Success").length;
        $("rts").textContent = vault.records.filter(x => x.Status === "RTS").length;
        $("award").textContent = vault.records.filter(x => x.Status === "AWARD CIRCUIT – NON-ROUTING").length;
    }

    function update(i, field, value) {
        vault.records[i][field] = value;
        saveAndSync();
    }

    function add() {
        if(!$("name").value) return;
        vault.records.push({ Name:$("name").value, Status:$("status").value });
        $("name").value = "";
        saveAndSync();
    }

    function del(i) { vault.records.splice(i,1); saveAndSync(); }

    function saveAndSync() {
        localStorage.setItem("VaultOS_SR10", JSON.stringify(vault));
        render();
    }

    function exportJSON() {
        let a = document.createElement("a");
        a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(vault));
        a.download = "VaultOS_Backup.json";
        a.click();
    }

    render();
</script>
</body>
</html>
