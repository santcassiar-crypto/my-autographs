<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VaultOS - Stable Ops Engine</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial}
header{position:sticky;top:0;background:#111;padding:10px;border-bottom:1px solid #222}

input,select,textarea,button{
width:100%;padding:10px;margin-top:6px;
background:#000;color:#fff;border:1px solid #333;border-radius:8px
}

button{cursor:pointer;background:#111}
button:hover{background:#1b1b1b}

.card{background:#111;margin:10px;padding:10px;border-radius:10px;border:1px solid #222}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:10px}
.box{background:#111;border:1px solid #222;padding:10px;border-radius:8px;text-align:center}
.small{font-size:11px;color:#888}

.section{margin:10px;padding:10px;background:#0d0d0d;border:1px solid #222;border-radius:10px}

.queue{background:#0a0a0a;border:1px solid #333;padding:10px;margin:10px;border-radius:10px}
</style>
</head>

<body>

<header>
<input id="search" placeholder="Search name, address, status, OCR...">
</header>

<div class="grid" id="stats"></div>

<div class="section">
<h3>🧠 NEXT TO SEND</h3>
<div id="next"></div>
</div>

<div class="section">
<h3>📦 SENT OUTBOX</h3>
<div id="outbox"></div>
</div>

<div class="section">
<h3>📸 OCR IMPORT</h3>
<input type="file" id="ocr">
<button onclick="runOCR()">Process OCR</button>
</div>

<div class="section">
<button onclick="add()">+ ADD</button>
<button onclick="exportDB()">EXPORT</button>
<button onclick="recover()">RECOVER</button>
</div>

<div id="list"></div>

<script>

////////////////////////////////////////////////////
// STORAGE ENGINE (SAFE SNAPSHOT + WAL)
////////////////////////////////////////////////////
const SNAP="vault_snap_v4";
const WALKEY="vault_wal_v4";

let DB=[];
let WAL=JSON.parse(localStorage.getItem(WALKEY)||"[]");

function uid(){
return Date.now()+"_"+Math.random().toString(16).slice(2);
}

function saveSnapshot(){
localStorage.setItem(SNAP,JSON.stringify(DB));
localStorage.setItem(WALKEY,"[]");
WAL=[];
}

function log(op){
WAL.push(op);
localStorage.setItem(WALKEY,JSON.stringify(WAL));
}

function load(){
try{
let snap=localStorage.getItem(SNAP);
if(snap) DB=JSON.parse(snap);
}catch(e){DB=[]}
}

function recover(){
saveSnapshot();
alert("Recovered clean snapshot");
render();
}

load();

////////////////////////////////////////////////////
// SEARCH (FIXED)
////////////////////////////////////////////////////
let search="";
document.getElementById("search").addEventListener("input",e=>{
search=e.target.value.toLowerCase().trim();
render();
});

function match(r,q){
if(!q) return true;

const text=[
r.ID,
r.Name,
r.Address,
r.Status,
r.RawOCR
].join(" ").toLowerCase();

return text.includes(q);
}

////////////////////////////////////////////////////
// OPS ENGINE
////////////////////////////////////////////////////
function nextCandidate(){
let pool=DB.filter(x=>x.Status==="PENDING"||x.Status==="RTS");
if(pool.length===0) return null;

pool.sort((a,b)=>{
return score(b)-score(a);
});

return pool[0];
}

function score(r){
let age=Date.now()-(r.UpdatedAt||0);
return (r.Status==="RTS"?100:50)+age/100000;
}

////////////////////////////////////////////////////
// CRUD
////////////////////////////////////////////////////
function add(){
let r={
ID:uid(),
Name:"New Record",
Address:"",
Status:"PENDING",
CreatedAt:Date.now(),
UpdatedAt:Date.now()
};

log({type:"ADD",data:r});
DB.unshift(r);
render();
}

function update(id,key,val){
let r=DB.find(x=>x.ID===id);
if(!r) return;

r[key]=val;
r.UpdatedAt=Date.now();

log({type:"UPDATE",id,key,val});
render();
}

function setStatus(id,val){
let r=DB.find(x=>x.ID===id);
if(!r) return;

r.Status=val;
r.UpdatedAt=Date.now();

log({type:"STATUS",id,val});
render();
}

function del(id){
DB=DB.filter(x=>x.ID!==id);
log({type:"DELETE",id});
render();
}

////////////////////////////////////////////////////
// OCR
////////////////////////////////////////////////////
async function runOCR(){
let f=document.getElementById("ocr").files[0];
if(!f) return alert("No file");

let res=await Tesseract.recognize(f,"eng");
let text=res.data.text||"";

let r={
ID:uid(),
Name:text.split("\n")[0]||"OCR",
Address:text,
Status:"PENDING",
RawOCR:text,
CreatedAt:Date.now(),
UpdatedAt:Date.now()
};

DB.unshift(r);
log({type:"ADD",data:r});
render();
}

////////////////////////////////////////////////////
// OUTBOX
////////////////////////////////////////////////////
function renderOutbox(){
let sent=DB.filter(x=>x.Status==="SENT"||x.Status==="SUCCESS");

document.getElementById("outbox").innerHTML=
sent.map(r=>`
<div class="card">
<b>${r.Name}</b><br>
<span>${r.Status}</span><br>
<div class="small">${r.Address||""}</div>
</div>
`).join("") || "No sends yet";
}

////////////////////////////////////////////////////
// STATS
////////////////////////////////////////////////////
function stats(){
return {
total:DB.length,
pending:DB.filter(x=>x.Status==="PENDING").length,
sent:DB.filter(x=>x.Status==="SENT").length,
success:DB.filter(x=>x.Status==="SUCCESS").length,
rts:DB.filter(x=>x.Status==="RTS").length
};
}

function renderStats(){
let s=stats();

document.getElementById("stats").innerHTML=`
<div class="box">TOTAL<br>${s.total}</div>
<div class="box">PENDING<br>${s.pending}</div>
<div class="box">SENT<br>${s.sent}</div>
<div class="box">SIGNED<br>${s.success}</div>
<div class="box">RTS<br>${s.rts}</div>
`;
}

////////////////////////////////////////////////////
// RENDER
////////////////////////////////////////////////////
function render(){

renderStats();
renderOutbox();

let next=nextCandidate();

document.getElementById("next").innerHTML=
next?
`<div class="queue">
<b>${next.Name}</b><br><br>
<button onclick="setStatus('${next.ID}','SENT')">Mark SENT</button>
</div>`
:"Nothing pending";

let root=document.getElementById("list");
root.innerHTML="";

let view=DB.filter(r=>match(r,search));

for(let r of view){

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<input value="${r.Name}" onchange="update('${r.ID}','Name',this.value)">
<textarea onchange="update('${r.ID}','Address',this.value)">${r.Address||""}</textarea>

<select onchange="setStatus('${r.ID}',this.value)">
<option ${r.Status==="PENDING"?"selected":""}>PENDING</option>
<option ${r.Status==="SENT"?"selected":""}>SENT</option>
<option ${r.Status==="SUCCESS"?"selected":""}>SUCCESS</option>
<option ${r.Status==="RTS"?"selected":""}>RTS</option>
</select>

<button onclick="del('${r.ID}')">DELETE</button>

<div class="small">ID: ${r.ID}</div>
`;

root.appendChild(div);
}

saveSnapshot();
}

////////////////////////////////////////////////////
// EXPORT
////////////////////////////////////////////////////
function exportDB(){
let b=new Blob([JSON.stringify(DB)],{type:"application/json"});
let a=document.createElement("a");
a.href=URL.createObjectURL(b);
a.download="vault_export.json";
a.click();
}

render();

</script>

</body>
</html>
