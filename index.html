<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VaultOS SR10 Collector Edition</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root{--bg:#0f172a;--panel:#1e293b;--panel2:#334155;--border:#475569;--text:#f8fafc;--accent:#38bdf8}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Arial;display:flex;min-height:100vh}
aside{width:270px;background:#020617;padding:20px;border-right:1px solid var(--border)}
main{flex:1;padding:20px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:18px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.stat{background:var(--panel2);padding:18px;border-radius:12px}
.stat b{font-size:28px;color:var(--accent)}
input,select,textarea,button{background:var(--panel2);color:white;border:1px solid var(--border);border-radius:8px;padding:10px;margin:4px}
button{cursor:pointer}
table{width:100%;border-collapse:collapse}
td,th{padding:10px;border-bottom:1px solid var(--border);text-align:left}
textarea{width:100%}
@media(max-width:800px){body{display:block}aside{width:100%}}
</style>
</head>
<body>
<aside>
<h2>VaultOS SR10</h2>
<p>Collector Command Centre</p>
<button onclick="view('dash')">Dashboard</button>
<button onclick="view('targets')">Targets</button>
<textarea id="notes" placeholder="Collector notes"></textarea>
</aside>

<section id="targets" style="display:none">
<div class="card">
<h2>Add Target</h2>
<input id="name" placeholder="Name">
<select id="status">
<option>Pending</option><option>Research</option><option>Sent</option>
<option>Success</option><option>RTS</option><option>AWARD CIRCUIT – NON-ROUTING</option>
</select>
<button onclick="add()">Save Target</button>
<button onclick="exportJSON()">Export JSON</button>
<input type="file" id="fileInput" onchange="importJSON(event)">
</div>
<div class="card">
<table>
<thead><tr><th>Name</th><th>Status</th><th></th></tr></thead>
<tbody id="list"></tbody>
</table>
</div>
</section>

<main>
<section id="dash">
<div class="card">
<h2>Dashboard</h2>
<div class="grid">
<div class="stat">Total<br><b id="total">0</b></div>
<div class="stat">Pending<br><b id="pending">0</b></div>
<div class="stat">Success<br><b id="success">0</b></div>
<div class="stat">RTS<br><b id="rts">0</b></div>
<div class="stat">Award Circuit<br><b id="award">0</b></div>
</div>
</div>
</section>
</main>

<script>
let vault = {records:[]};
let $ = x => document.getElementById(x);

function updateDashboard() {
    $("total").textContent = vault.records.length;
    $("pending").textContent = vault.records.filter(x => x.Status == "Pending").length;
    $("success").textContent = vault.records.filter(x => x.Status == "Success").length;
    $("rts").textContent = vault.records.filter(x => x.Status == "RTS").length;
    $("award").textContent = vault.records.filter(x => x.Status == "AWARD CIRCUIT – NON-ROUTING").length;
}

function renderList() {
    $("list").innerHTML = vault.records.map((x,i) => `
        <tr><td>${x.Name}</td><td>${x.Status}</td><td><button onclick="del(${i})">X</button></td></tr>`).join("");
}

function add() {
    if(!$("name").value) return;
    vault.records.push({Name:$("name").value, Status:$("status").value});
    $("name").value = "";
    refresh();
}

function del(i) { vault.records.splice(i,1); refresh(); }

function refresh() {
    renderList();
    updateDashboard();
}

function exportJSON() {
    let a = document.createElement("a");
    a.href = "data:text/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(vault));
    a.download = "VaultOS_SR10_Backup.json";
    a.click();
}

function importJSON(e) {
    let r = new FileReader();
    r.onload = () => { vault = JSON.parse(r.result); refresh(); };
    r.readAsText(e.target.files[0]);
}

function view(id) {
    document.querySelectorAll("section").forEach(s => s.style.display="none");
    if(id == 'dash') $("dash").parentElement.style.display = "block";
    else $(id).style.display = "block";
}

refresh();
</script>
</body>
</html>
