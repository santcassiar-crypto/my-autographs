function score(r){
let s=0;
if(r.Status==="PENDING") s+=12;
if(r.Status==="LOGGED") s+=3;

if(r.Status==="SUCCESS") return -999;

let n=(r.Name||"").toLowerCase();
if(n.includes("football")||n.includes("arsenal")) s+=3;
if(n.includes("film")||n.includes("cast")) s+=2;
return s;
}

function returnP(r){
let base=60;
if(r.Status==="RTS") base-=30;

if(n.includes("football")) base+=10;
if(n.includes("arsenal")) base+=8;
return Math.max(0,Math.min(100,base));
}
