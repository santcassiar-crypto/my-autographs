<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VaultOS SR7 - Professional</title>
    <style>
        :root { --bg: #0f172a; --sidebar: #1e293b; --text: #f1f5f9; --accent: #3b82f6; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; }
        aside { width: 280px; background: var(--sidebar); height: 100vh; padding: 20px; }
        main { flex: 1; padding: 40px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        input, button { background: #334155; color: white; border: 1px solid #475569; padding: 10px; border-radius: 6px; }
        button { cursor: pointer; }
        #errorLog { color: #ef4444; font-size: 0.8rem; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 12px; border-bottom: 1px solid #334155; text-align: left; }
    </style>
</head>
<body>

<aside>
    <h2>VaultOS SR7</h2>
    <div id="stats"></div>
    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #334155;">
    <h3>Scrapbook</h3>
    <textarea id="scratchpad" style="width:100%; height:200px; background:#0f172a; color:#fff;" oninput="saveData()"></textarea>
</aside>

<main>
    <div class="card">
        <input id="name" placeholder="Target Name...">
        <button onclick="addTarget()">Add Target</button>
        <button onclick="exportData()" style="background:#059669;">Export JSON</button>
        <button onclick="document.getElementById('importFile').click()" style="background:#dc2626;">Import JSON</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
        <div id="errorLog"></div>
    </div>

    <div class="card">
        <table>
            <thead><tr><th>Target Name</th><th>Actions</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</main>

<script>
    let vault = JSON.parse(localStorage.getItem('vaultData')) || { items: [], notes: "" };
    document.getElementById('scratchpad').value = vault.notes;

    function render() {
        document.getElementById('tableBody').innerHTML = vault.items.map((x, i) => `
            <tr>
                <td>${x.name}</td>
                <td><button onclick="del(${i})" style="background:#7f1d1d;">Delete</button></td>
            </tr>`).join("");
        document.getElementById('stats').innerText = "Total Targets: " + vault.items.length;
    }

    function addTarget() {
        const name = document.getElementById('name').value;
        if (!name) return;
        vault.items.push({ name });
        saveData();
        render();
        document.getElementById('name').value = "";
    }

    function saveData() {
        vault.notes = document.getElementById('scratchpad').value;
        localStorage.setItem('vaultData', JSON.stringify(vault));
    }

    function del(i) { vault.items.splice(i, 1); saveData(); render(); }

    function exportData() {
        const blob = new Blob([JSON.stringify(vault)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'vault.json'; a.click();
    }

    function importData(event) {
        const errLog = document.getElementById('errorLog');
        errLog.innerText = ""; 
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const parsed = JSON.parse(e.target.result);
                // Basic structural check
                if (!parsed.items) throw new Error("File missing 'items' array.");
                vault = parsed;
                document.getElementById('scratchpad').value = vault.notes || "";
                localStorage.setItem('vaultData', JSON.stringify(vault));
                render();
            } catch (err) {
                errLog.innerText = "Import Error: " + err.message;
            }
        };
        reader.readAsText(file);
    }
    
    render();
</script>
</body>
</html>
