


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VaultOS TRUE DATABASE CORE</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: #fff;
}

header {
    position: sticky;
    top: 0;
    background: #111;
    padding: 12px;
    border-bottom: 1px solid #222;
}

h1 {
    margin: 0;
    color: #00ffcc;
    font-size: 18px;
}

.container {
    display: grid;
    grid-template-columns: 280px 1fr;
    height: calc(100vh - 50px);
}

.sidebar {
    background: #0f0f0f;
    border-right: 1px solid #222;
    padding: 10px;
}

.main {
    padding: 10px;
    overflow-y: auto;
}

.card {
    background: #111;
    border: 1px solid #222;
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 10px;
}

button {
    width: 100%;
    padding: 8px;
    margin: 4px 0;
    background: #00ffcc;
    border: none;
    border-radius: 5px;
    font-weight: bold;
    cursor: pointer;
}

button:hover { background: #00ddb3; }

.record {
    border: 1px solid #222;
    padding: 8px;
    margin: 6px 0;
    border-radius: 6px;
    background: #0d0d0d;
}

input {
    width: 100%;
    padding: 6px;
    background: #000;
    border: 1px solid #333;
    color: #fff;
    border-radius: 5px;
}

.small { font-size: 12px; opacity: 0.7; }
</style>
</head>

<body>

<header>
    <h1>VaultOS TRUE DATABASE CORE</h1>
</header>

<div class="container">

<div class="sidebar">

    <div class="card">
        <button onclick="addRecord()">+ Add Record</button>
        <button onclick="exportDB()">Export</button>
        <button onclick="document.getElementById('importFile').click()">Import</button>
        <input type="file" id="importFile" accept="application/json">
    </div>

    <div class="card">
        <input id="search" placeholder="Search..." oninput="render()">
    </div>

</div>

<div class="main">
    <div id="view"></div>
</div>

</div>

<script>

// =========================
// DATABASE CORE
// =========================
let DB = {
    records: []
};

// =========================
// LOAD
// =========================
function loadDB() {
    const raw = localStorage.getItem("vaultos_true");
    if (!raw) return;

    try {
        const parsed = JSON.parse(raw);
        DB.records = Array.isArray(parsed.records)
            ? parsed.records
            : Array.isArray(parsed)
            ? parsed
            : [];
    } catch {}
}

// =========================
// SAVE
// =========================
function saveDB() {
    localStorage.setItem("vaultos_true", JSON.stringify(DB));
}

// =========================
// 🔥 UNIVERSAL NORMALISER (KEY FIX)
// =========================
function safeRecord(r) {

    if (!r || typeof r !== "object") {
        return {
            id: Date.now(),
            title: "Untitled",
            content: String(r || ""),
            created: "unknown"
        };
    }

    return {
        id: r.id || Date.now(),
        title: r.title || r.name || r.text || "Untitled",
        content: r.content || r.value || r.text || "",
        created: r.created || r.time || "unknown"
    };
}

// =========================
// ADD
// =========================
function addRecord() {
    const title = prompt("Title:");
    if (!title) return;

    const content = prompt("Content:");
    if (!content) return;

    DB.records.push({
        id: Date.now(),
        title,
        content,
        created: new Date().toISOString()
    });

    saveDB();
    render();
}

// =========================
// EXPORT
// =========================
function exportDB() {
    const blob = new Blob([JSON.stringify(DB)], { type: "application/json" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "VaultOS_DB.json";
    a.click();

    URL.revokeObjectURL(url);
}

// =========================
// IMPORT (FULL COMPATIBILITY)
// =========================
document.getElementById("importFile").addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(ev) {
        try {
            const incoming = JSON.parse(ev.target.result);

            const raw = incoming.records || incoming || [];

            DB.records = raw.map(safeRecord);

            saveDB();
            render();

            alert("Import successful");

        } catch {
            alert("Invalid JSON file");
        }
    };

    reader.readAsText(file);
    e.target.value = "";
});

// =========================
// SEARCH + RENDER (NO UNDEFINED EVER)
// =========================
function render() {
    const q = document.getElementById("search").value.toLowerCase();

    let records = DB.records.map(safeRecord);

    if (q) {
        records = records.filter(r =>
            r.title.toLowerCase().includes(q) ||
            r.content.toLowerCase().includes(q)
        );
    }

    const view = document.getElementById("view");

    view.innerHTML = `<h3>Records (${records.length})</h3>`;

    records.forEach(r => {
        view.innerHTML += `
            <div class="record">
                <b>${r.title}</b><br>
                <span class="small">${r.created}</span>
                <p>${r.content}</p>
            </div>
        `;
    });
}

// =========================
// INIT
// =========================
loadDB();
render();

</script>

</body>
</html>
