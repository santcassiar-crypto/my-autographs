<title>Autograph Tracker Pro 180+</title>

<style>

input,select{width:100%;padding:8px;margin-top:5px}
.card{background:#111;margin:10px;padding:10px;border-radius:6px;border:1px solid #222}
button{margin:5px;padding:6px}
.bad{border:1px solid red !important}
.warn{border:1px solid orange !important}
.small{font-size:10px;color:#888}
.filters button{margin-right:5px}
</style>
</head>

<body>

<div>

<div id="list"></div>

<script>

////////////////////////////////////////////////////

let DB = JSON.parse(localStorage.getItem("vault180")) || structuredClone(MASTER_DATA);

let limit = 50;
let search = "";
let filter = "ALL";

function save(){
localStorage.setItem("vault180",JSON.stringify(DB));
}

function daysSince(d){
if(!d) return null;
return Math.floor((Date.now()-new Date(d))/(1000*60*60*24));
}

////////////////////////////////////////////////////
// UI CONTROLS
////////////////////////////////////////////////////

document.getElementById("search").oninput = e=>{
search = e.target.value.toLowerCase();
render();
};

function setFilter(f){
filter=f;
render();
}

function add(){
let n=prompt("Name:");
if(!n) return;

DB.unshift({
ID:Date.now(),
Name:n,
Status:"PENDING",
SentDate:""
});

save();
render();
}

function reset(){
DB = structuredClone(MASTER_DATA);
limit=50;
save();
render();
}

function more(){
limit+=50;
render();
}

function markSent(id){
let x=DB.find(i=>i.ID===id);
if(x){
x.Status="SENT";
x.SentDate=new Date().toISOString().split("T")[0];
save();
render();
}
}

////////////////////////////////////////////////////
// RENDER
////////////////////////////////////////////////////

function render(){

let list = DB;

if(search){
list=list.filter(x=>x.Name.toLowerCase().includes(search));
}

if(filter==="PENDING") list=list.filter(x=>x.Status==="PENDING");
if(filter==="SENT") list=list.filter(x=>x.Status==="SENT");
if(filter==="SUCCESS") list=list.filter(x=>x.Status==="SUCCESS");
if(filter==="RTS") list=list.filter(x=>x.Status==="RTS");

if(filter==="OVERDUE"){
list=list.filter(x=>{
if(x.Status!=="SENT") return false;
let d=daysSince(x.SentDate);
return d && d>30;
});
}

list=list.slice(0,limit);

document.getElementById("list").innerHTML =
list.map(r=>{

let age = daysSince(r.SentDate);
let cls="card";
if(r.Status==="SENT" && age>60) cls="card bad";
else if(r.Status==="SENT" && age>30) cls="card warn";

return `
<div class="${cls}">
<input value="${r.Name}" onchange="x=>{DB.find(i=>i.ID==${r.ID}).Name=this.value;save()}">

<select onchange="DB.find(i=>i.ID==${r.ID}).Status=this.value;save();render()">
<option ${r.Status=="PENDING"?"selected":""}>PENDING</option>
<option ${r.Status=="SENT"?"selected":""}>SENT</option>
<option ${r.Status=="SUCCESS"?"selected":""}>SUCCESS</option>
<option ${r.Status=="RTS"?"selected":""}>RTS</option>
<option ${r.Status=="LOGGED"?"selected":""}>LOGGED</option>
</select>

<button onclick="markSent(${r.ID})">Mark Sent</button>

<div class="small">
ID:${r.ID} | Sent:${r.SentDate||"—"} | Age:${age||"—"}
</div>
</div>
`;
}).join("");

document.getElementById("stats").innerText =
`TOTAL:${DB.length}
 SENT:${DB.filter(x=>x.Status==="SENT").length}
 PENDING:${DB.filter(x=>x.Status==="PENDING").length}
 SUCCESS:${DB.filter(x=>x.Status==="SUCCESS").length}`;

}

render();

</script>
