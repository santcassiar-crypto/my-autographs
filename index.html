


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VaultOS SR15 Editable</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
:root{
  --bg:#020617;--panel:#0f172a;--panel2:#1e293b;
  --line:#334155;--accent:#38bdf8;--text:#f8fafc
}
*{box-sizing:border-box}
body{
  margin:0;background:var(--bg);color:var(--text);
  font-family:Arial;display:flex;min-height:100vh
}
aside{
  width:260px;background:#01040d;padding:20px;
  border-right:1px solid var(--line)
}
main{flex:1;padding:20px}

button,input{
  background:var(--panel2);color:white;border:1px solid var(--line);
  border-radius:8px;padding:8px;margin:4px;width:100%
}

.card{
  background:var(--panel);border:1px solid var(--line);
  border-radius:14px;padding:18px;margin-bottom:18px
}

table{width:100%;border-collapse:collapse}
td,th{padding:8px;border-bottom:1px solid var(--line)}
td input{
  width:100%;
  background:transparent;
  border:1px solid var(--line);
  color:white;
  padding:6px;
  border-radius:6px;
}

</style>
</head>

<body>

<aside>
<h2>VaultOS SR15</h2>
<input type="file" id="importFile" accept=".json">
</aside>

<main>

<div class="card">
<h2>Targets (Editable)</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>Status</th>
<th>Possible Address Used</th>
<th></th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

</div>

</main>

<script>

const $ = id => document.getElementById(id);

let vault = JSON.parse(localStorage.getItem("VaultOS_SR15_EDIT")) || {
targets:[]
};

function save(){
localStorage.setItem("VaultOS_SR15_EDIT", JSON.stringify(vault));
}

/* 🧠 CLEAN STATUS */
function cleanStatus(s){
return (s || "PENDING").toString().trim().toUpperCase();
}

/* 📊 RENDER (editable table) */
function render(){

$("list").innerHTML = vault.targets.map((t,i)=>`

<tr>

<td>
<input value="${t.name||""}"
oninput="vault.targets[${i}].name=this.value; save()">
</td>

<td>
<input value="${t.status||""}"
oninput="vault.targets[${i}].status=this.value; save()">
</td>

<td>
<input value="${t.address||""}"
placeholder="Add address used"
oninput="vault.targets[${i}].address=this.value; save()">
</td>

<td>
<button onclick="remove(${i})">X</button>
</td>

</tr>

`).join("");

}

/* ❌ REMOVE */
function remove(i){
vault.targets.splice(i,1);
save();
render();
}

/* 📥 IMPORT (YOUR FORMAT FIXED) */
document.getElementById("importFile").addEventListener("change",(e)=>{

const file = e.target.files?.[0];
if(!file) return;

const reader = new FileReader();

reader.onload = () => {
try{

const d = JSON.parse(reader.result || "{}");

const raw =
Array.isArray(d.records) ? d.records :
Array.isArray(d.targets) ? d.targets :
[];

vault.targets = raw.map((t,i)=>({

id: t.id || Date.now()+i,

name: t.name || t.Name || "Unknown",

status: cleanStatus(t.status || t.Status),

address: t.address || t.addr || ""

}));

save();
render();

alert("Imported: " + vault.targets.length + " entries");

}catch(err){
alert("Import failed: " + err.message);
}
};

reader.readAsText(file);
});

render();

</script>

</body>
</html>
