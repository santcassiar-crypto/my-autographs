<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TTM OS – Autonomous Decision Engine</title>

<style>
body{
  font-family:Arial;
  background:#0b0b0b;
  color:#fff;
  margin:0;
}

header{
  background:#111;
  padding:12px;
  position:sticky;
  top:0;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:#111;
  border:1px solid #222;
  border-radius:10px;
  padding:12px;
  margin:10px;
}

input,textarea,button,select{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid #333;
  background:#181818;
  color:#fff;
}

.record{
  padding:6px;
  border-bottom:1px solid #222;
}

.small{font-size:12px;color:#aaa}

.badge{
  background:#222;
  padding:2px 6px;
  border-radius:6px;
  font-size:11px;
}
</style>
</head>

<body>

<header>
<h2>TTM OS – Autonomous Decision Engine</h2>
<input id="search" placeholder="Search full database...">
</header>

<div class="grid" id="stats"></div>

<div class="card">
<h3>➕ Add Targets</h3>
<textarea id="bulk"></textarea>
<button onclick="add()">Add</button>
</div>

<div class="card">
<h3>📌 Update Status</h3>
<input id="u_name">
<select id="u_status">
<option>PENDING</option>
<option>SENT</option>
<option>SUCCESS</option>
<option>RTS</option>
<option>LOGGED</option>
</select>
<button onclick="update()">Update + Learn</button>
</div>

<div class="card">
<h3>🧠 CATEGORY HEALTH</h3>
<div id="weights"></div>
</div>

<div class="card">
<h3>⚡ AUTONOMOUS DECISION LIST (ONLY HIGH VALUE)</h3>
<div id="decisions"></div>
</div>

<div class="card">
<h3>📋 FULL DATABASE</h3>
<div id="list"></div>
</div>

<script>

const KEY="ttm_decision_engine_v1";

let DB = load();

function load(){
  try{
    const raw = JSON.parse(localStorage.getItem(KEY)||"{}");
    return raw.records ? raw : {records:[], weights:{}};
  }catch{
    return {records:[], weights:{}};
  }
}

function save(){
  localStorage.setItem(KEY, JSON.stringify(DB));
}

/* =========================
   CATEGORY DETECTION
========================= */

function category(name){
  const n = name.toLowerCase();

  if(/football|england|arsenal|kane|shearer/.test(n)) return "football";
  if(/nba|lakers|sabonis|banchero/.test(n)) return "nba";
  if(/oldman|fiennes|brosnan|jackman|comer/.test(n)) return "actors";
  if(/tv|podcast|show|theatre/.test(n)) return "tv";

  return "other";
}

/* =========================
   CATEGORY WEIGHTS
========================= */

function weight(cat){
  if(DB.weights[cat] === undefined){
    DB.weights[cat] = 1.0;
  }
  return DB.weights[cat];
}

/* =========================
   SCORE ENGINE (FILTERED)
========================= */

function score(r){
  const cat = category(r.name);
  const w = weight(cat);

  let s = 50;

  if(r.status==="SUCCESS") s += 40;
  if(r.status==="RTS") s -= 30;
  if(r.status==="SENT") s += 5;

  return s * w;
}

/* =========================
   LEARNING ENGINE
========================= */

function learn(r, newStatus){
  const cat = category(r.name);

  if(newStatus === "SUCCESS"){
    DB.weights[cat] += 0.06;
  }

  if(newStatus === "RTS"){
    DB.weights[cat] -= 0.08;
  }

  DB.weights[cat] = Math.max(0.5, Math.min(1.8, DB.weights[cat]));
}

/* =========================
   ADD
========================= */

function add(){
  const lines = document.getElementById("bulk").value
    .split("\n").map(x=>x.trim()).filter(Boolean);

  lines.forEach(n=>{
    DB.records.push({
      id:Date.now()+Math.random(),
      name:n,
      status:"PENDING"
    });
  });

  document.getElementById("bulk").value="";
  render();
  save();
}

/* =========================
   UPDATE + LEARN
========================= */

function update(){
  const name = document.getElementById("u_name").value.toLowerCase();
  const status = document.getElementById("u_status").value.toUpperCase();

  DB.records.forEach(r=>{
    if(r.name.toLowerCase() === name){
      r.status = status;
      learn(r, status);
    }
  });

  render();
  save();
}

/* =========================
   DECISION FILTER
========================= */

function decisions(){
  return DB.records
    .filter(r => r.status === "PENDING")
    .map(r => ({...r, s:score(r)}))
    .filter(r => r.s >= 60)
    .sort((a,b)=>b.s-a.s)
    .slice(0,15);
}

/* =========================
   RENDER
========================= */

function render(){

  const pending = DB.records.filter(r=>r.status==="PENDING").length;
  const success = DB.records.filter(r=>r.status==="SUCCESS").length;
  const rts = DB.records.filter(r=>r.status==="RTS").length;

  document.getElementById("stats").innerHTML = `
    <div class="card"><h2>${DB.records.length}</h2>Total</div>
    <div class="card"><h2>${pending}</h2>Pending</div>
    <div class="card"><h2>${success}</h2>Success</div>
    <div class="card"><h2>${rts}</h2>RTS</div>
  `;

  document.getElementById("weights").innerHTML =
    Object.entries(DB.weights)
      .map(([k,v])=>`${k}: <b>${v.toFixed(2)}</b>`)
      .join("<br>");

  document.getElementById("decisions").innerHTML =
    decisions().map(r=>`
      ⚡ ${r.name} <span class="badge">${r.s.toFixed(0)}</span>
    `).join("<br>");

  const q = (document.getElementById("search").value||"").toLowerCase();

  document.getElementById("list").innerHTML =
    DB.records
      .filter(r=>r.name.toLowerCase().includes(q))
      .map(r=>`
        <div class="record">
          <b>${r.name}</b><br>
          <span class="small">${r.status}</span>
        </div>
      `).join("");

  save();
}

/* INIT */
render();

</script>

</body>
</html>
