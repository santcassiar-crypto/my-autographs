<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VaultPro | Registry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #e4e4e7; font-family: sans-serif; }
        .bento-card { background: #111113; border: 1px solid #27272a; border-radius: 12px; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .ticker-wrap { animation: ticker 30s linear infinite; }
    </style>
</head>
<body class="pb-20">

    <div class="bg-red-600 overflow-hidden py-1 mb-6">
        <div class="ticker-wrap whitespace-nowrap text-[10px] font-black uppercase text-white tracking-widest">
            🚨 INTEL: SIR IAN MCKELLEN 'LEAR' ANNOUNCEMENT • VAULT SYNC ACTIVE • 162 TARGETS LOADED • AUTO-BACKUP READY
        </div>
    </div>

    <div class="max-w-md mx-auto p-4">
        <div class="flex justify-between items-end mb-6">
            <h1 class="text-3xl font-black text-white italic">VAULT<span class="text-red-600">PRO</span></h1>
            <button onclick="exportData()" class="text-[9px] bg-zinc-800 px-3 py-1 rounded text-zinc-400 uppercase font-bold">Backup</button>
        </div>

        <div id="list" class="space-y-2"></div>
    </div>

    <script>
        // 1. THE MASTER DATABASE
        const masterList = [
            {ID: 1, Name: "Jannik Sinner", Status: "SUCCESS"},
            {ID: 2, Name: "Keanu Reeves", Status: "FAILURE / RTS"},
            {ID: 3, Name: "Alan Carr", Status: "SUCCESS"},
            {ID: 4, Name: "Harry Kane (Bayern)", Status: "FAILURE / RTS"},
            {ID: 5, Name: "David Attenborough", Status: "SUCCESS"},
            {ID: 6, Name: "Paul Merson (Original)", Status: "SUCCESS"},
            {ID: 7, Name: "Tony Adams", Status: "SUCCESS"},
            {ID: 8, Name: "Joshua Kimmich", Status: "SUCCESS"},
            {ID: 9, Name: "Ron Ferdinand", Status: "SUCCESS"},
            {ID: 10, Name: "Erling Haaland (City)", Status: "SUCCESS"},
            // ... (Insert your remaining 152 records here following the same {ID, Name, Status} pattern)
        ];

        // 2. LOAD & MERGE
        let records = JSON.parse(localStorage.getItem('vault_db')) || masterList;

        function render() {
            const list = document.getElementById('list');
            list.innerHTML = '';
            records.forEach(r => {
                const div = document.createElement('div');
                div.className = "bento-card p-4 flex justify-between items-center";
                div.innerHTML = `
                    <span class="text-xs font-bold w-2/3">${r.Name}</span>
                    <select onchange="updateStatus(${r.ID}, this.value)" class="bg-black text-[9px] p-1 border border-zinc-700 uppercase">
                        <option ${r.Status === 'SUCCESS' ? 'selected' : ''}>SUCCESS</option>
                        <option ${r.Status === 'PENDING' ? 'selected' : ''}>PENDING</option>
                        <option ${r.Status === 'Sent' ? 'selected' : ''}>Sent</option>
                        <option ${r.Status === 'RTS' ? 'selected' : ''}>RTS</option>
                        <option ${r.Status === 'LOGGED' ? 'selected' : ''}>LOGGED</option>
                    </select>
                `;
                list.appendChild(div);
            });
        }

        function updateStatus(id, newStatus) {
            records.find(r => r.ID === id).Status = newStatus;
            localStorage.setItem('vault_db', JSON.stringify(records));
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(records)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "vault_backup.json";
            a.click();
        }

        render();
    </script>
</body>
</html>
