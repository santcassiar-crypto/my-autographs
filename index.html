

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VaultOS Stability Release 3+</title>

<style>
body{margin:0;background:#0b0f14;color:#fff;font-family:Arial}
header{background:#111827;padding:12px;position:sticky;top:0}
.wrap{padding:12px}
.cards,.filters,.formgrid{display:grid;gap:8px}
.cards{grid-template-columns:repeat(auto-fit,minmax(130px,1fr))}
.filters,.formgrid{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
.card{background:#111827;padding:10px;border-radius:8px}
input,select,button,textarea{
background:#111;color:#fff;border:1px solid #333;
padding:8px;border-radius:6px
}
button{cursor:pointer}
table{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px}
td,th{border:1px solid #222;padding:6px}
.log{background:#111827;padding:8px;max-height:180px;overflow:auto}
</style>
</head>

<body>

<header>
<h2>VaultOS Stability Release 3+</h2>
</header>


<div class="wrap">


<div class="cards" id="stats"></div>


<h3>Filters</h3>

<div class="filters">

<input id="search" placeholder="Search..." oninput="render()">


<select id="routeFilter" onchange="render()">
<option value="">All Routes</option>
<option>Theatre</option>
<option>Foundation</option>
<option>Club</option>
<option>Academy</option>
<option>Agency</option>
<option>Office</option>
<option>Event</option>
<option>Home</option>
</select>


<select id="outcomeFilter" onchange="render()">
<option value="">All Outcomes</option>
<option>PENDING</option>
<option>SUCCESS</option>
<option>RTS</option>
<option>FAILURE</option>
<option>PLANNED</option>
<option>SENT</option>
<option>NOT ACTIVE</option>
</select>

</div>



<h3>Add Record</h3>

<div class="formgrid">

<input id="name" placeholder="Name">

<input id="route" placeholder="Route">

<input id="system" placeholder="System">


<select id="strength">
<option>A</option>
<option>B</option>
<option>C</option>
<option>X</option>
</select>


<select id="likelihood">
<option>Very High</option>
<option>High</option>
<option>Medium</option>
<option>Low</option>
<option>Moonshot</option>
</select>


<select id="outcome">
<option>PENDING</option>
<option>SUCCESS</option>
<option>RTS</option>
<option>FAILURE</option>
<option>PLANNED</option>
<option>SENT</option>
<option>NOT ACTIVE</option>
</select>


<input id="datesent" placeholder="Date Sent">

<input id="notes" placeholder="Notes">

</div>


<p>
<button onclick="addRecord()">Add Record</button>
<button onclick="exportJSON()">Export JSON</button>

<button onclick="document.getElementById('file').click()">Import JSON</button>

<input id="file" type="file" accept=".json" style="display:none" onchange="importJSON(event)">
</p>



<h3>Success Analytics</h3>

<div id="analytics" class="card"></div>



<h3>Records</h3>

<table>

<thead>
<tr>
<th>Name</th>
<th>Route</th>
<th>Strength</th>
<th>Likelihood</th>
<th>Outcome</th>
<th>Notes</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>



<h3>Activity Log</h3>

<div id="log" class="log"></div>



<script>


let data=JSON.parse(localStorage.getItem("vaultos_sr3")||"[]");



function save(){

localStorage.setItem(
"vaultos_sr3",
JSON.stringify(data)
);

render();

}




function log(msg){

let l=JSON.parse(
localStorage.getItem("vaultos_sr3_logs")||"[]"
);

l.unshift(
new Date().toLocaleString()+" - "+msg
);

localStorage.setItem(
"vaultos_sr3_logs",
JSON.stringify(l.slice(0,300))
);

document.getElementById("log").innerHTML=l.join("<br>");

}




function addRecord(){

data.unshift({

id:Date.now(),

name:name.value,

route:route.value,

system:system.value,

strength:strength.value,

likelihood:likelihood.value,

outcome:outcome.value,

notes:notes.value,

date:datesent.value

});


log("Added "+name.value);

save();

}




function del(id){

data=data.filter(x=>x.id!=id);

log("Deleted "+id);

save();

}





function render(){


let q=(search.value||"").toLowerCase();

let rf=routeFilter.value;

let of=outcomeFilter.value;


let rows=data.filter(r=>

(!rf||r.route===rf)

&&

(!of||r.outcome===of)

&&

JSON.stringify(r).toLowerCase().includes(q)

);



tbody.innerHTML=rows.map(r=>`

<tr>

<td>${r.name}</td>

<td>${r.route}</td>

<td>${r.strength}</td>

<td>${r.likelihood}</td>

<td>${r.outcome}</td>

<td>${r.notes||""}</td>

<td>
<button onclick="del(${r.id})">X</button>
</td>

</tr>

`).join("");



let success=data.filter(x=>x.outcome==="SUCCESS").length;

let pending=data.filter(x=>x.outcome==="PENDING").length;

let inactive=data.filter(x=>x.outcome==="NOT ACTIVE").length;

let rts=data.filter(x=>x.outcome==="RTS").length;



stats.innerHTML=`

<div class="card"><b>Total</b><br>${data.length}</div>

<div class="card"><b>SUCCESS</b><br>${success}</div>

<div class="card"><b>PENDING</b><br>${pending}</div>

<div class="card"><b>RTS</b><br>${rts}</div>

<div class="card"><b>NOT ACTIVE</b><br>${inactive}</div>

`;



let routes={};


data.forEach(r=>{

if(!routes[r.route])
routes[r.route]={total:0,success:0};

routes[r.route].total++;

if(r.outcome==="SUCCESS")
routes[r.route].success++;

});



analytics.innerHTML=

Object.entries(routes).map(([k,v])=>

`${k}: ${v.success}/${v.total}`

).join("<br>")

||"No data yet";

}





function exportJSON(){

let a=document.createElement("a");

a.href=URL.createObjectURL(

new Blob(
[JSON.stringify(data,null,2)],
{type:"application/json"}
)

);

a.download="vaultos_sr3_export.json";

a.click();

}





function importJSON(event){


let file=event.target.files[0];

if(!file)return;



let reader=new FileReader();



reader.onload=function(e){


try{


let imported=JSON.parse(e.target.result);



data=imported.map(r=>({


id:r.ID || r.id || Date.now(),


name:r.Name || r.name || "",


route:r.Route || r.route || "",


system:r.System || r.system || "",


strength:r.Strength || r.strength || "C",


likelihood:r.Likelihood || r.likelihood || "Medium",


outcome:(r.Status || r.status || r.outcome || "PENDING")
.trim()
.replace("SUCCESS","SUCCESS")
.replace("SUCESS","SUCCESS"),


notes:r.Notes || r.notes || "",


date:r.Date || r.date || ""


}));



log("Imported "+data.length+" records");


save();


}

catch(err){

alert("Invalid JSON");

console.log(err);

}


};



reader.readAsText(file);


}





document.getElementById("log").innerHTML=

(JSON.parse(
localStorage.getItem("vaultos_sr3_logs")||"[]"
)).join("<br>");



render();


</script>


</div>

</body>
</html>
