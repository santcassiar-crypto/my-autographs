

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VaultOS CONTROL PANEL V3</title>

<style>
body { margin:0; font-family:Arial; background:#0b0b0b; color:#fff; }

header {
  padding:12px;
  background:#111;
  border-bottom:1px solid #222;
  position:sticky;
  top:0;
}

.container {
  display:grid;
  grid-template-columns:360px 1fr;
  height:calc(100vh - 50px);
}

.sidebar {
  background:#0f0f0f;
  border-right:1px solid #222;
  padding:10px;
}

.card {
  background:#111;
  border:1px solid #222;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
}

button {
  width:100%;
  padding:8px;
  margin:4px 0;
  background:#00ffcc;
  border:0;
  font-weight:bold;
  border-radius:5px;
  cursor:pointer;
}

button:hover { background:#00ddb3; }

.main { padding:10px; overflow:auto; }

.ticker {
  background:#111;
  border:1px solid #222;
  padding:12px;
  border-radius:8px;
  margin-bottom:10px;
  color:#00ffcc;
}

.record {
  background:#0d0d0d;
  border:1px solid #222;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  cursor:pointer;
}

.badge {
  padding:3px 8px;
  border-radius:20px;
  font-size:11px;
}

.PENDING { background:#ffcc00; color:#000; }
.SENT { background:#4da6ff; color:#fff; }
.SUCCESS { background:#00ff88; color:#000; }
.RTS { background:#ff4d4d; color:#fff; }

.panel {
  background:#111;
  border:1px solid #222;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
  color:#ccc;
  font-size:13px;
}

input {
  width:100%;
  padding:8px;
  background:#000;
  border:1px solid #333;
  color:#fff;
  border-radius:5px;
}
</style>
</head>

<body>

<header><b>VaultOS CONTROL PANEL V3 (AI EXPLAINABLE ENGINE)</b></header>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

  <div class="card">
    <button onclick="triggerImport()">IMPORT JSON</button>
    <input type="file" id="file" style="display:none" accept="application/json">
  </div>

  <div class="card">
    <button onclick="markNext()">MARK NEXT AS SENT</button>
  </div>

  <div class="card">
    <div id="stats"></div>
  </div>

</div>

<!-- MAIN -->
<div class="main">

  <div id="ticker" class="ticker">INITIALISING AI CONTROL ENGINE...</div>

  <div id="explain" class="panel">AI reasoning will appear here...</div>

  <div id="view"></div>

</div>

</div>

<script>

// =========================
// DB
// =========================
let DB = { records: [] };

// =========================
// LOAD / SAVE
// =========================
function save(){
  localStorage.setItem("vault_v3", JSON.stringify(DB));
}

function load(){
  const d = localStorage.getItem("vault_v3");
  if(d) DB = JSON.parse(d);
}
load();

// =========================
// NORMALISE
// =========================
function norm(r){
  return {
    ID: r?.ID ?? Date.now(),
    Name: (r?.Name ?? "Untitled").trim(),
    Status: (r?.Status ?? "PENDING").toString().trim().toUpperCase()
  };
}

// =========================
// SCORE ENGINE (AI)
// =========================
function score(r){

  let s = 0;

  if(r.Status === "PENDING") s += 50;
  if(r.Status === "RTS") s -= 30;

  // simple stability bonus
  if(r.Name.length > 5) s += 5;

  return s;
}

// =========================
// IMPORT (WITH AUTO CLEAN)
// =========================
function triggerImport(){
  document.getElementById("file").click();
}

document.getElementById("file").addEventListener("change", e => {
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);

      const arr =
        Array.isArray(data) ? data :
        Array.isArray(data.records) ? data.records :
        [];

      const cleaned = arr.map(norm);

      // merge duplicates
      const map = new Map();

      cleaned.forEach(r=>{
        map.set(r.Name.toLowerCase(), r);
      });

      DB.records = [...map.values()];

      save();
      render();

    } catch {
      alert("Import failed");
    }
  };

  reader.readAsText(file);
});

// =========================
// NEXT PICK
// =========================
function getNext(){

  const list = DB.records
    .map(norm)
    .filter(r => r.Status === "PENDING")
    .sort((a,b)=>score(b)-score(a));

  return list[0] || null;
}

// =========================
// MARK NEXT
// =========================
function markNext(){

  const next = getNext();
  if(!next) return;

  DB.records = DB.records.map(r =>
    r.Name === next.Name
      ? {...norm(r), Status:"SENT"}
      : r
  );

  save();
  render();
}

// =========================
// EXPLAIN AI
// =========================
function explain(r){

  if(!r) return "No active mission";

  return `
    🧠 AI SELECTION EXPLANATION

    • Name: ${r.Name}
    • Status: ${r.Status}
    • Score: ${score(r)}

    WHY SELECTED:
    - Eligible (PENDING)
    - Passed priority filter
    - Highest current score in queue
  `;
}

// =========================
// STATS
// =========================
function stats(){

  const s = {PENDING:0,SENT:0,SUCCESS:0,RTS:0};

  DB.records.forEach(r=>{
    const n = norm(r);
    if(s[n.Status] !== undefined) s[n.Status]++;
  });

  document.getElementById("stats").innerHTML = `
    PENDING: ${s.PENDING}<br>
    SENT: ${s.SENT}<br>
    SUCCESS: ${s.SUCCESS}<br>
    RTS: ${s.RTS}
  `;
}

// =========================
// RENDER
// =========================
function render(){

  const next = getNext();

  document.getElementById("ticker").innerHTML =
    next ? `NEXT → <b>${next.Name}</b>` : "NO ACTIVE ITEMS";

  document.getElementById("explain").innerHTML = explain(next);

  stats();

  const view = document.getElementById("view");

  view.innerHTML = `<h3>CONTROL QUEUE</h3>`;

  DB.records.forEach(r=>{
    const n = norm(r);

    view.innerHTML += `
      <div class="record">
        <b>${n.Name}</b><br>
        <span class="badge ${n.Status}">${n.Status}</span>
      </div>
    `;
  });
}

// INIT
load();
render();

</script>

</body>
</html>
