<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Autograph Tracker Pro</title>

<style>
body{margin:0;font-family:Arial;background:#000;color:#fff}
header{position:sticky;top:0;background:#111;padding:10px}
input,select,textarea{width:100%;padding:8px;margin-top:5px;background:#000;color:#fff;border:1px solid #333;border-radius:6px}
.card{background:#111;margin:10px;padding:10px;border-radius:6px;border:1px solid #222}
button{margin:5px;padding:6px}
.small{font-size:10px;color:#888}
.bad{border:1px solid red !important}
.warn{border:1px solid orange !important}
.section{padding:10px;background:#0b0b0b;margin:10px;border-radius:6px}
</style>
</head>

<body>

<header>
<input id="search" placeholder="Search 180+ records...">
</header>

<div>
<button onclick="setFilter('ALL')">ALL</button>
<button onclick="setFilter('PENDING')">PENDING</button>
<button onclick="setFilter('SENT')">SENT</button>
<button onclick="setFilter('SUCCESS')">SIGNED</button>
<button onclick="setFilter('RTS')">RTS</button>
<button onclick="setFilter('OVERDUE')">OVERDUE</button>
</div>

<div>
<button onclick="add()">+ ADD</button>
<button onclick="reset()">RESET</button>
<button onclick="more()">LOAD MORE</button>
</div>

<div class="section" id="next"></div>

<div id="stats"></div>
<div id="list"></div>

<script>

////////////////////////////////////////////////////
// YOUR DATA (PASTE FULL 180 HERE)
////////////////////////////////////////////////////
const MASTER_DATA = [
{"ID":1,"Name":"Jannik Sinner","Status":"SUCCESS","SentDate":"","Notes":""},
{"ID":2,"Name":"Keanu Reeves","Status":"RTS","SentDate":"","Notes":""},
{"ID":3,"Name":"Alan Carr","Status":"SUCCESS","SentDate":"","Notes":""},
{"ID":4,"Name":"Harry Kane","Status":"PENDING","SentDate":"","Notes":""},
{"ID":5,"Name":"David Attenborough","Status":"SUCCESS","SentDate":"","Notes":""}
];

////////////////////////////////////////////////////

let DB = JSON.parse(localStorage.getItem("vault_pro_v2"))
    || JSON.parse(JSON.stringify(MASTER_DATA));

let limit = 50;
let search = "";
let filter = "ALL";

function save(){
localStorage.setItem("vault_pro_v2",JSON.stringify(DB));
}

function daysSince(d){
if(!d) return null;
return Math.floor((Date.now()-new Date(d))/(1000*60*60*24));
}

////////////////////////////////////////////////////
// SEARCH
////////////////////////////////////////////////////

document.getElementById("search").oninput = (e)=>{
search = e.target.value.toLowerCase();
limit = 50;
render();
};

function setFilter(f){
filter = f;
render();
}

////////////////////////////////////////////////////
// ACTIONS
////////////////////////////////////////////////////

function add(){
let n = prompt("Name:");
if(!n) return;

DB.unshift({
ID:Date.now(),
Name:n,
Status:"PENDING",
SentDate:"",
Notes:""
});

save();
render();
}

function reset(){
DB = JSON.parse(JSON.stringify(MASTER_DATA));
limit = 50;
save();
render();
}

function more(){
limit += 50;
render();
}

function markSent(id){
let x = DB.find(i=>i.ID===id);
if(x){
x.Status="SENT";
x.SentDate=new Date().toISOString().split("T")[0];
save();
render();
}
}

////////////////////////////////////////////////////
// NEXT TO SEND (PRIORITY QUEUE)
////////////////////////////////////////////////////

function getNext(){
return DB
.filter(x=>x.Status==="PENDING")
.slice(0,10);
}

function renderNext(){
document.getElementById("next").innerHTML =
"<h3>Next to Send</h3>" +
getNext().map(r=>`
<div class="card">
<b>${r.Name}</b>
<button onclick="markSent(${r.ID})">Mark Sent</button>
</div>
`).join("");
}

////////////////////////////////////////////////////
// CORE RENDER
////////////////////////////////////////////////////

function render(){

let list = DB;

/* SEARCH FIRST */
if(search){
list = list.filter(x=>x.Name.toLowerCase().includes(search));
}

/* FILTER */
if(filter==="PENDING") list=list.filter(x=>x.Status==="PENDING");
if(filter==="SENT") list=list.filter(x=>x.Status==="SENT");
if(filter==="SUCCESS") list=list.filter(x=>x.Status==="SUCCESS");
if(filter==="RTS") list=list.filter(x=>x.Status==="RTS");

if(filter==="OVERDUE"){
list=list.filter(x=>{
if(x.Status!=="SENT") return false;
let d=daysSince(x.SentDate);
return d && d>30;
});
}

list = list.slice(0,limit);

/* MAIN LIST */
document.getElementById("list").innerHTML =
list.map(r=>{

let age = daysSince(r.SentDate);

let cls="card";
if(r.Status==="SENT" && age>60) cls="card bad";
else if(r.Status==="SENT" && age>30) cls="card warn";

return `
<div class="${cls}">

<input value="${r.Name}" onchange="r.Name=this.value;save()">

<select onchange="r.Status=this.value;save()">
<option ${r.Status=="PENDING"?"selected":""}>PENDING</option>
<option ${r.Status=="SENT"?"selected":""}>SENT</option>
<option ${r.Status=="SUCCESS"?"selected":""}>SUCCESS</option>
<option ${r.Status=="RTS"?"selected":""}>RTS</option>
</select>

<button onclick="markSent(${r.ID})">Mark Sent</button>

<textarea onchange="r.Notes=this.value;save()" placeholder="Notes / news / context">${r.Notes||""}</textarea>

<div class="small">
ID:${r.ID} | Sent:${r.SentDate||"—"} | Age:${age||"—"}
</div>

</div>
`;
}).join("");

/* STATS */
document.getElementById("stats").innerText =
`TOTAL:${DB.length}
 SENT:${DB.filter(x=>x.Status==="SENT").length}
 PENDING:${DB.filter(x=>x.Status==="PENDING").length}
 SUCCESS:${DB.filter(x=>x.Status==="SUCCESS").length}
 RTS:${DB.filter(x=>x.Status==="RTS").length}`;

/* NEXT PANEL */
renderNext();
}

render();

</script>

</body>
</html>
