<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Vault Fix</title>
<style>
body{font-family:Arial;background:#000;color:#fff;margin:0}
header{padding:10px;background:#111;position:sticky;top:0}
input,select{width:100%;padding:8px;margin-top:5px}
.card{background:#111;margin:10px;padding:10px;border-radius:6px}
button{margin:5px;padding:6px}
.small{font-size:10px;color:#888}
</style>
</head>

<body>

<header>
<input id="search" placeholder="search">
</header>

<div>
<button id="reset">RESET</button>
<button id="more">LOAD MORE</button>
</div>

<div id="stats"></div>
<div id="list"></div>

<script>

const MASTER = [
{ID:1,Name:"Jannik Sinner",Status:"SUCCESS"},
{ID:2,Name:"Keanu Reeves",Status:"RTS"},
{ID:3,Name:"Alan Carr",Status:"SUCCESS"},
{ID:4,Name:"Harry Kane",Status:"PENDING"},
{ID:5,Name:"David Attenborough",Status:"SUCCESS"}
];

let DB = JSON.parse(localStorage.getItem("vault")) || structuredClone(MASTER);

let limit = 50;
let q = "";

function save(){
localStorage.setItem("vault",JSON.stringify(DB));
}

document.getElementById("search").oninput = e=>{
q = e.target.value.toLowerCase();
render();
};

document.getElementById("reset").onclick = ()=>{
DB = structuredClone(MASTER);
limit = 50;
save();
render();
};

document.getElementById("more").onclick = ()=>{
limit += 50;
render();
};

function render(){

let filtered = q
? DB.filter(x=>x.Name.toLowerCase().includes(q))
: DB;

let show = filtered.slice(0,limit);

document.getElementById("list").innerHTML =
show.map(r=>`
<div class="card">
<input value="${r.Name}" onchange="edit(${r.ID},this.value)">
<select onchange="status(${r.ID},this.value)">
<option ${r.Status=="SUCCESS"?"selected":""}>SUCCESS</option>
<option ${r.Status=="PENDING"?"selected":""}>PENDING</option>
<option ${r.Status=="RTS"?"selected":""}>RTS</option>
</select>
<div class="small">${r.ID}</div>
</div>
`).join("");

stats();
}

function stats(){
document.getElementById("stats").innerText =
"TOTAL: "+DB.length+
" | SUCCESS: "+DB.filter(x=>x.Status=="SUCCESS").length+
" | PENDING: "+DB.filter(x=>x.Status=="PENDING").length+
" | RTS: "+DB.filter(x=>x.Status=="RTS").length;
}

function edit(id,val){
let x=DB.find(i=>i.ID==id);
if(x){x.Name=val;save();}
}

function status(id,val){
let x=DB.find(i=>i.ID==id);
if(x){x.Status=val;save();}
}

render();

</script>

</body>
</html>
