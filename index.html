<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VaultOS PWA</title>

<!-- PWA CORE -->
<link rel="manifest" href="data:application/manifest+json,{
  \"name\":\"VaultOS\",
  \"short_name\":\"VaultOS\",
  \"start_url\":\".\",
  \"display\":\"standalone\",
  \"background_color\":\"#000000\",
  \"theme_color\":\"#111111\",
  \"icons\":[]
}">

<style>
body{margin:0;font-family:Arial;background:#000;color:#fff}
header{position:sticky;top:0;background:#111;padding:10px;z-index:10}

input,select,textarea{
width:100%;padding:8px;margin-top:5px;
background:#000;color:#fff;border:1px solid #333;border-radius:6px
}

.card{background:#111;margin:10px;padding:10px;border-radius:8px;border:1px solid #222}
button{margin:5px;padding:6px}
.small{font-size:10px;color:#888}

.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px}
.box{background:#111;padding:10px;border-radius:6px;text-align:center}
.section{padding:10px;margin:10px;background:#0b0b0b;border-radius:8px}
</style>
</head>

<body>

<header>
<input id="search" placeholder="Search VaultOS...">
</header>

<div>
<button onclick="setFilter('ALL')">ALL</button>
<button onclick="setFilter('PENDING')">PENDING</button>
<button onclick="setFilter('SENT')">SENT</button>
<button onclick="setFilter('SUCCESS')">SIGNED</button>
<button onclick="setFilter('RTS')">RTS</button>
<button onclick="setFilter('FOLLOWUP')">FOLLOW UP</button>
</div>

<div class="grid" id="stats"></div>

<div class="section" id="priority"></div>

<div>
<button onclick="add()">+ ADD</button>
<button onclick="exportData()">EXPORT</button>
<button onclick="importData()">IMPORT</button>
</div>

<div id="list"></div>

<script>

////////////////////////////////////////////////////
// DATA CORE (SAFE + VERSIONED)
////////////////////////////////////////////////////

const MASTER_DATA = [
{"ID":1,"Name":"Jannik Sinner","Status":"SUCCESS"},
{"ID":2,"Name":"Keanu Reeves","Status":"RTS"},
{"ID":3,"Name":"Alan Carr","Status":"SUCCESS"},
{"ID":4,"Name":"Harry Kane","Status":"PENDING"},
{"ID":5,"Name":"David Attenborough","Status":"SUCCESS"}
];

let DB = load();

function load(){
let raw = localStorage.getItem("vault_pwa_v1");
if(raw) return JSON.parse(raw);
return MASTER_DATA;
}

function save(){
localStorage.setItem("vault_pwa_v1",JSON.stringify(DB));
backup();
}

function backup(){
localStorage.setItem("vault_pwa_backup",JSON.stringify({
time:Date.now(),
data:DB
}));
}

////////////////////////////////////////////////////
// STATE
////////////////////////////////////////////////////

let search="";
let filter="ALL";

document.getElementById("search").oninput=(e)=>{
search=e.target.value.toLowerCase();
render();
};

function setFilter(f){filter=f;render();}

////////////////////////////////////////////////////
// UTIL
////////////////////////////////////////////////////

function daysSince(d){
if(!d) return null;
return Math.floor((Date.now()-new Date(d))/(1000*60*60*24));
}

function addDays(n){
let d=new Date();
d.setDate(d.getDate()+n);
return d.toISOString().split("T")[0];
}

////////////////////////////////////////////////////
// ACTIONS
////////////////////////////////////////////////////

function add(){
let n=prompt("Name:");
if(!n) return;

DB.unshift({
ID:Date.now(),
Name:n,
Status:"PENDING",
SentDate:"",
FollowUp:addDays(30),
Priority:"NORMAL",
Notes:""
});

save();render();
}

function markSent(id){
let r=DB.find(x=>x.ID===id);
if(!r) return;

r.Status="SENT";
r.SentDate=new Date().toISOString().split("T")[0];
r.FollowUp=addDays(30);

save();render();
}

////////////////////////////////////////////////////
// SMART ENGINE
////////////////////////////////////////////////////

function score(r){
let s=0;
if(r.Status==="PENDING") s+=60;
if(r.Priority==="HIGH") s+=30;
let age=daysSince(r.SentDate);
if(age) s-=age;
return s;
}

function nextQueue(){
return DB
.filter(x=>x.Status==="PENDING")
.sort((a,b)=>score(b)-score(a))
.slice(0,10);
}

function followUps(){
return DB.filter(x=>
x.Status==="SENT" &&
x.FollowUp &&
new Date(x.FollowUp)<new Date()
);
}

////////////////////////////////////////////////////
// STATS
////////////////////////////////////////////////////

function renderStats(){
let total=DB.length;
let pending=DB.filter(x=>x.Status==="PENDING").length;
let sent=DB.filter(x=>x.Status==="SENT").length;
let success=DB.filter(x=>x.Status==="SUCCESS").length;
let rts=DB.filter(x=>x.Status==="RTS").length;

document.getElementById("stats").innerHTML=`
<div class="box">TOTAL<br>${total}</div>
<div class="box">PENDING<br>${pending}</div>
<div class="box">SENT<br>${sent}</div>
<div class="box">SIGNED<br>${success}</div>
<div class="box">RTS<br>${rts}</div>
`;
}

////////////////////////////////////////////////////
// PRIORITY
////////////////////////////////////////////////////

function renderPriority(){
document.getElementById("priority").innerHTML=
"<h3>🔥 Next to Send</h3>"+
nextQueue().map(r=>`
<div class="card">
<b>${r.Name}</b>
<div class="small">Score: ${score(r)}</div>
<button onclick="markSent(${r.ID})">Mark Sent</button>
</div>
`).join("");
}

////////////////////////////////////////////////////
// VIEW
////////////////////////////////////////////////////

function render(){

let list=DB;

if(search){
list=list.filter(x=>x.Name.toLowerCase().includes(search));
}

if(filter==="PENDING") list=list.filter(x=>x.Status==="PENDING");
if(filter==="SENT") list=list.filter(x=>x.Status==="SENT");
if(filter==="SUCCESS") list=list.filter(x=>x.Status==="SUCCESS");
if(filter==="RTS") list=list.filter(x=>x.Status==="RTS");
if(filter==="FOLLOWUP") list=followUps();

document.getElementById("list").innerHTML=
list.map(r=>`
<div class="card">

<input value="${r.Name}" onchange="r.Name=this.value;save()">

<select onchange="r.Status=this.value;save()">
<option ${r.Status==="PENDING"?"selected":""}>PENDING</option>
<option ${r.Status==="SENT"?"selected":""}>SENT</option>
<option ${r.Status==="SUCCESS"?"selected":""}>SUCCESS</option>
<option ${r.Status==="RTS"?"selected":""}>RTS</option>
</select>

<button onclick="markSent(${r.ID})">Mark Sent</button>

<div class="small">
ID:${r.ID} | Follow-up:${r.FollowUp||"—"}
</div>

</div>
`).join("");

renderStats();
renderPriority();
}

////////////////////////////////////////////////////
// EXPORT / IMPORT
////////////////////////////////////////////////////

function exportData(){
let blob=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="vaultos_backup.json";
a.click();
}

function importData(){
let raw=prompt("Paste backup JSON:");
if(!raw) return;
DB=JSON.parse(raw);
save();render();
}

render();

</script>

</body>
</html>
