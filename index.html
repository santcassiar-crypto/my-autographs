

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VaultOS V7 Lite Enterprise</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#0b0f14;
    color:#fff;
}

header{
    padding:12px;
    background:#111827;
    position:sticky;
    top:0;
    z-index:10;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

h1{font-size:16px;margin:0}

.container{
    display:grid;
    grid-template-columns: 300px 1fr;
    height:calc(100vh - 50px);
}

.sidebar{
    background:#0f172a;
    padding:10px;
    overflow:auto;
    border-right:1px solid #222;
}

.main{
    padding:10px;
    overflow:auto;
}

input, textarea, button, select{
    width:100%;
    padding:8px;
    margin:5px 0;
    border-radius:6px;
    border:1px solid #333;
    background:#111;
    color:#fff;
}

button{
    cursor:pointer;
    background:#2563eb;
    border:none;
}

button:hover{background:#1d4ed8}

.card{
    background:#111827;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #222;
}

.small{
    font-size:12px;
    opacity:0.7;
}

.row{
    display:flex;
    gap:10px;
}

.row > *{
    flex:1;
}

.ticker{
    background:#1f2937;
    padding:6px;
    font-size:12px;
    overflow:hidden;
    white-space:nowrap;
}

.marquee{
    display:inline-block;
    animation: scroll 20s linear infinite;
}

@keyframes scroll{
    0%{transform:translateX(100%)}
    100%{transform:translateX(-100%)}
}

.tag{
    display:inline-block;
    padding:2px 6px;
    background:#2563eb;
    border-radius:4px;
    font-size:10px;
    margin-right:5px;
}

.danger{background:#dc2626}

.success{background:#16a34a}

</style>
</head>

<body>

<header>
    <h1>VaultOS V7 Lite Enterprise</h1>
    <div class="small" id="status">Ready</div>
</header>

<div class="ticker">
    <div class="marquee" id="newsTicker">Loading system feed...</div>
</div>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h3>Command Console</h3>
        <input id="cmd" placeholder="Type command: add / clear / export / import" />
        <button onclick="runCommand()">Execute</button>

        <hr>

        <h3>Add Record</h3>
        <input id="title" placeholder="Title"/>
        <textarea id="desc" placeholder="Description"></textarea>
        <button onclick="addRecord()">Add</button>

        <hr>

        <h3>Import JSON</h3>
        <textarea id="importBox" placeholder='Paste JSON array here'></textarea>
        <button onclick="importData()">Import</button>

        <button onclick="exportData()">Export Data</button>

        <button onclick="clearAll()" class="danger">Clear All</button>

    </div>

    <!-- MAIN -->
    <div class="main">

        <input id="search" placeholder="Search records..." oninput="render()"/>

        <div id="records"></div>

    </div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("vaultos_data") || "[]");

const tickerMessages = [
    "System online ✔",
    "VaultOS V7 running stable",
    "Records synced locally",
    "AI layer: standby mode",
    "Import/export engine active"
];

function save(){
    localStorage.setItem("vaultos_data", JSON.stringify(data));
}

function addRecord(){
    const title = document.getElementById("title").value;
    const desc = document.getElementById("desc").value;

    if(!title) return;

    data.unshift({
        id: Date.now(),
        title,
        desc,
        tags: []
    });

    document.getElementById("title").value="";
    document.getElementById("desc").value="";

    save();
    render();
}

function deleteRecord(id){
    data = data.filter(x => x.id !== id);
    save();
    render();
}

function editRecord(id){
    const item = data.find(x => x.id === id);
    const newTitle = prompt("Edit title", item.title);
    const newDesc = prompt("Edit description", item.desc);

    if(newTitle !== null) item.title = newTitle;
    if(newDesc !== null) item.desc = newDesc;

    save();
    render();
}

function render(){
    const q = document.getElementById("search").value.toLowerCase();
    const container = document.getElementById("records");

    container.innerHTML = "";

    data
    .filter(x => x.title.toLowerCase().includes(q) || x.desc.toLowerCase().includes(q))
    .forEach(item => {

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div><b>${item.title}</b></div>
            <div class="small">${item.desc || ""}</div>
            <div style="margin-top:8px">
                <button onclick="editRecord(${item.id})">Edit</button>
                <button onclick="deleteRecord(${item.id})" class="danger">Delete</button>
            </div>
        `;

        container.appendChild(div);
    });
}

function exportData(){
    const blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "vaultos_export.json";
    a.click();
}

function importData(){
    try{
        const imported = JSON.parse(document.getElementById("importBox").value);
        if(Array.isArray(imported)){
            data = imported;
            save();
            render();
            alert("Imported successfully");
        }
    } catch(e){
        alert("Invalid JSON");
    }
}

function clearAll(){
    if(confirm("Clear all data?")){
        data = [];
        save();
        render();
    }
}

function runCommand(){
    const cmd = document.getElementById("cmd").value.toLowerCase();

    if(cmd === "clear"){
        clearAll();
    }
    else if(cmd === "export"){
        exportData();
    }
    else if(cmd === "import"){
        document.getElementById("importBox").focus();
    }
    else if(cmd.startsWith("add ")){
        const text = cmd.replace("add ","");
        data.unshift({id:Date.now(), title:text, desc:"(command created)"});
        save(); render();
    }
    else{
        alert("Unknown command");
    }

    document.getElementById("cmd").value="";
}

function updateTicker(){
    const msg = tickerMessages[Math.floor(Math.random()*tickerMessages.length)];
    document.getElementById("newsTicker").innerText = msg;
}

render();
updateTicker();
setInterval(updateTicker, 6000);

</script>

</body>
</html>
