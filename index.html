
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VaultOS Status Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0f14;
    color:#fff;
}

header{
    padding:10px;
    background:#111827;
    position:sticky;
    top:0;
}

.container{
    display:grid;
    grid-template-columns:320px 1fr;
    height:calc(100vh - 50px);
}

.sidebar{
    background:#0f172a;
    padding:10px;
    overflow:auto;
}

.main{
    padding:10px;
    overflow:auto;
}

input, select, textarea, button{
    width:100%;
    padding:8px;
    margin:5px 0;
    border-radius:6px;
    border:1px solid #333;
    background:#111;
    color:#fff;
}

button{
    background:#2563eb;
    cursor:pointer;
    border:none;
}
button:hover{background:#1d4ed8}

.card{
    background:#111827;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    border:1px solid #222;
}

.tag{
    display:inline-block;
    padding:2px 6px;
    border-radius:4px;
    font-size:11px;
    margin-left:6px;
}

.PENDING{background:#f59e0b}
.SUCCESS{background:#16a34a}
.RTS{background:#ef4444}
.LOGGED{background:#6366f1}
.SENT{background:#0ea5e9}
.FAILURE{background:#dc2626}

.small{font-size:12px;opacity:0.7}

</style>
</head>

<body>

<header>VaultOS Status Dashboard (Fixed Schema Engine)</header>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

<h3>Add Record</h3>

<input id="name" placeholder="Name"/>
<select id="status">
    <option>PENDING</option>
    <option>SUCCESS</option>
    <option>RTS</option>
    <option>LOGGED</option>
    <option>SENT</option>
    <option>FAILURE</option>
</select>

<button onclick="addRecord()">Add</button>

<hr>

<input id="search" placeholder="Search ID / Name / Status" oninput="render()"/>

</div>

<!-- MAIN -->
<div class="main">

<div id="output"></div>

</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("vault_status") || "[]");

/* ---------- SAVE ---------- */
function save(){
    localStorage.setItem("vault_status", JSON.stringify(data));
}

/* ---------- ADD ---------- */
function addRecord(){
    const name = document.getElementById("name").value;
    const status = document.getElementById("status").value;

    if(!name) return;

    data.unshift({
        ID: Date.now(),
        Name: name,
        Status: status
    });

    document.getElementById("name").value = "";
    save();
    render();
}

/* ---------- EDIT ---------- */
function edit(id){
    const item = data.find(x => x.ID === id);
    if(!item) return;

    const newName = prompt("Edit Name", item.Name);
    const newStatus = prompt("Edit Status", item.Status);

    if(newName !== null) item.Name = newName;
    if(newStatus !== null) item.Status = newStatus;

    save();
    render();
}

/* ---------- DELETE ---------- */
function del(id){
    data = data.filter(x => x.ID !== id);
    save();
    render();
}

/* ---------- RENDER ---------- */
function render(){

    const q = document.getElementById("search").value.toLowerCase();
    const out = document.getElementById("output");

    out.innerHTML = "";

    const filtered = data.filter(x =>
        (x.Name || "").toLowerCase().includes(q) ||
        (x.Status || "").toLowerCase().includes(q) ||
        (x.ID + "").includes(q)
    );

    const groups = {};

    filtered.forEach(x=>{
        if(!groups[x.Status]) groups[x.Status] = [];
        groups[x.Status].push(x);
    });

    Object.keys(groups).forEach(status=>{
        const block = document.createElement("div");

        block.innerHTML = `
            <h3>${status}</h3>
        `;

        groups[status].forEach(r=>{
            const div = document.createElement("div");
            div.className="card";

            div.innerHTML = `
                <b>${r.Name}</b>
                <span class="tag ${r.Status}">${r.Status}</span>
                <div class="small">ID: ${r.ID}</div>
                <button onclick="edit(${r.ID})">Edit</button>
                <button onclick="del(${r.ID})">Delete</button>
            `;

            block.appendChild(div);
        });

        out.appendChild(block);
    });
}

render();

</script>

</body>
</html>
