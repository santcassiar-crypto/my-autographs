<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VaultPro v4 | Self-Healing Decision Engine</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#050505; color:#e5e7eb; font-family:sans-serif; }
.card { background:#111113; border:1px solid #27272a; border-radius:12px; }
.status-SUCCESS { border-left:4px solid #22c55e; }
.status-PENDING { border-left:4px solid #f59e0b; }
.status-Sent { border-left:4px solid #3b82f6; }
.status-RTS { border-left:4px solid #ef4444; }
.status-LOGGED { border-left:4px solid #6b7280; }
.tag { font-size:10px; background:#1f2937; padding:2px 6px; border-radius:6px; margin-left:6px; }
.small { font-size:10px; opacity:0.7; }
</style>
</head>

<body class="pb-24">

<div class="bg-red-600 text-white text-[10px] font-bold text-center py-1">
VAULTPRO v4 • SELF-HEALING ACTIVE • DECISION ENGINE ONLINE
</div>

<div class="max-w-3xl mx-auto p-4">

<h1 class="text-3xl font-black mb-4">VAULT<span class="text-red-600">PRO</span> v4</h1>

<!-- DASHBOARD -->
<div class="grid grid-cols-5 gap-2 mb-4">
  <div class="card p-3 text-center"><div class="small">TOTAL</div><div id="t"></div></div>
  <div class="card p-3 text-center"><div class="small text-green-400">SUCCESS</div><div id="s"></div></div>
  <div class="card p-3 text-center"><div class="small text-amber-400">PENDING</div><div id="p"></div></div>
  <div class="card p-3 text-center"><div class="small text-blue-400">SENT</div><div id="se"></div></div>
  <div class="card p-3 text-center"><div class="small text-red-400">RTS</div><div id="r"></div></div>
</div>

<!-- INSIGHT -->
<div class="card p-3 mb-4 text-xs" id="insights"></div>

<div class="flex gap-2 mb-3">
<input id="search" oninput="render()" class="w-full bg-zinc-900 p-2 text-xs rounded border border-zinc-800" placeholder="Search...">

<select id="filter" onchange="render()" class="bg-zinc-900 text-xs p-2 rounded">
<option>ALL</option>
<option>SUCCESS</option>
<option>PENDING</option>
<option>Sent</option>
<option>RTS</option>
<option>LOGGED</option>
</select>

<button onclick="resetDB()" class="bg-red-600 text-xs px-2 rounded">RESET</button>
</div>

<div id="list" class="space-y-2"></div>

</div>

<script>

const DB_VERSION = "4.0";

/* =========================
FULL MASTER DATA
========================= */

const masterList = [
{ID:1,Name:"Jannik Sinner",Status:"SUCCESS",Category:"sport"},
{ID:2,Name:"Keanu Reeves",Status:"RTS",Category:"film"},
{ID:3,Name:"Alan Carr",Status:"SUCCESS",Category:"media"},
{ID:4,Name:"Harry Kane (Bayern)",Status:"RTS",Category:"sport"},
{ID:5,Name:"David Attenborough",Status:"SUCCESS",Category:"media"},
{ID:6,Name:"Paul Merson (Original)",Status:"SUCCESS",Category:"sport"},
{ID:7,Name:"Tony Adams",Status:"SUCCESS",Category:"sport"},
{ID:20,Name:"Mohamed Salah",Status:"SUCCESS",Category:"sport"},
{ID:32,Name:"Jude Bellingham",Status:"PENDING",Category:"sport"},
{ID:33,Name:"Kylian Mbappé",Status:"PENDING",Category:"sport"},
{ID:62,Name:"Ralph Fiennes",Status:"PENDING",Category:"theatre"},
{ID:63,Name:"Pierce Brosnan",Status:"PENDING",Category:"film"},
{ID:64,Name:"Jodie Comer",Status:"PENDING",Category:"theatre"},
{ID:110,Name:"Rosamund Pike",Status:"LOGGED",Category:"theatre"},
{ID:115,Name:"Stuart Pearce",Status:"LOGGED",Category:"sport"},
{ID:116,Name:"Ray Parlour",Status:"LOGGED",Category:"sport"}
];

/* =========================
SELF-HEALING CORE
========================= */

function migrate(data){
  if(!data || !data.version){
    return {
      version: DB_VERSION,
      records: Array.isArray(data) ? data : masterList,
      updated: new Date().toISOString()
    };
  }
  return data;
}

function loadDB(){
  let raw = localStorage.getItem("vault_v4");

  if(!raw){
    return { version: DB_VERSION, records: masterList };
  }

  let parsed = JSON.parse(raw);
  return migrate(parsed);
}

let db = loadDB();
let records = db.records;

/* CLEAN + FIX */
function sanitize(){
  records = records
    .filter(r => r && r.ID && r.Name && r.Status)
    .map(r => ({
      ...r,
      Category: r.Category || "unknown"
    }));
}

/* SAVE */
function save(){
  db.records = records;
  db.version = DB_VERSION;
  db.updated = new Date().toISOString();
  localStorage.setItem("vault_v4", JSON.stringify(db));
}

/* =========================
SCORING ENGINE
========================= */

function score(r){
  let base =
    r.Status==="SUCCESS"?100:
    r.Status==="RTS"?10:
    r.Status==="Sent"?50:
    r.Status==="PENDING"?40:20;

  if(r.Category==="sport") base += 15;
  if(r.Category==="theatre") base += 10;

  return base;
}

/* =========================
INSIGHTS + NEXT 20
========================= */

function renderInsights(){
  let success = records.filter(r=>r.Status==="SUCCESS").length;
  let total = records.length;
  let rate = ((success/total)*100).toFixed(1);

  let next20 = records
    .filter(r=>r.Status==="PENDING")
    .sort((a,b)=>score(b)-score(a))
    .slice(0,20);

  document.getElementById("insights").innerHTML = `
<b>Success rate:</b> ${rate}%<br><br>
<b>Recommended allocation:</b> 70% sport / 30% theatre<br>
<b>Monthly cap:</b> 15–20 stamps<br><br>

<b>Top next 20 sends:</b><br>
${next20.map(r=>"• "+r.Name).join("<br>")}
`;
}

/* =========================
RENDER
========================= */

function render(){

sanitize();

let q = document.getElementById("search").value.toLowerCase();
let f = document.getElementById("filter").value;

let list = document.getElementById("list");
list.innerHTML="";

let filtered = records.filter(r=>{
return r.Name.toLowerCase().includes(q) &&
(f==="ALL" || r.Status===f);
});

/* stats */
document.getElementById("t").innerText = records.length;
document.getElementById("s").innerText = records.filter(r=>r.Status==="SUCCESS").length;
document.getElementById("p").innerText = records.filter(r=>r.Status==="PENDING").length;
document.getElementById("se").innerText = records.filter(r=>r.Status==="Sent").length;
document.getElementById("r").innerText = records.filter(r=>r.Status==="RTS").length;

filtered.forEach(r=>{
let div=document.createElement("div");
div.className="card p-3 flex justify-between items-center status-"+r.Status;

div.innerHTML=`
<div class="text-xs font-bold w-2/3">${r.Name}</div>
<select onchange="update(${r.ID},this.value)" class="bg-black text-[10px]">
<option ${r.Status==="SUCCESS"?"selected":""}>SUCCESS</option>
<option ${r.Status==="PENDING"?"selected":""}>PENDING</option>
<option ${r.Status==="Sent"?"selected":""}>Sent</option>
<option ${r.Status==="RTS"?"selected":""}>RTS</option>
<option ${r.Status==="LOGGED"?"selected":""}>LOGGED</option>
</select>
`;

list.appendChild(div);
});

renderInsights();
}

/* UPDATE */
function update(id,val){
let r = records.find(x=>x.ID===id);
r.Status = val;
save();
render();
}

/* RESET */
function resetDB(){
localStorage.removeItem("vault_v4");
location.reload();
}

/* INIT */
render();

</script>

</body>
</html>
