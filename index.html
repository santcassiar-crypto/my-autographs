<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VaultPro v6 MASTER</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:#050505;
    color:#e5e7eb;
    font-family:Arial,sans-serif;
}

.card{
    background:#111113;
    border:1px solid #27272a;
    border-radius:14px;
}

.good{border-left:4px solid #22c55e;}
.mid{border-left:4px solid #f59e0b;}
.low{border-left:4px solid #ef4444;}

.small{
    font-size:11px;
    opacity:.7;
}

.stickyTop{
    position:sticky;
    top:0;
    z-index:100;
    backdrop-filter:blur(10px);
    background:rgba(5,5,5,.92);
}
</style>
</head>

<body class="min-h-screen pb-24">

<!-- TOP BAR -->
<div class="bg-red-600 text-white text-center text-[11px] py-2 font-bold tracking-wide">
VAULTPRO v6 MASTER • MOBILE SAFE • OFFLINE READY
</div>

<div class="max-w-6xl mx-auto p-3">

<!-- HEADER -->
<div class="stickyTop py-3 mb-3">

<div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">

<h1 class="text-3xl font-black">
VAULT<span class="text-red-600">PRO</span>
</h1>

<div class="flex gap-2 flex-wrap">

<button onclick="runAudit()" class="bg-blue-600 px-3 py-2 rounded text-xs font-bold">
AUDIT
</button>

<button onclick="resetMaster()" class="bg-green-600 px-3 py-2 rounded text-xs font-bold">
RESET
</button>

<button onclick="exportDB()" class="bg-zinc-700 px-3 py-2 rounded text-xs font-bold">
EXPORT
</button>

</div>
</div>

<div class="card p-3 mt-3">

<div class="flex flex-col md:flex-row gap-3 md:items-center md:justify-between">

<input
id="search"
oninput="render()"
placeholder="Search ALL records..."
class="w-full bg-zinc-900 border border-zinc-800 rounded p-3 text-sm text-white"
>

<div class="flex gap-2 items-center whitespace-nowrap">

<div class="text-sm">📮 Stamps:</div>

<div id="stampCount" class="font-black text-green-400">
20
</div>

<button onclick="useStamp()" class="bg-red-600 px-2 py-1 rounded text-xs">
USE
</button>

<button onclick="resetStamps()" class="bg-zinc-700 px-2 py-1 rounded text-xs">
RESET
</button>

</div>
</div>
</div>
</div>

<!-- STATS -->
<div id="stats" class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-4"></div>

<!-- AUDIT -->
<div id="audit" class="mb-4"></div>

<!-- RECORDS -->
<div id="list" class="space-y-2"></div>

</div>

<script>

/* =========================================================
FULL DATABASE
Replace this sample with your FULL JSON dataset
========================================================= */

const MASTER_DB = [

{"ID":1,"Name":"Jannik Sinner","Status":"SUCCESS"},
{"ID":2,"Name":"Keanu Reeves","Status":"RTS"},
{"ID":3,"Name":"Alan Carr","Status":"SUCCESS"},
{"ID":4,"Name":"Harry Kane (Bayern)","Status":"RTS"},
{"ID":5,"Name":"David Attenborough","Status":"SUCCESS"},
{"ID":6,"Name":"Paul Merson (Original)","Status":"SUCCESS"},
{"ID":7,"Name":"Tony Adams","Status":"SUCCESS"},
{"ID":8,"Name":"Joshua Kimmich","Status":"SUCCESS"},
{"ID":9,"Name":"Ron Ferdinand","Status":"SUCCESS"},
{"ID":10,"Name":"Erling Haaland (City)","Status":"SUCCESS"},
{"ID":11,"Name":"Lamine Yamal (Home)","Status":"RTS"},
{"ID":12,"Name":"Rosie Jones","Status":"SUCCESS"},
{"ID":13,"Name":"Kevin Bridges","Status":"SUCCESS"},
{"ID":14,"Name":"Lee Mack","Status":"SUCCESS"},
{"ID":15,"Name":"Chris Waddle","Status":"SUCCESS"},
{"ID":16,"Name":"Ivo Graham","Status":"SUCCESS"},
{"ID":17,"Name":"Josh Widdicombe","Status":"SUCCESS"},
{"ID":18,"Name":"Timothée Chalamet","Status":"Sent"},
{"ID":19,"Name":"Rob Beckett","Status":"SUCCESS"},
{"ID":20,"Name":"Mohamed Salah","Status":"SUCCESS"},
{"ID":21,"Name":"Tommy Fleetwood","Status":"SUCCESS"},
{"ID":22,"Name":"Lamine Yamal (Club)","Status":"SUCCESS"},
{"ID":23,"Name":"Gary Oldman","Status":"SUCCESS"},
{"ID":24,"Name":"Geoff Hurst","Status":"LOGGED"},
{"ID":25,"Name":"Scott Melvin- Stick to football podcast","Status":"PENDING"},
{"ID":26,"Name":"Jonathan ross tv show","Status":"PENDING"},
{"ID":27,"Name":"Matchroom - Brentwood","Status":"PENDING"},
{"ID":28,"Name":"Kevin Keegan- Home","Status":"SUCCESS"},
{"ID":29,"Name":"George Graham - Home","Status":"PENDING"},
{"ID":30,"Name":"LFC Gala Event","Status":"PENDING"},
{"ID":31,"Name":"Gosh4 Goals","Status":"PENDING"},
{"ID":32,"Name":"San Antonio Training Centre","Status":"PENDING"},
{"ID":33,"Name":"OKC training centre","Status":"PENDING"},
{"ID":34,"Name":"FC Barcelona - Training ground","Status":"PENDING"},
{"ID":35,"Name":"Arsenal womens team","Status":"PENDING"},
{"ID":36,"Name":"Park theatre x 2","Status":"PENDING"},
{"ID":37,"Name":"Jeremy Sochan","Status":"PENDING"},
{"ID":38,"Name":"Emma Stone","Status":"PENDING"},
{"ID":39,"Name":"Hugh Jackman","Status":"PENDING"},
{"ID":40,"Name":"Michael Sheen","Status":"SUCCESS"},
{"ID":41,"Name":"Line of Duty Cast","Status":"PENDING"},
{"ID":42,"Name":"England Women","Status":"PENDING"},
{"ID":43,"Name":"Tom Hiddleston","Status":"PENDING"},
{"ID":44,"Name":"Jodie Comer","Status":"PENDING"},
{"ID":45,"Name":"Ralph Fiennes","Status":"PENDING"},
{"ID":46,"Name":"Pierce Brosnan","Status":"PENDING"},
{"ID":47,"Name":"Mobland 2 (Cast)","Status":"PENDING"},
{"ID":48,"Name":"The Batman Part II (Cast)","Status":"PENDING"},
{"ID":49,"Name":"Wife and Dog (Cast)","Status":"PENDING"},
{"ID":50,"Name":"Highlander (Cast/Henry Cavill)","Status":"PENDING"}

];

/* =========================================================
LIVE DATABASE
========================================================= */

let DB = structuredClone(MASTER_DB);

/* =========================================================
STAMP SYSTEM
========================================================= */

let stamps = 20;

function useStamp(){
    if(stamps > 0){
        stamps--;
        updateStampUI();
        runAudit();
    }
}

function resetStamps(){
    stamps = 20;
    updateStampUI();
    runAudit();
}

function updateStampUI(){
    document.getElementById("stampCount").innerText = stamps;
}

/* =========================================================
SCORING ENGINE
========================================================= */

function score(r){

    let s = 50;

    if(r.Status === "SUCCESS") s += 30;
    if(r.Status === "PENDING") s += 10;
    if(r.Status === "RTS") s -= 30;
    if(r.Status === "Sent") s -= 5;
    if(r.Status === "LOGGED") s -= 2;

    let n = r.Name.toLowerCase();

    if(n.includes("theatre")) s += 15;
    if(n.includes("training")) s += 12;
    if(n.includes("cast")) s += 10;
    if(n.includes("home")) s += 8;
    if(n.includes("podcast")) s += 6;

    return s;
}

/* =========================================================
SMART RENDER
50 visible / ALL searchable
========================================================= */

function render(){

    let q = document.getElementById("search").value.toLowerCase();

    let filtered;

    // SEARCH MODE
    if(q.length > 0){

        filtered = DB.filter(r =>
            r.Name.toLowerCase().includes(q)
        );

    } else {

        // DEFAULT MODE = show top 50 only
        filtered = [...DB]
            .sort((a,b)=>score(b)-score(a))
            .slice(0,50);
    }

    filtered.sort((a,b)=>score(b)-score(a));

    let list = document.getElementById("list");

    list.innerHTML = "";

    filtered.forEach(r=>{

        let sc = score(r);

        let cls = "low";

        if(sc >= 80) cls = "good";
        else if(sc >= 55) cls = "mid";

        let div = document.createElement("div");

        div.className = `card p-3 ${cls}`;

        div.innerHTML = `

        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">

            <div>
                <div class="font-bold text-sm">${r.Name}</div>
                <div class="small">${r.Status} • Score ${sc}</div>
            </div>

            <select
            class="bg-black border border-zinc-700 rounded p-2 text-xs"
            onchange="updateStatus(${r.ID},this.value)">

                <option ${r.Status==='SUCCESS'?'selected':''}>SUCCESS</option>
                <option ${r.Status==='PENDING'?'selected':''}>PENDING</option>
                <option ${r.Status==='Sent'?'selected':''}>Sent</option>
                <option ${r.Status==='RTS'?'selected':''}>RTS</option>
                <option ${r.Status==='LOGGED'?'selected':''}>LOGGED</option>

            </select>

        </div>
        `;

        list.appendChild(div);

    });

    updateStats();
}

/* =========================================================
UPDATE STATUS
========================================================= */

function updateStatus(id,val){

    let target = DB.find(x=>x.ID===id);

    if(target){
        target.Status = val;
    }

    render();
}

/* =========================================================
STATS
========================================================= */

function updateStats(){

    document.getElementById("stats").innerHTML = `

    <div class="card p-3">
        <div class="small">TOTAL</div>
        <div class="text-2xl font-black">${DB.length}</div>
    </div>

    <div class="card p-3">
        <div class="small">SUCCESS</div>
        <div class="text-2xl font-black text-green-400">
            ${DB.filter(x=>x.Status==="SUCCESS").length}
        </div>
    </div>

    <div class="card p-3">
        <div class="small">PENDING</div>
        <div class="text-2xl font-black text-yellow-400">
            ${DB.filter(x=>x.Status==="PENDING").length}
        </div>
    </div>

    <div class="card p-3">
        <div class="small">RTS</div>
        <div class="text-2xl font-black text-red-400">
            ${DB.filter(x=>x.Status==="RTS").length}
        </div>
    </div>

    `;
}

/* =========================================================
AUDIT ENGINE
========================================================= */

function runAudit(){

    let top = DB
    .filter(x=>x.Status==="PENDING")
    .sort((a,b)=>score(b)-score(a))
    .slice(0,stamps);

    let html = `

    <div class="card p-3">

        <div class="font-bold mb-2">
            🧠 Optimised Monthly Sends
        </div>

    `;

    top.forEach(t=>{

        html += `
        <div class="text-sm mb-1">
            • ${t.Name}
            <span class="small">(Score ${score(t)})</span>
        </div>
        `;

    });

    html += `</div>`;

    document.getElementById("audit").innerHTML = html;
}

/* =========================================================
RESET
========================================================= */

function resetMaster(){

    DB = structuredClone(MASTER_DB);

    render();
    runAudit();
}

/* =========================================================
EXPORT
========================================================= */

function exportDB(){

    const blob = new Blob(
        [JSON.stringify(DB)],
        {type:'application/json'}
    );

    const a = document.createElement('a');

    a.href = URL.createObjectURL(blob);

    a.download = 'vaultpro_backup.json';

    a.click();
}

/* =========================================================
INIT
========================================================= */

render();
runAudit();
updateStampUI();

</script>

</body>
</html>
