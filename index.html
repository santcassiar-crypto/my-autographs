<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VaultPro v4 | Optimiser Engine</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#050505; color:#e5e7eb; font-family:sans-serif; }
.card { background:#111113; border:1px solid #27272a; border-radius:12px; }
.good { border-left:4px solid #22c55e; }
.mid { border-left:4px solid #f59e0b; }
.low { border-left:4px solid #ef4444; }
.small { font-size:10px; opacity:0.7; }
button { font-size:11px; }
select { background:#000; color:#fff; font-size:10px; }
</style>
</head>

<body class="pb-24">

<div class="bg-red-600 text-white text-[10px] font-bold text-center py-1">
VAULTPRO v4 • OPTIMISER ENGINE • STAMP ALLOCATION SYSTEM
</div>

<div class="max-w-6xl mx-auto p-4">

<h1 class="text-3xl font-black mb-3">VAULT<span class="text-red-600">PRO</span> v4</h1>

<!-- CONTROL PANEL -->
<div class="flex gap-2 mb-3">
<input id="search" oninput="render()" placeholder="Search vault..." class="w-full bg-zinc-900 p-2 text-xs rounded border border-zinc-800">

<button onclick="generatePlan()" class="bg-green-600 px-3 rounded">GENERATE SEND PLAN</button>
<button onclick="download()" class="bg-zinc-700 px-3 rounded">BACKUP</button>
</div>

<!-- STAMP BUDGET -->
<div class="card p-3 mb-3 text-xs">
📦 Monthly Stamp Budget: <b id="budget">20</b>  
Remaining: <b id="remaining">20</b>
<button onclick="useStamp()" class="ml-3 bg-red-600 px-2 rounded">- Use Stamp</button>
<button onclick="resetBudget()" class="ml-1 bg-green-600 px-2 rounded">Reset</button>
</div>

<!-- PLAN OUTPUT -->
<div id="plan" class="mb-4"></div>

<!-- LIST -->
<div id="list" class="space-y-2"></div>

</div>

<script>

/* =========================
FULL DATASET (YOUR RESTORE)
========================= */

let DB = [ /* (your full dataset is assumed inserted here unchanged) */ ];

/* =========================
STAMP SYSTEM
========================= */

let budget = 20;
let remaining = 20;

/* =========================
CATEGORY SCORING ENGINE
========================= */

function score(name, status){

let score = 50; // base

// SUCCESS reinforcement
if(status === "SUCCESS") score += 25;

// RTS penalty
if(status.includes("RTS")) score -= 25;

// Sent slight penalty (already attempted)
if(status === "Sent") score -= 10;

// LOGGED neutral
if(status === "LOGGED") score -= 5;

// CATEGORY BOOSTS
const n = name.toLowerCase();

if(n.includes("theatre") || n.includes("park") || n.includes("romeo") || n.includes("west end")) score += 20;
if(n.includes("training") || n.includes("fc") || n.includes("lakers") || n.includes("england")) score += 18;
if(n.includes("cast") || n.includes("series") || n.includes("batman") || n.includes("avengers")) score += 15;
if(n.includes("home")) score += 10;

// elite known boosters (your proven wins pattern)
if(n.includes("stephen fry") || n.includes("paul merson") || n.includes("tony adams")) score += 25;

return score;
}

/* =========================
PLAN GENERATOR
========================= */

function generatePlan(){

let ranked = [...DB].map(r => ({
...r,
Score: score(r.Name, r.Status)
}));

ranked.sort((a,b)=>b.Score-a.Score);

let top = ranked.filter(r => r.Status === "PENDING").slice(0, remaining);

let html = `<div class="card p-3 mb-3">
<div class="text-sm font-bold mb-2">🔥 RECOMMENDED SEND PLAN</div>
<div class="small">Based on category strength + RTS history + success reinforcement</div>
</div>`;

top.forEach(r=>{
html += `
<div class="card p-3 mb-2 good flex justify-between">
<div>
<div class="text-xs font-bold">${r.Name}</div>
<div class="small">Score: ${r.Score}</div>
</div>
<div class="text-xs text-green-400">PRIORITY</div>
</div>`;
});

document.getElementById("plan").innerHTML = html;
}

/* =========================
STAMP CONTROL
========================= */

function useStamp(){
if(remaining > 0) remaining--;
updateBudget();
}

function resetBudget(){
remaining = budget;
updateBudget();
}

function updateBudget(){
document.getElementById("remaining").innerText = remaining;
document.getElementById("budget").innerText = budget;
}

/* =========================
BACKUP
========================= */

function download(){
const blob = new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="vault_v4_backup.json";
a.click();
}

/* =========================
RENDER LIST
========================= */

function render(){

const q=document.getElementById("search").value?.toLowerCase()||"";
const list=document.getElementById("list");
list.innerHTML="";

DB.filter(r=>r.Name.toLowerCase().includes(q))
.sort((a,b)=>score(b.Name,b.Status)-score(a.Name,a.Status))
.forEach(r=>{

const sc = score(r.Name,r.Status);
let cls = sc > 80 ? "good" : sc > 55 ? "mid" : "low";

const div=document.createElement("div");
div.className=`card p-3 flex justify-between items-center ${cls}`;

div.innerHTML=`
<div>
<div class="text-xs font-bold">${r.Name}</div>
<div class="small">Score: ${sc} • ${r.Status}</div>
</div>

<select onchange="r.Status=this.value;render()">
<option ${r.Status==="SUCCESS"?"selected":""}>SUCCESS</option>
<option ${r.Status==="PENDING"?"selected":""}>PENDING</option>
<option ${r.Status==="Sent"?"selected":""}>Sent</option>
<option ${r.Status==="RTS"?"selected":""}>RTS</option>
<option ${r.Status==="LOGGED"?"selected":""}>LOGGED</option>
</select>
`;

list.appendChild(div);
});

}

updateBudget();
render();

</script>

</body>
</html>
