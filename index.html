<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TTM OS – Autonomous Scheduler</title>

<style>
body{
  font-family:Arial;
  background:#0b0b0b;
  color:#fff;
  margin:0;
}

header{
  background:#111;
  padding:12px;
  position:sticky;
  top:0;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:#111;
  border:1px solid #222;
  border-radius:10px;
  padding:12px;
  margin:10px;
}

input,textarea,button,select{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid #333;
  background:#181818;
  color:#fff;
}

.record{
  padding:6px;
  border-bottom:1px solid #222;
}

.small{font-size:12px;color:#aaa}

.badge{
  padding:2px 6px;
  background:#222;
  border-radius:6px;
  font-size:11px;
}
</style>
</head>

<body>

<header>
<h2>TTM OS – Autonomous Scheduler</h2>
<input id="search" placeholder="Search targets...">
</header>

<div class="grid" id="stats"></div>

<div class="card">
<h3>➕ Add Targets</h3>
<textarea id="bulk" placeholder="One target per line"></textarea>
<button onclick="add()">Add</button>
</div>

<div class="card">
<h3>📌 Update Status</h3>
<input id="u_name" placeholder="Target name">
<select id="u_status">
<option>PENDING</option>
<option>SENT</option>
<option>SUCCESS</option>
<option>RTS</option>
<option>LOGGED</option>
</select>
<button onclick="update()">Update</button>
</div>

<div class="card">
<h3>⚡ TODAY’S AUTONOMOUS SEND LIST</h3>
<div id="today"></div>
</div>

<div class="card">
<h3>🧠 SYSTEM STATES</h3>
<div id="states"></div>
</div>

<div class="card">
<h3>📋 ALL RECORDS</h3>
<div id="list"></div>
</div>

<script>

/* =========================
   CORE DB
========================= */

const KEY = "ttm_autonomous_v1";
let DB = load();

function load(){
  try{
    const raw = JSON.parse(localStorage.getItem(KEY)||"{}");
    return raw.records ? raw : {records:[]};
  }catch{
    return {records:[]};
  }
}

function save(){
  localStorage.setItem(KEY, JSON.stringify(DB));
}

/* =========================
   NORMALISE STATUS
========================= */

function norm(s){
  if(!s) return "PENDING";
  s = String(s).trim().toUpperCase();

  if(s.includes("PEND")) return "PENDING";
  if(s.includes("SUCCESS")) return "SUCCESS";
  if(s.includes("RTS") || s.includes("FAIL")) return "RTS";
  if(s.includes("LOG")) return "LOGGED";
  if(s.includes("SENT")) return "SENT";

  return "PENDING";
}

/* =========================
   CORE ACTIONS
========================= */

function add(){
  const lines = document.getElementById("bulk").value
    .split("\n").map(x=>x.trim()).filter(Boolean);

  lines.forEach(n=>{
    DB.records.push({
      id: Date.now()+Math.random(),
      name:n,
      status:"PENDING",
      history:[],
      created:Date.now()
    });
  });

  document.getElementById("bulk").value="";
  cycle();
}

function update(){
  const name = document.getElementById("u_name").value.toLowerCase();
  const status = norm(document.getElementById("u_status").value);

  DB.records.forEach(r=>{
    if(r.name.toLowerCase() === name){
      r.status = status;
    }
  });

  cycle();
}

/* =========================
   SCORING ENGINE
========================= */

function score(r){
  let s = 50;

  if(r.status === "SUCCESS") s += 40;
  if(r.status === "RTS") s -= 30;
  if(r.status === "SENT") s += 10;

  const n = r.name.toLowerCase();
  if(n.includes("event")) s += 5;
  if(n.includes("training")) s -= 5;

  return Math.max(0,Math.min(100,s));
}

/* =========================
   AUTONOMOUS SCHEDULER CORE
========================= */

function todayList(){
  return DB.records
    .filter(r => r.status === "PENDING")
    .sort((a,b)=>score(b)-score(a))
    .slice(0,12);
}

/* =========================
   STATE BREAKDOWN
========================= */

function states(){
  return {
    pending: DB.records.filter(r=>r.status==="PENDING").length,
    sent: DB.records.filter(r=>r.status==="SENT").length,
    success: DB.records.filter(r=>r.status==="SUCCESS").length,
    rts: DB.records.filter(r=>r.status==="RTS").length,
    logged: DB.records.filter(r=>r.status==="LOGGED").length
  };
}

/* =========================
   RENDER ENGINE
========================= */

function render(){

  const s = states();

  document.getElementById("stats").innerHTML = `
    <div class="card"><h2>${DB.records.length}</h2>Total</div>
    <div class="card"><h2>${s.pending}</h2>Pending</div>
    <div class="card"><h2>${s.sent}</h2>Sent</div>
    <div class="card"><h2>${s.success}</h2>Success</div>
    <div class="card"><h2>${s.rts}</h2>RTS</div>
  `;

  /* ⚡ AUTONOMOUS OUTPUT */
  document.getElementById("today").innerHTML =
    todayList().map(r=>`
      ⚡ ${r.name}
      <span class="badge">${score(r)}%</span>
    `).join("<br>");

  document.getElementById("states").innerHTML = `
    READY (PENDING): ${s.pending}<br>
    IN PROGRESS (SENT): ${s.sent}<br>
    COMPLETED (SUCCESS): ${s.success}<br>
    FAILED / RETRY (RTS): ${s.rts}
  `;

  const q = (document.getElementById("search").value||"").toLowerCase();

  document.getElementById("list").innerHTML =
    DB.records
      .filter(r=>r.name.toLowerCase().includes(q))
      .map(r=>`
        <div class="record">
          <b>${r.name}</b><br>
          <span class="small">${r.status}</span>
        </div>
      `).join("");

  save();
}

/* =========================
   CYCLE
========================= */

function cycle(){
  save();
  render();
}

/* INIT */
document.getElementById("search").addEventListener("input",render);
render();

</script>

</body>
</html>
