<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TTM OS PRO+ (Fixed Import)</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#0b0b0b;
  color:#fff;
  margin:0;
}

header{
  background:#111;
  padding:12px;
  position:sticky;
  top:0;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:#111;
  border:1px solid #222;
  border-radius:10px;
  padding:12px;
  margin:10px;
}

input,textarea,button,select{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid #333;
  background:#181818;
  color:#fff;
}

button{cursor:pointer}

.record{
  padding:8px;
  border-bottom:1px solid #222;
}

.small{font-size:12px;color:#aaa}

.badge{
  padding:2px 6px;
  background:#222;
  border-radius:6px;
  font-size:11px;
}
</style>
</head>

<body>

<header>
<h2>TTM OS PRO+ (Stable Fixed Version)</h2>
<input id="search" placeholder="Search targets...">
</header>

<div class="grid" id="stats"></div>

<div class="card">
<h3>➕ Add Targets</h3>
<textarea id="bulk" placeholder="One target per line"></textarea>
<button onclick="addTargets()">Add</button>
</div>

<div class="card">
<h3>📌 Update Status</h3>
<input id="u_name" placeholder="Target name">
<select id="u_status">
<option>PENDING</option>
<option>SENT</option>
<option>SUCCESS</option>
<option>RTS</option>
<option>LOGGED</option>
</select>
<button onclick="updateStatus()">Update</button>
</div>

<div class="card">
<h3>💾 JSON Backup</h3>
<input type="file" id="file">
<button onclick="importJSON()">Import JSON</button>
<button onclick="exportJSON()">Export JSON</button>
<div id="backup" class="small"></div>
</div>

<div class="card">
<h3>🎯 Queue</h3>
<div id="queue"></div>
</div>

<div class="card">
<h3>📋 All Records</h3>
<div id="list"></div>
</div>

<script>

const KEY = "ttm_os_fixed_v1";

let DB = load();

/* =========================
   SAFE LOAD (FIXED)
========================= */
function load(){
  try{
    const raw = JSON.parse(localStorage.getItem(KEY)||"{}");

    if(Array.isArray(raw)){
      return {records: raw};
    }

    if(raw && Array.isArray(raw.records)){
      return raw;
    }

    return {records:[]};

  }catch(e){
    return {records:[]};
  }
}

function save(){
  localStorage.setItem(KEY, JSON.stringify(DB));
}

/* =========================
   NORMALISE STATUS
========================= */
function norm(s){
  if(!s) return "PENDING";
  s = String(s).trim().toUpperCase();

  if(s.includes("PEND")) return "PENDING";
  if(s.includes("SUCCESS")) return "SUCCESS";
  if(s.includes("RTS") || s.includes("FAIL")) return "RTS";
  if(s.includes("LOG")) return "LOGGED";
  if(s.includes("SENT")) return "SENT";

  return "PENDING";
}

/* =========================
   ADD
========================= */
function addTargets(){
  const lines = document.getElementById("bulk").value
    .split("\n").map(x=>x.trim()).filter(Boolean);

  lines.forEach(n=>{
    DB.records.push({
      id: Date.now()+Math.random(),
      name:n,
      status:"PENDING",
      history:[]
    });
  });

  document.getElementById("bulk").value="";
  save();
  render();
}

/* =========================
   UPDATE
========================= */
function updateStatus(){
  const name = document.getElementById("u_name").value.toLowerCase();
  const status = norm(document.getElementById("u_status").value);

  DB.records.forEach(r=>{
    if(r.name.toLowerCase() === name){
      r.status = status;
    }
  });

  save();
  render();
}

/* =========================
   SCORE
========================= */
function score(r){
  let s = 50;

  if(r.status === "SUCCESS") s += 30;
  if(r.status === "SENT") s += 10;
  if(r.status === "RTS") s -= 25;

  return Math.max(0,Math.min(100,s));
}

/* =========================
   IMPORT (FIXED + SAFE)
========================= */
function importJSON(){
  const file = document.getElementById("file").files[0];
  if(!file){
    alert("Select file");
    return;
  }

  const reader = new FileReader();

  reader.onload = e=>{
    try{
      const raw = JSON.parse(e.target.result);

      let records = [];

      if(Array.isArray(raw)){
        records = raw;
      } else if(raw && Array.isArray(raw.records)){
        records = raw.records;
      } else {
        throw new Error("Bad format");
      }

      DB.records = records
        .filter(r => r && (r.Name || r.name))
        .map(r => ({
          id: r.ID || r.id || Date.now()+Math.random(),
          name: String(r.Name || r.name).trim(),
          status: norm(r.Status || r.status),
          history: Array.isArray(r.history) ? r.history : []
        }));

      save();
      render();

      document.getElementById("backup").innerText =
        "Imported " + DB.records.length + " records";

    }catch(err){
      alert("Import failed");
      console.error(err);
    }
  };

  reader.readAsText(file);
}

/* =========================
   EXPORT
========================= */
function exportJSON(){
  const blob = new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="ttm_backup.json";
  a.click();
}

/* =========================
   QUEUE
========================= */
function queue(){
  return DB.records
    .filter(r=>r.status==="PENDING")
    .sort((a,b)=>score(b)-score(a))
    .slice(0,10);
}

/* =========================
   RENDER
========================= */
function render(){

  const total = DB.records.length;
  const pending = DB.records.filter(r=>r.status==="PENDING").length;
  const success = DB.records.filter(r=>r.status==="SUCCESS").length;

  document.getElementById("stats").innerHTML = `
    <div class="card"><h2>${total}</h2>Total</div>
    <div class="card"><h2>${pending}</h2>Pending</div>
    <div class="card"><h2>${success}</h2>Success</div>
  `;

  document.getElementById("queue").innerHTML =
    queue().map(r=>`
      🎯 ${r.name} <span class="badge">${score(r)}%</span>
    `).join("<br>");

  const q = (document.getElementById("search").value||"").toLowerCase();

  document.getElementById("list").innerHTML =
    DB.records
      .filter(r=>r.name.toLowerCase().includes(q))
      .map(r=>`
        <div class="record">
          <b>${r.name}</b><br>
          <span class="small">${r.status}</span>
        </div>
      `).join("");

  save();
}

/* INIT */
document.getElementById("search").addEventListener("input",render);
render();

</script>

</body>
</html>
