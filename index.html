





<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VaultOS ELITE PRO</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: #fff;
    margin: 0;
    padding: 20px;
}

header {
    position: sticky;
    top: 0;
    background: #111;
    padding: 15px;
    border-bottom: 1px solid #222;
}

h1 {
    margin: 0;
    color: #00ffcc;
}

.container {
    max-width: 1100px;
    margin: auto;
}

.card {
    background: #111;
    border: 1px solid #222;
    border-radius: 8px;
    padding: 15px;
    margin-top: 15px;
}

button {
    background: #00ffcc;
    border: none;
    padding: 10px 12px;
    margin: 5px 5px 5px 0;
    cursor: pointer;
    border-radius: 5px;
    font-weight: bold;
}

button:hover { background: #00ddb3; }

button.danger { background: #ff4d4d; color: white; }

input, textarea {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    background: #000;
    color: #fff;
    border: 1px solid #333;
    border-radius: 5px;
}

pre {
    background: #000;
    padding: 10px;
    border: 1px solid #222;
    overflow: auto;
    max-height: 300px;
}

.record {
    border: 1px solid #222;
    padding: 10px;
    margin-top: 10px;
    background: #0f0f0f;
    border-radius: 6px;
}
</style>
</head>

<body>

<header>
    <h1>VaultOS ELITE PRO SYSTEM</h1>
</header>

<div class="container">

<!-- CONTROL PANEL -->
<div class="card">
    <h3>Controls</h3>

    <button onclick="addRecordPrompt()">Add Record</button>
    <button onclick="exportVault()">Export JSON</button>
    <button onclick="document.getElementById('importFile').click()">Import JSON</button>
    <button class="danger" onclick="resetVault()">Reset Vault</button>

    <input type="file" id="importFile" accept="application/json">
</div>

<!-- RECORDS -->
<div class="card">
    <h3>Vault Records</h3>
    <div id="records"></div>
</div>

<!-- RAW DATA -->
<div class="card">
    <h3>Raw Data</h3>
    <pre id="raw"></pre>
</div>

</div>

<script>
// =========================
// CORE VAULT ENGINE
// =========================
function getVault() {
    return JSON.parse(localStorage.getItem("vaultos") || "{}");
}

function saveVault(data) {
    localStorage.setItem("vaultos", JSON.stringify(data));
    render();
}

// =========================
// INIT
// =========================
if (!localStorage.getItem("vaultos")) {
    saveVault({
        version: "ELITE-PRO-V1",
        created: new Date().toISOString(),
        records: [
            { id: 1, title: "System Boot", content: "Vault initialized", time: new Date().toISOString() }
        ]
    });
}

// =========================
// ADD RECORD
// =========================
function addRecordPrompt() {
    const title = prompt("Record title:");
    if (!title) return;

    const content = prompt("Record content:");
    if (!content) return;

    const vault = getVault();

    const newRecord = {
        id: Date.now(),
        title,
        content,
        time: new Date().toISOString()
    };

    vault.records.push(newRecord);
    saveVault(vault);
}

// =========================
// DELETE RECORD
// =========================
function deleteRecord(id) {
    const vault = getVault();
    vault.records = vault.records.filter(r => r.id !== id);
    saveVault(vault);
}

// =========================
// EXPORT
// =========================
function exportVault() {
    const data = localStorage.getItem("vaultos") || "{}";

    const blob = new Blob([data], { type: "application/json" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "VaultOS-elite-backup.json";
    a.click();

    URL.revokeObjectURL(url);
}

// =========================
// IMPORT
// =========================
document.getElementById("importFile").addEventListener("change", function (e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function (event) {
        try {
            const data = JSON.parse(event.target.result);

            if (!data || typeof data !== "object") {
                alert("Invalid file");
                return;
            }

            saveVault(data);
            alert("Vault imported successfully");

        } catch (err) {
            alert("Import failed");
        }
    };

    reader.readAsText(file);
    e.target.value = "";
});

// =========================
// RESET
// =========================
function resetVault() {
    if (!confirm("Reset VaultOS completely?")) return;

    localStorage.removeItem("vaultos");
    location.reload();
}

// =========================
// RENDER UI
// =========================
function render() {
    const vault = getVault();

    // raw view
    document.getElementById("raw").textContent =
        JSON.stringify(vault, null, 2);

    // records view
    const container = document.getElementById("records");
    container.innerHTML = "";

    if (!vault.records) return;

    vault.records.forEach(r => {
        const div = document.createElement("div");
        div.className = "record";

        div.innerHTML = `
            <strong>${r.title}</strong><br>
            <small>${r.time}</small>
            <p>${r.content}</p>
            <button onclick="deleteRecord(${r.id})">Delete</button>
        `;

        container.appendChild(div);
    });
}

render();

</script>

</body>
</html>
