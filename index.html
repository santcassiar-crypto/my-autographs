<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registry Pro | Billericay Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #e4e4e7; font-family: 'Inter', sans-serif; }
        .bento-card { background: #111113; border: 1px solid #27272a; border-radius: 16px; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .ticker-text { display: inline-block; white-space: nowrap; animation: ticker 25s linear infinite; }
        .status-success { color: #22c55e; border-bottom: 2px solid #22c55e; }
        .status-sent { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
        .status-rts { color: #ef4444; border-bottom: 2px solid #ef4444; }
        .status-pending { color: #a1a1aa; border-bottom: 2px solid #a1a1aa; }
    </style>
</head>
<body class="pb-24">

    <div class="w-full bg-red-600 py-1.5 overflow-hidden sticky top-0 z-[60] border-b border-red-500">
        <div class="ticker-text font-black italic uppercase text-[10px] text-white tracking-widest">
            🚨 INTEL: SIR IAN MCKELLEN 'LEAR' ANNOUNCEMENT • HENRY CAVILL FILMING @ SKYE TODAY • DIRK NOWITZKI RETURNS TRACKED IN ESSEX •
        </div>
    </div>

    <div class="max-w-md mx-auto p-4">
        <header class="mb-6 space-y-4 pt-2 text-center">
            <h1 class="text-3xl font-black tracking-tighter text-white uppercase italic">Registry<span class="text-red-600">Pro</span></h1>
            <div class="grid grid-cols-4 gap-2">
                <div class="bento-card p-2"><span id="win-count" class="text-lg font-black text-green-500">0</span><div class="text-[7px] text-zinc-500 uppercase">Wins</div></div>
                <div class="bento-card p-2"><span id="sent-count" class="text-lg font-black text-blue-500">0</span><div class="text-[7px] text-zinc-500 uppercase">Sent</div></div>
                <div class="bento-card p-2"><span id="pending-count" class="text-lg font-black text-zinc-400">0</span><div class="text-[7px] text-zinc-500 uppercase">Pend</div></div>
                <div class="bento-card p-2"><span id="rts-count" class="text-lg font-black text-red-600">0</span><div class="text-[7px] text-zinc-500 uppercase">RTS</div></div>
            </div>
        </header>

        <div class="bento-card p-4 mb-6 border-blue-900/40 bg-blue-950/10 shadow-lg">
            <h2 class="text-[10px] font-black uppercase text-blue-500 mb-2">Vault Recovery</h2>
            <textarea id="raw-import" placeholder="Paste your 182 names or old backup here..." class="w-full bg-black border border-zinc-800 rounded-lg p-2 text-[10px] h-24 text-blue-300 outline-none"></textarea>
            <button onclick="smartRepair()" class="w-full mt-2 bg-blue-600 text-white py-3 rounded-lg text-[10px] font-bold uppercase tracking-widest active:scale-95 transition-transform">
                Smart Repair & Load 182 Records
            </button>
        </div>

        <div class="sticky top-12 z-50 mb-6">
            <input type="text" id="search" placeholder="Search Vault..." onkeyup="render()" class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-2xl text-sm shadow-2xl outline-none focus:border-red-600">
        </div>

        <div id="list" class="space-y-3"></div>
    </div>

    <script>
        let records = JSON.parse(localStorage.getItem('autograph_db_v3')) || [];

        function smartRepair() {
            const input = document.getElementById('raw-import').value.trim();
            if(!input) return alert("Paste something first!");

            try {
                // Try direct JSON load first
                let data = JSON.parse(input);
                records = Array.isArray(data) ? data : [data];
            } catch (e) {
                // If JSON fails, try to turn each line of text into a record
                const lines = input.split(/\n/);
                records = lines.map((line, index) => ({
                    ID: Date.now() + index,
                    Name: line.trim(),
                    Status: "PENDING",
                    Category: "RECOVERY",
                    Date: new Date().toLocaleDateString('en-GB')
                })).filter(r => r.Name.length > 1);
            }
            
            saveAndRender();
            alert("Vault Processed: " + records.length + " items found.");
        }

        function toggleStatus(id) {
            const states = ["PENDING", "SENT", "SUCCESS", "RTS"];
            const idx = records.findIndex(r => r.ID == id);
            records[idx].Status = states[(states.indexOf(records[idx].Status) + 1) % states.length];
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('autograph_db_v3', JSON.stringify(records));
            render();
        }

        function render() {
            const q = document.getElementById('search').value.toLowerCase();
            const list = document.getElementById('list');
            list.innerHTML = '';
            let stats = {SUCCESS:0, SENT:0, PENDING:0, RTS:0};

            records.forEach(r => {
                if(stats[r.Status] !== undefined) stats[r.Status]++;
                if(!r.Name.toLowerCase().includes(q)) return;

                const div = document.createElement('div');
                div.className = "bento-card p-4 flex justify-between items-center";
                div.innerHTML = `
                    <div>
                        <h3 class="font-black text-white italic text-sm uppercase">${r.Name}</h3>
                        <span class="text-[8px] text-zinc-600 font-bold">${r.Category} • ${r.Date}</span>
                    </div>
                    <button onclick="toggleStatus(${r.ID})" class="status-${r.Status.toLowerCase()} text-[10px] font-black w-20 py-2 bg-black rounded border border-zinc-800">${r.Status}</button>
                `;
                list.appendChild(div);
            });

            document.getElementById('win-count').innerText = stats.SUCCESS;
            document.getElementById('sent-count').innerText = stats.SENT;
            document.getElementById('pending-count').innerText = stats.PENDING;
            document.getElementById('rts-count').innerText = stats.RTS;
        }
        render();
    </script>
</body>
</html>
