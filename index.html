



<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VaultOS Mail Engine v2</title>

<style>
body{margin:0;font-family:Arial;background:#0b0f14;color:#fff}
header{background:#111827;padding:12px;position:sticky;top:0}
.wrap{padding:12px}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.card{background:#111827;padding:10px;border-radius:8px}

input,select,button,textarea{
padding:8px;border-radius:6px;border:1px solid #333;background:#111;color:#fff
}
button{cursor:pointer}

table{width:100%;border-collapse:collapse;margin-top:10px}
td,th{border:1px solid #222;padding:6px}

.log{max-height:160px;overflow:auto;background:#111827;padding:8px;margin-top:10px}

.engine{margin-top:10px;display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}

.small{font-size:12px;color:#aaa}
</style>
</head>

<body>
<header><h2>VaultOS Mail Engine v2</h2></header>

<div class="wrap">

<!-- STATS -->
<div class="cards" id="stats"></div>

<!-- ENGINE -->
<h3>Weekly Engine Output</h3>
<div class="engine" id="engine"></div>

<!-- INPUTS -->
<p>
<input id="search" placeholder="Search..." oninput="render()">
</p>

<h3>Add Record</h3>
<input id="name" placeholder="Name">

<select id="status">
<option>PENDING</option>
<option>SENT</option>
<option>SUCCESS</option>
<option>RTS</option>
<option>FAILURE</option>
</select>

<select id="tag">
<option>🟢 CONFIRMED</option>
<option>🟡 POSSIBLE</option>
<option>🔴 UNVERIFIED</option>
</select>

<input id="category" placeholder="Category (Theatre / Sport / Film)">

<button onclick="addRecord()">Add</button>

<h3>Bulk Add</h3>
<textarea id="bulk" rows="4" placeholder="One name per line"></textarea>
<button onclick="bulkAdd()">Bulk Add</button>

<!-- TABLE -->
<h3>Records</h3>
<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Status</th>
<th>Tag</th>
<th>Category</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<!-- LOG -->
<h3>Activity Log</h3>
<div class="log" id="log"></div>

</div>

<script>
let data = JSON.parse(localStorage.getItem('vaultos_v2') || '[]');

/* ---------------- SAVE ---------------- */
function save(){
 localStorage.setItem('vaultos_v2', JSON.stringify(data));
 render();
}

/* ---------------- LOG ---------------- */
function log(t){
 let logs = JSON.parse(localStorage.getItem('vaultos_logs_v2') || '[]');
 logs.unshift(new Date().toLocaleString()+" - "+t);
 localStorage.setItem('vaultos_logs_v2', JSON.stringify(logs.slice(0,200)));
 renderLogs();
}

function renderLogs(){
 let logs = JSON.parse(localStorage.getItem('vaultos_logs_v2') || '[]');
 document.getElementById('log').innerHTML = logs.join('<br>');
}

/* ---------------- PRIORITY SCORE ---------------- */
function score(r){
 let s = 0;
 if(r.Tag === "🟢 CONFIRMED") s += 4;
 if(r.Tag === "🟡 POSSIBLE") s += 2;
 if(r.Category === "Theatre") s += 3;
 if(r.Category === "Sport") s += 2;
 if(r.Status !== "FAILURE") s += 1;
 return s;
}

/* ---------------- RELEASE RADAR ---------------- */
function releaseRadar(r){
 if(!r.ReleaseDate) return r;

 let now = new Date();
 let rd = new Date(r.ReleaseDate);

 if(rd <= now && r.Tag !== "🔴 UNVERIFIED"){
  r.Active = true;
  r.Status = "READY";
 } else {
  r.Active = false;
 }

 return r;
}

/* ---------------- WEEKLY ENGINE ---------------- */
function engine(){
 let send=[],hold=[],remove=[];

 data.forEach(r=>{

  if(r.Tag === "🔴 UNVERIFIED"){
    remove.push(r);
    return;
  }

  if(r.Tag === "🟡 POSSIBLE" && !r.Active){
    hold.push(r);
    return;
  }

  if(r.Tag === "🟢 CONFIRMED" && r.Active){
    if(r.Status !== "SUCCESS"){
      send.push(r);
    }
  }

 });

 send.sort((a,b)=>score(b)-score(a));

 return {send,hold,remove};
}

/* ---------------- RENDER ---------------- */
function render(){

 data = data.map(releaseRadar);

 let q = (document.getElementById('search').value||'').toLowerCase();

 let tb = document.getElementById('tbody');
 tb.innerHTML='';

 let filtered = data.filter(r =>
 (r.Name||'').toLowerCase().includes(q) ||
 (r.Status||'').toLowerCase().includes(q) ||
 (r.Tag||'').toLowerCase().includes(q)
 );

 filtered.forEach(r=>{
  let tr=document.createElement('tr');
  tr.innerHTML=`
  <td>${r.ID}</td>
  <td contenteditable onblur="edit(${r.ID},'Name',this.innerText)">${r.Name}</td>
  <td contenteditable onblur="edit(${r.ID},'Status',this.innerText)">${r.Status}</td>
  <td contenteditable onblur="edit(${r.ID},'Tag',this.innerText)">${r.Tag}</td>
  <td contenteditable onblur="edit(${r.ID},'Category',this.innerText)">${r.Category||''}</td>
  <td><button onclick="del(${r.ID})">Delete</button></td>`;
  tb.appendChild(tr);
 });

 let c = {TOTAL:data.length,SUCCESS:0,PENDING:0,RTS:0,FAILURE:0};
 data.forEach(r=>{if(c[r.Status]!=null)c[r.Status]++;});

 document.getElementById('stats').innerHTML =
 Object.entries(c).map(([k,v])=>
 `<div class="card"><b>${k}</b><br>${v}</div>`
 ).join('');

 renderEngine();
}

/* ---------------- ENGINE UI ---------------- */
function renderEngine(){
 let e = engine();

 document.getElementById('engine').innerHTML = `
 <div class="card">🟢 SEND<br><b>${e.send.length}</b></div>
 <div class="card">🟡 HOLD<br><b>${e.hold.length}</b></div>
 <div class="card">🔴 REMOVE<br><b>${e.remove.length}</b></div>
 `;
}

/* ---------------- CRUD ---------------- */
function addRecord(){
 let n=document.getElementById('name').value.trim();
 if(!n) return;

 data.unshift({
  ID: Date.now(),
  Name: n,
  Status: document.getElementById('status').value,
  Tag: document.getElementById('tag').value,
  Category: document.getElementById('category').value
 });

 log("Added "+n);
 save();
}

function bulkAdd(){
 document.getElementById('bulk').value
 .split('\n')
 .map(x=>x.trim())
 .filter(Boolean)
 .forEach(n=>{
  data.unshift({
   ID: Date.now()+Math.random(),
   Name:n,
   Status:"PENDING",
   Tag:"🟡 POSSIBLE",
   Category:"Theatre"
  });
 });

 log("Bulk add completed");
 save();
}

function edit(id,key,val){
 let r=data.find(x=>x.ID==id);
 if(r){r[key]=val; save();}
}

function del(id){
 data=data.filter(x=>x.ID!=id);
 log("Deleted "+id);
 save();
}

/* ---------------- INIT ---------------- */
render();
renderLogs();
</script>

</body>
</html>
