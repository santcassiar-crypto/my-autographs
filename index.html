
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VaultOS Stable Core + Recovery</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#0b0b0b;
  color:#fff;
  margin:0;
}

header{
  background:#111;
  padding:12px;
  position:sticky;
  top:0;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:#111;
  border:1px solid #222;
  border-radius:10px;
  padding:12px;
  margin:10px;
}

input,textarea,button{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid #333;
  background:#181818;
  color:#fff;
}

button{cursor:pointer}

.record{
  padding:8px;
  border-bottom:1px solid #222;
}

.small{font-size:12px;color:#aaa}

.badge{
  padding:2px 6px;
  background:#222;
  border-radius:6px;
  font-size:11px;
  margin-left:6px;
}
</style>
</head>

<body>

<header>
<h2>VaultOS Stable Core + Recovery</h2>
<input id="search" placeholder="Search records...">
</header>

<div class="grid" id="stats"></div>

<!-- BULK ADD -->
<div class="card">
<h3>Bulk Add</h3>
<textarea id="bulkNames" placeholder="One name per line..."></textarea>
<button onclick="bulkAdd()">Add All</button>
<div id="bulkResult" class="small"></div>
</div>

<!-- INTELLIGENCE -->
<div class="card">
<h3>Intelligence</h3>
<div id="intel"></div>
</div>

<!-- RECOVERY TOOL -->
<div class="card">
<h3>📂 Recovery Console (JSON Import)</h3>
<input type="file" id="jsonFile">
<button onclick="importFile()">Load JSON Backup</button>
<div id="recoverStatus" class="small"></div>
</div>

<!-- RECORDS -->
<div class="card">
<h3>Records</h3>
<div id="list"></div>
</div>

<script>

/* =========================
   🧱 SINGLE SOURCE OF TRUTH
========================= */

const KEY = "vaultos_core_db";

let DB = loadDB();

/* =========================
   LOAD + AUTO MIGRATION
========================= */

function loadDB(){

  const core = JSON.parse(localStorage.getItem(KEY) || "null");

  if(core && core.records){
    return core;
  }

  // legacy scan
  const legacyKeys = [
    "vaultos_v7_intel",
    "vaultos_v8_ai",
    "vaultos_v9_predict",
    "vaultos_v10_auto"
  ];

  let merged = [];

  legacyKeys.forEach(k=>{
    try{
      const data = JSON.parse(localStorage.getItem(k) || "[]");
      if(Array.isArray(data)) merged = merged.concat(data);
    }catch(e){}
  });

  const migrated = merged.map(r => ({
    id: r.id || r.ID || Date.now()+Math.random(),
    name: r.name || r.Name || "",
    status: r.status || r.Status || "PENDING",
    created: r.created || Date.now(),
    history: r.history || r.History || []
  }));

  return {
    records: migrated,
    meta: {
      version: "stable-recovery-core",
      created: Date.now(),
      lastUpdated: Date.now()
    }
  };
}

/* =========================
   SAVE
========================= */

function saveDB(){
  DB.meta.lastUpdated = Date.now();
  localStorage.setItem(KEY, JSON.stringify(DB));
}

/* =========================
   BULK ADD
========================= */

function bulkAdd(){

  const text = document.getElementById('bulkNames').value.trim();
  if(!text) return alert("No input");

  const lines = text.split("\n").map(x=>x.trim()).filter(Boolean);

  lines.forEach(name=>{
    DB.records.push({
      id: Date.now()+Math.random(),
      name,
      status: "PENDING",
      created: Date.now(),
      history: []
    });
  });

  document.getElementById('bulkNames').value="";
  document.getElementById('bulkResult').innerText =
    `Added ${lines.length} records`;

  saveDB();
  render();
}

/* =========================
   🧠 INTELLIGENCE ENGINE
========================= */

function score(r){

  let s = 50;
  const n = (r.name||"").toLowerCase();

  if(r.status==="SUCCESS") s += 25;
  if(r.status==="RTS") s -= 25;
  if(r.status==="PENDING") s += 10;

  if(n.includes("official")) s += 10;
  if(n.includes("event")) s += 8;
  if(n.includes("academy")) s -= 10;

  return Math.max(0,Math.min(100,s));
}

/* history learning */
function learn(r){

  if(!r.history) r.history = [];

  r.history.push(score(r));

  if(r.history.length > 8){
    r.history.shift();
  }
}

/* trend */
function trend(r){
  const h = r.history || [];
  if(h.length < 2) return 0;
  return h[h.length-1] - h[0];
}

/* prediction */
function predict(r){
  return Math.max(0, Math.min(100, score(r) + trend(r)*1.5));
}

/* =========================
   📂 JSON IMPORT (FIXED)
========================= */

function loadJSONFile(file){

  const reader = new FileReader();

  reader.onload = e => {

    try{
      const data = JSON.parse(e.target.result);

      let records = [];

      if(Array.isArray(data)){
        records = data;
      } else if(data.records){
        records = data.records;
      } else {
        alert("Invalid JSON format");
        return;
      }

      DB.records = records.map(r => ({
        id: r.id || r.ID || Date.now()+Math.random(),
        name: r.name || r.Name || "",
        status: r.status || r.Status || "PENDING",
        created: r.created || Date.now(),
        history: r.history || r.History || []
      }));

      saveDB();
      render();

      document.getElementById('recoverStatus').innerText =
        "Recovered " + DB.records.length + " records";

    }catch(err){
      console.error(err);
      alert("Invalid JSON file");
    }
  };

  reader.readAsText(file);
}

function importFile(){
  const file = document.getElementById("jsonFile").files[0];
  if(!file) return alert("Select a file first");
  loadJSONFile(file);
}

/* =========================
   RENDER
========================= */

function render(){

  DB.records.forEach(learn);

  const total = DB.records.length;
  const pending = DB.records.filter(x=>x.status==="PENDING").length;
  const success = DB.records.filter(x=>x.status==="SUCCESS").length;

  document.getElementById('stats').innerHTML = `
    <div class="card"><h2>${total}</h2>Total</div>
    <div class="card"><h2>${pending}</h2>Pending</div>
    <div class="card"><h2>${success}</h2>Success</div>
  `;

  const top = DB.records
    .filter(x=>x.status==="PENDING")
    .sort((a,b)=>predict(b)-predict(a))
    .slice(0,10);

  document.getElementById('intel').innerHTML =
    top.length ? top.map(x=>`
      ⚡ <b>${x.name}</b>
      <span class="badge">${predict(x).toFixed(0)}%</span>
    `).join("") : "No intelligence data";

  const q = (document.getElementById('search').value||"").toLowerCase();

  document.getElementById('list').innerHTML =
    DB.records
      .filter(x=>(x.name||"").toLowerCase().includes(q))
      .map(x=>`
        <div class="record">
          <b>${x.name}</b><br>
          <span class="small">${x.status}</span>
        </div>
      `).join("");

  saveDB();
}

/* =========================
   SEARCH
========================= */

document.getElementById('search').addEventListener('input',render);

/* INIT */
render();

</script>

</body>
</html>
