


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VaultOS SR5 Foundation</title>
<style>
body{margin:0;background:#080d14;color:#fff;font-family:Arial}
header{background:#111827;padding:15px;position:sticky;top:0}
.wrap{padding:15px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
.card{background:#111827;border-radius:10px;padding:12px}
input,select,textarea,button{background:#0b1220;color:white;border:1px solid #334155;padding:9px;border-radius:6px}
button{cursor:pointer}
.form{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px}
table{width:100%;border-collapse:collapse;margin-top:15px;font-size:13px}
td,th{border:1px solid #334155;padding:6px}
.good{color:#7cff98}.warn{color:#ffd166}.bad{color:#ff7777}
.ticker{background:#172554;padding:10px;overflow:hidden;white-space:nowrap}
#tickerText{display:inline-block;animation:scroll 18s linear infinite}
@keyframes scroll{from{transform:translateX(100%)}to{transform:translateX(-100%)}}
</style>
</head>
<body>
<header><h2>VaultOS SR5 Foundation</h2></header>
<div class="wrap">

<div class="ticker"><span id="tickerText"></span></div>

<h3>Dashboard</h3>
<div class="grid" id="dashboard"></div>

<h3>AI Intelligence Report</h3>
<div class="card" id="ai"></div>

<h3>Add Record</h3>
<div class="form">
<input id="person" placeholder="Person / Target">
<select id="category">
<option>Actor</option><option>Athlete</option><option>Director</option><option>Company</option><option>Other</option>
</select>
<select id="route">
<option>Theatre</option><option>Foundation</option><option>Club</option><option>Academy</option><option>Agency</option><option>Email</option><option>Web Form</option><option>TTM</option>
</select>
<select id="status">
<option>Planned</option><option>Sent</option><option>Pending</option><option>Success</option><option>Failure</option><option>RTS</option><option>NO / NOT ACTIVE</option>
</select>
<select id="strength">
<option>A+</option><option>A</option><option>B</option><option>C</option><option>X</option>
</select>
<select id="likelihood">
<option>Very High</option><option>High</option><option>Medium</option><option>Low</option><option>Moonshot</option>
</select>
<input id="item" placeholder="Item">
<input id="date" placeholder="Date Sent">
<textarea id="notes" placeholder="Notes"></textarea>
</div>
<br>
<button onclick="add()">Add Record</button>
<button onclick="exportData()">Backup JSON</button>
<input type="file" id="importFile" onchange="importData(event)">

<h3>Records</h3>
<table>
<thead><tr><th>Name</th><th>Route</th><th>Status</th><th>Strength</th><th>Likelihood</th><th>Notes</th><th></th></tr></thead>
<tbody id="rows"></tbody>
</table>

</div>

<script>
let data=JSON.parse(localStorage.getItem("vaultos_sr5")||"[]");

function save(){
localStorage.setItem("vaultos_sr5",JSON.stringify(data));
render();
}

function add(){
data.unshift({
id:Date.now(),
person:person.value,
category:category.value,
route:route.value,
status:status.value,
strength:strength.value,
likelihood:likelihood.value,
item:item.value,
date:date.value,
notes:notes.value
});
save();
}

function del(id){
data=data.filter(x=>x.id!==id);
save();
}

function render(){

let count=s=>data.filter(x=>x.status===s).length;
let total=data.length;
let success=count("Success");
let completed=data.filter(x=>["Success","Failure","RTS","NO / NOT ACTIVE"].includes(x.status)).length;
let rate=completed?Math.round(success/completed*100):0;

dashboard.innerHTML=`
<div class="card">Total<br><b>${total}</b></div>
<div class="card good">Success<br><b>${success}</b></div>
<div class="card">Pending<br><b>${count("Pending")}</b></div>
<div class="card">Sent<br><b>${count("Sent")}</b></div>
<div class="card">RTS<br><b>${count("RTS")}</b></div>
<div class="card bad">NO / NOT ACTIVE<br><b>${count("NO / NOT ACTIVE")}</b></div>
<div class="card">Success Rate<br><b>${rate}%</b></div>`;

let route={};
data.forEach(x=>route[x.route]=(route[x.route]||0)+1);
let best=Object.entries(route).sort((a,b)=>b[1]-a[1])[0];

ai.innerHTML=`
Total targets: ${total}<br>
Active pipeline: ${count("Sent")+count("Pending")}<br>
Best route: ${best?best[0]:"No data"}<br>
Recommendation: ${count("Pending")>10?"Review pending targets":"Pipeline healthy"}<br>
Moonshots tracked: ${data.filter(x=>x.likelihood==="Moonshot").length}`;

tickerText.innerHTML=`★ ${total} records ★ ${success} successes ★ ${count("Pending")} pending ★ ${rate}% success rate ★`;

rows.innerHTML=data.map(x=>`
<tr>
<td>${x.person}</td>
<td>${x.route}</td>
<td>${x.status}</td>
<td>${x.strength}</td>
<td>${x.likelihood}</td>
<td>${x.notes||""}</td>
<td><button onclick="del(${x.id})">X</button></td>
</tr>`).join("");
}

function exportData(){
let a=document.createElement("a");
a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:"application/json"}));
a.download="vaultos_sr5_backup.json";
a.click();
}

function importData(e){
let r=new FileReader();
r.onload=()=>{data=JSON.parse(r.result);save()};
r.readAsText(e.target.files[0]);
}

render();
</script>
</body>
</html>
