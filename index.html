<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VaultPro v6 Master</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#050505; color:#e5e7eb; font-family:sans-serif; }
.card { background:#111113; border:1px solid #27272a; border-radius:12px; }
.good { border-left:4px solid #22c55e; }
.mid { border-left:4px solid #f59e0b; }
.low { border-left:4px solid #ef4444; }
.small { font-size:10px; opacity:0.7; }
select { background:#000; color:#fff; font-size:11px; }
button { font-size:11px; }
</style>
</head>

<body class="pb-24">

<div class="bg-red-600 text-white text-[10px] font-bold text-center py-1">
VAULTPRO v6 MASTER • FULL DATA LOCKED • NO PLACEHOLDERS
</div>

<div class="max-w-6xl mx-auto p-4">

<h1 class="text-3xl font-black mb-3">VAULT<span class="text-red-600">PRO</span> v6 MASTER</h1>

<div class="flex gap-2 mb-3">
<input id="search" oninput="render()" placeholder="Search vault..." class="w-full bg-zinc-900 p-2 text-xs rounded border border-zinc-800">

<button onclick="runAudit()" class="bg-blue-600 px-3 rounded">AUDIT</button>
<button onclick="resetMaster()" class="bg-green-600 px-3 rounded">RESET MASTER</button>
<button onclick="resetStamps()" class="bg-zinc-700 px-3 rounded">RESET STAMPS</button>
</div>

<div class="card p-3 mb-3 text-xs">
📦 Stamp Budget: <b>20</b>  
Remaining: <b id="stamps">20</b>
<button onclick="useStamp()" class="ml-2 bg-red-600 px-2 rounded">USE</button>
</div>

<div id="audit" class="mb-3"></div>
<div id="list"></div>

</div>

<script>

let MASTER_DB = [
{"ID":1779457614274,"Name":"Scott Melvin- Stick to football podcast","Status":"PENDING"},
{"ID":1779457583433,"Name":"Jonathan ross tv show","Status":"PENDING"},
{"ID":1779457568898,"Name":"Matchroom - Brentwood","Status":"PENDING"},
{"ID":1779457518143,"Name":"Kevin Keegan- Home","Status":"SUCCESS"},
{"ID":1779457496694,"Name":"George Graham - Home ","Status":"PENDING"},
{"ID":1779457449900,"Name":"LFC Gala Event","Status":"PENDING"},
{"ID":1779457307017,"Name":"Gary Oldman ","Status":"SUCCESS"},
{"ID":1779369334553,"Name":"Geoff Hurst ","Status":"LOGGED"},
{"ID":1,"Name":"Jannik Sinner","Status":"SUCCESS"},
{"ID":2,"Name":"Keanu Reeves","Status":"RTS"},
{"ID":3,"Name":"Alan Carr","Status":"SUCCESS"},
{"ID":5,"Name":"David Attenborough","Status":"SUCCESS"},
{"ID":7,"Name":"Tony Adams","Status":"SUCCESS"},
{"ID":10,"Name":"Erling Haaland (City)","Status":"SUCCESS"},
{"ID":13,"Name":"Kevin Bridges","Status":"SUCCESS"},
{"ID":18,"Name":"Timothée Chalamet","Status":"Sent"},
{"ID":28,"Name":"Mikel Arteta","Status":"Sent"},
{"ID":32,"Name":"Jude Bellingham","Status":"PENDING"},
{"ID":33,"Name":"Kylian Mbappé","Status":"PENDING"},
{"ID":36,"Name":"Usain Bolt","Status":"PENDING"},
{"ID":41,"Name":"Rik Smits","Status":"SUCCESS"},
{"ID":42,"Name":"Robert Parish","Status":"SUCCESS"},
{"ID":66,"Name":"Ralph Fiennes","Status":"PENDING"},
{"ID":67,"Name":"Pierce Brosnan","Status":"PENDING"},
{"ID":68,"Name":"Jodie Comer","Status":"PENDING"},
{"ID":80,"Name":"Hugh Jackman","Status":"PENDING"},
{"ID":81,"Name":"LA Lakers","Status":"Sent"},
{"ID":83,"Name":"Man Utd Training","Status":"Sent"},
{"ID":88,"Name":"Antoine Griezmann / Alvarez","Status":"PENDING"},
{"ID":90,"Name":"Paul Scholes","Status":"RTS"},
{"ID":92,"Name":"Michael Sheen","Status":"SUCCESS"},
{"ID":114,"Name":"Dick Van Dyke","Status":"SUCCESS"},
{"ID":115,"Name":"Stuart Pearce","Status":"SUCCESS"},
{"ID":116,"Name":"Ray Parlour","Status":"SUCCESS"},
{"ID":118,"Name":"Alex Ferguson (1)","Status":"LOGGED"},
{"ID":119,"Name":"Thierry Henry","Status":"LOGGED"},
{"ID":120,"Name":"David Seaman","Status":"LOGGED"},
{"ID":153,"Name":"Michael Sheen (Extra)","Status":"SUCCESS"},
{"ID":171,"Name":"Stephen Fry (1/3)","Status":"SUCCESS"},
{"ID":172,"Name":"Stephen Fry (2/3)","Status":"SUCCESS"},
{"ID":173,"Name":"Stephen Fry (3/3)","Status":"SUCCESS"},
{"ID":174,"Name":"Paul Merson (1/2)","Status":"SUCCESS"},
{"ID":176,"Name":"Tony Adams (Extra)","Status":"SUCCESS"},
{"ID":177,"Name":"Arsenal 2026 Squad","Status":"SUCCESS"}
];

let DB = structuredClone(MASTER_DB);

let stamps = 20;

/* =========================
SCORING
========================= */

function score(r){
let s=50;
if(r.Status==="SUCCESS") s+=30;
if(r.Status==="RTS") s-=30;
if(r.Status==="Sent") s-=10;
if(r.Status==="LOGGED") s-=5;

let n=r.Name.toLowerCase();
if(n.includes("theatre")) s+=15;
if(n.includes("training")) s+=12;
if(n.includes("fc")) s+=10;
return s;
}

/* =========================
STAMPS
========================= */

function useStamp(){
if(stamps>0) stamps--;
document.getElementById("stamps").innerText=stamps;
}

function resetStamps(){
stamps=20;
document.getElementById("stamps").innerText=stamps;
}

/* =========================
MASTER RESET (IMPORTANT FIX)
========================= */

function resetMaster(){
DB = structuredClone(MASTER_DB);
render();
runAudit();
}

/* =========================
AUDIT
========================= */

function runAudit(){

let pending = DB.filter(x=>x.Status==="PENDING")
.sort((a,b)=>score(b)-score(a))
.slice(0,stamps);

let html = `
<div class="card p-3 mb-3">
<div class="text-sm font-bold">🧠 MASTER AUDIT</div>
<div class="small">Full dataset integrity + stamp-limited plan</div>
</div>`;

/* stats */
html += `
<div class="card p-3 mb-2 text-xs">
SUCCESS: ${DB.filter(x=>x.Status==="SUCCESS").length}<br>
PENDING: ${DB.filter(x=>x.Status==="PENDING").length}<br>
RTS: ${DB.filter(x=>x.Status==="RTS").length}<br>
TOTAL: ${DB.length}
</div>`;

/* plan */
html += `<div class="card p-3 mb-2"><b>🎯 TOP SENDS</b></div>`;

pending.forEach(r=>{
html += `
<div class="card p-2 mb-2 good">
<div class="text-xs font-bold">${r.Name}</div>
<div class="small">Score ${score(r)}</div>
</div>`;
});

document.getElementById("audit").innerHTML=html;
}

/* =========================
RENDER
========================= */

function render(){

let q=document.getElementById("search").value?.toLowerCase()||"";
let list=document.getElementById("list");
list.innerHTML="";

DB.filter(r=>r.Name.toLowerCase().includes(q))
.sort((a,b)=>score(b)-score(a))
.forEach(r=>{

let sc=score(r);
let cls=sc>80?"good":sc>55?"mid":"low";

let div=document.createElement("div");
div.className="card p-3 flex justify-between items-center "+cls;

div.innerHTML=`
<div class="text-xs font-bold">${r.Name}</div>

<select onchange="r.Status=this.value">
<option ${r.Status==="SUCCESS"?"selected":""}>SUCCESS</option>
<option ${r.Status==="PENDING"?"selected":""}>PENDING</option>
<option ${r.Status==="Sent"?"selected":""}>Sent</option>
<option ${r.Status==="RTS"?"selected":""}>RTS</option>
<option ${r.Status==="LOGGED"?"selected":""}>LOGGED</option>
</select>
`;

list.appendChild(div);
});

}

render();
runAudit();

</script>

</body>
</html>
