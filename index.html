
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VaultOS v8 AI Engine</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#0b0b0b;
  color:#fff;
  margin:0;
}

header{
  background:#111;
  padding:12px;
  position:sticky;
  top:0;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:#111;
  border:1px solid #222;
  border-radius:10px;
  padding:12px;
  margin:10px;
}

input,select,button,textarea{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid #333;
  background:#181818;
  color:#fff;
}

button{cursor:pointer}

.record{
  padding:8px;
  border-bottom:1px solid #222;
}

.small{font-size:12px;color:#aaa}

.badge{
  padding:2px 6px;
  background:#222;
  border-radius:6px;
  font-size:11px;
  margin-left:6px;
}
</style>
</head>

<body>

<header>
<h2>VaultOS v8 AI Engine</h2>
<input id="search" placeholder="Search records...">
</header>

<div class="grid" id="stats"></div>

<div class="card">
<h3>Bulk Add</h3>
<textarea id="bulkNames" placeholder="One name per line..."></textarea>
<button onclick="bulkAdd()">Add All As PENDING</button>
<div id="bulkResult" class="small"></div>
</div>

<div class="card">
<h3>🧠 AI Intelligence (Self Learning)</h3>
<div id="intel"></div>
</div>

<div class="card">
<h3>📊 Performance Graph</h3>
<canvas id="chart" width="400" height="150" style="width:100%;background:#0a0a0a;border-radius:8px"></canvas>
</div>

<div class="card">
<h3>Records</h3>
<div id="list"></div>
</div>

<script>

const KEY = "vaultos_v8_ai";
let DB = [];

/* ---------------- STORAGE ---------------- */

function save(){
  localStorage.setItem(KEY, JSON.stringify(DB));
  render();
}

function load(){
  try{
    DB = JSON.parse(localStorage.getItem(KEY) || "[]");
  }catch(e){
    DB = [];
  }
  render();
}

/* ---------------- BULK ---------------- */

function bulkAdd(){
  const text = document.getElementById('bulkNames').value.trim();
  if(!text) return alert("No input");

  const lines = text.split("\n").map(x => x.trim()).filter(Boolean);

  lines.forEach(name => {
    DB.push({
      ID: Date.now() + Math.random(),
      Name: name,
      Status: "PENDING",
      HistoryScore: 50
    });
  });

  document.getElementById('bulkNames').value = "";
  document.getElementById('bulkResult').innerText =
    `Added ${lines.length} targets`;

  save();
}

/* ---------------- AI CORE ---------------- */

/* SELF-LEARNING SCORE MODEL */
function aiScore(r){

  let base = r.HistoryScore ?? 50;
  const n = (r.Name || "").toLowerCase();

  // status learning feedback loop
  if(r.Status === "SUCCESS") base += 20;
  if(r.Status === "RTS") base -= 25;
  if(r.Status === "PENDING") base += 5;

  // pattern intelligence
  if(n.includes("official")) base += 10;
  if(n.includes("academy")) base -= 10;
  if(n.includes("trial")) base -= 15;
  if(n.includes("event")) base += 8;
  if(n.includes("tour")) base += 10;

  // clamp
  return Math.max(0, Math.min(100, base));
}

/* CATEGORY ENGINE */
function category(name){
  const n = (name||"").toLowerCase();

  if(/football|england|barcelona|liverpool/.test(n)) return "Football";
  if(/nba|lakers|celtics/.test(n)) return "NBA";
  if(/film|actor|movie|tv/.test(n)) return "Entertainment";
  if(/event|tour|show/.test(n)) return "Events";
  return "Other";
}

/* DUPLICATE CLUSTER */
function dedupe(){
  const map = {};
  DB.forEach(r=>{
    const k = (r.Name||"").trim().toLowerCase();
    map[k] = (map[k]||0)+1;
  });
  return Object.entries(map).filter(x=>x[1]>1);
}

/* ---------------- RENDER ---------------- */

function render(){

  /* update learning memory */
  DB.forEach(r=>{
    r.HistoryScore = aiScore(r);
  });

  const total = DB.length;
  const pending = DB.filter(x=>x.Status==="PENDING").length;
  const success = DB.filter(x=>x.Status==="SUCCESS").length;

  document.getElementById('stats').innerHTML = `
    <div class="card"><h2>${total}</h2>Total</div>
    <div class="card"><h2>${pending}</h2>Pending</div>
    <div class="card"><h2>${success}</h2>Success</div>
  `;

  /* INTELLIGENCE CORE */
  const top = DB
    .filter(x=>x.Status==="PENDING")
    .sort((a,b)=>aiScore(b)-aiScore(a))
    .slice(0,10);

  document.getElementById('intel').innerHTML =
    top.length
      ? top.map(x=>`
        <div>
          ⚡ <b>${x.Name}</b>
          <span class="badge">${aiScore(x).toFixed(0)}%</span>
          <span class="small">${category(x.Name)}</span>
        </div>
      `).join("")
      : "No active intelligence";

  /* LIST */
  const q = (document.getElementById('search').value||"").toLowerCase();

  document.getElementById('list').innerHTML =
    DB
      .filter(x=>(x.Name||"").toLowerCase().includes(q))
      .map(x=>`
        <div class="record">
          <b>${x.Name}</b><br>
          <span class="small">${x.Status}</span>
        </div>
      `).join("");

  drawChart();
}

/* ---------------- SIMPLE ANALYTICS GRAPH ---------------- */

function drawChart(){
  const c = document.getElementById("chart");
  if(!c) return;
  const ctx = c.getContext("2d");

  ctx.clearRect(0,0,c.width,c.height);

  const data = DB.slice(-20).map(x=>aiScore(x));

  ctx.beginPath();
  ctx.moveTo(0,100);

  data.forEach((v,i)=>{
    const x = (i/data.length)*400;
    const y = 150 - (v*1.2);
    ctx.lineTo(x,y);
  });

  ctx.strokeStyle = "#4ade80";
  ctx.stroke();
}

/* ---------------- SEARCH ---------------- */

document.getElementById('search').addEventListener('input',render);

/* ---------------- INIT ---------------- */

load();

</script>

</body>
</html>
