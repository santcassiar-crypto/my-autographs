<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VaultOS PRO</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial}
header{position:sticky;top:0;background:#111;padding:12px;border-bottom:1px solid #222;z-index:10}
input,button,textarea{
width:100%;padding:10px;margin-top:6px;
background:#0b0b0b;color:#fff;border:1px solid #333;border-radius:10px
}
button{cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:10px}
.box{background:#111;border:1px solid #222;border-radius:10px;padding:10px;text-align:center}
.card{background:#111;border:1px solid #222;border-radius:10px;padding:10px;margin:10px}
.small{font-size:11px;color:#888}
</style>
</head>

<body>

<header>
<h3>🧠 VaultOS PRO</h3>
<input id="search" placeholder="Search vault...">
</header>

<div class="grid" id="stats"></div>

<div class="card">
<h3>📥 IMPORT FULL DATASET</h3>
<textarea id="importBox" placeholder="Paste full JSON array here..."></textarea>
<button onclick="importData()">IMPORT DATA</button>
<button onclick="clearData()">RESET STORAGE</button>
</div>

<div id="list"></div>

<script>

const KEY = "vault_pro_master";

let DB = [];

/* ------------------------
LOAD
------------------------ */
function load(){
let raw = localStorage.getItem(KEY);

if(raw){
try{
DB = JSON.parse(raw);
render();
return;
}catch(e){}
}

DB = [];
render();
}

/* ------------------------
SAVE
------------------------ */
function save(){
localStorage.setItem(KEY, JSON.stringify(DB));
}

/* ------------------------
IMPORT (MAIN FIX)
------------------------ */
function importData(){
let text = document.getElementById("importBox").value.trim();

if(!text){
alert("Paste JSON first");
return;
}

try{
let data = JSON.parse(text);

if(!Array.isArray(data)){
alert("Must be an array");
return;
}

DB = data;
save();
render();

alert("IMPORT COMPLETE: " + DB.length + " records");

}catch(e){
alert("Invalid JSON");
}
}

/* ------------------------
RESET
------------------------ */
function clearData(){
if(!confirm("Clear ALL stored data?")) return;
localStorage.removeItem(KEY);
DB=[];
render();
}

/* ------------------------
SEARCH
------------------------ */
let search="";
document.getElementById("search").addEventListener("input",e=>{
search=e.target.value.toLowerCase();
render();
});

function match(x){
return !search || (x.Name||"").toLowerCase().includes(search);
}

/* ------------------------
STATS
------------------------ */
function stats(){
return {
total:DB.length,
success:DB.filter(x=>x.Status==="SUCCESS").length,
pending:DB.filter(x=>x.Status==="PENDING").length,
rts:DB.filter(x=>x.Status?.includes("RTS")).length
};
}

/* ------------------------
RENDER
------------------------ */
function render(){

let s = stats();

document.getElementById("stats").innerHTML=`
<div class="box">${s.total}<br><small>TOTAL</small></div>
<div class="box">${s.success}<br><small>SUCCESS</small></div>
<div class="box">${s.pending}<br><small>PENDING</small></div>
`;

document.getElementById("list").innerHTML=
DB.filter(match)
.map(x=>`
<div class="card">
<b>${x.Name || "Unnamed"}</b><br>
<small>${x.Status || "UNKNOWN"}</small>
</div>
`).join("");

}

load();

</script>

</body>
</html>
