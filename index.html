
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VaultOS v9 Predictive Engine</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#0b0b0b;
  color:#fff;
  margin:0;
}

header{
  background:#111;
  padding:12px;
  position:sticky;
  top:0;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:#111;
  border:1px solid #222;
  border-radius:10px;
  padding:12px;
  margin:10px;
}

input,textarea,button{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid #333;
  background:#181818;
  color:#fff;
}

button{cursor:pointer}

.record{
  padding:8px;
  border-bottom:1px solid #222;
}

.small{font-size:12px;color:#aaa}

.badge{
  padding:2px 6px;
  background:#222;
  border-radius:6px;
  font-size:11px;
  margin-left:6px;
}
</style>
</head>

<body>

<header>
<h2>VaultOS v9 Predictive Engine</h2>
<input id="search" placeholder="Search records...">
</header>

<div class="grid" id="stats"></div>

<div class="card">
<h3>Bulk Add</h3>
<textarea id="bulkNames" placeholder="One name per line..."></textarea>
<button onclick="bulkAdd()">Add All As PENDING</button>
<div id="bulkResult" class="small"></div>
</div>

<div class="card">
<h3>🔮 Predictive Intelligence</h3>
<div id="intel"></div>
</div>

<div class="card">
<h3>📈 Next Best Targets</h3>
<div id="next"></div>
</div>

<div class="card">
<h3>Records</h3>
<div id="list"></div>
</div>

<script>

const KEY = "vaultos_v9_predict";
let DB = [];

/* ---------------- STORAGE ---------------- */

function save(){
  localStorage.setItem(KEY, JSON.stringify(DB));
  render();
}

function load(){
  try{
    DB = JSON.parse(localStorage.getItem(KEY) || "[]");
  }catch(e){
    DB = [];
  }
  render();
}

/* ---------------- BULK ---------------- */

function bulkAdd(){
  const text = document.getElementById('bulkNames').value.trim();
  if(!text) return alert("No input");

  const lines = text.split("\n").map(x=>x.trim()).filter(Boolean);

  lines.forEach(name=>{
    DB.push({
      ID: Date.now()+Math.random(),
      Name: name,
      Status: "PENDING",
      History: []
    });
  });

  document.getElementById('bulkNames').value="";
  document.getElementById('bulkResult').innerText =
    `Added ${lines.length} targets`;

  save();
}

/* ---------------- CORE MODELS ---------------- */

function category(n){
  n=(n||"").toLowerCase();

  if(/football|england|liverpool|barcelona/.test(n)) return "Football";
  if(/nba|lakers|celtics/.test(n)) return "NBA";
  if(/actor|movie|film|tv/.test(n)) return "Entertainment";
  if(/event|tour|show/.test(n)) return "Events";
  return "Other";
}

/* AI SCORE */
function aiScore(r){
  let s = 50;
  const n = (r.Name||"").toLowerCase();

  if(r.Status==="SUCCESS") s += 25;
  if(r.Status==="RTS") s -= 20;
  if(r.Status==="PENDING") s += 10;

  if(/official|verified/.test(n)) s += 15;
  if(/academy|trial/.test(n)) s -= 15;
  if(/event|tour/.test(n)) s += 10;

  return Math.max(0,Math.min(100,s));
}

/* TREND ENGINE (NEW) */
function trendScore(r){

  const hist = r.History || [];
  if(hist.length < 2) return 0;

  const last = hist[hist.length-1];
  const prev = hist[hist.length-2];

  return last - prev;
}

/* PREDICTION ENGINE (NEW CORE) */
function predict(r){

  const base = aiScore(r);
  const trend = trendScore(r);

  const cat = category(r.Name);

  let prediction = base;

  // trend influence
  prediction += trend * 1.5;

  // category weighting (system-wide bias)
  if(cat === "Football") prediction += 8;
  if(cat === "NBA") prediction += 5;
  if(cat === "Events") prediction += 6;

  // randomness removed (stability focus)

  return Math.max(0,Math.min(100,prediction));
}

/* ---------------- RENDER ---------------- */

function render(){

  /* update history snapshot */
  DB.forEach(r=>{
    if(!r.History) r.History = [];
    r.History.push(aiScore(r));
    if(r.History.length > 5) r.History.shift();
  });

  const total = DB.length;
  const pending = DB.filter(x=>x.Status==="PENDING").length;
  const success = DB.filter(x=>x.Status==="SUCCESS").length;

  document.getElementById('stats').innerHTML = `
    <div class="card"><h2>${total}</h2>Total</div>
    <div class="card"><h2>${pending}</h2>Pending</div>
    <div class="card"><h2>${success}</h2>Success</div>
  `;

  /* INTELLIGENCE (CURRENT STATE) */
  const intel = DB
    .filter(x=>x.Status==="PENDING")
    .sort((a,b)=>predict(b)-predict(a))
    .slice(0,10);

  document.getElementById('intel').innerHTML =
    intel.length
      ? intel.map(x=>`
        <div>
          ⚡ <b>${x.Name}</b>
          <span class="badge">${predict(x).toFixed(0)}%</span>
          <span class="small">${category(x.Name)}</span>
        </div>
      `).join("")
      : "No predictive signals";

  /* NEXT BEST TARGETS (NEW FEATURE) */
  const next = DB
    .filter(x=>x.Status==="PENDING")
    .sort((a,b)=>predict(b)-predict(a))
    .slice(0,5);

  document.getElementById('next').innerHTML =
    next.map(x=>`
      🚀 ${x.Name}
      <span class="badge">P:${predict(x).toFixed(0)}%</span>
    `).join("<br>");

  /* LIST */
  const q = (document.getElementById('search').value||"").toLowerCase();

  document.getElementById('list').innerHTML =
    DB
      .filter(x=>(x.Name||"").toLowerCase().includes(q))
      .map(x=>`
        <div class="record">
          <b>${x.Name}</b><br>
          <span class="small">${x.Status}</span>
        </div>
      `).join("");
}

/* ---------------- SEARCH ---------------- */

document.getElementById('search').addEventListener('input',render);

/* ---------------- INIT ---------------- */

load();

</script>

</body>
</html>
