
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VaultOS Stability Release 3</title>
<style>
body{margin:0;background:#0b0f14;color:#fff;font-family:Arial}
header{background:#111827;padding:12px;position:sticky;top:0}
.wrap{padding:12px}
.cards,.filters,.formgrid{display:grid;gap:8px}
.cards{grid-template-columns:repeat(auto-fit,minmax(130px,1fr))}
.filters,.formgrid{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
.card{background:#111827;padding:10px;border-radius:8px}
input,select,button,textarea{background:#111;color:#fff;border:1px solid #333;padding:8px;border-radius:6px}
table{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px}
td,th{border:1px solid #222;padding:6px}
.log{background:#111827;padding:8px;max-height:180px;overflow:auto}
.good{color:#7CFC98}.bad{color:#ff7b7b}
</style>
</head>
<body>
<header><h2>VaultOS Stability Release 3</h2></header>
<div class="wrap">

<div class="cards" id="stats"></div>

<h3>Filters</h3>
<div class="filters">
<input id="search" placeholder="Search..." oninput="render()">
<select id="routeFilter" onchange="render()">
<option value="">All Routes</option>
<option>Theatre</option><option>Foundation</option><option>Club</option>
<option>Academy</option><option>Agency</option><option>Office</option>
<option>Event</option><option>Home</option>
</select>
<select id="outcomeFilter" onchange="render()">
<option value="">All Outcomes</option>
<option>Pending</option><option>Success</option><option>RTS</option>
<option>Failure</option><option>Planned</option><option>Sent</option>
</select>
</div>

<h3>Add Record</h3>
<div class="formgrid">
<input id="name" placeholder="Name">
<input id="route" placeholder="Route Type">
<input id="system" placeholder="System">
<select id="strength"><option>A</option><option>B</option><option>C</option><option>X</option></select>
<select id="likelihood"><option>Very High</option><option>High</option><option>Medium</option><option>Low</option><option>Moonshot</option></select>
<select id="outcome"><option>Pending</option><option>Success</option><option>RTS</option><option>Failure</option><option>Planned</option><option>Sent</option></select>
<input id="datesent" placeholder="Date Sent">
<input id="notes" placeholder="Notes">
</div>
<p><button onclick="addRecord()">Add Record</button>
<button onclick="exportJSON()">Export</button></p>

<h3>Success Analytics</h3>
<div id="analytics" class="card"></div>

<h3>Records</h3>
<table>
<thead>
<tr>
<th>Name</th><th>Route</th><th>Strength</th><th>Likelihood</th><th>Outcome</th><th>Notes</th><th>Delete</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<h3>Activity Log</h3>
<div id="log" class="log"></div>

<script>
let data=JSON.parse(localStorage.getItem('vaultos_sr3')||'[]');

function save(){
 localStorage.setItem('vaultos_sr3',JSON.stringify(data));
 render();
}

function log(msg){
 let l=JSON.parse(localStorage.getItem('vaultos_sr3_logs')||'[]');
 l.unshift(new Date().toLocaleString()+" - "+msg);
 localStorage.setItem('vaultos_sr3_logs',JSON.stringify(l.slice(0,300)));
 document.getElementById('log').innerHTML=l.join('<br>');
}

function addRecord(){
 data.unshift({
  id:Date.now(),
  name:name.value,
  route:route.value,
  system:system.value,
  strength:strength.value,
  likelihood:likelihood.value,
  outcome:outcome.value,
  notes:notes.value,
  date:datesent.value
 });
 log('Added '+name.value);
 save();
}

function del(id){
 data=data.filter(x=>x.id!=id);
 log('Deleted '+id);
 save();
}

function render(){
 let q=(search.value||'').toLowerCase();
 let rf=routeFilter.value;
 let of=outcomeFilter.value;

 let rows=data.filter(r=>
 (!rf||r.route===rf) &&
 (!of||r.outcome===of) &&
 JSON.stringify(r).toLowerCase().includes(q)
 );

 tbody.innerHTML=rows.map(r=>`
 <tr>
 <td>${r.name}</td>
 <td>${r.route}</td>
 <td>${r.strength}</td>
 <td>${r.likelihood}</td>
 <td>${r.outcome}</td>
 <td>${r.notes||''}</td>
 <td><button onclick="del(${r.id})">X</button></td>
 </tr>`).join('');

 let success=data.filter(x=>x.outcome==='Success').length;
 let pending=data.filter(x=>x.outcome==='Pending').length;
 let moon=data.filter(x=>x.likelihood==='Moonshot').length;
 let aRoutes=data.filter(x=>x.strength==='A').length;

 stats.innerHTML=`
 <div class="card"><b>Total</b><br>${data.length}</div>
 <div class="card"><b>Success</b><br>${success}</div>
 <div class="card"><b>Pending</b><br>${pending}</div>
 <div class="card"><b>A Routes</b><br>${aRoutes}</div>
 <div class="card"><b>Moonshots</b><br>${moon}</div>`;

 let routeStats={};
 data.forEach(r=>{
   if(!routeStats[r.route]) routeStats[r.route]={sent:0,success:0};
   routeStats[r.route].sent++;
   if(r.outcome==='Success') routeStats[r.route].success++;
 });

 analytics.innerHTML=Object.entries(routeStats).map(([k,v])=>{
   let pct=v.sent?Math.round((v.success/v.sent)*100):0;
   return `<div>${k}: ${v.success}/${v.sent} (${pct}%)</div>`;
 }).join('') || 'No data yet';
}

function exportJSON(){
 let a=document.createElement('a');
 a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
 a.download='vaultos_sr3_export.json';
 a.click();
}

document.getElementById('log').innerHTML=(JSON.parse(localStorage.getItem('vaultos_sr3_logs')||'[]')).join('<br>');
render();
</script>
</div>
</body>
</html>
