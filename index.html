
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TTM_OS_PRO_PLUS</title>
<style>
body{font-family:Arial,sans-serif;background:#0b0b0b;color:#fff;margin:0}
header{background:#111;padding:12px;position:sticky;top:0}
.card{background:#111;border:1px solid #222;border-radius:10px;padding:12px;margin:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;padding:10px}
input,select,textarea,button{padding:10px;border-radius:8px;border:1px solid #333;background:#181818;color:#fff}
textarea{width:100%;height:120px}
#search{width:100%}
.record{padding:6px;border-bottom:1px solid #222}
</style>
</head>
<body>
<header>
<h2>TTM OS PRO PLUS</h2>
<input id="search" placeholder="Search records...">
</header>

<div class="grid" id="stats"></div>

<div class="card">
<h3>JSON Import / Export</h3>
<input type="file" id="file">
<button onclick="importJSON()">Import JSON</button>
<button onclick="exportJSON()">Export JSON</button>
<div id="msg"></div>
</div>

<div class="card">
<h3>Bulk Add</h3>
<textarea id="bulk"></textarea>
<button onclick="bulkAdd()">Add All As PENDING</button>
</div>

<div class="card"><h3>7 Day Planner</h3><div id="planner"></div></div>
<div class="card"><h3>ROI Queue</h3><div id="roi"></div></div>
<div class="card"><h3>Duplicates</h3><div id="dupes"></div></div>
<div class="card"><h3>Records</h3><div id="list"></div></div>

<script>
const KEY="TTM_OS_PRO_PLUS";
let DB={records:[],weights:{},heat:{}};

function load(){
 let d=localStorage.getItem(KEY);
 if(d) DB=JSON.parse(d);
 render();
}
function save(){localStorage.setItem(KEY,JSON.stringify(DB));}

function importJSON(){
 const f=document.getElementById('file').files[0];
 if(!f) return alert("Select JSON file");
 const r=new FileReader();
 r.onload=e=>{
  try{
   const data=JSON.parse(e.target.result);

   if(Array.isArray(data)){
     DB.records=data.map(x=>({
      id:x.id||x.ID||Date.now()+Math.random(),
      name:x.name||x.Name||"",
      status:(x.status||x.Status||"PENDING").toUpperCase()
     }));
     DB.weights={}; DB.heat={};
   } else if(data.records){
     DB.records=(data.records||[]).map(x=>({
      id:x.id||x.ID||Date.now()+Math.random(),
      name:x.name||x.Name||"",
      status:(x.status||x.Status||"PENDING").toUpperCase()
     }));
     DB.weights=data.weights||{};
     DB.heat=data.heat||{};
   } else {
     throw new Error("Unknown format");
   }

   save(); render();
   document.getElementById("msg").innerHTML="Imported "+DB.records.length+" records";
  } catch(err){
   alert("Import failed");
   console.error(err);
  }
 };
 r.readAsText(f);
}

function exportJSON(){
 const a=document.createElement("a");
 a.href=URL.createObjectURL(new Blob([JSON.stringify(DB,null,2)],{type:"application/json"}));
 a.download="TTM_OS_PRO_PLUS_Backup.json";
 a.click();
}

function bulkAdd(){
 document.getElementById("bulk").value.split("\n").map(x=>x.trim()).filter(Boolean).forEach(n=>{
  DB.records.push({id:Date.now()+Math.random(),name:n,status:"PENDING"});
 });
 save(); render();
}

function roiScore(r){
 let s=50;
 let n=r.name.toLowerCase();
 if(n.includes("home")) s+=30;
 if(n.includes("event")) s+=15;
 if(n.includes("podcast")) s+=10;
 if(n.includes("training")) s-=20;
 return s;
}

function render(){
 const rec=DB.records;
 const pending=rec.filter(x=>x.status==="PENDING").length;
 const success=rec.filter(x=>x.status==="SUCCESS").length;
 const rts=rec.filter(x=>x.status.includes("RTS")).length;
 const logged=rec.filter(x=>x.status==="LOGGED").length;
 const sent=rec.filter(x=>x.status==="SENT").length;

 document.getElementById("stats").innerHTML=`
 <div class="card"><h2>${rec.length}</h2>Total</div>
 <div class="card"><h2>${pending}</h2>Pending</div>
 <div class="card"><h2>${success}</h2>Success</div>
 <div class="card"><h2>${rts}</h2>RTS</div>
 <div class="card"><h2>${logged}</h2>Logged</div>
 <div class="card"><h2>${sent}</h2>Sent</div>`;

 let roi=rec.filter(x=>x.status==="PENDING").sort((a,b)=>roiScore(b)-roiScore(a)).slice(0,20);
 document.getElementById("roi").innerHTML=roi.map(x=>"⚡ "+x.name+" ("+roiScore(x)+")").join("<br>");

 let days=[[],[],[],[],[],[],[]];
 roi.forEach((r,i)=>days[i%7].push(r.name));
 document.getElementById("planner").innerHTML=days.map((d,i)=>"<b>Day "+(i+1)+"</b><br>"+d.join("<br>")).join("<hr>");

 let map={};
 rec.forEach(r=>{
  let k=r.name.trim().toLowerCase();
  map[k]=(map[k]||0)+1;
 });
 document.getElementById("dupes").innerHTML=Object.keys(map).filter(k=>map[k]>1).join("<br>")||"No duplicates";

 const q=(document.getElementById("search").value||"").toLowerCase();
 document.getElementById("list").innerHTML=rec.filter(r=>r.name.toLowerCase().includes(q))
 .map(r=>`<div class="record"><b>${r.name}</b><br>${r.status}</div>`).join("");
}
document.addEventListener("input",e=>{if(e.target.id==="search") render();});
load();
</script>
</body>
</html>
