


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VaultOS DATABASE ENGINE</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: #fff;
}

header {
    position: sticky;
    top: 0;
    background: #111;
    padding: 12px;
    border-bottom: 1px solid #222;
}

h1 {
    margin: 0;
    color: #00ffcc;
    font-size: 18px;
}

.container {
    display: grid;
    grid-template-columns: 280px 1fr;
    height: calc(100vh - 50px);
}

.sidebar {
    background: #0f0f0f;
    border-right: 1px solid #222;
    padding: 10px;
}

.main {
    padding: 10px;
    overflow-y: auto;
}

.card {
    background: #111;
    border: 1px solid #222;
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 10px;
}

button {
    width: 100%;
    padding: 8px;
    margin: 4px 0;
    background: #00ffcc;
    border: none;
    border-radius: 5px;
    font-weight: bold;
    cursor: pointer;
}

button:hover { background: #00ddb3; }

.record {
    border: 1px solid #222;
    padding: 8px;
    margin: 6px 0;
    border-radius: 6px;
    background: #0d0d0d;
}

input {
    width: 100%;
    padding: 6px;
    background: #000;
    border: 1px solid #333;
    color: #fff;
    border-radius: 5px;
}

.small { font-size: 12px; opacity: 0.7; }
</style>
</head>

<body>

<header>
    <h1>VaultOS DATABASE ENGINE</h1>
</header>

<div class="container">

<div class="sidebar">

    <div class="card">
        <button onclick="addRecord()">+ Insert Record</button>
        <button onclick="createSnapshot()">Snapshot</button>
        <button onclick="exportDB()">Export DB</button>
        <button onclick="document.getElementById('importFile').click()">Import DB</button>
        <input type="file" id="importFile" accept="application/json">
    </div>

    <div class="card">
        <input id="query" placeholder="Search database..." oninput="render()">
    </div>

</div>

<div class="main">
    <div id="view"></div>
</div>

</div>

<script>

// ===============================
// DATABASE CORE (IN-MEMORY INDEX)
// ===============================
let DB = {
    records: [],
    index: {},
    snapshots: []
};

// ===============================
// LOAD
// ===============================
function loadDB() {
    const raw = localStorage.getItem("vaultos_db");
    if (!raw) return;

    try {
        const parsed = JSON.parse(raw);
        DB.records = Array.isArray(parsed.records) ? parsed.records : [];
        DB.snapshots = Array.isArray(parsed.snapshots) ? parsed.snapshots : [];
        rebuildIndex();
    } catch {}
}

// ===============================
// SAVE
// ===============================
function saveDB() {
    localStorage.setItem("vaultos_db", JSON.stringify(DB));
}

// ===============================
// INDEX ENGINE (FAST LOOKUP)
// ===============================
function rebuildIndex() {
    DB.index = {};

    DB.records.forEach(r => {
        const text = ((r.title || "") + " " + (r.content || "")).toLowerCase();

        text.split(/\s+/).forEach(word => {
            if (!DB.index[word]) DB.index[word] = [];
            DB.index[word].push(r.id);
        });
    });
}

// ===============================
// INSERT
// ===============================
function addRecord() {
    const title = prompt("Title:");
    if (!title) return;

    const content = prompt("Content:");
    if (!content) return;

    const record = {
        id: Date.now(),
        title,
        content,
        created: new Date().toISOString()
    };

    DB.records.push(record);

    rebuildIndex();
    saveDB();
    render();
}

// ===============================
// SNAPSHOT (VERSION CONTROL)
// ===============================
function createSnapshot() {
    DB.snapshots.push({
        time: new Date().toISOString(),
        data: JSON.parse(JSON.stringify(DB.records))
    });

    saveDB();
    alert("Snapshot created");
}

// ===============================
// QUERY ENGINE (FAST SEARCH)
// ===============================
function queryDB(q) {
    q = q.toLowerCase().trim();
    if (!q) return DB.records;

    const words = q.split(/\s+/);

    let resultIds = null;

    words.forEach(w => {
        const ids = DB.index[w] || [];

        if (resultIds === null) {
            resultIds = new Set(ids);
        } else {
            resultIds = new Set(ids.filter(id => resultIds.has(id)));
        }
    });

    const results = DB.records.filter(r => resultIds?.has(r.id));

    return results;
}

// ===============================
// EXPORT
// ===============================
function exportDB() {
    const blob = new Blob([JSON.stringify(DB)], { type: "application/json" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "VaultOS_DATABASE.json";
    a.click();

    URL.revokeObjectURL(url);
}

// ===============================
// IMPORT (FULL COMPATIBILITY)
// ===============================
document.getElementById("importFile").addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(ev) {
        try {
            const incoming = JSON.parse(ev.target.result);

            DB.records = Array.isArray(incoming.records)
                ? incoming.records
                : Array.isArray(incoming)
                ? incoming
                : [];

            DB.snapshots = Array.isArray(incoming.snapshots)
                ? incoming.snapshots
                : [];

            rebuildIndex();
            saveDB();
            render();

            alert("Database imported");

        } catch {
            alert("Invalid database file");
        }
    };

    reader.readAsText(file);
    e.target.value = "";
});

// ===============================
// RENDER
// ===============================
function render() {
    const q = document.getElementById("query").value;
    const results = queryDB(q);

    const view = document.getElementById("view");
    view.innerHTML = `<h3>Records (${results.length})</h3>`;

    results.forEach(r => {
        view.innerHTML += `
            <div class="record">
                <b>${r.title}</b><br>
                <span class="small">${r.created}</span>
                <p>${r.content}</p>
            </div>
        `;
    });
}

// ===============================
// INIT
// ===============================
loadDB();
render();

</script>

</body>
</html>
