<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VaultOS Industrial Dataset OS</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial}
header{position:sticky;top:0;background:#111;padding:10px;border-bottom:1px solid #222}

input,select,textarea,button{
width:100%;padding:10px;margin-top:6px;
background:#000;color:#fff;border:1px solid #333;border-radius:8px
}

button{cursor:pointer;background:#111}
button:hover{background:#1c1c1c}

.card{background:#111;margin:10px;padding:10px;border-radius:10px;border:1px solid #222}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:10px}
.box{background:#111;border:1px solid #222;padding:10px;border-radius:8px;text-align:center}
.small{font-size:11px;color:#888}
.section{margin:10px;padding:10px;background:#0d0d0d;border:1px solid #222;border-radius:10px}
.queue{background:#0a0a0a;border:1px solid #333;padding:10px;margin:10px;border-radius:10px}
</style>
</head>

<body>

<header>
<input id="search" placeholder="Search dataset...">
</header>

<div class="grid" id="stats"></div>

<div class="section">
<h3>🧠 NEXT TO SEND</h3>
<div id="next"></div>
</div>

<div class="section">
<h3>📦 OUTBOX</h3>
<div id="outbox"></div>
</div>

<div class="section">
<button onclick="exportDB()">EXPORT</button>
<button onclick="resetSystem()">RESET</button>
</div>

<div id="list"></div>

<script>

////////////////////////////////////////////////////
// 📦 FULL DATASET (YOUR INPUT CLEANED INTO STRUCTURE)
////////////////////////////////////////////////////
const SEED_DATA = [
{ID:1779457614274,Name:"Scott Melvin- Stick to football podcast",Status:"PENDING"},
{ID:1779457583433,Name:"Jonathan ross tv show",Status:"PENDING"},
{ID:1779457568898,Name:"Matchroom - Brentwood",Status:"PENDING"},
{ID:1779457518143,Name:"Kevin Keegan- Home",Status:"SUCCESS"},
{ID:1779457496694,Name:"George Graham - Home",Status:"PENDING"},
{ID:1779457449900,Name:"LFC Gala Event",Status:"PENDING"},
{ID:1779457437040,Name:"Gosh4 Goals",Status:"PENDING"},
{ID:1779457382999,Name:"San Antonio Training Centre",Status:"PENDING"},
{ID:1779457367391,Name:"OKC training centre",Status:"PENDING"},
{ID:1779457333472,Name:"FC Barcelona - Training ground",Status:"PENDING"},
{ID:1779457307017,Name:"Gary Oldman",Status:"SUCCESS"},
{ID:1779457276281,Name:"Arsenal womens team",Status:"PENDING"},
{ID:1779457232607,Name:"Park theatre x 2",Status:"PENDING"},
{ID:1779457195881,Name:"Jermery Sochan",Status:"PENDING"},
{ID:1779369334553,Name:"Geoff Hurst",Status:"PENDING"},
{ID:1779362415139,Name:"Max Dowman - Dads London office",Status:"PENDING"}
];

////////////////////////////////////////////////////
// STORAGE
////////////////////////////////////////////////////
let DB=[];

function load(){

let raw=localStorage.getItem("vault_dataset");

if(raw){
DB=JSON.parse(raw);
return;
}

// first run → inject dataset
DB = SEED_DATA.map(normalize);
save();

}

function save(){
localStorage.setItem("vault_dataset",JSON.stringify(DB));
}

////////////////////////////////////////////////////
// NORMALISE (CRITICAL FIX)
////////////////////////////////////////////////////
function normalize(r){

let status = (r.Status||"PENDING").toUpperCase();

if(status.includes("SUCCESS")) status="SUCCESS";
else if(status.includes("RTS")||status.includes("FAIL")) status="RTS";
else if(status.includes("SENT")) status="SENT";
else status="PENDING";

return {
ID:r.ID,
Name:(r.Name||"UNKNOWN").trim(),
Status:status,
CreatedAt:r.CreatedAt||Date.now(),
UpdatedAt:Date.now()
};

}

////////////////////////////////////////////////////
// SEARCH
////////////////////////////////////////////////////
let search="";
document.getElementById("search").addEventListener("input",e=>{
search=e.target.value.toLowerCase();
render();
});

function match(r,q){
if(!q) return true;
return (r.Name+" "+r.Status).toLowerCase().includes(q);
}

////////////////////////////////////////////////////
// ENGINE
////////////////////////////////////////////////////
function next(){

let pool=DB.filter(x=>x.Status==="PENDING");
if(!pool.length) return null;

return pool.sort((a,b)=>
(b.UpdatedAt||0)-(a.UpdatedAt||0)
)[0];
}

////////////////////////////////////////////////////
// STATS
////////////////////////////////////////////////////
function stats(){
return {
total:DB.length,
pending:DB.filter(x=>x.Status==="PENDING").length,
sent:DB.filter(x=>x.Status==="SENT").length,
success:DB.filter(x=>x.Status==="SUCCESS").length,
rts:DB.filter(x=>x.Status==="RTS").length
};
}

////////////////////////////////////////////////////
// RENDER
////////////////////////////////////////////////////
function render(){

let s=stats();

document.getElementById("stats").innerHTML=`
<div class="box">TOTAL<br>${s.total}</div>
<div class="box">PENDING<br>${s.pending}</div>
<div class="box">SENT<br>${s.sent}</div>
<div class="box">SUCCESS<br>${s.success}</div>
<div class="box">RTS<br>${s.rts}</div>
`;

let n=next();

document.getElementById("next").innerHTML=
n?
`<div class="queue">
<b>${n.Name}</b><br><br>
<button onclick="markSent(${n.ID})">MARK SENT</button>
</div>`
:"NO PENDING ITEMS";

document.getElementById("outbox").innerHTML=
DB.filter(x=>x.Status==="SENT"||x.Status==="SUCCESS")
.map(r=>`
<div class="card">
<b>${r.Name}</b><br>${r.Status}
</div>
`).join("");

document.getElementById("list").innerHTML=
DB.filter(r=>match(r,search))
.map(r=>`
<div class="card">
<input value="${r.Name}" onchange="update(${r.ID},this.value)">
<select onchange="setStatus(${r.ID},this.value)">
<option ${r.Status==="PENDING"?"selected":""}>PENDING</option>
<option ${r.Status==="SENT"?"selected":""}>SENT</option>
<option ${r.Status==="SUCCESS"?"selected":""}>SUCCESS</option>
<option ${r.Status==="RTS"?"selected":""}>RTS</option>
</select>
</div>
`).join("");

save();

}

////////////////////////////////////////////////////
// ACTIONS
////////////////////////////////////////////////////
function update(id,val){
let r=DB.find(x=>x.ID===id);
r.Name=val;
r.UpdatedAt=Date.now();
save();render();
}

function setStatus(id,val){
let r=DB.find(x=>x.ID===id);
r.Status=val.toUpperCase();
r.UpdatedAt=Date.now();
save();render();
}

function markSent(id){
setStatus(id,"SENT");
}

function resetSystem(){
localStorage.removeItem("vault_dataset");
location.reload();
}

function exportDB(){
let b=new Blob([JSON.stringify(DB)],{type:"application/json"});
let a=document.createElement("a");
a.href=URL.createObjectURL(b);
a.download="vault_dataset.json";
a.click();
}

////////////////////////////////////////////////////
// INIT
////////////////////////////////////////////////////
load();
render();

</script>

</body>
</html>
