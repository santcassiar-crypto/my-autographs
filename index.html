<!DOCTYPE html>
<html>
<head>
    <title>Recovery Mode</title>
</head>
<body>
    <h1 id="status">Loading...</h1>
    <div id="list"></div>

    <script>
        // Check what is in storage
        const data = localStorage.getItem('autograph_db_v3');
        const status = document.getElementById('status');
        const list = document.getElementById('list');

        if (!data) {
            status.innerText = "No data found in storage.";
        } else {
            const records = JSON.parse(data);
            status.innerText = "Records found: " + records.length;
            records.forEach(r => {
                let div = document.createElement('div');
                div.innerText = r.Name + " - " + r.Status;
                list.appendChild(div);
            });
        }
    </script>
</body>
</html>
