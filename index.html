
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VaultOS v7 Intelligence Core</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#0b0b0b;
  color:#fff;
  margin:0;
}

header{
  background:#111;
  padding:12px;
  position:sticky;
  top:0;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:#111;
  border:1px solid #222;
  border-radius:10px;
  padding:12px;
  margin:10px;
}

input,select,button,textarea{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid #333;
  background:#181818;
  color:#fff;
}

button{cursor:pointer}

.record{
  padding:8px;
  border-bottom:1px solid #222;
}

.small{font-size:12px;color:#aaa}

.badge{
  display:inline-block;
  padding:2px 6px;
  font-size:11px;
  background:#222;
  border-radius:6px;
  margin-left:6px;
}
</style>
</head>

<body>

<header>
<h2>VaultOS v7 Intelligence Core</h2>
<input id="search" placeholder="Search records...">
</header>

<div class="grid" id="stats"></div>

<div class="card">
<h3>Bulk Add</h3>
<textarea id="bulkNames" placeholder="One name per line..."></textarea>
<button onclick="bulkAdd()">Add All As PENDING</button>
<div id="bulkResult" class="small"></div>
</div>

<div class="card">
<h3>Intelligence Engine</h3>
<div id="intel"></div>
</div>

<div class="card">
<h3>Awaiting Queue</h3>
<div id="awaiting"></div>
</div>

<div class="card">
<h3>Records</h3>
<div id="list"></div>
</div>

<script>

const KEY = "vaultos_v7_intel";
let DB = [];

/* ---------- LOAD / SAVE ---------- */

function save(){
  localStorage.setItem(KEY, JSON.stringify(DB));
  render();
}

function load(){
  try{
    DB = JSON.parse(localStorage.getItem(KEY) || "[]");
  }catch(e){
    DB = [];
  }
  render();
}

/* ---------- ADD ---------- */

function bulkAdd(){
  const text = document.getElementById('bulkNames').value.trim();
  if(!text) return alert("No input");

  const lines = text.split("\n").map(x => x.trim()).filter(Boolean);

  lines.forEach(name => {
    DB.push({
      ID: Date.now() + Math.random(),
      Name: name,
      Status: "PENDING"
    });
  });

  document.getElementById('bulkNames').value = "";
  document.getElementById('bulkResult').innerText =
    `Added ${lines.length} pending targets`;

  save();
}

/* ---------- FIXED INTELLIGENCE SYSTEM ---------- */

function category(name){
  const n = (name || "").toLowerCase();

  if(/football|arsenal|england|liverpool|barcelona|madrid/.test(n)) return "Football";
  if(/nba|lakers|celtics|suns|spurs/.test(n)) return "NBA";
  if(/actor|film|movie|tv|comedy|netflix/.test(n)) return "Entertainment";
  if(/event|festival|tour|show|appearance/.test(n)) return "Events";
  if(/training|camp|academy/.test(n)) return "Training";
  return "Other";
}

/* REAL SCORING MODEL */
function score(r){
  let s = 50;

  const n = (r.Name || "").toLowerCase();
  const c = category(r.Name);

  // status weighting
  if(r.Status === "PENDING") s += 15;
  if(r.Status === "SUCCESS") s -= 40;

  // category weighting (useful targeting bias)
  if(c === "Football") s += 20;
  if(c === "NBA") s += 15;
  if(c === "Events") s += 10;
  if(c === "Entertainment") s += 8;

  // quality signals (clean + realistic)
  if(n.includes("official")) s += 10;
  if(n.includes("academy")) s -= 10;
  if(n.includes("youth")) s -= 15;
  if(n.includes("trial")) s -= 10;
  if(n.includes("private")) s += 5;

  // penalty for low-quality noise
  if(n.length < 4) s -= 20;

  return Math.max(0, Math.min(100, s));
}

/* ---------- RENDER ---------- */

function render(){

  const total = DB.length;
  const pending = DB.filter(x => x.Status === "PENDING").length;
  const success = DB.filter(x => x.Status === "SUCCESS").length;

  document.getElementById('stats').innerHTML = `
    <div class="card"><h2>${total}</h2>Total</div>
    <div class="card"><h2>${pending}</h2>Pending</div>
    <div class="card"><h2>${success}</h2>Success</div>
  `;

  /* INTELLIGENCE (FIXED PRIORITY ENGINE) */
  const top = DB
    .filter(x => x.Status === "PENDING")
    .sort((a,b) => score(b) - score(a))
    .slice(0,10);

  document.getElementById('intel').innerHTML =
    top.length
      ? top.map(x => `
          <div>
            🔥 <b>${x.Name}</b>
            <span class="badge">${score(x)}%</span>
            <span class="small">(${category(x.Name)})</span>
          </div>
        `).join("")
      : "No pending intelligence targets";

  /* QUEUE */
  document.getElementById('awaiting').innerHTML =
    top.map(x => "📬 " + x.Name).join("<br>");

  /* LIST */
  const q = (document.getElementById('search').value || "").toLowerCase();

  document.getElementById('list').innerHTML =
    DB
      .filter(x => (x.Name || "").toLowerCase().includes(q))
      .map(x => `
        <div class="record">
          <b>${x.Name}</b><br>
          <span class="small">${x.Status}</span>
        </div>
      `)
      .join("");
}

/* ---------- SEARCH ---------- */

document.getElementById('search').addEventListener('input', render);

/* ---------- INIT ---------- */

load();

</script>

</body>
</html>
