


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VaultOS LIVE TICKER ENGINE</title>

<style>
body { margin:0; font-family:Arial; background:#0b0b0b; color:#fff; }

header {
  padding:12px;
  background:#111;
  border-bottom:1px solid #222;
  position:sticky;
  top:0;
}

.container {
  display:grid;
  grid-template-columns:320px 1fr;
  height:calc(100vh - 50px);
}

/* LEFT */
.sidebar {
  background:#0f0f0f;
  border-right:1px solid #222;
  padding:10px;
}

.card {
  background:#111;
  border:1px solid #222;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
}

button {
  width:100%;
  padding:8px;
  margin:4px 0;
  background:#00ffcc;
  border:0;
  font-weight:bold;
  border-radius:5px;
  cursor:pointer;
}

button:hover { background:#00ddb3; }

/* RIGHT */
.main { padding:10px; overflow:auto; }

.record {
  background:#0d0d0d;
  border:1px solid #222;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
}

.badge {
  padding:3px 8px;
  border-radius:20px;
  font-size:11px;
  margin-left:6px;
}

.PENDING { background:#ffcc00; color:#000; }
.SENT { background:#4da6ff; color:#fff; }
.SUCCESS { background:#00ff88; color:#000; }
.RTS { background:#ff4d4d; color:#fff; }
.LOGGED { background:#888; color:#fff; }

.ticker {
  background:#111;
  border:1px solid #222;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
  font-size:14px;
  color:#00ffcc;
}
</style>
</head>

<body>

<header>
<b>VaultOS LIVE TICKER ENGINE</b>
</header>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

  <div class="card">
    <button onclick="markSent()">MARK CURRENT AS SENT</button>
    <button onclick="loadSample()">LOAD SAMPLE DATA</button>
  </div>

  <div class="card">
    <div style="font-size:12px;opacity:0.7">
      NEXT QUEUE AUTO-GENERATED
    </div>
  </div>

</div>

<!-- MAIN -->
<div class="main">

  <div id="ticker" class="ticker">Loading queue...</div>

  <div id="view"></div>

</div>

</div>

<script>

// ======================
// CORE DB
// ======================
let DB = { records: [] };
let currentIndex = 0;

// ======================
// LOAD / SAVE
// ======================
function save(){
  localStorage.setItem("vault_ticker", JSON.stringify(DB));
}

function load(){
  const d = localStorage.getItem("vault_ticker");
  if(d) DB = JSON.parse(d);
}
load();

// ======================
// NORMALISER
// ======================
function norm(r){
  return {
    ID: r?.ID ?? Date.now(),
    Name: r?.Name ?? "Untitled",
    Status: r?.Status ?? "PENDING"
  };
}

// ======================
// FILTER LOGIC (CORE ENGINE)
// ======================
function getQueue(){

  let arr = DB.records.map(norm);

  // REMOVE CLOSED STATES
  arr = arr.filter(r =>
    r.Status === "PENDING"
  );

  // DEDUPE BY NAME
  const seen = new Set();
  arr = arr.filter(r => {
    const key = r.Name.toLowerCase().trim();
    if(seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  return arr;
}

// ======================
// TICKER ENGINE
// ======================
function updateTicker(queue){

  if(queue.length === 0){
    document.getElementById("ticker").innerHTML = "NO ITEMS IN QUEUE";
    return;
  }

  const current = queue[currentIndex] || queue[0];

  document.getElementById("ticker").innerHTML = `
    NEXT SEND → <b>${current.Name}</b>
    <span class="${current.Status} badge">${current.Status}</span>
  `;
}

// ======================
// MARK SENT (ADVANCE ENGINE)
// ======================
function markSent(){

  const queue = getQueue();
  if(queue.length === 0) return;

  const current = queue[currentIndex] || queue[0];

  // update original DB record
  DB.records = DB.records.map(r => {
    if(r.Name === current.Name){
      return { ...r, Status:"SENT" };
    }
    return r;
  });

  save();

  // reset index safely
  currentIndex = 0;

  render();
}

// ======================
// RENDER
// ======================
function render(){

  const queue = getQueue();
  updateTicker(queue);

  const view = document.getElementById("view");

  view.innerHTML = `<h3>ACTIVE QUEUE (${queue.length})</h3>`;

  queue.forEach((r,i)=>{
    view.innerHTML += `
      <div class="record">
        <b>${r.Name}</b>
        <span class="${r.Status} badge">${r.Status}</span>
        <br>
        <small>ID: ${r.ID}</small>
      </div>
    `;
  });
}

// ======================
// SAMPLE DATA LOADER
// ======================
function loadSample(){

  DB.records = [
    {ID:1, Name:"Test A", Status:"PENDING"},
    {ID:2, Name:"Test B", Status:"PENDING"},
    {ID:3, Name:"Test C", Status:"SENT"},
    {ID:4, Name:"Test D", Status:"PENDING"},
    {ID:5, Name:"Test A", Status:"PENDING"}
  ];

  save();
  render();
}

// INIT
load();
render();

</script>

</body>
</html>
