<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TTM OS – Self Optimising Engine</title>

<style>
body{
  font-family:Arial;
  background:#0b0b0b;
  color:#fff;
  margin:0;
}

header{
  background:#111;
  padding:12px;
  position:sticky;
  top:0;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:#111;
  border:1px solid #222;
  border-radius:10px;
  padding:12px;
  margin:10px;
}

input,textarea,button,select{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid #333;
  background:#181818;
  color:#fff;
}

.record{
  padding:6px;
  border-bottom:1px solid #222;
}

.small{font-size:12px;color:#aaa}
.badge{background:#222;padding:2px 6px;border-radius:6px;font-size:11px}
</style>
</head>

<body>

<header>
<h2>TTM OS – Self Optimising Engine</h2>
<input id="search" placeholder="Search database...">
</header>

<div class="grid" id="stats"></div>

<div class="card">
<h3>➕ Add Targets</h3>
<textarea id="bulk"></textarea>
<button onclick="add()">Add</button>
</div>

<div class="card">
<h3>📌 Update Status</h3>
<input id="u_name">
<select id="u_status">
<option>PENDING</option>
<option>SENT</option>
<option>SUCCESS</option>
<option>RTS</option>
<option>LOGGED</option>
</select>
<button onclick="update()">Update + Learn</button>
</div>

<div class="card">
<h3>🧠 CATEGORY STRATEGY MAP</h3>
<div id="strategy"></div>
</div>

<div class="card">
<h3>⚡ OPTIMISED ACTION LIST</h3>
<div id="actions"></div>
</div>

<div class="card">
<h3>📋 FULL DATA</h3>
<div id="list"></div>
</div>

<script>

const KEY="ttm_self_opt_v1";

let DB = load();

function load(){
  try{
    const raw = JSON.parse(localStorage.getItem(KEY)||"{}");
    return raw.records ? raw : {records:[], weights:{}, heat:{}};
  }catch{
    return {records:[], weights:{}, heat:{}};
  }
}

function save(){
  localStorage.setItem(KEY, JSON.stringify(DB));
}

/* =========================
   CATEGORY SYSTEM
========================= */

function category(n){
  n = n.toLowerCase();

  if(/football|arsenal|england|kane|shearer/.test(n)) return "football";
  if(/nba|lakers|sabonis|banchero/.test(n)) return "nba";
  if(/actor|oldman|fiennes|brosnan|comer/.test(n)) return "actors";
  if(/tv|podcast|show|theatre/.test(n)) return "tv";

  return "other";
}

/* =========================
   INITIAL VALUES
========================= */

function get(cat){
  if(DB.weights[cat] === undefined) DB.weights[cat]=1.0;
  if(DB.heat[cat] === undefined) DB.heat[cat]=0;
  return DB.weights[cat];
}

/* =========================
   HEAT DECAY (SELF BALANCE)
========================= */

function decay(){
  Object.keys(DB.heat).forEach(k=>{
    DB.heat[k] *= 0.95; // natural cooling
  });
}

/* =========================
   SCORE ENGINE (SELF-OPTIMISING)
========================= */

function score(r){
  const cat = category(r.name);
  let w = get(cat);

  let base = 50;

  if(r.status==="SUCCESS") base += 40;
  if(r.status==="RTS") base -= 30;
  if(r.status==="SENT") base += 5;

  /* 🔥 SATURATION PENALTY */
  const heat = DB.heat[cat] || 0;
  const fatigue = Math.min(0.4, heat * 0.02);

  /* 📈 COOLDOWN BOOST */
  const cooldown = heat < 3 ? 0.1 : 0;

  let final = base * w;

  final = final * (1 - fatigue) + (cooldown * 10);

  return Math.max(0, Math.min(100, final));
}

/* =========================
   LEARNING + STRATEGY ADJUSTMENT
========================= */

function learn(r, newStatus){
  const cat = category(r.name);

  /* update heat (usage tracking) */
  DB.heat[cat] = (DB.heat[cat] || 0) + 1;

  if(newStatus === "SUCCESS"){
    DB.weights[cat] = (DB.weights[cat] || 1.0) + 0.04;
  }

  if(newStatus === "RTS"){
    DB.weights[cat] = (DB.weights[cat] || 1.0) - 0.06;
  }

  DB.weights[cat] = Math.max(0.5, Math.min(1.8, DB.weights[cat]));
}

/* =========================
   CORE ACTIONS
========================= */

function add(){
  const lines = document.getElementById("bulk").value
    .split("\n").map(x=>x.trim()).filter(Boolean);

  lines.forEach(n=>{
    DB.records.push({
      id:Date.now()+Math.random(),
      name:n,
      status:"PENDING"
    });
  });

  document.getElementById("bulk").value="";
  render();
  save();
}

function update(){
  const name = document.getElementById("u_name").value.toLowerCase();
  const status = document.getElementById("u_status").value.toUpperCase();

  DB.records.forEach(r=>{
    if(r.name.toLowerCase() === name){
      r.status = status;
      learn(r, status);
    }
  });

  render();
  save();
}

/* =========================
   OPTIMISED OUTPUT
========================= */

function actions(){
  return DB.records
    .filter(r=>r.status==="PENDING")
    .map(r=>({r, s:score(r)}))
    .sort((a,b)=>b.s-a.s)
    .slice(0,15);
}

/* =========================
   STRATEGY VIEW
========================= */

function strategy(){
  const cats = {};

  DB.records.forEach(r=>{
    const c = category(r.name);
    cats[c] = cats[c] || {count:0, heat:DB.heat[c]||0};
    cats[c].count++;
  });

  return cats;
}

/* =========================
   RENDER
========================= */

function render(){

  decay();

  document.getElementById("stats").innerHTML = `
    <div class="card"><h2>${DB.records.length}</h2>Total</div>
    <div class="card"><h2>${DB.records.filter(r=>r.status==="PENDING").length}</h2>Pending</div>
    <div class="card"><h2>${DB.records.filter(r=>r.status==="SUCCESS").length}</h2>Success</div>
    <div class="card"><h2>${DB.records.filter(r=>r.status==="RTS").length}</h2>RTS</div>
  `;

  document.getElementById("strategy").innerHTML =
    Object.entries(strategy()).map(([k,v])=>`
      ${k} → uses: ${v.count}, heat: ${(v.heat||0).toFixed(1)}, weight: ${(DB.weights[k]||1).toFixed(2)}
    `).join("<br>");

  document.getElementById("actions").innerHTML =
    actions().map(x=>`
      ⚡ ${x.r.name} <span class="badge">${x.s.toFixed(0)}</span>
    `).join("<br>");

  const q = (document.getElementById("search").value||"").toLowerCase();

  document.getElementById("list").innerHTML =
    DB.records
      .filter(r=>r.name.toLowerCase().includes(q))
      .map(r=>`
        <div class="record">
          <b>${r.name}</b><br>
          <span class="small">${r.status}</span>
        </div>
      `).join("");

  save();
}

/* INIT */
render();

</script>

</body>
</html>
