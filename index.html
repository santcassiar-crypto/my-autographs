
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TTM OS – Long Term Core</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#0b0b0b;
  color:#fff;
  margin:0;
}

header{
  background:#111;
  padding:12px;
  position:sticky;
  top:0;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:#111;
  border:1px solid #222;
  border-radius:10px;
  padding:12px;
  margin:10px;
}

input,textarea,button,select{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid #333;
  background:#181818;
  color:#fff;
}

button{cursor:pointer}

.record{
  padding:8px;
  border-bottom:1px solid #222;
}

.small{font-size:12px;color:#aaa}

.badge{
  padding:2px 6px;
  background:#222;
  border-radius:6px;
  font-size:11px;
}
</style>
</head>

<body>

<header>
<h2>TTM OS – Long Term System</h2>
<input id="search" placeholder="Search targets...">
</header>

<div class="grid" id="stats"></div>

<!-- ADD TARGETS -->
<div class="card">
<h3>➕ Add Targets</h3>
<textarea id="bulk" placeholder="One name per line"></textarea>
<button onclick="addTargets()">Add</button>
</div>

<!-- UPDATE STATUS -->
<div class="card">
<h3>📌 Update Status</h3>
<input id="nameUpdate" placeholder="Name">
<select id="statusUpdate">
<option>PENDING</option>
<option>SUCCESS</option>
<option>RTS</option>
<option>LOGGED</option>
</select>
<button onclick="updateStatus()">Update</button>
</div>

<!-- JSON BACKUP -->
<div class="card">
<h3>💾 Backup / Restore</h3>
<input type="file" id="file">
<button onclick="importData()">Import JSON</button>
<button onclick="exportData()">Export JSON</button>
<div id="backupStatus" class="small"></div>
</div>

<!-- QUEUE -->
<div class="card">
<h3>🎯 Daily Send Queue</h3>
<div id="queue"></div>
</div>

<!-- NEWS -->
<div class="card">
<h3>📰 Activity Signals</h3>
<div id="news"></div>
</div>

<!-- GRAPH -->
<div class="card">
<h3>📊 Performance Trend</h3>
<canvas id="graph" width="400" height="160" style="width:100%;background:#0a0a0a;border-radius:8px"></canvas>
</div>

<!-- LIST -->
<div class="card">
<h3>All Targets</h3>
<div id="list"></div>
</div>

<script>

/* =========================
   CORE VAULT (NO VERSIONING)
========================= */

const KEY="ttm_vault_core";

let DB=load();

function load(){
  const d=JSON.parse(localStorage.getItem(KEY)||"{}");
  return d.records ? d : {records:[],meta:{created:Date.now()}};
}

function save(){
  localStorage.setItem(KEY,JSON.stringify(DB));
}

/* =========================
   ADD TARGETS
========================= */

function addTargets(){
  const lines=document.getElementById("bulk").value
    .split("\n").map(x=>x.trim()).filter(Boolean);

  lines.forEach(n=>{
    DB.records.push({
      id:Date.now()+Math.random(),
      name:n,
      status:"PENDING",
      history:[]
    });
  });

  document.getElementById("bulk").value="";
  save();
  render();
}

/* =========================
   STATUS UPDATE
========================= */

function updateStatus(){
  const name=document.getElementById("nameUpdate").value.toLowerCase();
  const status=document.getElementById("statusUpdate").value;

  DB.records.forEach(r=>{
    if(r.name.toLowerCase()===name){
      r.status=status;
    }
  });

  save();
  render();
}

/* =========================
   INTELLIGENCE ENGINE
========================= */

function score(r){
  let s=50;
  const n=(r.name||"").toLowerCase();

  if(r.status==="SUCCESS") s+=30;
  if(r.status==="RTS") s-=30;
  if(r.status==="PENDING") s+=10;

  if(n.includes("official")) s+=10;
  if(n.includes("event")) s+=8;

  return Math.max(0,Math.min(100,s));
}

function learn(r){
  if(!r.history) r.history=[];
  r.history.push(score(r));
  if(r.history.length>10) r.history.shift();
}

function trend(r){
  const h=r.history||[];
  if(h.length<2) return 0;
  return h[h.length-1]-h[0];
}

function predict(r){
  return Math.max(0,Math.min(100,score(r)+trend(r)*1.5));
}

/* =========================
   DAILY QUEUE (IMPORTANT)
========================= */

function queue(){
  return DB.records
    .filter(r=>r.status==="PENDING")
    .sort((a,b)=>(predict(b))-(predict(a)))
    .slice(0,10);
}

/* =========================
   SIGNALS (NEWS)
========================= */

function signals(){
  return queue().slice(0,5).map(r=>({
    text:`${r.name} activity signal rising`,
    score:predict(r).toFixed(0)
  }));
}

/* =========================
   GRAPH
========================= */

function graph(){
  const c=document.getElementById("graph");
  const ctx=c.getContext("2d");

  ctx.clearRect(0,0,c.width,c.height);

  const data=DB.records
    .map(r=>r.history?.slice(-1)[0]||50)
    .slice(-20);

  ctx.beginPath();
  ctx.moveTo(0,150);

  data.forEach((v,i)=>{
    ctx.lineTo(i*20,150-(v*1.2));
  });

  ctx.strokeStyle="#4ade80";
  ctx.stroke();
}

/* =========================
   IMPORT / EXPORT (CRITICAL)
========================= */

function exportData(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="ttm_backup.json";
  a.click();
}

function importData(){
  const file=document.getElementById("file").files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=e=>{
    const data=JSON.parse(e.target.result);

    DB.records = Array.isArray(data) ? data : data.records || [];

    save();
    render();

    document.getElementById("backupStatus").innerText=
      "Loaded " + DB.records.length + " records";
  };

  reader.readAsText(file);
}

/* =========================
   RENDER LOOP (DAILY USE CORE)
========================= */

function render(){

  DB.records.forEach(learn);

  const total=DB.records.length;
  const pending=DB.records.filter(r=>r.status==="PENDING").length;
  const success=DB.records.filter(r=>r.status==="SUCCESS").length;

  document.getElementById("stats").innerHTML=`
    <div class="card"><h2>${total}</h2>Total</div>
    <div class="card"><h2>${pending}</h2>Pending</div>
    <div class="card"><h2>${success}</h2>Success</div>
  `;

  const q=queue();

  document.getElementById("queue").innerHTML=
    q.map(r=>`
      🎯 ${r.name}
      <span class="badge">${predict(r).toFixed(0)}%</span>
    `).join("<br>");

  const s=signals();

  document.getElementById("news").innerHTML=
    s.map(n=>`
      📰 ${n.text}
      <span class="badge">${n.score}%</span>
    `).join("<br>");

  const filter=(document.getElementById("search").value||"").toLowerCase();

  document.getElementById("list").innerHTML=
    DB.records
      .filter(r=>r.name.toLowerCase().includes(filter))
      .map(r=>`
        <div class="record">
          <b>${r.name}</b><br>
          <span class="small">${r.status}</span>
        </div>
      `).join("");

  graph();
  save();
}

/* =========================
   INIT
========================= */

document.getElementById("search").addEventListener("input",render);
render();

</script>

</body>
</html>
