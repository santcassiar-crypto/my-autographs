<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registry Pro 2026 | Billericay Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #e4e4e7; font-family: 'Inter', sans-serif; }
        .bento-card { background: #111113; border: 1px solid #27272a; border-radius: 16px; transition: transform 0.2s; }
        .bento-card:active { transform: scale(0.98); }
        .status-success { color: #22c55e; border-bottom: 2px solid #22c55e; }
        .status-sent { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
        .status-rts { color: #ef4444; border-bottom: 2px solid #ef4444; }
        .status-pending { color: #71717a; border-bottom: 2px solid #71717a; }
        .glass { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(12px); }
        input:focus { border-color: #ef4444; box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2); outline: none; }
    </style>
</head>
<body class="pb-24">

    <div class="max-w-md mx-auto p-4">
        <header class="mb-6 space-y-4">
            <div class="flex justify-between items-end">
                <h1 class="text-3xl font-black tracking-tighter text-white">VAULT<span class="text-red-600">.</span>26</h1>
                <span class="text-[10px] font-mono text-zinc-500 uppercase tracking-widest bg-zinc-900 px-2 py-1 rounded">Billericay Registry</span>
            </div>

            <div class="grid grid-cols-3 gap-2">
                <div class="bento-card p-3 flex flex-col items-center">
                    <span class="text-[9px] text-zinc-500 font-bold uppercase mb-1">Success</span>
                    <span id="win-count" class="text-2xl font-black text-green-500">0</span>
                </div>
                <div class="bento-card p-3 flex flex-col items-center">
                    <span class="text-[9px] text-zinc-500 font-bold uppercase mb-1">Rate</span>
                    <span id="win-rate" class="text-2xl font-black text-white">0%</span>
                </div>
                <div class="bento-card p-3 flex flex-col items-center border-red-900/30">
                    <span class="text-[9px] text-zinc-500 font-bold uppercase mb-1">Total</span>
                    <span id="total-count" class="text-2xl font-black text-red-600">0</span>
                </div>
            </div>
        </header>

        <section class="bento-card p-4 mb-6 border-zinc-800 bg-zinc-900/50">
            <div class="space-y-3">
                <input type="text" id="newName" placeholder="Name (e.g. Dirk Nowitzki)" class="w-full bg-black border border-zinc-800 p-3 rounded-xl text-sm text-white">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="newCat" placeholder="Category" class="bg-black border border-zinc-800 p-3 rounded-xl text-xs text-white">
                    <input type="text" id="newAgent" placeholder="Agent" class="bg-black border border-zinc-800 p-3 rounded-xl text-xs text-white">
                </div>
                <button onclick="addRecord()" class="w-full bg-red-600 hover:bg-red-700 text-white p-3 rounded-xl font-bold uppercase italic text-sm transition-all">Add to Registry</button>
            </div>
        </section>

        <div class="sticky top-4 z-50 mb-6">
            <input type="text" id="search" placeholder="Search Vault..." onkeyup="render()" class="w-full glass border border-zinc-800 p-4 rounded-2xl text-sm shadow-2xl">
        </div>

        <div id="list" class="space-y-3">
            </div>

        <div class="fixed bottom-0 left-0 w-full p-4 glass border-t border-zinc-800">
            <div class="max-w-md mx-auto grid grid-cols-2 gap-4">
                <button onclick="downloadBackup()" class="bg-zinc-900 border border-zinc-700 p-3 rounded-xl text-[10px] font-bold uppercase tracking-widest text-zinc-400">💾 Sync to Github</button>
                <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="bg-zinc-800 p-3 rounded-xl text-[10px] font-bold uppercase text-white">↑ Jump to Top</button>
            </div>
        </div>
    </div>

    <script>
        let records = JSON.parse(localStorage.getItem('autograph_db_v2')) || [
            {"ID":1715781600000, "Name":"Kevin Keegan", "Status":"SUCCESS", "Category":"Football", "Date":"15/05/2026", "Agent":"Home"},
            {"ID":1715781500000, "Name":"Griff Rhys Jones", "Status":"SUCCESS", "Category":"Theatre", "Date":"15/05/2026", "Agent":"Apollo Theatre"}
        ];

        const states = ["PENDING", "SENT", "SUCCESS", "RTS"];

        function addRecord() {
            const name = document.getElementById('newName').value;
            if(!name) return;
            
            records.push({
                ID: Date.now(),
                Name: name,
                Category: document.getElementById('newCat').value || "General",
                Status: "PENDING",
                Date: new Date().toLocaleDateString('en-GB'),
                Agent: document.getElementById('newAgent').value || "TBC"
            });
            
            document.getElementById('newName').value = '';
            saveAndRender();
        }

        function toggleStatus(id) {
            const idx = records.findIndex(r => r.ID === id);
            let cur = records[idx].Status;
            records[idx].Status = states[(states.indexOf(cur) + 1) % states.length];
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('autograph_db_v2', JSON.stringify(records));
            render();
        }

        function render() {
            const q = document.getElementById('search').value.toLowerCase();
            const list = document.getElementById('list');
            list.innerHTML = '';
            
            let wins = 0;
            const now = Date.now();

            records.sort((a,b) => b.ID - a.ID).forEach(r => {
                if(r.Status === "SUCCESS") wins++;
                
                if(!r.Name.toLowerCase().includes(q)) return;

                const isNew = (now - r.ID) < 86400000; // Last 24 hours
                
                const div = document.createElement('div');
                div.className = "bento-card p-4 relative overflow-hidden";
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <h3 class="font-bold text-white tracking-tight">${r.Name}</h3>
                                ${isNew ? '<span class="bg-red-600 text-[8px] font-black px-1.5 py-0.5 rounded italic">NEW</span>' : ''}
                            </div>
                            <div class="flex gap-3 text-[10px] text-zinc-500 font-medium">
                                <span class="uppercase text-red-500 font-bold">${r.Category}</span>
                                <span>${r.Date}</span>
                            </div>
                            <div class="text-[9px] text-zinc-600 mt-2 font-mono uppercase">Agent: ${r.Agent}</div>
                        </div>
                        <div class="text-right">
                            <button onclick="toggleStatus(${r.ID})" class="status-${r.Status.toLowerCase()} text-[11px] font-black tracking-widest mb-2 block w-20 py-1 bg-black rounded border border-zinc-800">
                                ${r.Status}
                            </button>
                            <button onclick="deleteRecord(${r.ID})" class="text-zinc-800 text-xs">Delete</button>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });

            // Update Stats
            document.getElementById('win-count').innerText = wins;
            document.getElementById('total-count').innerText = records.length;
            document.getElementById('win-rate').innerText = records.length ? Math.round((wins/records.length)*100) + "%" : "0%";
        }

        function deleteRecord(id) {
            if(confirm('Wipe from Registry?')) {
                records = records.filter(r => r.ID !== id);
                saveAndRender();
            }
        }

        function downloadBackup() {
            const blob = new Blob([document.documentElement.outerHTML], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Registry_Backup_${new Date().toISOString().split('T')[0]}.html`;
            a.click();
        }

        render();
    </script>
</body>
</html>
