


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VaultOS FIXED ENGINE</title>

<style>
body { margin:0; font-family:Arial; background:#0b0b0b; color:#fff; }
header { padding:10px; background:#111; border-bottom:1px solid #222; }
.container { display:grid; grid-template-columns:280px 1fr; height:calc(100vh - 50px); }
.sidebar { padding:10px; background:#0f0f0f; border-right:1px solid #222; }
.main { padding:10px; overflow:auto; }

.card { background:#111; border:1px solid #222; padding:10px; margin-bottom:10px; border-radius:8px; }

button {
  width:100%;
  padding:8px;
  margin:4px 0;
  background:#00ffcc;
  border:0;
  font-weight:bold;
  cursor:pointer;
  border-radius:5px;
}

button:hover { background:#00ddb3; }

.record {
  background:#0d0d0d;
  border:1px solid #222;
  padding:8px;
  margin:6px 0;
  border-radius:6px;
}

.small { font-size:12px; opacity:0.7; }
input {
  width:100%;
  padding:6px;
  background:#000;
  border:1px solid #333;
  color:#fff;
  border-radius:5px;
}
</style>
</head>

<body>

<header><b>VaultOS FIXED IMPORT ENGINE</b></header>

<div class="container">

<div class="sidebar">

  <div class="card">
    <button onclick="document.getElementById('file').click()">Import JSON</button>
    <button onclick="exportDB()">Export JSON</button>
    <input type="file" id="file" accept="application/json">
  </div>

  <div class="card">
    <input id="search" placeholder="Search Name..." oninput="render()">
  </div>

</div>

<div class="main">
  <div id="view"></div>
</div>

</div>

<script>

// ======================
// CORE DB
// ======================
let DB = { records: [] };

function save() {
  localStorage.setItem("vault_fixed", JSON.stringify(DB));
}

function load() {
  const raw = localStorage.getItem("vault_fixed");
  if (raw) DB = JSON.parse(raw);
}
load();

// ======================
// 🔥 STRICT NORMALISER (YOUR FORMAT ONLY)
// ======================
function norm(r) {
  return {
    id: r?.ID ?? Date.now(),
    name: r?.Name ?? "Untitled",
    status: r?.Status ?? "UNKNOWN"
  };
}

// ======================
// IMPORT
// ======================
document.getElementById("file").onchange = e => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);

      const arr = Array.isArray(data) ? data : (data.records || []);

      DB.records = arr.map(norm);

      save();
      render();

      alert("Import successful");

    } catch {
      alert("Invalid JSON");
    }
  };

  reader.readAsText(file);
  e.target.value = "";
};

// ======================
// EXPORT
// ======================
function exportDB() {
  const blob = new Blob([JSON.stringify(DB.records)], { type: "application/json" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "vault_fixed.json";
  a.click();

  URL.revokeObjectURL(url);
}

// ======================
// RENDER (NO UNDEFINED EVER)
// ======================
function render() {
  const q = document.getElementById("search").value.toLowerCase();

  let records = DB.records.map(norm);

  if (q) {
    records = records.filter(r =>
      r.name.toLowerCase().includes(q)
    );
  }

  const view = document.getElementById("view");

  view.innerHTML = `<h3>Records (${records.length})</h3>`;

  records.forEach(r => {
    view.innerHTML += `
      <div class="record">
        <b>${r.name}</b><br>
        <span class="small">ID: ${r.id}</span><br>
        <span class="small">Status: ${r.status}</span>
      </div>
    `;
  });
}

// ======================
render();

</script>

</body>
</html>
