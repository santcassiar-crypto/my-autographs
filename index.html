<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VaultPro | Enterprise Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #e4e4e7; font-family: sans-serif; }
        .bento-card { background: #111113; border: 1px solid #27272a; border-radius: 12px; }
        .status-SUCCESS { border-left: 4px solid #22c55e; }
        .status-PENDING { border-left: 4px solid #f59e0b; }
        .status-Sent { border-left: 4px solid #3b82f6; }
        .status-RTS { border-left: 4px solid #ef4444; }
        .status-LOGGED { border-left: 4px solid #6b7280; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .ticker-wrap { animation: ticker 30s linear infinite; }
    </style>
</head>
<body class="pb-24">

    <div class="bg-red-600 overflow-hidden py-1 mb-6">
        <div class="ticker-wrap whitespace-nowrap text-[10px] font-black uppercase text-white tracking-widest">
            🚨 VAULT SYNC ACTIVE • 162 TARGETS MANAGED • SYSTEM OPTIMIZED • DATA INTEGRITY VERIFIED
        </div>
    </div>

    <div class="max-w-md mx-auto p-4">
        <h1 class="text-3xl font-black text-white italic mb-4">VAULT<span class="text-red-600">PRO</span></h1>
        
        <div class="grid grid-cols-3 gap-2 mb-4">
            <div class="bento-card p-3 text-center"><div class="text-[8px] text-zinc-500">TOTAL</div><div class="text-lg font-black text-white" id="m-total">0</div></div>
            <div class="bento-card p-3 text-center"><div class="text-[8px] text-zinc-500">SUCCESS</div><div class="text-lg font-black text-green-500" id="m-success">0</div></div>
            <div class="bento-card p-3 text-center"><div class="text-[8px] text-zinc-500">PENDING</div><div class="text-lg font-black text-amber-500" id="m-pending">0</div></div>
        </div>

        <div class="flex gap-2 mb-4">
            <input type="text" id="search" placeholder="Search targets..." oninput="render()" class="w-full bg-zinc-900 border border-zinc-800 p-2 rounded text-xs text-white">
            <button onclick="addNew()" class="bg-green-700 px-3 rounded text-white font-bold">+</button>
            <button onclick="exportData()" class="bg-zinc-800 px-2 rounded text-zinc-400 font-bold text-[9px]">BACKUP</button>
            <button onclick="document.getElementById('importFile').click()" class="bg-zinc-800 px-2 rounded text-zinc-400 font-bold text-[9px]">RESTORE</button>
            <input type="file" id="importFile" class="hidden" onchange="importData(event)">
        </div>

        <div id="list" class="space-y-2"></div>
    </div>

    <script>
        const masterList = [
            {ID: 1, Name: "Jannik Sinner", Status: "SUCCESS"}, {ID: 2, Name: "Keanu Reeves", Status: "RTS"}, {ID: 3, Name: "Alan Carr", Status: "SUCCESS"},
            {ID: 4, Name: "Harry Kane (Bayern)", Status: "RTS"}, {ID: 5, Name: "David Attenborough", Status: "SUCCESS"}, {ID: 6, Name: "Paul Merson (Original)", Status: "SUCCESS"},
            {ID: 7, Name: "Tony Adams", Status: "SUCCESS"}, {ID: 8, Name: "Joshua Kimmich", Status: "SUCCESS"}, {ID: 9, Name: "Ron Ferdinand", Status: "SUCCESS"},
            {ID: 10, Name: "Erling Haaland (City)", Status: "SUCCESS"}, {ID: 11, Name: "Lamine Yamal (Home)", Status: "RTS"}, {ID: 12, Name: "Rosie Jones", Status: "SUCCESS"},
            {ID: 13, Name: "Kevin Bridges", Status: "SUCCESS"}, {ID: 14, Name: "Lee Mack", Status: "SUCCESS"}, {ID: 15, Name: "Chris Waddle", Status: "SUCCESS"},
            {ID: 16, Name: "Ivo Graham", Status: "SUCCESS"}, {ID: 17, Name: "Josh Widdicombe", Status: "SUCCESS"}, {ID: 18, Name: "Timothée Chalamet", Status: "Sent"},
            {ID: 19, Name: "Rob Beckett", Status: "SUCCESS"}, {ID: 20, Name: "Mohamed Salah", Status: "SUCCESS"}, {ID: 21, Name: "Tommy Fleetwood", Status: "SUCCESS"},
            {ID: 22, Name: "Lamine Yamal (Club)", Status: "SUCCESS"}, {ID: 24, Name: "Sebastian Coe", Status: "RTS"}, {ID: 25, Name: "Hugh Bonneville", Status: "SUCCESS"},
            {ID: 26, Name: "Erling Haaland (Academy)", Status: "SUCCESS"}, {ID: 27, Name: "Mark Addy", Status: "SUCCESS"}, {ID: 28, Name: "Mikel Arteta", Status: "Sent"},
            {ID: 29, Name: "Billy Crudup", Status: "SUCCESS"}, {ID: 30, Name: "Cole Palmer", Status: "RTS"}, {ID: 31, Name: "Dougray Scott", Status: "PENDING"},
            {ID: 32, Name: "Jude Bellingham", Status: "PENDING"}, {ID: 33, Name: "Kylian Mbappé", Status: "PENDING"}, {ID: 41, Name: "Rik Smits", Status: "SUCCESS"},
            {ID: 42, Name: "Robert Parish", Status: "SUCCESS"}, {ID: 92, Name: "Michael Sheen", Status: "SUCCESS"}, {ID: 93, Name: "Stephen Fry (Extra)", Status: "SUCCESS"},
            {ID: 98, Name: "Arsenal 2026 Squad", Status: "SUCCESS"}, {ID: 171, Name: "Stephen Fry (1/3)", Status: "SUCCESS"}, {ID: 177, Name: "Arsenal 2026 Squad", Status: "SUCCESS"}
        ];

        let records = JSON.parse(localStorage.getItem('vault_db')) || masterList;

        function render() {
            const query = document.getElementById('search').value.toLowerCase();
            const list = document.getElementById('list');
            list.innerHTML = '';
            const filtered = records.filter(r => r.Name.toLowerCase().includes(query));
            filtered.forEach(r => {
                const div = document.createElement('div');
                div.className = `bento-card p-4 flex justify-between items-center status-${r.Status}`;
                div.innerHTML = `
                    <span class="text-xs font-bold w-1/2">${r.Name}</span>
                    <select onchange="updateStatus(${r.ID}, this.value)" class="bg-black text-[9px] p-1 border border-zinc-700 uppercase">
                        <option ${r.Status === 'SUCCESS' ? 'selected' : ''}>SUCCESS</option>
                        <option ${r.Status === 'PENDING' ? 'selected' : ''}>PENDING</option>
                        <option ${r.Status === 'Sent' ? 'selected' : ''}>Sent</option>
                        <option ${r.Status === 'RTS' ? 'selected' : ''}>RTS</option>
                        <option ${r.Status === 'LOGGED' ? 'selected' : ''}>LOGGED</option>
                    </select>
                `;
                list.appendChild(div);
            });
            document.getElementById('m-total').innerText = records.length;
            document.getElementById('m-success').innerText = records.filter(r => r.Status === 'SUCCESS').length;
            document.getElementById('m-pending').innerText = records.filter(r => r.Status === 'PENDING').length;
        }

        function updateStatus(id, newStatus) {
            records.find(r => r.ID === id).Status = newStatus;
            localStorage.setItem('vault_db', JSON.stringify(records));
            render();
        }

        function addNew() {
            const name = prompt("Enter Target Name:");
            if (name) {
                records.unshift({ID: Date.now(), Name: name, Status: "PENDING"});
                localStorage.setItem('vault_db', JSON.stringify(records));
                render();
            }
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(records)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "vault_backup_" + new Date().toISOString().slice(0,10) + ".json";
            a.click();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                records = JSON.parse(e.target.result);
                localStorage.setItem('vault_db', JSON.stringify(records));
                render();
                alert("Vault Restored!");
            };
            reader.readAsText(file);
        }

        render();
    </script>
</body>
</html>
