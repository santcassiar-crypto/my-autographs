<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VaultOS OCR Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#000;color:#fff}
header{position:sticky;top:0;background:#111;padding:10px}

input,select,textarea{
width:100%;padding:8px;margin-top:5px;
background:#000;color:#fff;border:1px solid #333;border-radius:6px
}

.card{background:#111;margin:10px;padding:10px;border-radius:8px;border:1px solid #222}
button{margin:5px;padding:6px}
.small{font-size:10px;color:#888}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px}
.box{background:#111;padding:10px;border-radius:6px;text-align:center}
.section{padding:10px;margin:10px;background:#0b0b0b;border-radius:8px}
</style>
</head>

<body>

<header>
<input id="search" placeholder="Search Vault...">
</header>

<div>
<button onclick="setFilter('ALL')">ALL</button>
<button onclick="setFilter('PENDING')">PENDING</button>
<button onclick="setFilter('SENT')">SENT</button>
<button onclick="setFilter('SUCCESS')">SIGNED</button>
<button onclick="setFilter('RTS')">RTS</button>
</div>

<div class="grid" id="stats"></div>

<div class="section">
<h3>📸 OCR Import (Image → Record)</h3>
<input type="file" id="ocrInput" accept="image/*">
<button onclick="extractOCR()">Extract & Create Record</button>
<div class="small">Upload envelope/letter photo → auto extract name + address</div>
</div>

<div class="section" id="priority"></div>

<div>
<button onclick="add()">+ ADD MANUAL</button>
</div>

<div id="list"></div>

<script>

////////////////////////////////////////////////////
// DATA
////////////////////////////////////////////////////

const MASTER_DATA = [
{"ID":1,"Name":"Jannik Sinner","Status":"SUCCESS"},
{"ID":2,"Name":"Keanu Reeves","Status":"RTS"},
{"ID":3,"Name":"Alan Carr","Status":"SUCCESS"},
{"ID":4,"Name":"Harry Kane","Status":"PENDING"},
{"ID":5,"Name":"David Attenborough","Status":"SUCCESS"}
];

let DB = load();

function load(){
let raw = localStorage.getItem("vault_os_ocr");
if(raw) return JSON.parse(raw);
return MASTER_DATA;
}

function save(){
localStorage.setItem("vault_os_ocr",JSON.stringify(DB));
}

////////////////////////////////////////////////////
// STATE
////////////////////////////////////////////////////

let search="";
let filter="ALL";

document.getElementById("search").oninput=(e)=>{
search=e.target.value.toLowerCase();
render();
};

function setFilter(f){filter=f;render();}

////////////////////////////////////////////////////
// CORE ACTIONS
////////////////////////////////////////////////////

function add(){
let n=prompt("Name:");
if(!n) return;

DB.unshift({
ID:Date.now(),
Name:n,
Address:"",
Status:"PENDING"
});

save();
render();
}

////////////////////////////////////////////////////
// OCR FEATURE
////////////////////////////////////////////////////

function extractOCR(){

let file=document.getElementById("ocrInput").files[0];
if(!file) return alert("Upload an image first");

Tesseract.recognize(
file,
'eng',
{ logger:m=>console.log(m) }
).then(({data:{text}})=>{

console.log("OCR TEXT:",text);

let parsed=parseText(text);

createFromOCR(parsed);

});

}

function parseText(text){

let lines=text
.split("\n")
.map(l=>l.trim())
.filter(Boolean);

let name=lines[0]||"Unknown";
let address=lines.slice(1,6).join(", ");

return {name,address,raw:text};
}

function createFromOCR(data){

DB.unshift({
ID:Date.now(),
Name:data.name,
Address:data.address,
Status:"PENDING",
Notes:"OCR IMPORT",
RawOCR:data.raw
});

save();
render();

alert("Record created from image!");
}

////////////////////////////////////////////////////
// VIEW PIPELINE
////////////////////////////////////////////////////

function getView(){

let list=DB;

if(search){
list=list.filter(x=>
x.Name.toLowerCase().includes(search) ||
(x.Address||"").toLowerCase().includes(search)
);
}

if(filter==="PENDING") list=list.filter(x=>x.Status==="PENDING");
if(filter==="SENT") list=list.filter(x=>x.Status==="SENT");
if(filter==="SUCCESS") list=list.filter(x=>x.Status==="SUCCESS");
if(filter==="RTS") list=list.filter(x=>x.Status==="RTS");

return list;
}

////////////////////////////////////////////////////
// STATS
////////////////////////////////////////////////////

function renderStats(){

let total=DB.length;
let pending=DB.filter(x=>x.Status==="PENDING").length;
let sent=DB.filter(x=>x.Status==="SENT").length;
let success=DB.filter(x=>x.Status==="SUCCESS").length;
let rts=DB.filter(x=>x.Status==="RTS").length;

document.getElementById("stats").innerHTML=`
<div class="box">TOTAL<br>${total}</div>
<div class="box">PENDING<br>${pending}</div>
<div class="box">SENT<br>${sent}</div>
<div class="box">SIGNED<br>${success}</div>
<div class="box">RTS<br>${rts}</div>
`;
}

////////////////////////////////////////////////////
// RENDER
////////////////////////////////////////////////////

function render(){

let list=getView();

document.getElementById("list").innerHTML=
list.map(r=>`
<div class="card">

<input value="${r.Name}" onchange="r.Name=this.value;save()">

<textarea placeholder="Address" onchange="r.Address=this.value;save()">${r.Address||""}</textarea>

<select onchange="r.Status=this.value;save()">
<option ${r.Status==="PENDING"?"selected":""}>PENDING</option>
<option ${r.Status==="SENT"?"selected":""}>SENT</option>
<option ${r.Status==="SUCCESS"?"selected":""}>SUCCESS</option>
<option ${r.Status==="RTS"?"selected":""}>RTS</option>
</select>

<div class="small">ID: ${r.ID}</div>

</div>
`).join("");

renderStats();
}

render();

</script>

</body>
</html>
