


<!DOCTYPE html>
<html>
<head>
    <title>VaultOS SR7 - Reliable</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .container { display: flex; gap: 20px; }
        .box { border: 1px solid #000; padding: 15px; width: 45%; }
        textarea { width: 100%; height: 200px; }
    </style>
</head>
<body>

<div class="container">
    <div class="box">
        <h3>Scrapbook (Notes)</h3>
        <textarea id="notes" onblur="saveData()"></textarea>
    </div>
    <div class="box">
        <h3>Target List (Names)</h3>
        <input id="name" placeholder="Name">
        <button onclick="addEntry()">Add</button>
        <ul id="list"></ul>
    </div>
</div>

<div style="margin-top:20px;">
    <button onclick="exportData()">Export Data</button>
    <input type="file" id="fileInput">
    <button onclick="importData()">Import Data</button>
</div>

<script>
    // Load data immediately
    let data = JSON.parse(localStorage.getItem('vaultData')) || { notes: "", items: [] };

    // Apply data to screen
    document.getElementById('notes').value = data.notes;
    updateList();

    function updateList() {
        const listEl = document.getElementById('list');
        listEl.innerHTML = data.items.map(i => `<li>${i}</li>`).join('');
    }

    function saveData() {
        data.notes = document.getElementById('notes').value;
        localStorage.setItem('vaultData', JSON.stringify(data));
        console.log("Saved!");
    }

    function addEntry() {
        const name = document.getElementById('name').value;
        if(name) {
            data.items.push(name);
            saveData();
            updateList();
            document.getElementById('name').value = "";
        }
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(data)], {type: "application/json"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "vaultData.json";
        a.click();
    }

    function importData() {
        const file = document.getElementById('fileInput').files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            data = JSON.parse(e.target.result);
            localStorage.setItem('vaultData', JSON.stringify(data));
            document.getElementById('notes').value = data.notes;
            updateList();
        };
        reader.readAsText(file);
    }
</script>
</body>
</html>
