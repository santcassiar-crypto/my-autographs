<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VaultOS Ultimate</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:radial-gradient(circle at top,#111 0%,#000 60%);
color:#fff;
font-family:Arial,sans-serif;
min-height:100vh;
}

header{
position:sticky;
top:0;
z-index:999;
background:rgba(10,10,10,.92);
padding:14px;
border-bottom:1px solid #222;
backdrop-filter:blur(10px);
}

input,select,button{
width:100%;
padding:12px;
margin-top:8px;
background:#0b0b0b;
color:#fff;
border:1px solid #333;
border-radius:12px;
font-size:14px;
}

button{
cursor:pointer;
background:linear-gradient(180deg,#1d1d1d,#111);
font-weight:bold;
}

button:hover{
border-color:#666;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
padding:12px;
}

.box{
background:#111;
border:1px solid #222;
border-radius:18px;
padding:18px;
text-align:center;
}

.card{
background:#111;
border:1px solid #222;
border-radius:18px;
padding:14px;
margin:12px;
}

.small{
font-size:11px;
color:#888;
margin-top:6px;
}

.status-success{
border-left:4px solid #00ff99;
}

.status-pending{
border-left:4px solid orange;
}

.status-rts{
border-left:4px solid red;
}

.status-logged{
border-left:4px solid #44aaff;
}

.status-sent{
border-left:4px solid violet;
}

.title{
font-size:24px;
font-weight:bold;
}

.subtitle{
font-size:12px;
color:#777;
margin-top:4px;
}

</style>

</head>
<body>

<header>
<div class="title">🏆 VaultOS</div>
<div class="subtitle">Autograph Tracking System</div>
<input id="search" placeholder="Search vault...">
</header>

<div class="grid" id="stats"></div>

<div class="card">
<h3>➕ QUICK ADD</h3>
<input id="newName" placeholder="Add new target...">
<select id="newStatus">
<option>PENDING</option>
<option>SUCCESS</option>
<option>RTS</option>
<option>LOGGED</option>
<option>Sent</option>
</select>
<button onclick="addEntry()">ADD TO VAULT</button>
</div>

<div class="card">
<h3>🛡️ BACKUP CONTROLS</h3>
<button onclick="exportBackup()">⬇️ DOWNLOAD BACKUP NOW</button>
<input type="file" id="restoreFile">
<button onclick="restoreBackup()">⬆️ RESTORE FROM FILE</button>
<button onclick="resetVault()">♻️ RESET TO FULL SEED DATA</button>
<div class="small">
Backups protect your vault if browser/device storage is wiped.
</div>
</div>

<div id="list"></div>

<script>

const STORAGE_KEY = "vault_wipe_resistant_v4";

let DB = [];
let search = "";

const SEED = [
{"ID":1779457614274,"Name":"Scott Melvin- Stick to football podcast","Status":"PENDING"},
{"ID":1779457583433,"Name":"Jonathan ross tv show","Status":"PENDING"},
{"ID":1779457568898,"Name":"Matchroom - Brentwood","Status":"PENDING"},
{"ID":1779457518143,"Name":"Kevin Keegan- Home","Status":"SUCCESS"},
{"ID":1779457496694,"Name":"George Graham - Home","Status":"PENDING"},
{"ID":1779457449900,"Name":"LFC Gala Event","Status":"PENDING"},
{"ID":1779457437040,"Name":"Gosh4 Goals","Status":"PENDING"},
{"ID":1779457382999,"Name":"San Antonio Training Centre","Status":"PENDING"},
{"ID":1779457367391,"Name":"OKC training centre","Status":"PENDING"},
{"ID":1779457333472,"Name":"FC Barcelona - Training ground","Status":"PENDING"},
{"ID":1779457307017,"Name":"Gary Oldman","Status":"SUCCESS"},
{"ID":1779457276281,"Name":"Arsenal womens team","Status":"PENDING"},
{"ID":1779457232607,"Name":"Park theatre x 2","Status":"PENDING"},
{"ID":1779457195881,"Name":"Jermery Sochan","Status":"PENDING"},
{"ID":1779369334553,"Name":"Geoff Hurst","Status":"LOGGED"},
{"ID":1779362415139,"Name":"Max Dowman - Dads London office","Status":"PENDING"},
{"ID":1,"Name":"Jannik Sinner","Status":"SUCCESS"},
{"ID":2,"Name":"Keanu Reeves","Status":"RTS"},
{"ID":3,"Name":"Alan Carr","Status":"SUCCESS"},
{"ID":4,"Name":"Harry Kane (Bayern)","Status":"RTS"},
{"ID":5,"Name":"David Attenborough","Status":"SUCCESS"},
{"ID":6,"Name":"Paul Merson (Original)","Status":"SUCCESS"},
{"ID":7,"Name":"Tony Adams","Status":"SUCCESS"},
{"ID":8,"Name":"Joshua Kimmich","Status":"SUCCESS"},
{"ID":9,"Name":"Ron Ferdinand","Status":"SUCCESS"},
{"ID":10,"Name":"Erling Haaland (City)","Status":"SUCCESS"},
{"ID":11,"Name":"Lamine Yamal (Home)","Status":"RTS"},
{"ID":12,"Name":"Rosie Jones","Status":"SUCCESS"},
{"ID":13,"Name":"Kevin Bridges","Status":"SUCCESS"},
{"ID":14,"Name":"Lee Mack","Status":"SUCCESS"},
{"ID":15,"Name":"Chris Waddle","Status":"SUCCESS"},
{"ID":16,"Name":"Ivo Graham","Status":"SUCCESS"},
{"ID":17,"Name":"Josh Widdicombe","Status":"SUCCESS"},
{"ID":18,"Name":"Timothée Chalamet","Status":"Sent"},
{"ID":19,"Name":"Rob Beckett","Status":"SUCCESS"},
{"ID":20,"Name":"Mohamed Salah","Status":"SUCCESS"}
];

function esc(s){
return String(s)
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/\"/g,"&quot;");
}

function save(){
localStorage.setItem(STORAGE_KEY,JSON.stringify(DB));
autoBackup();
}

function load(){
let raw = localStorage.getItem(STORAGE_KEY);

if(raw){
try{
DB = JSON.parse(raw);

SEED.forEach(seed=>{
let exists = DB.find(x=>x.ID===seed.ID);
if(!exists){
DB.push(seed);
}
});

save();
render();
return;
}catch(e){}
}

DB = [...SEED];
save();
render();
}

function autoBackup(){

let snapshot = {
time:Date.now(),
data:DB
};

localStorage.setItem(
"vault_backup_latest",
JSON.stringify(snapshot)
);

localStorage.setItem(
"vault_backup_shadow",
JSON.stringify(snapshot)
);

}

function exportBackup(){

let blob = new Blob(
[JSON.stringify({
time:Date.now(),
data:DB
},null,2)],
{type:"application/json"}
);

let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="vault_backup_"+Date.now()+".json";
a.click();

}

function restoreBackup(){

let file=document.getElementById("restoreFile").files[0];

if(!file){
alert("Select backup file");
return;
}

let reader=new FileReader();

reader.onload=e=>{
try{
let obj=JSON.parse(e.target.result);

if(obj.data){
DB=obj.data;
save();
render();
alert("RESTORE COMPLETE");
}else{
alert("Invalid backup file");
}
}catch(err){
alert("Restore failed");
}
};

reader.readAsText(file);

}

function resetVault(){

let ok=confirm("Reset vault to latest full seed data?");

if(!ok) return;

localStorage.removeItem(STORAGE_KEY);
localStorage.removeItem("vault_backup_latest");
localStorage.removeItem("vault_backup_shadow");

DB=[...SEED];

save();
render();

alert("FULL DATA RESTORED");

}

function addEntry(){

let name=document.getElementById("newName").value.trim();
let status=document.getElementById("newStatus").value;

if(!name){
alert("Enter a target name");
return;
}

DB.unshift({
ID:Date.now(),
Name:name,
Status:status
});

save();
render();

document.getElementById("newName").value="";

}

function update(id,val){
let r=DB.find(x=>x.ID===id);
if(r){
r.Name=val;
save();
}
}

function setStatus(id,val){
let r=DB.find(x=>x.ID===id);
if(r){
r.Status=val;
save();
render();
}
}

function removeEntry(id){
if(!confirm("Delete entry?")) return;
DB=DB.filter(x=>x.ID!==id);
save();
render();
}

function stats(){
return {
total:DB.length,
pending:DB.filter(x=>x.Status==="PENDING").length,
success:DB.filter(x=>x.Status==="SUCCESS").length,
rts:DB.filter(x=>x.Status.includes("RTS")).length,
logged:DB.filter(x=>x.Status==="LOGGED").length
};
}

document.getElementById("search")
.addEventListener("input",function(){
search=this.value.toLowerCase().trim();
render();
});

function match(r,q){
if(!q) return true;
return String(r.Name||"")
.toLowerCase()
.includes(q);
}

function render(){

let s=stats();

let successRate=
Math.round((s.success/s.total)*100)||0;

document.getElementById("stats").innerHTML=`
<div class="box">
<h2>${s.total}</h2>
<div class="small">TOTAL</div>
</div>

<div class="box">
<h2>${s.success}</h2>
<div class="small">SUCCESS</div>
</div>

<div class="box">
<h2>${successRate}%</h2>
<div class="small">SUCCESS RATE</div>
</div>

<div class="box">
<h2>${s.pending}</h2>
<div class="small">PENDING</div>
</div>
`;

let filtered = DB
.filter(r=>match(r,search))
.sort((a,b)=>b.ID-a.ID);

document.getElementById("list").innerHTML=
filtered.map(r=>{

let statusClass="status-"+
r.Status.toLowerCase()
.replace(/\s/g,"")
.replace("/","");

return `
<div class="card ${statusClass}">

<div class="small">ID: ${r.ID}</div>

<input
value="${esc(r.Name)}"
onchange="update(${r.ID},this.value)"
>

<select onchange="setStatus(${r.ID},this.value)">
<option ${r.Status==="PENDING"?"selected":""}>PENDING</option>
<option ${r.Status==="SUCCESS"?"selected":""}>SUCCESS</option>
<option ${r.Status==="RTS"?"selected":""}>RTS</option>
<option ${r.Status==="LOGGED"?"selected":""}>LOGGED</option>
<option ${r.Status==="Sent"?"selected":""}>Sent</option>
</select>

<button onclick="removeEntry(${r.ID})">
🗑 DELETE
</button>

</div>
`;

}).join("");

}

load();

</script>

</body>
</html>
