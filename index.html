
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VaultOS Import Fix</title>
<style>
body{margin:0;font-family:Arial;background:#0b0f14;color:#fff}
header{padding:10px;background:#111827}
.container{display:grid;grid-template-columns:320px 1fr;height:calc(100vh - 50px)}
.sidebar{background:#0f172a;padding:10px;overflow:auto}
.main{padding:10px;overflow:auto}
textarea,input,button{
width:100%;padding:8px;margin:5px 0;background:#111;color:#fff;border:1px solid #333;border-radius:6px
}
button{background:#2563eb;cursor:pointer}
button:hover{background:#1d4ed8}
.card{background:#111827;padding:10px;margin:10px 0;border-radius:8px;border:1px solid #222}
.bad{color:#f87171;font-size:12px}
.good{color:#34d399;font-size:12px}
</style>
</head>

<body>

<header>VaultOS Import Fix (No More Untitled Spam)</header>

<div class="container">

<div class="sidebar">

<h3>Import JSON</h3>
<textarea id="box" placeholder="Paste JSON array here"></textarea>

<button onclick="preview()">Preview Import</button>
<button onclick="commit('replace')">Replace</button>
<button onclick="commit('merge')">Merge</button>

<div id="preview"></div>

</div>

<div class="main">

<h3>Records</h3>
<input id="search" oninput="render()" placeholder="Search...">

<div id="out"></div>

</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("vault_fix") || "[]");
let staged = [];

/* ---------- SMART NORMALISER ---------- */
function normalise(r){

    const title =
        r.title ??
        r.name ??
        r.heading ??
        r.text ??
        r.t;

    const desc =
        r.desc ??
        r.description ??
        r.body ??
        r.content ??
        r.text;

    return {
        id: r.id || Date.now() + Math.random(),
        title: title || null,
        desc: desc || ""
    };
}

/* ---------- SAFE PARSER ---------- */
function safeParse(str){
    try{
        return JSON.parse(str);
    }catch(e){
        try{
            let fixed = str
                .replace(/,\s*}/g,"}")
                .replace(/,\s*]/g,"]")
                .replace(/'/g,'"');

            return JSON.parse(fixed);
        }catch(err){
            return null;
        }
    }
}

/* ---------- PREVIEW ---------- */
function preview(){
    const raw = document.getElementById("box").value;
    const parsed = safeParse(raw);

    const out = document.getElementById("preview");

    if(!parsed || !Array.isArray(parsed)){
        out.innerHTML = "<div class='bad'>Invalid JSON or not an array</div>";
        staged = [];
        return;
    }

    staged = parsed.map(normalise);

    let html = "<h4>Preview:</h4>";

    staged.forEach((r,i)=>{
        html += `
        <div class="card">
            <b>${r.title || "<span style='color:red'>MISSING TITLE</span>"}</b>
            <div>${r.desc || ""}</div>
        </div>`;
    });

    out.innerHTML = html;
}

/* ---------- COMMIT ---------- */
function commit(mode){

    if(!staged.length){
        alert("Nothing staged. Run preview first.");
        return;
    }

    if(mode === "replace"){
        data = staged;
    } else {
        data = [...staged, ...data];
    }

    localStorage.setItem("vault_fix", JSON.stringify(data));

    staged = [];
    document.getElementById("box").value = "";
    document.getElementById("preview").innerHTML = "";

    render();
}

/* ---------- RENDER ---------- */
function render(){
    const q = document.getElementById("search").value.toLowerCase();
    const out = document.getElementById("out");

    out.innerHTML = "";

    data
    .filter(x => (x.title||"").toLowerCase().includes(q))
    .forEach(r=>{

        const div = document.createElement("div");
        div.className="card";

        div.innerHTML = `
            <b>${r.title || "<span style='color:red'>Untitled (bad import)</span>"}</b>
            <div>${r.desc || ""}</div>
        `;

        out.appendChild(div);
    });
}

render();

</script>

</body>
</html>
