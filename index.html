

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VaultOS SR15 Fixed Import</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
:root{
  --bg:#020617;--panel:#0f172a;--panel2:#1e293b;
  --line:#334155;--accent:#38bdf8;--text:#f8fafc
}
*{box-sizing:border-box}
body{
  margin:0;background:var(--bg);color:var(--text);
  font-family:Arial;display:flex;min-height:100vh
}
aside{
  width:260px;background:#01040d;padding:20px;
  border-right:1px solid var(--line)
}
main{flex:1;padding:20px}

button,input,select{
  background:var(--panel2);color:white;border:1px solid var(--line);
  border-radius:8px;padding:10px;margin:4px;width:100%
}
button{cursor:pointer}

.card{
  background:var(--panel);border:1px solid var(--line);
  border-radius:14px;padding:18px;margin-bottom:18px
}

table{width:100%;border-collapse:collapse}
td,th{padding:10px;border-bottom:1px solid var(--line)}

.hidden{display:none}
</style>
</head>

<body>

<aside>
<h2>VaultOS SR15</h2>

<button onclick="page('dash')">Dashboard</button>
<button onclick="page('targets')">Targets</button>

<input type="file" id="importFile" accept=".json">
</aside>

<main>

<section id="dash">
<div class="card">
<h2>Stats</h2>
<p>Targets: <b id="total">0</b></p>
<p>Success: <b id="success">0</b></p>
<p>Pending: <b id="pending">0</b></p>
<p>RTS: <b id="rts">0</b></p>
</div>
</section>

<section id="targets" class="hidden">
<div class="card">
<h2>Targets</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>Status</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

</div>
</section>

</main>

<script>

const $ = id => document.getElementById(id);

let vault = {
  targets:[]
};

function page(id){
  ["dash","targets"].forEach(x=>$(x).classList.add("hidden"));
  $(id).classList.remove("hidden");
}

/* ✅ CLEAN STATUS NORMALISER */
function cleanStatus(s){
  return (s || "PENDING")
    .toString()
    .trim()
    .toUpperCase();
}

/* 📊 RENDER */
function render(){

  $("list").innerHTML = vault.targets.map(t=>`
    <tr>
      <td>${t.name}</td>
      <td>${t.status}</td>
    </tr>
  `).join("");

  $("total").textContent = vault.targets.length;
  $("success").textContent = vault.targets.filter(x=>cleanStatus(x.status)==="SUCCESS").length;
  $("pending").textContent = vault.targets.filter(x=>cleanStatus(x.status)==="PENDING").length;
  $("rts").textContent = vault.targets.filter(x=>cleanStatus(x.status)==="RTS").length;
}

/* 📥 FIXED IMPORT (YOUR FORMAT SUPPORT) */
document.getElementById("importFile").addEventListener("change",(e)=>{

  const file = e.target.files?.[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = () => {
    try {

      const d = JSON.parse(reader.result || "{}");

      const raw =
        Array.isArray(d.records) ? d.records :
        Array.isArray(d.targets) ? d.targets :
        [];

      vault.targets = raw.map((t,i)=>({

        id: t.id || Date.now()+i,

        // ✅ supports YOUR file
        name: t.name || t.Name || "Unknown",

        // store raw but cleaned for stats
        status: cleanStatus(t.status || t.Status)

      }));

      render();
      alert("Import successful: " + vault.targets.length + " loaded");

    } catch(err){
      alert("Import failed: " + err.message);
    }
  };

  reader.readAsText(file);
});

render();

</script>

</body>
</html>
