

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VaultOS CONTROL CENTER V4</title>

<style>
body { margin:0; font-family:Arial; background:#0b0b0b; color:#fff; }

header {
  padding:12px;
  background:#111;
  border-bottom:1px solid #222;
  position:sticky;
  top:0;
}

.container {
  display:grid;
  grid-template-columns:340px 1fr;
  height:calc(100vh - 50px);
}

.sidebar {
  background:#0f0f0f;
  padding:10px;
  border-right:1px solid #222;
  overflow:auto;
}

.main {
  padding:10px;
  overflow:auto;
}

.card {
  background:#111;
  border:1px solid #222;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
}

button {
  width:100%;
  padding:8px;
  margin:4px 0;
  background:#00ffcc;
  border:0;
  font-weight:bold;
  cursor:pointer;
}

button:hover { background:#00ddb3; }

input, textarea {
  width:100%;
  padding:8px;
  background:#000;
  border:1px solid #333;
  color:#fff;
  margin-top:5px;
}

.record {
  background:#0d0d0d;
  border:1px solid #222;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
}

.badge {
  padding:3px 8px;
  border-radius:12px;
  font-size:11px;
}

.PENDING { background:#ffcc00; color:#000; }
.SENT { background:#4da6ff; color:#fff; }
.SUCCESS { background:#00ff88; color:#000; }
.RTS { background:#ff4d4d; color:#fff; }

.ticker {
  background:#111;
  border:1px solid #222;
  padding:12px;
  margin-bottom:10px;
  color:#00ffcc;
  border-radius:8px;
}
</style>
</head>

<body>

<header><b>VaultOS CONTROL CENTER V4</b></header>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

  <div class="card">
    <b>Quick Add</b>
    <input id="name" placeholder="Name">
    <button onclick="addRecord()">ADD RECORD</button>
  </div>

  <div class="card">
    <b>Bulk Import (paste JSON)</b>
    <textarea id="bulk" placeholder='[{"ID":1,"Name":"Test","Status":"PENDING"}]'></textarea>
    <button onclick="bulkImport()">IMPORT PASTE</button>
  </div>

  <div class="card">
    <button onclick="markNext()">MARK NEXT SENT</button>
  </div>

</div>

<!-- MAIN -->
<div class="main">

  <div id="ticker" class="ticker"></div>

  <div id="view"></div>

</div>

</div>

<script>

let DB = { records: [] };

// LOAD
function load(){
  const d = localStorage.getItem("vault_v4");
  if(d) DB = JSON.parse(d);
}
function save(){
  localStorage.setItem("vault_v4", JSON.stringify(DB));
}
load();

// NORMALISE
function norm(r){
  return {
    ID: r?.ID ?? Date.now(),
    Name: (r?.Name ?? "").trim(),
    Status: (r?.Status ?? "PENDING").toUpperCase().trim()
  };
}

// ADD RECORD
function addRecord(){
  const name = document.getElementById("name").value.trim();
  if(!name) return;

  DB.records.push({
    ID: Date.now(),
    Name: name,
    Status: "PENDING"
  });

  document.getElementById("name").value = "";
  save();
  render();
}

// BULK IMPORT
function bulkImport(){
  try {
    const data = JSON.parse(document.getElementById("bulk").value);

    if(!Array.isArray(data)) return alert("Must be array");

    data.forEach(r=>{
      DB.records.push(norm(r));
    });

    save();
    render();

  } catch {
    alert("Invalid JSON");
  }
}

// NEXT ENGINE
function getNext(){
  const list = DB.records
    .map(norm)
    .filter(r => r.Status === "PENDING");

  return list[0] || null;
}

// MARK NEXT
function markNext(){
  const next = getNext();
  if(!next) return;

  DB.records = DB.records.map(r =>
    r.Name === next.Name
      ? {...r, Status:"SENT"}
      : r
  );

  save();
  render();
}

// TICKER (NEWS-LIKE FEED)
function ticker(){
  const next = getNext();

  if(!next){
    document.getElementById("ticker").innerHTML = "NO ACTIVE ITEMS";
    return;
  }

  document.getElementById("ticker").innerHTML =
    `🔥 NEXT → <b>${next.Name}</b> | STATUS: ${next.Status}`;
}

// RENDER
function render(){
  ticker();

  const view = document.getElementById("view");

  view.innerHTML = "<h3>QUEUE</h3>";

  DB.records.forEach(r=>{
    const n = norm(r);

    view.innerHTML += `
      <div class="record">
        <b>${n.Name}</b><br>
        <span class="badge ${n.Status}">${n.Status}</span>
      </div>
    `;
  });
}

load();
render();

</script>

</body>
</html>
