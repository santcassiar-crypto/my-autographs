<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TTM OS – Self Optimising Engine (Stable)</title>

<style>
body{
  font-family:Arial;
  background:#0b0b0b;
  color:#fff;
  margin:0;
}

header{
  background:#111;
  padding:12px;
  position:sticky;
  top:0;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:#111;
  border:1px solid #222;
  border-radius:10px;
  padding:12px;
  margin:10px;
}

input,textarea,button,select{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid #333;
  background:#181818;
  color:#fff;
}

.record{
  padding:6px;
  border-bottom:1px solid #222;
}

.small{font-size:12px;color:#aaa}
.badge{background:#222;padding:2px 6px;border-radius:6px;font-size:11px}
</style>
</head>

<body>

<header>
<h2>TTM OS – Self Optimising Engine</h2>
<input id="search" placeholder="Search...">
</header>

<div class="grid" id="stats"></div>

<div class="card">
<h3>➕ Add Targets</h3>
<textarea id="bulk"></textarea>
<button onclick="add()">Add</button>
</div>

<div class="card">
<h3>📌 Update Status</h3>
<input id="u_name" placeholder="Exact name">
<select id="u_status">
<option>PENDING</option>
<option>SENT</option>
<option>SUCCESS</option>
<option>RTS</option>
<option>LOGGED</option>
</select>
<button onclick="update()">Update + Learn</button>
</div>

<div class="card">
<h3>💾 Backup (JSON)</h3>
<input type="file" id="file">
<button onclick="importJSON()">Import JSON</button>
<button onclick="exportJSON()">Export JSON</button>
<div class="small" id="backupStatus"></div>
</div>

<div class="card">
<h3>🧠 CATEGORY STRATEGY</h3>
<div id="strategy"></div>
</div>

<div class="card">
<h3>⚡ OPTIMISED ACTION LIST</h3>
<div id="actions"></div>
</div>

<div class="card">
<h3>📋 ALL RECORDS</h3>
<div id="list"></div>
</div>

<script>

const KEY="ttm_self_engine_v2";

let DB = load();

/* =========================
   LOAD / SAVE
========================= */

function load(){
  try{
    const raw = JSON.parse(localStorage.getItem(KEY)||"{}");
    return raw.records ? raw : {records:[], weights:{}, heat:{}};
  }catch{
    return {records:[], weights:{}, heat:{}};
  }
}

function save(){
  localStorage.setItem(KEY, JSON.stringify(DB));
}

/* =========================
   CATEGORY
========================= */

function category(n){
  n = n.toLowerCase();

  if(/football|arsenal|england|kane|shearer/.test(n)) return "football";
  if(/nba|lakers|sabonis|banchero/.test(n)) return "nba";
  if(/oldman|fiennes|brosnan|comer|jackman/.test(n)) return "actors";
  if(/tv|podcast|show|theatre/.test(n)) return "tv";

  return "other";
}

/* =========================
   INIT VALUES
========================= */

function get(cat){
  if(DB.weights[cat] === undefined) DB.weights[cat]=1.0;
  if(DB.heat[cat] === undefined) DB.heat[cat]=0;
  return DB.weights[cat];
}

/* =========================
   HEAT DECAY
========================= */

function decay(){
  Object.keys(DB.heat).forEach(k=>{
    DB.heat[k] *= 0.95;
  });
}

/* =========================
   SCORE ENGINE
========================= */

function score(r){
  const cat = category(r.name);
  const w = get(cat);

  let base = 50;

  if(r.status==="SUCCESS") base += 40;
  if(r.status==="RTS") base -= 30;
  if(r.status==="SENT") base += 5;

  const heat = DB.heat[cat] || 0;
  const fatigue = Math.min(0.4, heat * 0.02);

  let final = base * w;

  final = final * (1 - fatigue);

  return Math.max(0, Math.min(100, final));
}

/* =========================
   LEARNING
========================= */

function learn(r, status){
  const cat = category(r.name);

  DB.heat[cat] = (DB.heat[cat] || 0) + 1;

  if(status==="SUCCESS"){
    DB.weights[cat] += 0.04;
  }

  if(status==="RTS"){
    DB.weights[cat] -= 0.06;
  }

  DB.weights[cat] = Math.max(0.5, Math.min(1.8, DB.weights[cat]));
}

/* =========================
   ADD
========================= */

function add(){
  const lines = document.getElementById("bulk").value
    .split("\n").map(x=>x.trim()).filter(Boolean);

  lines.forEach(n=>{
    DB.records.push({
      id:Date.now()+Math.random(),
      name:n,
      status:"PENDING"
    });
  });

  document.getElementById("bulk").value="";
  render();
  save();
}

/* =========================
   UPDATE
========================= */

function update(){
  const name = document.getElementById("u_name").value.toLowerCase();
  const status = document.getElementById("u_status").value.toUpperCase();

  DB.records.forEach(r=>{
    if(r.name.toLowerCase() === name){
      r.status = status;
      learn(r, status);
    }
  });

  render();
  save();
}

/* =========================
   OPTIMISED ACTIONS
========================= */

function actions(){
  return DB.records
    .filter(r=>r.status==="PENDING")
    .map(r=>({r, s:score(r)}))
    .sort((a,b)=>b.s-a.s)
    .slice(0,15);
}

/* =========================
   STRATEGY VIEW
========================= */

function strategy(){
  const out = {};

  DB.records.forEach(r=>{
    const c = category(r.name);
    out[c] = out[c] || {count:0, heat:DB.heat[c]||0, weight:DB.weights[c]||1};
    out[c].count++;
  });

  return out;
}

/* =========================
   JSON IMPORT
========================= */

function importJSON(){
  const file = document.getElementById("file").files[0];
  if(!file) return alert("Select JSON file");

  const reader = new FileReader();

  reader.onload = e=>{
    try{
      const data = JSON.parse(e.target.result);

      DB.records = data.records || [];
      DB.weights = data.weights || {};
      DB.heat = data.heat || {};

      DB.records = DB.records.map(r=>({
        id:r.id||Date.now()+Math.random(),
        name:r.name||r.Name,
        status:(r.status||r.Status||"PENDING").toUpperCase()
      }));

      save();
      render();

      document.getElementById("backupStatus").innerText =
        "Imported " + DB.records.length + " records";

    }catch(err){
      alert("Invalid JSON");
    }
  };

  reader.readAsText(file);
}

/* =========================
   JSON EXPORT
========================= */

function exportJSON(){
  const blob = new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "ttm_self_optimising_backup.json";
  a.click();
}

/* =========================
   RENDER
========================= */

function render(){

  decay();

  const pending = DB.records.filter(r=>r.status==="PENDING").length;
  const success = DB.records.filter(r=>r.status==="SUCCESS").length;
  const rts = DB.records.filter(r=>r.status==="RTS").length;

  document.getElementById("stats").innerHTML = `
    <div class="card"><h2>${DB.records.length}</h2>Total</div>
    <div class="card"><h2>${pending}</h2>Pending</div>
    <div class="card"><h2>${success}</h2>Success</div>
    <div class="card"><h2>${rts}</h2>RTS</div>
  `;

  document.getElementById("strategy").innerHTML =
    Object.entries(strategy()).map(([k,v])=>`
      ${k}: count=${v.count}, heat=${v.heat.toFixed(1)}, weight=${v.weight.toFixed(2)}
    `).join("<br>");

  document.getElementById("actions").innerHTML =
    actions().map(x=>`
      ⚡ ${x.r.name} <span class="badge">${x.s.toFixed(0)}</span>
    `).join("<br>");

  const q = (document.getElementById("search").value||"").toLowerCase();

  document.getElementById("list").innerHTML =
    DB.records
      .filter(r=>r.name.toLowerCase().includes(q))
      .map(r=>`
        <div class="record">
          <b>${r.name}</b><br>
          <span class="small">${r.status}</span>
        </div>
      `).join("");

  save();
}

render();

</script>

</body>
</html>
