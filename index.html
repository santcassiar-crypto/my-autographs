





<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VaultOS Backup System</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: #fff;
    margin: 0;
    padding: 20px;
}

h1 {
    color: #00ffcc;
}

.container {
    max-width: 900px;
    margin: auto;
}

.card {
    background: #111;
    border: 1px solid #222;
    padding: 15px;
    margin-top: 15px;
    border-radius: 8px;
}

button {
    background: #00ffcc;
    border: none;
    padding: 10px 15px;
    margin: 5px;
    cursor: pointer;
    font-weight: bold;
    border-radius: 5px;
}

button:hover {
    background: #00ddb3;
}

pre {
    background: #000;
    padding: 10px;
    overflow: auto;
    border: 1px solid #222;
}

input[type="file"] {
    display: none;
}
</style>
</head>

<body>

<div class="container">

<h1>VaultOS Backup System</h1>

<div class="card">
    <button onclick="exportVaultBackup()">Export Backup</button>
    <button onclick="document.getElementById('jsonImport').click()">Import Backup</button>
    <input type="file" id="jsonImport" accept="application/json">
</div>

<div class="card">
    <h3>Current Vault Data</h3>
    <pre id="output"></pre>
</div>

</div>

<script>
// -----------------------------
// INIT STORAGE
// -----------------------------
function getVaultData() {
    return JSON.parse(localStorage.getItem("vaultos_data") || "{}");
}

function setVaultData(data) {
    localStorage.setItem("vaultos_data", JSON.stringify(data));
    render();
}

// -----------------------------
// EXPORT
// -----------------------------
function exportVaultBackup() {
    const data = localStorage.getItem("vaultos_data") || "{}";

    const blob = new Blob([data], { type: "application/json" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "VaultOS-backup.json";
    a.click();

    URL.revokeObjectURL(url);
}

// -----------------------------
// IMPORT
// -----------------------------
document.getElementById("jsonImport").addEventListener("change", function (event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function (e) {
        try {
            const importedData = JSON.parse(e.target.result);

            if (!importedData || typeof importedData !== "object") {
                alert("Invalid backup file");
                return;
            }

            // FULL REPLACE
            setVaultData(importedData);

            alert("VaultOS restored successfully");
        } catch (err) {
            alert("Import failed: invalid JSON");
            console.error(err);
        }
    };

    reader.readAsText(file);
    event.target.value = "";
});

// -----------------------------
// DEMO DATA (optional starter)
// -----------------------------
if (!localStorage.getItem("vaultos_data")) {
    setVaultData({
        version: "V5",
        created: new Date().toISOString(),
        records: [
            { id: 1, name: "Sample Record", value: "Vault initialized" }
        ]
    });
}

// -----------------------------
// RENDER
// -----------------------------
function render() {
    document.getElementById("output").textContent =
        JSON.stringify(getVaultData(), null, 2);
}

render();
</script>

</body>
</html>
