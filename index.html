<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VaultOS OCR Tracker (Upgraded)</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js"></script>

<style>
*{box-sizing:border-box;}

body{
margin:0;
background:#000;
color:#fff;
font-family:Arial,sans-serif;
}

header{
position:sticky;
top:0;
background:#111;
padding:10px;
z-index:10;
border-bottom:1px solid #222;
}

input,select,textarea,button{
width:100%;
padding:10px;
margin-top:8px;
background:#000;
color:#fff;
border:1px solid #333;
border-radius:8px;
font-size:14px;
}

button{
cursor:pointer;
background:#111;
min-height:44px;
}

button:hover{background:#1b1b1b;}

.row{
display:flex;
gap:8px;
padding:10px;
flex-wrap:wrap;
position:sticky;
bottom:0;
background:#000;
z-index:20;
}

.row button{
flex:1;
min-width:100px;
}

.section{
margin:10px;
padding:10px;
background:#0d0d0d;
border:1px solid #222;
border-radius:10px;
}

.card{
background:#111;
margin:10px;
padding:10px;
border-radius:10px;
border:1px solid #222;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
padding:10px;
}

.box{
background:#111;
border:1px solid #222;
padding:12px;
border-radius:8px;
text-align:center;
font-size:14px;
}

.small{
font-size:11px;
color:#888;
margin-top:5px;
word-break:break-word;
}

textarea{min-height:90px;resize:vertical;}

.raw{
background:#050505;
border:1px solid #222;
padding:10px;
border-radius:8px;
font-size:11px;
white-space:pre-wrap;
margin-top:10px;
color:#8f8f8f;
max-height:180px;
overflow:auto;
}

@media(max-width:700px){
.grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

<body>

<header>
<input id="search" placeholder="Search ALL records...">
</header>

<div class="row">
<button onclick="setFilter('ALL')">ALL</button>
<button onclick="setFilter('PENDING')">PENDING</button>
<button onclick="setFilter('SENT')">SENT</button>
<button onclick="setFilter('SUCCESS')">SIGNED</button>
<button onclick="setFilter('RTS')">RTS</button>
</div>

<div id="stats" class="grid"></div>

<div class="section">
<h3>📸 OCR IMPORT</h3>
<input type="file" id="ocrInput" accept="image/*">
<button onclick="extractOCR()">Extract & Create Record</button>
<div class="small">Upload envelope / letter / label image</div>
</div>

<div class="row">
<button onclick="addManual()">+ ADD MANUAL</button>
<button onclick="exportDB()">EXPORT</button>
</div>

<div class="section">
<input type="file" id="importFile">
<button onclick="importDB()">IMPORT BACKUP</button>
</div>

<div id="list"></div>

<script>

////////////////////////////////////////////////////
// MASTER DATA (immutable clone)
////////////////////////////////////////////////////
const MASTER_DATA = () => ([
{
ID:1,Name:"Jannik Sinner",Address:"",Status:"SUCCESS",
CreatedAt:Date.now(),UpdatedAt:Date.now(),History:[]
},
{
ID:2,Name:"Keanu Reeves",Address:"",Status:"RTS",
CreatedAt:Date.now(),UpdatedAt:Date.now(),History:[]
},
{
ID:3,Name:"Alan Carr",Address:"",Status:"SUCCESS",
CreatedAt:Date.now(),UpdatedAt:Date.now(),History:[]
},
{
ID:4,Name:"Harry Kane",Address:"",Status:"PENDING",
CreatedAt:Date.now(),UpdatedAt:Date.now(),History:[]
},
{
ID:5,Name:"David Attenborough",Address:"",Status:"SUCCESS",
CreatedAt:Date.now(),UpdatedAt:Date.now(),History:[]
}
]);

////////////////////////////////////////////////////
let DB = load();
function load(){
let raw = localStorage.getItem("vault_os_ocr");
if(raw){
try{return JSON.parse(raw);}catch(e){}
}
return MASTER_DATA();
}
function save(){
localStorage.setItem("vault_os_ocr",JSON.stringify(DB));
}

////////////////////////////////////////////////////
// STATE + DEBOUNCE
////////////////////////////////////////////////////
let search = "";
let filter = "ALL";
let timer;

document.getElementById("search").addEventListener("input", e=>{
clearTimeout(timer);
timer = setTimeout(()=>{
search = e.target.value.toLowerCase().trim();
render();
},150);
});

function setFilter(f){
filter = f;
render();
}

////////////////////////////////////////////////////
// SAFE DOM HELPERS
////////////////////////////////////////////////////
function el(tag, props={}, children=[]){
const node = document.createElement(tag);
Object.entries(props).forEach(([k,v])=>{
if(k==="class") node.className=v;
else if(k==="html") node.innerHTML=v;
else node[k]=v;
});
children.forEach(c=>node.appendChild(c));
return node;
}

////////////////////////////////////////////////////
// ADD MANUAL
////////////////////////////////////////////////////
function addManual(){
let name = prompt("Name:");
if(!name) return;

DB.unshift({
ID:Date.now(),
Name:name,
Address:"",
Status:"PENDING",
Notes:"",
RawOCR:"",
CreatedAt:Date.now(),
UpdatedAt:Date.now(),
History:[]
});

save();
render();
}

////////////////////////////////////////////////////
// OCR
////////////////////////////////////////////////////
async function extractOCR(){

let file = document.getElementById("ocrInput").files[0];
if(!file) return alert("Upload image first");

alert("Running OCR...");

try{

const result = await Tesseract.recognize(file,"eng");
const text = result.data.text || "";

if(!text.trim()) return alert("No text detected");

const parsed = parseText(text);
createFromOCR(parsed);

}catch(e){
console.error(e);
alert("OCR FAILED");
}
}

////////////////////////////////////////////////////
// OCR PARSER (improved)
////////////////////////////////////////////////////
function parseText(text){

const lines = text
.split("\n")
.map(x=>x.trim())
.filter(Boolean);

let name = lines.find(l=>
/^[A-Z][A-Za-z'-.]+(\s[A-Z][A-Za-z'-.]+)+$/.test(l) ||
l === l.toUpperCase()
) || lines[0] || "Unknown";

let address = lines.filter(l=>l!==name).slice(0,6).join(", ");

return {name,address,raw:text};
}

function createFromOCR(data){

DB.unshift({
ID:Date.now(),
Name:data.name,
Address:data.address,
Status:"PENDING",
Notes:"OCR IMPORT",
RawOCR:data.raw,
CreatedAt:Date.now(),
UpdatedAt:Date.now(),
History:[]
});

save();
render();
alert("OCR RECORD CREATED");
}

////////////////////////////////////////////////////
// UPDATE
////////////////////////////////////////////////////
function updateField(id,field,val){
let item = DB.find(x=>x.ID===id);
if(!item) return;

const oldStatus = item.Status;

item[field]=val;
item.UpdatedAt=Date.now();

if(field==="Status"){
item.History.push({
from:oldStatus,
to:val,
date:Date.now()
});
}

save();
renderStats();
}

////////////////////////////////////////////////////
// DELETE
////////////////////////////////////////////////////
function removeRecord(id){
if(!confirm("Delete record?")) return;
DB = DB.filter(x=>x.ID!==id);
save();
render();
}

////////////////////////////////////////////////////
// EXPORT / IMPORT
////////////////////////////////////////////////////
function exportDB(){
const blob = new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="vault_backup.json";
a.click();
}

function importDB(){
let file=document.getElementById("importFile").files[0];
if(!file) return alert("Select file");

let reader=new FileReader();
reader.onload=e=>{
try{
DB=JSON.parse(e.target.result);
save();
render();
alert("IMPORT COMPLETE");
}catch{
alert("INVALID FILE");
}
};
reader.readAsText(file);
}

////////////////////////////////////////////////////
// FILTER VIEW
////////////////////////////////////////////////////
function getView(){
let list=[...DB];

if(search){
list=list.filter(r=>
JSON.stringify(r).toLowerCase().includes(search)
);
}

if(filter!=="ALL"){
list=list.filter(x=>x.Status===filter);
}

return list;
}

////////////////////////////////////////////////////
// STATS
////////////////////////////////////////////////////
function renderStats(){
const count = s => DB.filter(x=>x.Status===s).length;

document.getElementById("stats").innerHTML=`
<div class="box">TOTAL<br>${DB.length}</div>
<div class="box">PENDING<br>${count("PENDING")}</div>
<div class="box">SENT<br>${count("SENT")}</div>
<div class="box">SIGNED<br>${count("SUCCESS")}</div>
<div class="box">RTS<br>${count("RTS")}</div>
`;
}

////////////////////////////////////////////////////
// RENDER (DOM-based)
////////////////////////////////////////////////////
function render(){

const list = getView();
const root = document.getElementById("list");
root.innerHTML="";

list.forEach(r=>{

const card = el("div",{class:"card"});

const name = el("input",{value:r.Name});
name.addEventListener("change",e=>{
updateField(r.ID,"Name",e.target.value);
});

const addr = el("textarea",{textContent:r.Address});
addr.addEventListener("change",e=>{
updateField(r.ID,"Address",e.target.value);
});

const status = el("select");
["PENDING","SENT","SUCCESS","RTS"].forEach(s=>{
const opt = el("option",{value:s,innerHTML:s});
if(r.Status===s) opt.selected=true;
status.appendChild(opt);
});
status.addEventListener("change",e=>{
updateField(r.ID,"Status",e.target.value);
});

const del = el("button",{innerHTML:"DELETE"});
del.addEventListener("click",()=>removeRecord(r.ID));

card.appendChild(name);
card.appendChild(addr);
card.appendChild(status);
card.appendChild(del);

card.appendChild(el("div",{class:"small",innerHTML:`ID: ${r.ID}`}));

if(r.RawOCR){
card.appendChild(el("div",{class:"raw",textContent:r.RawOCR}));
}

root.appendChild(card);
});

renderStats();
}

render();

</script>

</body>
</html>
