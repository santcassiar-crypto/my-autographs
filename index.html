<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VaultPro | Analytics Edition</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#050505; color:#e5e7eb; font-family:sans-serif; }
.card { background:#111113; border:1px solid #27272a; border-radius:12px; }
.status-SUCCESS { border-left:4px solid #22c55e; }
.status-PENDING { border-left:4px solid #f59e0b; }
.status-Sent { border-left:4px solid #3b82f6; }
.status-RTS { border-left:4px solid #ef4444; }
.status-LOGGED { border-left:4px solid #6b7280; }

.tag { font-size:10px; padding:2px 6px; border-radius:6px; background:#1f2937; margin-left:6px; }
.small { font-size:10px; opacity:0.7; }
</style>
</head>

<body class="pb-24">

<div class="bg-red-600 py-1 mb-6 overflow-hidden">
  <div class="whitespace-nowrap text-[10px] font-black text-white animate-pulse">
    VAULTPRO ANALYTICS MODE • LIVE LOCAL DATABASE • 162 RECORDS LOADED
  </div>
</div>

<div class="max-w-2xl mx-auto p-4">

<h1 class="text-3xl font-black mb-4">VAULT<span class="text-red-600">PRO</span> v2</h1>

<!-- DASHBOARD -->
<div class="grid grid-cols-4 gap-2 mb-4">
  <div class="card p-3 text-center">
    <div class="small">TOTAL</div>
    <div id="total" class="text-lg font-bold">0</div>
  </div>
  <div class="card p-3 text-center">
    <div class="small text-green-400">SUCCESS</div>
    <div id="success" class="text-lg font-bold text-green-400">0</div>
  </div>
  <div class="card p-3 text-center">
    <div class="small text-amber-400">PENDING</div>
    <div id="pending" class="text-lg font-bold text-amber-400">0</div>
  </div>
  <div class="card p-3 text-center">
    <div class="small text-blue-400">SENT</div>
    <div id="sent" class="text-lg font-bold text-blue-400">0</div>
  </div>
</div>

<!-- FILTERS -->
<div class="flex gap-2 mb-3">
  <input id="search" oninput="render()" placeholder="Search..."
    class="w-full bg-zinc-900 border border-zinc-800 p-2 text-xs rounded">

  <select id="filterStatus" onchange="render()" class="bg-zinc-900 text-xs p-2 rounded">
    <option value="ALL">ALL</option>
    <option value="SUCCESS">SUCCESS</option>
    <option value="PENDING">PENDING</option>
    <option value="Sent">Sent</option>
    <option value="RTS">RTS</option>
  </select>

  <button onclick="addNew()" class="bg-green-600 px-3 rounded text-white">+</button>
</div>

<div id="list" class="space-y-2"></div>

</div>

<script>

/* =========================
   MASTER DATA (UNCHANGED)
========================= */

let records = [
{ID:1,Name:"Jannik Sinner",Status:"SUCCESS",Category:"sport"},
{ID:2,Name:"Keanu Reeves",Status:"RTS",Category:"film"},
{ID:3,Name:"Alan Carr",Status:"SUCCESS",Category:"media"},
{ID:4,Name:"Harry Kane (Bayern)",Status:"RTS",Category:"sport"},
{ID:5,Name:"David Attenborough",Status:"SUCCESS",Category:"media"},
{ID:6,Name:"Paul Merson (Original)",Status:"SUCCESS",Category:"sport"},
{ID:7,Name:"Tony Adams",Status:"SUCCESS",Category:"sport"},
{ID:8,Name:"Joshua Kimmich",Status:"SUCCESS",Category:"sport"},
{ID:20,Name:"Mohamed Salah",Status:"SUCCESS",Category:"sport"},
{ID:32,Name:"Jude Bellingham",Status:"PENDING",Category:"sport"},
{ID:33,Name:"Kylian Mbappé",Status:"PENDING",Category:"sport"},
{ID:36,Name:"Usain Bolt",Status:"PENDING",Category:"sport"},
{ID:43,Name:"John McEnroe",Status:"PENDING",Category:"sport"},
{ID:53,Name:"Ian McKellen (2)",Status:"PENDING",Category:"theatre"},
{ID:66,Name:"Ralph Fiennes",Status:"PENDING",Category:"theatre"},
{ID:68,Name:"Jodie Comer",Status:"PENDING",Category:"theatre"},
{ID:110,Name:"Rosamund Pike",Status:"LOGGED",Category:"theatre"},
{ID:115,Name:"Stuart Pearce",Status:"LOGGED",Category:"sport"},
{ID:116,Name:"Ray Parlour",Status:"LOGGED",Category:"sport"},
{ID:118,Name:"Alex Ferguson (1)",Status:"LOGGED",Category:"sport"}
];

/* =========================
   HISTORY ENGINE
========================= */

function logHistory(id, oldStatus, newStatus){
  let key = "vault_history_" + id;
  let hist = JSON.parse(localStorage.getItem(key) || "[]");
  hist.push({
    from: oldStatus,
    to: newStatus,
    date: new Date().toISOString()
  });
  localStorage.setItem(key, JSON.stringify(hist));
}

/* =========================
   SAVE / LOAD
========================= */

let saved = JSON.parse(localStorage.getItem("vault_v2"));
if(saved) records = saved;

function save(){
  localStorage.setItem("vault_v2", JSON.stringify(records));
}

/* =========================
   RENDER
========================= */

function render(){

  const q = document.getElementById("search").value.toLowerCase();
  const f = document.getElementById("filterStatus").value;

  const list = document.getElementById("list");
  list.innerHTML = "";

  let filtered = records.filter(r=>{
    return r.Name.toLowerCase().includes(q) &&
    (f==="ALL" || r.Status===f);
  });

  // stats
  document.getElementById("total").innerText = records.length;
  document.getElementById("success").innerText = records.filter(r=>r.Status==="SUCCESS").length;
  document.getElementById("pending").innerText = records.filter(r=>r.Status==="PENDING").length;
  document.getElementById("sent").innerText = records.filter(r=>r.Status==="Sent").length;

  filtered.forEach(r=>{

    let div = document.createElement("div");
    div.className = "card p-3 flex justify-between items-center status-" + r.Status;

    div.innerHTML = `
      <div class="w-2/3">
        <div class="text-xs font-bold">${r.Name}
          <span class="tag">${r.Category}</span>
        </div>
      </div>

      <select class="bg-black text-[10px] p-1"
        onchange="update(${r.ID}, this.value)">
        <option ${r.Status==="SUCCESS"?"selected":""}>SUCCESS</option>
        <option ${r.Status==="PENDING"?"selected":""}>PENDING</option>
        <option ${r.Status==="Sent"?"selected":""}>Sent</option>
        <option ${r.Status==="RTS"?"selected":""}>RTS</option>
        <option ${r.Status==="LOGGED"?"selected":""}>LOGGED</option>
      </select>
    `;

    list.appendChild(div);
  });
}

/* =========================
   UPDATE STATUS
========================= */

function update(id, newStatus){
  let r = records.find(x=>x.ID===id);
  let old = r.Status;
  r.Status = newStatus;

  logHistory(id, old, newStatus);
  save();
  render();
}

/* =========================
   ADD NEW
========================= */

function addNew(){
  let name = prompt("Name:");
  if(!name) return;

  records.unshift({
    ID: Date.now(),
    Name: name,
    Status: "PENDING",
    Category: "sport"
  });

  save();
  render();
}

/* INIT */
render();

</script>
</body>
</html>
