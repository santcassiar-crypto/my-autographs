<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VaultOS Industrial Ops OS</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial}
header{position:sticky;top:0;background:#111;padding:10px;border-bottom:1px solid #222;z-index:10}

input,select,textarea,button{
width:100%;padding:10px;margin-top:6px;
background:#000;color:#fff;border:1px solid #333;border-radius:8px
}

button{cursor:pointer;background:#111}
button:hover{background:#1c1c1c}

.card{background:#111;margin:10px;padding:10px;border-radius:10px;border:1px solid #222}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:10px}
.box{background:#111;border:1px solid #222;padding:10px;border-radius:8px;text-align:center}
.small{font-size:11px;color:#888}
.section{margin:10px;padding:10px;background:#0d0d0d;border:1px solid #222;border-radius:10px}
.queue{background:#0a0a0a;border:1px solid #333;padding:10px;margin:10px;border-radius:10px}
</style>
</head>

<body>

<header>
<input id="search" placeholder="Search 180+ records (instant indexed)">
</header>

<div class="grid" id="stats"></div>

<div class="section">
<h3>🧠 NEXT BATCH ENGINE</h3>
<div id="next"></div>
</div>

<div class="section">
<h3>📦 OUTBOX</h3>
<div id="outbox"></div>
</div>

<div class="section">
<button onclick="seed180()">⚡ GENERATE 180 RECORDS</button>
<button onclick="add()">+ ADD</button>
<button onclick="exportDB()">EXPORT</button>
<button onclick="wipe()">RESET SYSTEM</button>
</div>

<div id="list"></div>

<script>

////////////////////////////////////////////////////
// INDEXEDDB (INDUSTRIAL GRADE STORAGE)
////////////////////////////////////////////////////
const DB_NAME="vaultos_industrial";
const STORE="records";

let db;

function openDB(){
return new Promise(res=>{
let req=indexedDB.open(DB_NAME,1);

req.onupgradeneeded=e=>{
let db=e.target.result;
let store=db.createObjectStore(STORE,{keyPath:"ID"});
store.createIndex("status","Status",{unique:false});
store.createIndex("name","Name",{unique:false});
};

req.onsuccess=e=>{
db=e.target.result;
res(db);
};
});
}

function tx(mode="readonly"){
return db.transaction(STORE,mode).objectStore(STORE);
}

async function getAll(){
return new Promise(res=>{
tx().getAll().onsuccess=e=>res(e.target.result||[]);
});
}

async function put(item){
return new Promise(res=>{
tx("readwrite").put(item).onsuccess=()=>res();
});
}

async function del(id){
return new Promise(res=>{
tx("readwrite").delete(id).onsuccess=()=>res();
});
}

////////////////////////////////////////////////////
// STATE
////////////////////////////////////////////////////
let DB=[];
let search="";

////////////////////////////////////////////////////
// SEARCH (FAST)
////////////////////////////////////////////////////
document.getElementById("search").addEventListener("input",e=>{
search=e.target.value.toLowerCase().trim();
render();
});

function match(r,q){
if(!q) return true;
return (
(r.Name||"").toLowerCase().includes(q) ||
(r.Address||"").toLowerCase().includes(q) ||
(r.Status||"").toLowerCase().includes(q)
);
}

////////////////////////////////////////////////////
// OPS ENGINE
////////////////////////////////////////////////////
function next(){
let pool=DB.filter(x=>x.Status==="PENDING"||x.Status==="RTS");
if(!pool.length) return null;

pool.sort((a,b)=>
score(b)-score(a)
);

return pool[0];
}

function score(r){
let age=Date.now()-(r.UpdatedAt||0);
return (r.Status==="RTS"?100:50)+age/100000;
}

////////////////////////////////////////////////////
// SEED 180 RECORDS (REALISTIC LOAD TEST)
////////////////////////////////////////////////////
function seed180(){

let statuses=["PENDING","SENT","SUCCESS","RTS"];
let names=["Smith","Johnson","Williams","Brown","Jones","Miller","Davis","Wilson","Taylor","Clark"];

let batch=[];

for(let i=0;i<180;i++){

batch.push({
ID:crypto.randomUUID(),
Name:names[i%names.length]+" "+i,
Address:"Street "+i+" London",
Status:statuses[i%statuses.length],
CreatedAt:Date.now()-i*100000,
UpdatedAt:Date.now()-i*50000
});

}

Promise.all(batch.map(put)).then(load);
}

////////////////////////////////////////////////////
// CORE OPS
////////////////////////////////////////////////////
async function add(){
let r={
ID:crypto.randomUUID(),
Name:"New Record",
Address:"",
Status:"PENDING",
CreatedAt:Date.now(),
UpdatedAt:Date.now()
};

await put(r);
load();
}

async function setStatus(id,val){
let r=DB.find(x=>x.ID===id);
if(!r) return;

r.Status=val;
r.UpdatedAt=Date.now();

await put(r);
load();
}

async function remove(id){
await del(id);
load();
}

////////////////////////////////////////////////////
// LOAD
////////////////////////////////////////////////////
async function load(){
DB=await getAll();
render();
}

////////////////////////////////////////////////////
// OUTBOX
////////////////////////////////////////////////////
function outbox(){
return DB.filter(x=>x.Status==="SENT"||x.Status==="SUCCESS");
}

////////////////////////////////////////////////////
// STATS
////////////////////////////////////////////////////
function stats(){
return {
total:DB.length,
pending:DB.filter(x=>x.Status==="PENDING").length,
sent:DB.filter(x=>x.Status==="SENT").length,
success:DB.filter(x=>x.Status==="SUCCESS").length,
rts:DB.filter(x=>x.Status==="RTS").length
};
}

////////////////////////////////////////////////////
// RENDER
////////////////////////////////////////////////////
function render(){

let s=stats();

document.getElementById("stats").innerHTML=`
<div class="box">TOTAL<br>${s.total}</div>
<div class="box">PENDING<br>${s.pending}</div>
<div class="box">SENT<br>${s.sent}</div>
<div class="box">SUCCESS<br>${s.success}</div>
<div class="box">RTS<br>${s.rts}</div>
`;

let n=next();

document.getElementById("next").innerHTML=
n?
`<div class="queue">
<b>${n.Name}</b><br><br>
<button onclick="setStatus('${n.ID}','SENT')">SEND NEXT</button>
</div>`
:"NO QUEUE";

document.getElementById("outbox").innerHTML=
outbox().slice(0,10).map(r=>`
<div class="card">
<b>${r.Name}</b><br>
${r.Status}<br>
</div>
`).join("");

let root=document.getElementById("list");
root.innerHTML="";

DB.filter(r=>match(r,search))
.forEach(r=>{

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<input value="${r.Name}" onchange="updateName('${r.ID}',this.value)">
<textarea onchange="updateAddr('${r.ID}',this.value)">${r.Address||""}</textarea>

<select onchange="setStatus('${r.ID}',this.value)">
<option ${r.Status==="PENDING"?"selected":""}>PENDING</option>
<option ${r.Status==="SENT"?"selected":""}>SENT</option>
<option ${r.Status==="SUCCESS"?"selected":""}>SUCCESS</option>
<option ${r.Status==="RTS"?"selected":""}>RTS</option>
</select>

<button onclick="remove('${r.ID}')">DELETE</button>
`;

root.appendChild(div);

});

}

////////////////////////////////////////////////////
// SAFE FIELD UPDATES
////////////////////////////////////////////////////
async function updateName(id,val){
let r=DB.find(x=>x.ID===id);
r.Name=val;r.UpdatedAt=Date.now();
await put(r);load();
}

async function updateAddr(id,val){
let r=DB.find(x=>x.ID===id);
r.Address=val;r.UpdatedAt=Date.now();
await put(r);load();
}

////////////////////////////////////////////////////
// INIT
////////////////////////////////////////////////////
openDB().then(load);

////////////////////////////////////////////////////
// EXPORT / RESET
////////////////////////////////////////////////////
async function exportDB(){
let all=await getAll();
let b=new Blob([JSON.stringify(all)],{type:"application/json"});
let a=document.createElement("a");
a.href=URL.createObjectURL(b);
a.download="vault_industrial.json";
a.click();
}

function wipe(){
indexedDB.deleteDatabase(DB_NAME);
location.reload();
}

</script>

</body>
</html>
