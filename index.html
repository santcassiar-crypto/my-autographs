
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VaultOS SR15+ Collector Edition</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
:root{--bg:#020617;--panel:#0f172a;--panel2:#1e293b;--line:#334155;--accent:#38bdf8;--text:#f8fafc}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Arial;display:flex;min-height:100vh}
aside{width:260px;background:#01040d;padding:20px;border-right:1px solid var(--line)}
main{flex:1;padding:20px}
button,input,select,textarea{
background:var(--panel2);color:white;border:1px solid var(--line);
border-radius:8px;padding:10px;margin:4px;width:100%
}
button{cursor:pointer}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:18px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.stat{background:var(--panel2);padding:18px;border-radius:12px}
.stat b{font-size:28px;color:var(--accent)}
table{width:100%;border-collapse:collapse}
td,th{padding:10px;border-bottom:1px solid var(--line)}
.hidden{display:none}
textarea{width:100%;height:120px}
</style>
</head>

<body>

<aside>
<h2>VaultOS SR15+</h2>
<p>Collector Command Centre</p>

<button onclick="page('dash')">Dashboard</button>
<button onclick="page('targets')">Targets</button>
<button onclick="page('bulk')">Bulk Import</button>

<button onclick="exportVault()">Export Backup</button>
<input type="file" id="importFile" accept=".json">
</aside>

<main>

<!-- DASH -->
<section id="dash">
<div class="card">
<h1>Dashboard</h1>
<div class="grid">
<div class="stat">Targets <b id="cTotal">0</b></div>
<div class="stat">Sent <b id="cSent">0</b></div>
<div class="stat">Waiting <b id="cWaiting">0</b></div>
<div class="stat">Success <b id="cSuccess">0</b></div>
</div>
</div>

<div class="card">
<h2>Notes</h2>
<textarea id="notes"></textarea>
</div>
</section>

<!-- TARGETS -->
<section id="targets" class="hidden">

<div class="card">
<h2>Add Target</h2>

<input id="name" placeholder="Name">
<input id="sport" placeholder="Sport/Field">
<input id="team" placeholder="Team/Show/Org">
<input id="method" placeholder="Method">
<input id="sentDate" placeholder="Date Sent">
<input id="address" placeholder="Possible Address Sent">

<select id="status">
<option>Research</option>
<option>Ready</option>
<option>Sent</option>
<option>Waiting</option>
<option>Success</option>
<option>RTS</option>
</select>

<button onclick="addTarget()">Save Target</button>
</div>

<div class="card">
<input id="search" placeholder="Search..." oninput="renderTargets()">

<table>
<thead>
<tr>
<th>Name</th>
<th>Field</th>
<th>Status</th>
<th>Address</th>
<th></th>
</tr>
</thead>
<tbody id="targetList"></tbody>
</table>
</div>

</section>

<!-- BULK ADDRESS ENGINE -->
<section id="bulk" class="hidden">

<div class="card">
<h2>Bulk Name → Address Suggestion Engine</h2>

<p>Paste names (one per line):</p>
<textarea id="bulkInput" placeholder="Gary Oldman&#10;Geoff Hurst&#10;Wendell Pierce"></textarea>

<button onclick="suggestAddresses()">Suggest Addresses</button>

<div class="card">
<table>
<thead>
<tr>
<th>Name</th>
<th>Suggested Address Route</th>
</tr>
</thead>
<tbody id="bulkOutput"></tbody>
</table>
</div>

</div>

</section>

</main>

<script>

const $ = id => document.getElementById(id);

let vault = JSON.parse(localStorage.getItem("VaultOS_SR15")) || {
version:"SR15",
targets:[],
notes:""
};

function save(){
localStorage.setItem("VaultOS_SR15", JSON.stringify(vault));
}

function page(id){
["dash","targets","bulk"].forEach(x=>$(x).classList.add("hidden"));
$(id).classList.remove("hidden");
}

/* SIMPLE DOMAIN ROUTING ENGINE (offline heuristics) */
function guessAddress(name){

name = name.toLowerCase();

if(name.includes("hurst")) return "Football Club / Stadium Association Contact Route";
if(name.includes("oldman")) return "Theatre / Production Agency / Film Studio Contact Route";
if(name.includes("pierce")) return "TV/Film Production Studio or Agency Contact Route";
if(name.includes("actor") || name.includes("film")) return "Production Company / Agency Routing";
if(name.includes("player") || name.includes("fc")) return "Club Stadium / Sports Association Route";

return "General Agency / Management / Public Organisation Contact Route";
}

/* BULK ENGINE */
function suggestAddresses(){

const lines = $("bulkInput").value.split("\n").map(x=>x.trim()).filter(Boolean);

$("bulkOutput").innerHTML = lines.map(name=>`
<tr>
<td>${name}</td>
<td>${guessAddress(name)}</td>
</tr>
`).join("");
}

/* TARGETS */
function addTarget(){

vault.targets.push({
id:Date.now(),
name:$("name").value || "",
sport:$("sport").value || "",
team:$("team").value || "",
method:$("method").value || "",
sent:$("sentDate").value || "",
status:$("status").value || "Research",
address:$("address").value || ""
});

save();
renderTargets();
update();
}

/* RENDER */
function renderTargets(){

const q = ($("search")?.value || "").toLowerCase();

$("targetList").innerHTML = vault.targets
.filter(t=>JSON.stringify(t).toLowerCase().includes(q))
.map((t,i)=>`
<tr>
<td>${t.name}</td>
<td>${t.sport}</td>
<td>${t.status}</td>
<td>${t.address || ""}</td>
<td><button onclick="removeTarget(${i})">X</button></td>
</tr>
`).join("");
}

function removeTarget(i){
vault.targets.splice(i,1);
save();
renderTargets();
update();
}

/* STATS */
function update(){
$("cTotal").textContent = vault.targets.length;
$("cSent").textContent = vault.targets.filter(x=>x.status==="Sent").length;
$("cWaiting").textContent = vault.targets.filter(x=>x.status==="Waiting").length;
$("cSuccess").textContent = vault.targets.filter(x=>x.status==="Success").length;
$("notes").value = vault.notes || "";
}

$("notes").oninput = ()=>{
vault.notes = $("notes").value;
save();
};

/* EXPORT */
function exportVault(){
const a=document.createElement("a");
a.href="data:text/json;charset=utf-8,"+
encodeURIComponent(JSON.stringify(vault,null,2));
a.download="VaultOS_SR15Plus.json";
a.click();
}

/* IMPORT */
$("importFile").addEventListener("change",(e)=>{
const file=e.target.files?.[0];
if(!file)return;

const r=new FileReader();

r.onload=()=>{
try{
const d=JSON.parse(r.result||"{}");

vault={
version:"SR15",
targets:(d.targets||[]).map(t=>({
id:t.id||Date.now(),
name:t.name||"",
sport:t.sport||"",
team:t.team||"",
method:t.method||"",
sent:t.sent||"",
status:t.status||"Research",
address:t.address||""
})),
notes:d.notes||""
};

save();
renderTargets();
update();

alert("Import successful");

}catch(err){
alert("Import failed: "+err.message);
}
};

r.readAsText(file);
});

renderTargets();
update();

</script>

</body>
</html>
