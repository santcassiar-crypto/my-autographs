<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registry Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: #f0f0f0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: #161616; border: 1px solid #262626; border-radius: 12px; margin-bottom: 8px; border-left: 4px solid #525252; }
        .status-success { border-left-color: #22c55e; }
        .status-sent { border-left-color: #3b82f6; }
        .status-rts { border-left-color: #ef4444; }
        .sticky-header { position: sticky; top: 0; z-index: 50; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #262626; }
    </style>
</head>
<body class="pb-20">

    <div class="max-w-md mx-auto">
        <div class="sticky-header p-5">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-xl font-black italic text-red-600 italic tracking-tighter">REGISTRY PRO</h1>
                <div class="flex gap-3 text-[10px] font-bold">
                    <span class="text-green-500" id="count-win">0</span>
                    <span class="text-blue-500" id="count-sent">0</span>
                    <span class="text-zinc-500" id="count-total">0</span>
                </div>
            </div>
            
            <div class="bg-zinc-900 p-3 rounded-xl border border-zinc-800 mb-4 text-xs">
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <input type="text" id="newName" placeholder="Name" class="bg-black border border-zinc-700 p-2 rounded">
                    <input type="text" id="newCat" placeholder="Category" class="bg-black border border-zinc-700 p-2 rounded">
                </div>
                <button onclick="addRecord()" class="w-full bg-red-600 p-2 rounded font-black uppercase italic">Add Entry</button>
            </div>

            <input type="text" id="search" placeholder="Search..." class="w-full bg-zinc-900 p-3 rounded-xl text-sm border border-zinc-800" onkeyup="render()">
        </div>

        <div class="p-4" id="list"></div>

        <div class="p-6">
            <button onclick="downloadBackup()" class="w-full bg-zinc-800 border border-zinc-700 py-4 rounded-xl text-[10px] font-black uppercase tracking-widest text-zinc-400">
                💾 Download GitHub Backup (HTML)
            </button>
        </div>
    </div>

    <script id="master-script">
        // MASTER DATA - This is what gets updated on backup
        let records = JSON.parse(localStorage.getItem('autograph_db')) || [
            {"ID":1, "Name":"Sample Entry", "Status":"PENDING", "Category":"Tennis"}
        ];

        const states = ["PENDING", "SENT", "SUCCESS", "RTS"];

        function toggle(id) {
            const idx = records.findIndex(r => r.ID === id);
            let cur = records[idx].Status;
            records[idx].Status = states[(states.indexOf(cur) + 1) % states.length];
            saveAndRender();
        }

        function addRecord() {
            const n = document.getElementById('newName').value;
            const c = document.getElementById('newCat').value;
            if(!n) return;
            records.push({ ID: Date.now(), Name: n, Category: c, Status: "PENDING" });
            document.getElementById('newName').value = '';
            saveAndRender();
        }

        function deleteRec(id) {
            if(confirm('Delete?')) {
                records = records.filter(r => r.ID !== id);
                saveAndRender();
            }
        }

        function saveAndRender() {
            localStorage.setItem('autograph_db', JSON.stringify(records));
            render();
        }

        function render() {
            const q = document.getElementById('search').value.toLowerCase();
            const list = document.getElementById('list');
            list.innerHTML = '';
            let win=0, sent=0;

            records.sort((a,b) => b.ID - a.ID).forEach(r => {
                if (r.Status === "SUCCESS") win++;
                if (r.Status === "SENT") sent++;
                if (!r.Name.toLowerCase().includes(q)) return;

                const div = document.createElement('div');
                div.className = `card p-4 flex justify-between items-center status-${r.Status.toLowerCase()}`;
                div.innerHTML = `
                    <div>
                        <div class="font-bold text-sm">${r.Name}</div>
                        <div class="text-[9px] text-zinc-500 uppercase font-black">${r.Category}</div>
                    </div>
                    <div class="flex items-center gap-3">
                        <div onclick="toggle(${r.ID})" class="text-[10px] font-black px-2 py-1 bg-black rounded border border-zinc-800 cursor-pointer">
                            ${r.Status}
                        </div>
                        <button onclick="deleteRec(${r.ID})" class="text-zinc-800 text-xs">✕</button>
                    </div>
                `;
                list.appendChild(div);
            });
            document.getElementById('count-win').innerText = `WIN: ${win}`;
            document.getElementById('count-sent').innerText = `SENT: ${sent}`;
            document.getElementById('count-total').innerText = `TOTAL: ${records.length}`;
        }

        function downloadBackup() {
            const currentCode = document.documentElement.outerHTML;
            // This replaces the old data in the code with your live phone data
            const updatedCode = currentCode.replace(
                /let records = JSON\.parse\(localStorage\.getItem\('autograph_db'\)\) \|\| \[.*?\];/s,
                `let records = JSON.parse(localStorage.getItem('autograph_db')) || ${JSON.stringify(records)};`
            );
            
            const blob = new Blob([updatedCode], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'index.html';
            a.click();
        }

        render();
    </script>
</body>
</html>
