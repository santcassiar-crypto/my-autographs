<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>VaultOS SR6 Intelligence</title>

<style>

*{
box-sizing:border-box
}

body{
margin:0;
background:#070b14;
color:#fff;
font-family:Arial,Helvetica,sans-serif;
padding:20px
}

h1{
color:#60a5fa;
margin-bottom:5px
}

h2{
color:#93c5fd
}

.small{
color:#94a3b8;
font-size:13px
}


.card{
background:#111827;
border-radius:12px;
padding:18px;
margin-bottom:18px;
box-shadow:0 0 15px #000
}


.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px
}


.stat{
background:#1f2937;
padding:15px;
border-radius:10px
}


.stat-title{
font-size:13px;
color:#94a3b8
}


.stat-number{
font-size:30px;
color:#34d399;
margin-top:5px
}


button{

background:#2563eb;
border:0;
padding:10px 14px;
border-radius:7px;
color:white;
cursor:pointer;
margin:3px

}


button:hover{
background:#1d4ed8
}


input,select,textarea{

width:100%;
background:#020617;
border:1px solid #374151;
color:white;
padding:9px;
border-radius:6px

}


.tabs{

display:flex;
gap:8px;
flex-wrap:wrap

}


.tab{

background:#1e293b

}


.live{

color:#34d399;
font-weight:bold

}


.feed{

max-height:250px;
overflow:auto

}


.feed-item{

padding:8px;
border-bottom:1px solid #374151;
font-size:14px

}


.high{
color:#34d399
}

.medium{
color:#fbbf24
}

.low{
color:#f87171
}


table{

width:100%;
border-collapse:collapse

}


th,td{

padding:9px;
border-bottom:1px solid #374151;
text-align:left

}


th{

color:#93c5fd

}


.hidden{
display:none
}


</style>

</head>

<body>


<h1>VaultOS SR6</h1>

<div class="small">
Autograph Target Intelligence System |
<span class="live">● LIVE</span>
</div>



<div class="card">

<h2>Live Dashboard</h2>


<div class="grid">


<div class="stat">
<div class="stat-title">
TOTAL TARGETS
</div>
<div class="stat-number" id="totalTargets">
0
</div>
</div>


<div class="stat">
<div class="stat-title">
RESEARCH QUEUE
</div>
<div class="stat-number" id="researchCount">
0
</div>
</div>


<div class="stat">
<div class="stat-title">
ACTIVE REQUESTS
</div>
<div class="stat-number" id="activeCount">
0
</div>
</div>


<div class="stat">
<div class="stat-title">
RETURNS
</div>
<div class="stat-number" id="returnCount">
0
</div>
</div>


<div class="stat">
<div class="stat-title">
HIGH PRIORITY
</div>
<div class="stat-number" id="priorityCount">
0
</div>
</div>


</div>


<br>

<div>
Last update:
<span id="lastUpdate">
-
</span>
</div>


</div>




<div class="card">


<h2>Activity Feed</h2>

<div class="feed" id="activity">

</div>


</div>





<div class="card">


<div class="tabs">

<button class="tab" onclick="showTab('dashboard')">
Dashboard
</button>

<button class="tab" onclick="showTab('targets')">
Targets
</button>

<button class="tab" onclick="showTab('research')">
Research
</button>

<button class="tab" onclick="showTab('returns')">
Returns
</button>

</div>


</div>





<div id="dashboard">

<div class="card">

<h2>Intelligence Summary</h2>

<p id="summary">

Waiting for data...

</p>

</div>

</div>





<div id="targets" class="hidden">

<div class="card">

<h2>Active Targets</h2>

<div id="targetArea">

</div>

</div>

</div>





<div id="research" class="hidden">

<div class="card">

<h2>Research Queue</h2>

<div id="researchArea">

</div>

</div>

</div>





<div id="returns" class="hidden">

<div class="card">

<h2>Return Tracking</h2>

<div id="returnArea">

</div>

</div>

</div>






<script>


let vault={

targets:[],
research:[],
returns:[],
activity:[]

};





function save(){

localStorage.setItem(
"VaultOS_SR6",
JSON.stringify(vault)
);

}





function load(){

let data=
localStorage.getItem("VaultOS_SR6");


if(data){

vault=JSON.parse(data);

}

}




function logAction(text){

vault.activity.unshift({

time:new Date().toLocaleString(),

text:text

});


vault.activity=
vault.activity.slice(0,50);

}





function score(x){


let s=0;


if(x.priority=="★★★★★")
s+=50;

else if(x.priority=="★★★★")
s+=40;

else if(x.priority=="★★★")
s+=30;


if(x.status=="RETURNED")
s+=40;

if(x.status=="SENT")
s+=20;


return s;


}






function updateDashboard(){


document.getElementById(
"totalTargets"
).innerHTML=
vault.targets.length;


document.getElementById(
"researchCount"
).innerHTML=
vault.research.length;


document.getElementById(
"activeCount"
).innerHTML=
vault.targets.filter(
x=>x.status=="SENT"||
x.status=="WAITING"
).length;


document.getElementById(
"returnCount"
).innerHTML=
vault.returns.length;


document.getElementById(
"priorityCount"
).innerHTML=
vault.targets.filter(
x=>score(x)>=70
).length;



document.getElementById(
"lastUpdate"
).innerHTML=
new Date().toLocaleTimeString();



document.getElementById(
"activity"
).innerHTML=
vault.activity.map(x=>

`
<div class="feed-item">
${x.time}<br>
${x.text}
</div>

`

).join("");



save();

}




function showTab(name){


["dashboard","targets","research","returns"]

.forEach(x=>{

document.getElementById(x)
.classList.add("hidden");

});


document.getElementById(name)
.classList.remove("hidden");


}




setInterval(updateDashboard,1000);


load();

updateDashboard();


</script>

  <script>


function addTarget(){


let name=
prompt("Target name");


if(!name)return;


vault.targets.push({

id:Date.now(),

name:name,

category:"Sports",

route:"",

status:"RESEARCH",

priority:"★★★",

notes:""

});


logAction(
"New target added: "+name
);


updateDashboard();

renderTargets();

}




function addResearch(){


let name=
prompt("Research target name");


if(!name)return;


vault.research.push({

id:Date.now(),

name:name,

category:"",

route:"",

potential:"Medium",

decision:"WATCH",

notes:""


});


logAction(
"Research added: "+name
);


updateDashboard();

renderResearch();


}







function moveToTargets(i){


let x=vault.research[i];


vault.targets.push({

id:Date.now(),

name:x.name,

category:x.category,

route:x.route,

status:"RESEARCH",

priority:"★★★",

notes:x.notes


});


vault.research.splice(i,1);


logAction(
x.name+" moved from research to targets"
);


updateDashboard();

renderResearch();

renderTargets();


}





function markReturned(i){


let x=vault.targets[i];


x.status="RETURNED";


vault.returns.push(x);


vault.targets.splice(i,1);


logAction(
x.name+" marked as returned"
);


updateDashboard();

renderTargets();

renderReturns();


}






function renderTargets(){


let area=
document.getElementById("targetArea");


if(!area)return;


area.innerHTML=`

<button onclick="addTarget()">
+ Add Target
</button>

<table>

<tr>

<th>Name</th>
<th>Status</th>
<th>Priority</th>
<th>Score</th>
<th>Notes</th>
<th></th>

</tr>


${
vault.targets.map((x,i)=>`

<tr>

<td>${x.name}</td>

<td>
<select onchange="changeStatus(${i},this.value)">

<option ${x.status=="RESEARCH"?"selected":""}>
RESEARCH
</option>

<option ${x.status=="SENT"?"selected":""}>
SENT
</option>

<option ${x.status=="WAITING"?"selected":""}>
WAITING
</option>

<option ${x.status=="RETURNED"?"selected":""}>
RETURNED
</option>


</select>
</td>


<td>
<select onchange="changePriority(${i},this.value)">

<option>${x.priority}</option>

<option>★★★★★</option>
<option>★★★★</option>
<option>★★★</option>
<option>★★</option>
<option>★</option>

</select>
</td>


<td>
${score(x)}%
</td>


<td>
<input value="${x.notes}"
onchange="changeNote(${i},this.value)">
</td>


<td>

<button onclick="markReturned(${i})">
Return
</button>

</td>


</tr>

`).join("")
}


</table>

`;

}





function renderResearch(){


let area=
document.getElementById("researchArea");


if(!area)return;


area.innerHTML=`

<button onclick="addResearch()">
+ Add Research
</button>


<table>

<tr>

<th>Name</th>
<th>Potential</th>
<th>Decision</th>
<th>Notes</th>
<th></th>

</tr>


${
vault.research.map((x,i)=>`

<tr>

<td>
${x.name}
</td>


<td>
<select onchange="x.potential=this.value;save()">

<option>${x.potential}</option>
<option>High</option>
<option>Medium</option>
<option>Low</option>

</select>
</td>


<td>
${x.decision}
</td>


<td>
<input value="${x.notes}"
onchange="x.notes=this.value;save()">
</td>


<td>

<button onclick="moveToTargets(${i})">
Promote
</button>

</td>


</tr>

`).join("")
}

</table>

`;

}







function renderReturns(){


let area=
document.getElementById("returnArea");


if(!area)return;


area.innerHTML=`

<table>

<tr>

<th>Name</th>
<th>Notes</th>

</tr>


${
vault.returns.map(x=>`

<tr>

<td>${x.name}</td>

<td>${x.notes}</td>

</tr>


`).join("")
}

</table>

`;

}






function changeStatus(i,v){

vault.targets[i].status=v;


logAction(
vault.targets[i].name+
" status changed to "+
v
);


updateDashboard();

renderTargets();

}




function changePriority(i,v){

vault.targets[i].priority=v;

updateDashboard();

renderTargets();

}





function changeNote(i,v){

vault.targets[i].notes=v;

save();

}








function importVaultJSON(){


let input=document.createElement("input");

input.type="file";

input.accept=".json";


input.onchange=e=>{


let file=e.target.files[0];


let reader=new FileReader();


reader.onload=function(){

let data=
JSON.parse(reader.result);


if(Array.isArray(data)){


vault.targets=
data.map(x=>({

name:x.Name||x.name||"Unknown",

route:x.Route||x.route||"",

status:x.Status||x.status||"RESEARCH",

priority:"★★★",

notes:x.Notes||x.notes||""

}));


}


logAction(
"JSON import completed"
);


updateDashboard();

renderTargets();


};


reader.readAsText(file);


};


input.click();


}







function exportVault(){


let blob=new Blob(

[
JSON.stringify(vault,null,2)
],

{
type:"application/json"
}

);


let a=document.createElement("a");


a.href=
URL.createObjectURL(blob);


a.download=
"VaultOS_SR6_Backup.json";


a.click();


}







// initial render

renderTargets();

renderResearch();

renderReturns();


</script>
