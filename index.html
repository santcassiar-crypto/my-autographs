<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TTM OS PRO+</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#0b0b0b;
  color:#fff;
  margin:0;
}

header{
  background:#111;
  padding:12px;
  position:sticky;
  top:0;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:#111;
  border:1px solid #222;
  border-radius:10px;
  padding:12px;
  margin:10px;
}

input,textarea,button,select{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid #333;
  background:#181818;
  color:#fff;
}

button{cursor:pointer}

.record{
  padding:8px;
  border-bottom:1px solid #222;
}

.small{font-size:12px;color:#aaa}

.badge{
  padding:2px 6px;
  background:#222;
  border-radius:6px;
  font-size:11px;
}
</style>
</head>

<body>

<header>
<h2>TTM OS PRO+ — Decision Engine</h2>
<input id="search" placeholder="Search targets...">
</header>

<div class="grid" id="stats"></div>

<div class="card">
<h3>➕ Add Targets</h3>
<textarea id="bulk" placeholder="One target per line"></textarea>
<button onclick="addTargets()">Add</button>
</div>

<div class="card">
<h3>📌 Update Status</h3>
<input id="u_name" placeholder="Target name">
<select id="u_status">
<option>PENDING</option>
<option>SENT</option>
<option>SUCCESS</option>
<option>RTS</option>
<option>LOGGED</option>
</select>
<button onclick="updateStatus()">Update</button>
</div>

<div class="card">
<h3>📊 7-Day Priority Plan</h3>
<div id="plan"></div>
</div>

<div class="card">
<h3>🎯 Live Send Queue</h3>
<div id="queue"></div>
</div>

<div class="card">
<h3>🧠 Intelligence Layer</h3>
<div id="intel"></div>
</div>

<div class="card">
<h3>💾 Backup</h3>
<input type="file" id="file">
<button onclick="importJSON()">Import</button>
<button onclick="exportJSON()">Export</button>
<div id="backup" class="small"></div>
</div>

<div class="card">
<h3>📋 All Targets</h3>
<div id="list"></div>
</div>

<script>

/* =========================
   CORE SYSTEM
========================= */

const KEY = "ttm_os_pro_plus";

let DB = load();

function load(){
  const raw = JSON.parse(localStorage.getItem(KEY)||"{}");
  return raw.records ? raw : {records:[],meta:{}};
}

function save(){
  localStorage.setItem(KEY,JSON.stringify(DB));
}

/* =========================
   NORMALISATION LAYER
========================= */

function norm(s){
  if(!s) return "PENDING";
  s = String(s).trim().toUpperCase();

  if(s.includes("PEND")) return "PENDING";
  if(s.includes("SUCCESS")) return "SUCCESS";
  if(s.includes("RTS") || s.includes("FAIL")) return "RTS";
  if(s.includes("LOG")) return "LOGGED";
  if(s.includes("SENT")) return "SENT";

  return "PENDING";
}

/* =========================
   ADD / UPDATE
========================= */

function addTargets(){
  const lines = document.getElementById("bulk").value
    .split("\n").map(x=>x.trim()).filter(Boolean);

  lines.forEach(n=>{
    DB.records.push({
      id: Date.now()+Math.random(),
      name:n,
      status:"PENDING",
      history:[],
      created:Date.now()
    });
  });

  document.getElementById("bulk").value="";
  save();
  render();
}

function updateStatus(){
  const name = document.getElementById("u_name").value.toLowerCase();
  const status = norm(document.getElementById("u_status").value);

  DB.records.forEach(r=>{
    if(r.name.toLowerCase() === name){
      r.status = status;
    }
  });

  save();
  render();
}

/* =========================
   ENGINE CORE
========================= */

function baseScore(r){
  let s = 50;

  if(r.status === "SUCCESS") s += 40;
  if(r.status === "SENT") s += 15;
  if(r.status === "RTS") s -= 35;
  if(r.status === "LOGGED") s += 5;

  const n = r.name.toLowerCase();
  if(n.includes("event")) s += 10;
  if(n.includes("training")) s -= 5;

  return s;
}

function trend(r){
  if(!r.history || r.history.length < 2) return 0;
  return r.history[r.history.length-1] - r.history[0];
}

/* FINAL PRO+ SCORING */
function score(r){
  const s = baseScore(r);
  const t = trend(r);

  return Math.max(0,Math.min(100, s + t * 1.3));
}

/* =========================
   LEARNING LOOP
========================= */

function learn(){
  DB.records.forEach(r=>{
    if(!r.history) r.history=[];
    r.history.push(baseScore(r));
    if(r.history.length > 12) r.history.shift();
  });
}

/* =========================
   DEDUPE ENGINE
========================= */

function dedupe(){
  const map = new Map();

  DB.records.forEach(r=>{
    const k = r.name.trim().toLowerCase();

    if(!map.has(k)){
      map.set(k,r);
    } else {
      const ex = map.get(k);

      if(r.status === "SUCCESS") ex.status = "SUCCESS";
      if(r.status === "RTS" && ex.status !== "SUCCESS") ex.status = "RTS";
    }
  });

  DB.records = [...map.values()];
}

/* =========================
   LIVE QUEUE
========================= */

function queue(){
  return DB.records
    .filter(r=>r.status==="PENDING")
    .sort((a,b)=>score(b)-score(a))
    .slice(0,10);
}

/* =========================
   7-DAY PLAN ENGINE (PRO+ FEATURE)
========================= */

function plan(){
  return DB.records
    .filter(r=>r.status==="PENDING")
    .sort((a,b)=>score(b)-score(a))
    .slice(0,7);
}

/* =========================
   INTELLIGENCE
========================= */

function intel(){
  return queue().slice(0,5);
}

/* =========================
   IMPORT / EXPORT
========================= */

function exportJSON(){
  const blob = new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="ttm_pro_plus.json";
  a.click();
}

function importJSON(){
  const file=document.getElementById("file").files[0];
  if(!file) return;

  const reader=new FileReader();

  reader.onload=e=>{
    const data=JSON.parse(e.target.result);
    const records = Array.isArray(data)?data:data.records||[];

    DB.records = records.map(r=>({
      id:r.id||Date.now()+Math.random(),
      name:r.name||r.Name||"",
      status:norm(r.status||r.Status),
      history:r.history||[],
      created:r.created||Date.now()
    }));

    save();
    render();
    document.getElementById("backup").innerText =
      "Loaded " + DB.records.length + " targets";
  };

  reader.readAsText(file);
}

/* =========================
   RENDER ENGINE
========================= */

function render(){

  dedupe();
  learn();

  const total = DB.records.length;
  const pending = DB.records.filter(r=>r.status==="PENDING").length;
  const success = DB.records.filter(r=>r.status==="SUCCESS").length;
  const sent = DB.records.filter(r=>r.status==="SENT").length;
  const rts = DB.records.filter(r=>r.status==="RTS").length;

  document.getElementById("stats").innerHTML = `
    <div class="card"><h2>${total}</h2>Total</div>
    <div class="card"><h2>${pending}</h2>Pending</div>
    <div class="card"><h2>${sent}</h2>Sent</div>
    <div class="card"><h2>${success}</h2>Success</div>
    <div class="card"><h2>${rts}</h2>RTS</div>
  `;

  document.getElementById("queue").innerHTML =
    queue().map(r=>`
      🎯 ${r.name}
      <span class="badge">${score(r).toFixed(0)}%</span>
    `).join("<br>");

  document.getElementById("plan").innerHTML =
    plan().map(r=>`
      📅 ${r.name}
      <span class="badge">${score(r).toFixed(0)}</span>
    `).join("<br>");

  document.getElementById("intel").innerHTML =
    intel().map(r=>`
      ⚡ ${r.name} → ${score(r).toFixed(0)}
    `).join("<br>");

  const q=(document.getElementById("search").value||"").toLowerCase();

  document.getElementById("list").innerHTML =
    DB.records
      .filter(r=>r.name.toLowerCase().includes(q))
      .map(r=>`
        <div class="record">
          <b>${r.name}</b><br>
          <span class="small">${r.status}</span>
        </div>
      `).join("");

  save();
}

/* INIT */
render();

</script>

</body>
</html>
