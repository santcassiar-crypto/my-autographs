<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VaultPro v5 FIXED</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#050505; color:#e5e7eb; font-family:sans-serif; }
.card { background:#111113; border:1px solid #27272a; border-radius:12px; }
.tab { cursor:pointer; padding:6px 10px; font-size:11px; border-radius:6px; }
.active { background:#dc2626; color:white; }
select { background:#000; color:#fff; font-size:11px; }
.small { font-size:10px; opacity:0.7; }
.good { border-left:4px solid #22c55e; }
.mid { border-left:4px solid #f59e0b; }
.low { border-left:4px solid #ef4444; }
</style>
</head>

<body class="pb-24">

<div class="bg-red-600 text-white text-[10px] font-bold text-center py-1">
VAULTPRO v5 FIXED • FULL DATA RESTORED
</div>

<div class="max-w-6xl mx-auto p-4">

<h1 class="text-3xl font-black mb-2">VAULT<span class="text-red-600">PRO</span> v5</h1>

<div class="flex gap-2 mb-3">
<div class="tab active" onclick="switchTab('vault')">VAULT</div>
<div class="tab" onclick="switchTab('opt')">OPTIMISER</div>
<div class="tab" onclick="switchTab('stats')">ANALYTICS</div>
</div>

<input id="search" oninput="render()" placeholder="Search..." class="w-full bg-zinc-900 p-2 text-xs rounded border border-zinc-800 mb-3">

<div id="vault"></div>
<div id="opt" class="hidden"></div>
<div id="stats" class="hidden"></div>

</div>

<script>

/* =========================
FULL RESTORED DATASET (YOUR INPUT)
========================= */

let DB = [
{"ID":1779457614274,"Name":"Scott Melvin- Stick to football podcast","Status":"PENDING"},
{"ID":1779457583433,"Name":"Jonathan ross tv show","Status":"PENDING"},
{"ID":1779457568898,"Name":"Matchroom - Brentwood","Status":"PENDING"},
{"ID":1779457518143,"Name":"Kevin Keegan- Home","Status":"SUCCESS"},
{"ID":1779457496694,"Name":"George Graham - Home ","Status":"PENDING"},
{"ID":1779457449900,"Name":"LFC Gala Event","Status":"PENDING"},
{"ID":1779457437040,"Name":"Gosh4 Goals","Status":"PENDING"},
{"ID":1779457382999,"Name":"San Antonio Training Centre ","Status":"PENDING"},
{"ID":1779457367391,"Name":"OKC training centre","Status":"PENDING"},
{"ID":1779457333472,"Name":"FC Barcelona - Training ground","Status":"PENDING"},
{"ID":1779457307017,"Name":"Gary Oldman ","Status":"SUCCESS"},
{"ID":1779457276281,"Name":"Arsenal womens team","Status":"PENDING"},
{"ID":1779457232607,"Name":"Park theatre x 2 ","Status":"PENDING"},
{"ID":1779457195881,"Name":"Jermery Sochan","Status":"PENDING"},
{"ID":1779369334553,"Name":"Geoff Hurst ","Status":"LOGGED"},
{"ID":1779362415139,"Name":"Max Dowman - Dads London office","Status":"PENDING"},
{"ID":1,"Name":"Jannik Sinner","Status":"SUCCESS"},
{"ID":2,"Name":"Keanu Reeves","Status":"RTS"},
{"ID":3,"Name":"Alan Carr","Status":"SUCCESS"},
{"ID":4,"Name":"Harry Kane (Bayern)","Status":"RTS"},
{"ID":5,"Name":"David Attenborough","Status":"SUCCESS"},
{"ID":6,"Name":"Paul Merson (Original)","Status":"SUCCESS"},
{"ID":7,"Name":"Tony Adams","Status":"SUCCESS"},
{"ID":8,"Name":"Joshua Kimmich","Status":"SUCCESS"},
{"ID":9,"Name":"Ron Ferdinand","Status":"SUCCESS"},
{"ID":10,"Name":"Erling Haaland (City)","Status":"SUCCESS"},
{"ID":11,"Name":"Lamine Yamal (Home)","Status":"RTS"},
{"ID":12,"Name":"Rosie Jones","Status":"SUCCESS"},
{"ID":13,"Name":"Kevin Bridges","Status":"SUCCESS"},
{"ID":14,"Name":"Lee Mack","Status":"SUCCESS"},
{"ID":15,"Name":"Chris Waddle","Status":"SUCCESS"},
{"ID":16,"Name":"Ivo Graham","Status":"SUCCESS"},
{"ID":17,"Name":"Josh Widdicombe","Status":"SUCCESS"},
{"ID":18,"Name":"Timothée Chalamet","Status":"Sent"}
];

/* =========================
CORE
========================= */

function score(r){
let s=50;
if(r.Status==="SUCCESS") s+=25;
if(r.Status==="RTS") s-=25;
if(r.Status==="Sent") s-=10;
if(r.Status==="LOGGED") s-=5;

let n=r.Name.toLowerCase();
if(n.includes("theatre")) s+=15;
if(n.includes("training")) s+=12;
if(n.includes("fc")) s+=10;

return s;
}

function switchTab(t){
["vault","opt","stats"].forEach(x=>{
document.getElementById(x).style.display = x===t?"block":"none";
});
}

/* =========================
UPDATE
========================= */

function update(id,val){
let r=DB.find(x=>x.ID===id);
if(r){r.Status=val; render();}
}

/* =========================
RENDER VAULT
========================= */

function render(){

let q=document.getElementById("search").value?.toLowerCase()||"";
let v=document.getElementById("vault");
v.innerHTML="";

DB.filter(r=>r.Name.toLowerCase().includes(q))
.sort((a,b)=>score(b)-score(a))
.forEach(r=>{

let sc=score(r);
let cls=sc>80?"good":sc>55?"mid":"low";

let div=document.createElement("div");
div.className="card p-3 flex justify-between items-center "+cls;

div.innerHTML=`
<div class="text-xs font-bold">${r.Name}</div>

<select onchange="update(${r.ID},this.value)">
<option ${r.Status==="SUCCESS"?"selected":""}>SUCCESS</option>
<option ${r.Status==="PENDING"?"selected":""}>PENDING</option>
<option ${r.Status==="Sent"?"selected":""}>Sent</option>
<option ${r.Status==="RTS"?"selected":""}>RTS</option>
<option ${r.Status==="LOGGED"?"selected":""}>LOGGED</option>
</select>
`;

v.appendChild(div);
});

renderOpt();
renderStats();
}

/* =========================
OPTIMISER
========================= */

function renderOpt(){

let top=[...DB]
.filter(x=>x.Status==="PENDING")
.sort((a,b)=>score(b)-score(a))
.slice(0,20);

document.getElementById("opt").innerHTML =
top.map(r=>`
<div class="card p-2 mb-2">
<div class="text-xs font-bold">${r.Name}</div>
<div class="small">Score ${score(r)}</div>
</div>
`).join("");
}

/* =========================
ANALYTICS
========================= */

function renderStats(){

let t=DB.length;
let s=DB.filter(x=>x.Status==="SUCCESS").length;
let p=DB.filter(x=>x.Status==="PENDING").length;
let r=DB.filter(x=>x.Status==="RTS").length;

document.getElementById("stats").innerHTML=`
<div class="card p-3 text-xs">
Total: ${t}<br>
Success: ${s}<br>
Pending: ${p}<br>
RTS: ${r}
</div>`;
}

render();

</script>

</body>
</html>
